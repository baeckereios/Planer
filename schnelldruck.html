<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schnelldruck – BäckereiOS</title>
<link rel="stylesheet" href="systemdesign.css">
<style>

  body { padding-bottom: 3rem; }

  .content {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 16px 0;
  }

  /* Titel-Eingabe */
  #titel {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    border-radius: 0;
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 1.6rem;
    color: var(--text);
    padding: 6px 2px 8px;
    margin-bottom: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  #titel::placeholder {
    color: var(--dim);
    font-weight: 300;
    font-style: italic;
    opacity: .7;
  }
  #titel:focus { border-bottom-color: var(--amber); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .toolbar .label { margin-bottom: 0; }
  .pill { font-size: 0.78rem; padding: 0 12px; height: 36px; min-width: unset; }

  /* Textarea */
  #notiz {
    width: 100%;
    min-height: 360px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  #notiz:focus { border-color: var(--amber); }
  #notiz::placeholder { color: var(--dim); opacity: .6; }

  .char-row {
    text-align: right;
    font-size: 0.72rem;
    color: var(--dim);
    margin-top: 4px;
    font-family: 'Barlow', sans-serif;
    min-height: 1.2em;
  }

  .btn-main {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-main svg { width: 17px; height: 17px; flex-shrink: 0; }

  .datum-hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--dim);
    margin-top: 8px;
    font-family: 'Barlow', sans-serif;
    letter-spacing: .04em;
  }

  /* ── DRUCKLAYOUT ── */
  @media print {
    html, body {
      background: #fff !important;
      color: #000 !important;
      margin: 0; padding: 0;
      height: auto;
    }
    .brand-header, .top-nav, .content { display: none !important; }

    #print-area {
      display: block !important;
      width: 100%;
      padding: 12mm 15mm;
      font-family: 'Barlow', sans-serif;
    }

    .pa-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid #000;
      padding-bottom: 5mm;
      margin-bottom: 7mm;
    }
    .pa-logo {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 20pt;
      letter-spacing: -.02em;
      line-height: 1;
    }
    .pa-logo em { color: #c07a10; font-style: italic; }
    .pa-logo-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 7pt;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      margin-top: 2mm;
    }
    .pa-meta {
      text-align: right;
      font-size: 8pt;
      color: #666;
      line-height: 1.7;
      font-family: 'Barlow', sans-serif;
    }
    .pa-titel {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 18pt;
      margin-bottom: 5mm;
      padding-bottom: 3mm;
      border-bottom: 1px solid #ddd;
    }
    .pa-body {
      font-family: 'Barlow', sans-serif;
      font-size: 11pt;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .pa-footer {
      margin-top: 12mm;
      border-top: 1px solid #ddd;
      padding-top: 3mm;
      display: flex;
      justify-content: space-between;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 7.5pt;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #bbb;
    }
  }

  #print-area { display: none; }

</style>
<script>
  (function(){ var t=localStorage.getItem('BOS_THEME')||'light'; document.documentElement.setAttribute('data-theme',t); })();
</script>
<script src="shell.js"></script>
</head>
<body>

<div class="brand-header">
  <div class="brand-logo">Bäckerei<span>OS</span></div>
  <div class="slogan-bar">Produktionssteuerung · Bäckerei Langrehr</div>
</div>

<div class="top-nav" style="max-width:680px; margin:0 auto;">
  <a href="index.html" class="btn-back-nav">← Zurück</a>
  <span class="page-subtitle">Schnelldruck</span>
  <span></span>
</div>

<div class="content">
  <div class="card">

    <div class="label">Überschrift</div>
    <input type="text" id="titel" placeholder="Titel (optional) …" maxlength="120" autocomplete="off">

    <div class="toolbar" style="margin-top:20px;">
      <span class="label" style="margin-right:4px;">Schriftgröße</span>
      <button class="pill" data-pt="9"  data-screen="12">Klein</button>
      <button class="pill active" data-pt="11" data-screen="15">Normal</button>
      <button class="pill" data-pt="13" data-screen="17">Groß</button>
      <button class="pill" data-pt="16" data-screen="20">XL</button>
    </div>

    <textarea id="notiz" placeholder="Notiz hier eingeben …" spellcheck="true"></textarea>
    <div class="char-row" id="charcount"></div>

    <button class="btn-main" onclick="drucken()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Drucken
    </button>

    <div class="datum-hint" id="datum-hint"></div>

  </div>
</div>

<div id="print-area">
  <div class="pa-header">
    <div>
      <div class="pa-logo">Bäckerei<em>OS</em></div>
      <div class="pa-logo-sub">Produktionssteuerung</div>
    </div>
    <div class="pa-meta" id="pa-meta"></div>
  </div>
  <div class="pa-titel" id="pa-titel"></div>
  <div class="pa-body"  id="pa-body"></div>
  <div class="pa-footer">
    <span>BäckereiOS · Schnelldruck</span>
    <span id="pa-footer-date"></span>
  </div>
</div>

<script>
  function formatDate(d) {
    const days   = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    const months = ['Januar','Februar','März','April','Mai','Juni','Juli',
                    'August','September','Oktober','November','Dezember'];
    return days[d.getDay()] + ', ' + d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }
  function formatTime(d) {
    return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  }

  document.getElementById('datum-hint').textContent = 'Ausdruck-Datum: ' + formatDate(new Date());

  const notiz     = document.getElementById('notiz');
  const charcount = document.getElementById('charcount');
  notiz.addEventListener('input', function() {
    var n = notiz.value.length;
    charcount.textContent = n > 0 ? n + ' Zeichen' : '';
  });

  var currentPt = 11;
  document.querySelectorAll('.pill[data-pt]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.pill[data-pt]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentPt = parseInt(btn.dataset.pt);
      notiz.style.fontSize = btn.dataset.screen + 'px';
    });
  });

  function drucken() {
    var text = notiz.value.trim();
    if (!text) {
      notiz.focus();
      notiz.style.borderColor = 'var(--red)';
      setTimeout(function() { notiz.style.borderColor = ''; }, 1200);
      return;
    }
    var d       = new Date();
    var dateStr = formatDate(d);
    var timeStr = formatTime(d);

    var titel   = document.getElementById('titel').value.trim();
    var paTitel = document.getElementById('pa-titel');
    paTitel.textContent  = titel;
    paTitel.style.display = titel ? 'block' : 'none';

    document.getElementById('pa-meta').innerHTML   = dateStr + '<br>' + timeStr + ' Uhr';
    document.getElementById('pa-body').textContent  = text;
    document.getElementById('pa-body').style.fontSize = currentPt + 'pt';
    document.getElementById('pa-footer-date').textContent = dateStr + ' · ' + timeStr;

    window.print();
  }
</script>
</body>
</html>
