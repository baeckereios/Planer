<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BäckereiOS — Produktionsverlauf Baguette</title>
<link rel="stylesheet" href="systemdesign.css">
<script src="inventurdaten.js"></script>
<script src="produktions_gehirn.js"></script>
<script src="shell.js" defer></script>

<style>
body { background: var(--background,#f8f6f2); color: var(--text-primary,#1a1a1a); padding-bottom: 100px; }
.container { max-width: 960px; margin: 0 auto; padding: 14px 12px; }

.card { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
.card-titel { font-size: 0.68rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim,#6b7280); margin-bottom: 10px; }
.produkt-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.produkt-chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; cursor: pointer; border: 2px solid var(--border-color,#e5e0d8); background: var(--card-bg,#fff); font-size: 0.82rem; font-weight: 700; color: var(--dim,#6b7280); user-select: none; transition: all 0.15s; }
.produkt-chip.aktiv { border-color: var(--amber,#d49a36); background: #fffbf0; color: var(--text-primary,#1a1a1a); }
.chip-dot { width:8px; height:8px; border-radius:50%; background:#d1d5db; transition:background 0.15s; }
.produkt-chip.aktiv .chip-dot { background: var(--amber,#d49a36); }

.btn-row { display:flex; gap:10px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
.druck-btn { font-family: inherit; font-size: 0.85rem; font-weight: 800; padding: 10px 20px; border-radius: 10px; border: none; background: #1e293b; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
.save-btn { font-family: inherit; font-size: 0.85rem; font-weight: 800; padding: 10px 20px; border-radius: 10px; border: 2px solid var(--amber,#d49a36); background: #fffbf0; color: var(--text-primary,#1a1a1a); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
.save-btn:active { background: var(--amber,#d49a36); color: #fff; }
.db-status { font-size: 0.72rem; color: var(--dim,#6b7280); font-weight: 700; }
.db-status.ok { color: #10b981; }
.db-status.err { color: #ef4444; }

.akk-wrap { margin-bottom: 10px; }
.akk-header { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; font-size: 0.9rem; font-weight: 800; }
.akk-header.open { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }
.akk-body { display: none; background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-top: none; border-radius: 0 0 12px 12px; overflow-x: auto; }
.akk-body.open { display: block; }
.akk-arrow { transition: transform 0.2s; font-size: 0.75rem; color: var(--dim,#6b7280); }
.akk-header.open .akk-arrow { transform: rotate(180deg); }

/* ── Screen-Tabelle ── */
.fv-outer { padding: 10px 12px 14px; }
.fv-table { border-collapse: collapse; width: 100%; table-layout: fixed; font-size: 0.78rem; }
.fv-table thead th { padding: 5px 6px; font-size: 0.62rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: var(--dim,#6b7280); border-bottom: 2px solid #1e293b; background: var(--card-bg,#fff); text-align: center; white-space: nowrap; }
.fv-table thead th.col-tag { text-align: left; width: 72px; }
.fv-table thead th.col-bst { width: 56px; }
.fv-table thead th.col-vbr { width: 56px; }
.fv-table thead th.col-avg { width: 44px; }

/* Zebra — auf tr damit beide Sub-Zeilen gleich gefärbt */
.fv-table tbody tr.z0 td { background: #f5f3ef; }
.fv-table tbody tr.z1 td { background: #ffffff; }

td.col-tag { border: 1px solid #cbd5e1; border-right: 1.5px solid #1e293b; vertical-align: middle; padding: 0 6px; }
.tag-inner { display: flex; flex-direction: column; justify-content: center; min-height: 50px; padding: 4px 0; }
.tag-wt { font-weight: 900; font-size: 0.84rem; }
.tag-dat { font-size: 0.67rem; color: var(--dim,#6b7280); font-weight: 600; }
.tag-heute .tag-wt { color: var(--amber,#d49a36); }

.cell-top { border-bottom: 1px dashed #e2e8f0; height: 25px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.cell-bot { height: 25px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

/* Produktions-Eingabe */
.prod-input {
  font-family: inherit; font-size: 0.82rem; font-weight: 800;
  width: 44px; text-align: center; padding: 2px 4px;
  border: 1.5px solid var(--amber,#d49a36); border-radius: 5px;
  background: #fffbf0; color: var(--text-primary,#1a1a1a);
}
.prod-input:focus { outline: none; background: #fff8e8; }
.prod-input::placeholder { color: #d1d5db; font-weight: 400; }

/* Verbrauchs-Eingabe — teal wenn manuell überschrieben, grau sonst */
.vbr-input {
  font-family: inherit; font-size: 0.82rem; font-weight: 800;
  width: 44px; text-align: center; padding: 2px 4px;
  border: 1.5px solid #d1d5db; border-radius: 5px;
  background: var(--card-bg,#fff); color: var(--text-primary,#1a1a1a);
}
.vbr-input:focus { outline: none; border-color: #0d9488; background: #f0fdfa; }
.vbr-input.manuell { border-color: #0d9488; background: #f0fdfa; color: #0d9488; }
.vbr-input::placeholder { color: #94a3b8; font-weight: 600; font-style: italic; }

/* Bestand-Anzeige Farben */
.bst-val { color: var(--text-primary,#1a1a1a); }
.bst-leer { color: #d1d5db; font-size: 0.7rem; }
.vbr-val { color: #92400e; font-weight: 800; }
.avg-val { color: #6b7280; font-size: 0.73rem; font-weight: 600; }

.fv-table tbody tr.row-b td { border-bottom: 1px solid #cbd5e1; }
.fv-table tbody tr.row-b.last-row td { border-bottom: 2px solid #1e293b; }
.fv-table tfoot td { padding: 5px 6px; font-weight: 800; background: #f0ede8; border-top: 2px solid #1e293b; text-align: center; font-size: 0.73rem; }
.fv-table tfoot td.col-tag { text-align: left; font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim,#6b7280); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-titel">Produkte auswählen</div>
    <div class="produkt-chips" id="chip-container"></div>
  </div>

  <div class="btn-row">
    <button class="druck-btn" onclick="drucken()">🖨 Drucken</button>
    <button class="save-btn" onclick="speichern()">💾 Speichern</button>
    <span id="db-status" class="db-status"></span>
  </div>

  <div id="akkordeon-container"></div>
</div>

<script>
/* ── Produkt-Konfiguration ── */
const PRODUKT_CONFIG = [
  { id:'baguette',    label:'Baguette',      shortLabel:'Baguette',   legacyKey:'stangen_gesamt_stueck',      einheit:'Bl.', charge:6 },
  { id:'bagteig',     label:'Bag.-Teig',     shortLabel:'Bag.Teig',   legacyKey:'baguettestange_teig_stueck', einheit:'Dl.', charge:3 },
  { id:'zwiebel',     label:'Zwiebelstange', shortLabel:'Zwiebel',    legacyKey:'zwiebelstange_stueck',       einheit:'Bl.', charge:6 },
  { id:'zwiebelteig', label:'Zwb.-Teig',     shortLabel:'Zwb.Teig',   legacyKey:'zwiebelstange_teig_stueck',  einheit:'Dl.', charge:3 },
];

/* ── Wochentag-Hilfs ── */
const JS_ZU_BOS = [6,0,1,2,3,4,5];
const WT_KURZ   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

function getTage() {
  const heute = new Date(); heute.setHours(0,0,0,0);
  return Array.from({length:9}, (_,i) => {
    const d = new Date(heute); d.setDate(heute.getDate()+i);
    const bos = JS_ZU_BOS[d.getDay()];
    return { bos, wt: WT_KURZ[bos],
      datum: String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.',
      isoStr: d.toISOString().slice(0,10), istHeute: i===0 };
  });
}

/* ── Stammdaten ── */
let stammdaten = null;
function getNeeds(prod) {
  if (!stammdaten || !prod) return [0,0,0,0,0,0,0];
  const id = window.BOS_GEHIRN?.bosIdFuerKey(prod.legacyKey);
  return (id && stammdaten[id]?.needs) || [0,0,0,0,0,0,0];
}
function getCharge(prod) {
  if (!stammdaten || !prod) return prod?.charge || 1;
  const id = window.BOS_GEHIRN?.bosIdFuerKey(prod.legacyKey);
  return (id && stammdaten[id]?.charge) || prod.charge;
}
function getBestand(prod) {
  if (!prod) return null;
  const p = window.BOS_INVENTUR?.products?.[prod.legacyKey];
  if (!p) return null;
  const v = p.stock !== undefined ? p.stock : (p.locs||[]).reduce((a,b)=>a+b,0);
  return v >= 0 ? v : null;
}
function getBestandFuerDatum(prod, isoStr) {
  if (!prod || !window.BOS_INVENTUR) return null;
  const p = window.BOS_INVENTUR.products?.[prod.legacyKey];
  if (!p || !p.ts) return null;
  const invDatum = new Date(p.ts).toISOString().slice(0,10);
  return invDatum === isoStr ? (p.stock !== undefined ? p.stock : (p.locs||[]).reduce((a,b)=>a+b,0)) : null;
}
function getRealVbr(prod, isoStr) {
  if (!prod || !window.BOS_GEHIRN?._db) return null;
  const entry = window.BOS_GEHIRN._db.find(e => e.datum === isoStr);
  if (!entry) return null;
  const id = window.BOS_GEHIRN?.bosIdFuerKey(prod.legacyKey);
  return id ? (entry[id] ?? entry[prod.legacyKey]) : entry[prod.legacyKey];
}

/* ── Produktions-DB ─────────────────────────────────────────────────
   Struktur: { "version":1, "eintraege": { "YYYY-MM-DD": { "legacyKey": Zahl, ... }, ... } }
   Geladen aus produktionsverlauf_db.json (fetch, cache:no-store)
   Gespeichert als Download-JSON
   Cleanup: Einträge älter als 14 Tage werden beim Speichern gelöscht
─────────────────────────────────────────────────────────────────── */
let prodDB = { version: 1, eintraege: {} };

async function ladeProdDB() {
  const status = document.getElementById('db-status');
  try {
    const r = await fetch('produktionsverlauf_db.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    prodDB = data;
    status.textContent = '● DB geladen';
    status.className = 'db-status ok';
  } catch(e) {
    // Datei nicht gefunden oder leer → starte mit leerer DB
    prodDB = { version: 1, eintraege: {} };
    status.textContent = '○ Neue DB (noch keine Datei)';
    status.className = 'db-status';
  }
}

function getProd(legacyKey, isoStr) {
  const tag = prodDB.eintraege[isoStr];
  if (!tag) return null;
  const v = tag[legacyKey];
  return (v !== undefined && v !== null && v !== '') ? Number(v) : null;
}

function setProd(legacyKey, isoStr, value) {
  if (!prodDB.eintraege[isoStr]) prodDB.eintraege[isoStr] = {};
  if (value === '' || value === null || isNaN(value)) {
    delete prodDB.eintraege[isoStr][legacyKey];
    if (Object.keys(prodDB.eintraege[isoStr]).length === 0) {
      delete prodDB.eintraege[isoStr];
    }
  } else {
    prodDB.eintraege[isoStr][legacyKey] = Number(value);
  }
  renderAkkordeons();
}

// Manueller Verbrauch — Key: legacyKey + '_vbr'
// Priorität: manuell > real DB > null (Kette stoppt)
function getManualVbr(legacyKey, isoStr) {
  const tag = prodDB.eintraege[isoStr];
  if (!tag) return null;
  const v = tag[legacyKey + '_vbr'];
  return (v !== undefined && v !== null && v !== '') ? Number(v) : null;
}

function setManualVbr(legacyKey, isoStr, value) {
  if (!prodDB.eintraege[isoStr]) prodDB.eintraege[isoStr] = {};
  const vbrKey = legacyKey + '_vbr';
  if (value === '' || value === null || isNaN(Number(value))) {
    delete prodDB.eintraege[isoStr][vbrKey];
    if (Object.keys(prodDB.eintraege[isoStr]).length === 0) {
      delete prodDB.eintraege[isoStr];
    }
  } else {
    prodDB.eintraege[isoStr][vbrKey] = Number(value);
  }
  renderAkkordeons();
}

// Effektiver Verbrauch: manuell schlägt DB, kein Ø-Fallback
function getVbrEffektiv(prod, isoStr) {
  const manual = getManualVbr(prod.legacyKey, isoStr);
  if (manual !== null) return { wert: manual, quelle: 'manuell' };
  const real = getRealVbr(prod, isoStr);
  if (real !== null) return { wert: real, quelle: 'db' };
  return null;
}

function bereinige() {
  // Entferne alle Einträge älter als 14 Tage
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 14);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  Object.keys(prodDB.eintraege).forEach(datum => {
    if (datum < cutoffStr) delete prodDB.eintraege[datum];
  });
}

function speichern() {
  bereinige();
  const json = JSON.stringify(prodDB, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'produktionsverlauf_db.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  const status = document.getElementById('db-status');
  status.textContent = '✓ Gespeichert — bitte hochladen';
  status.className = 'db-status ok';
}

/* ── Auswahl ── */
const LS_KEY = 'BOS_PROD_AUSWAHL';
let auswahl = JSON.parse(localStorage.getItem(LS_KEY)||'["baguette"]');

function toggleProdukt(id) {
  auswahl = auswahl.includes(id) ? auswahl.filter(x=>x!==id) : [...auswahl,id];
  localStorage.setItem(LS_KEY,JSON.stringify(auswahl));
  renderChips(); renderAkkordeons(); aktualisiereInfo();
}
function renderChips() {
  document.getElementById('chip-container').innerHTML = PRODUKT_CONFIG.map(p=>`
    <div class="produkt-chip ${auswahl.includes(p.id)?'aktiv':''}" onclick="toggleProdukt('${p.id}')">
      <div class="chip-dot"></div>${p.label}</div>`).join('');
}
function aktualisiereInfo() {
  const n = auswahl.length;
  document.getElementById('auswahl-info') && (document.getElementById('auswahl-info').textContent =
    n===0 ? 'Kein Produkt ausgewählt' : n+' Produkt'+(n>1?'e':'')+' ausgewählt');
}

/* ── Screen-Tabelle ─────────────────────────────────────────────────
   Rollender Bestand:
   1. Inventur für exakt dieses Datum → Neustart der Kette
   2. Bestand[N+1] = Bestand[N] + Produktion[N] − Verbrauch[N]
      (nur wenn realer Verbrauch aus DB bekannt — Ø wird NIE abgezogen)
   3. Kein realer Verbrauch → Kette stoppt (auch wenn Produktion eingetragen)
─────────────────────────────────────────────────────────────────── */
function buildScreenTabelle(p) {
  const tage = getTage(), needs = getNeeds(p), charge = getCharge(p);
  let rollBst = getBestand(p), tbody = '';

  tage.forEach((t,ti) => {
    const zebra  = ti%2===0 ? 'z0' : 'z1';
    const isLast = ti===tage.length-1;
    const vbrObj  = getVbrEffektiv(p, t.isoStr); // { wert, quelle } oder null
    const avg    = needs[t.bos] || 0;
    const prod   = getProd(p.legacyKey, t.isoStr);

    // Bestand-Anzeige
    const bstHtml = rollBst !== null
      ? `<span class="bst-val">${rollBst}</span>`
      : `<span class="bst-leer">—</span>`;

    // Ø-Anzeige
    const avgHtml = avg > 0
      ? `<span class="avg-val">${avg}</span>`
      : `<span class="bst-leer">—</span>`;

    // Produktions-Eingabefeld
    const prodVal  = prod !== null ? prod : '';
    const prodHtml = `<input class="prod-input" type="number" inputmode="numeric"
      value="${prodVal}" placeholder="Prod."
      data-key="${p.legacyKey}" data-datum="${t.isoStr}"
      onchange="setProd(this.dataset.key, this.dataset.datum, this.value)">`;

    // Verbrauchs-Eingabefeld
    // placeholder = DB-Wert (kursiv grau), value = manueller Override (teal)
    const manVbr  = getManualVbr(p.legacyKey, t.isoStr);
    const dbVbr   = getRealVbr(p, t.isoStr);
    const vbrInputVal = manVbr !== null ? manVbr : '';
    const vbrPlaceholder = dbVbr !== null ? dbVbr : '';
    const vbrCls  = manVbr !== null ? 'vbr-input manuell' : 'vbr-input';
    const vbrHtml = `<input class="${vbrCls}" type="number" inputmode="numeric"
      value="${vbrInputVal}" placeholder="${vbrPlaceholder}"
      title="${dbVbr !== null ? 'DB: '+dbVbr+' · manuell überschreibbar' : 'Kein DB-Wert — manuell eingeben'}"
      data-key="${p.legacyKey}" data-datum="${t.isoStr}"
      onchange="setManualVbr(this.dataset.key, this.dataset.datum, this.value)">`;

    tbody += `
      <tr class="row-a ${zebra}">
        <td class="col-tag" rowspan="2">
          <div class="tag-inner ${t.istHeute?'tag-heute':''}">
            <span class="tag-wt">${t.wt}${t.istHeute?' ●':''}</span>
            <span class="tag-dat">${t.datum}</span>
          </div>
        </td>
        <td class="col-bst"><div class="cell-top">${bstHtml}</div></td>
        <td class="col-vbr"><div class="cell-top"></div></td>
        <td class="col-avg"><div class="cell-top"></div></td>
      </tr>
      <tr class="row-b ${zebra}${isLast?' last-row':''}">
        <td class="col-bst"><div class="cell-bot">${prodHtml}</div></td>
        <td class="col-vbr"><div class="cell-bot">${vbrHtml}</div></td>
        <td class="col-avg"><div class="cell-bot">${avgHtml}</div></td>
      </tr>`;

    // ── Rollenden Bestand fortschreiben ──
    // Priorität 1: Frische Inventur für diesen Tag → Neustart
    const invH = getBestandFuerDatum(p, t.isoStr);
    if (invH !== null) {
      rollBst = invH;
    } else if (rollBst !== null) {
      if (vbrObj !== null) {
        // Produktion addieren, dann effektiven Verbrauch abziehen
        const prodAdd = prod !== null ? prod : 0;
        rollBst = Math.max(0, Math.round((rollBst + prodAdd - vbrObj.wert) * 10) / 10);
      } else {
        // Kein Verbrauch (weder manuell noch DB) → Kette stoppt
        rollBst = null;
      }
    }
  });

  // Ø-Summe über 9 Tage
  const sum = tage.reduce((s,t) => s+(needs[t.bos]||0), 0);

  return `<table class="fv-table">
    <thead>
      <tr>
        <th class="col-tag">Tag</th>
        <th colspan="3">${p.label} (${charge} Stk/${p.einheit})</th>
      </tr>
      <tr>
        <th class="col-tag"></th>
        <th class="col-bst">Bst/Prod.</th>
        <th class="col-vbr">Verbr.</th>
        <th class="col-avg">Ø</th>
      </tr>
    </thead>
    <tbody>${tbody}</tbody>
    <tfoot><tr>
      <td class="col-tag">Ø Summe</td>
      <td class="col-bst"></td>
      <td class="col-vbr"></td>
      <td class="col-avg">${sum} ${p.einheit}</td>
    </tr></tfoot>
  </table>`;
}

/* ── Akkordeons ── */
function renderAkkordeons() {
  const container = document.getElementById('akkordeon-container');
  if (!auswahl.length) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--dim,#6b7280);font-size:0.85rem;font-weight:700;">Kein Produkt ausgewählt</div>';
    return;
  }
  // Akkordeon-Öffnungszustand merken
  const offene = {};
  auswahl.forEach((_,gi) => {
    const b = document.getElementById('akk-b-'+gi);
    if (b) offene[gi] = b.classList.contains('open');
  });
  container.innerHTML = auswahl.map((id, gi) => {
    const p = PRODUKT_CONFIG.find(x=>x.id===id);
    if (!p) return '';
    return `<div class="akk-wrap">
      <div class="akk-header ${offene[gi]?'open':''}" id="akk-h-${gi}" onclick="toggleAkk(${gi})">
        <span>${p.label}</span><span class="akk-arrow" id="akk-a-${gi}">${offene[gi]?'▲':'▼'}</span>
      </div>
      <div class="akk-body ${offene[gi]?'open':''}" id="akk-b-${gi}">
        <div class="fv-outer">${buildScreenTabelle(p)}</div>
      </div></div>`;
  }).join('');
}

function toggleAkk(gi) {
  document.getElementById('akk-b-'+gi).classList.toggle('open');
  document.getElementById('akk-h-'+gi).classList.toggle('open');
  const arrow = document.getElementById('akk-a-'+gi);
  if (arrow) arrow.textContent = document.getElementById('akk-b-'+gi).classList.contains('open') ? '▲' : '▼';
}

/* ── Print (Gemini-Layout, Bugs gepatcht) ── */
function drucken() {
  if (!auswahl.length) { alert('Kein Produkt ausgewählt.'); return; }

  var jetzt = new Date(), pad = n => String(n).padStart(2,'0');
  var WT_LANG = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  var datStr = WT_LANG[jetzt.getDay()]+', '+pad(jetzt.getDate())+'.'+pad(jetzt.getMonth()+1)+'.'+jetzt.getFullYear();

  var slots = Array.from({length:4}, (_,i) => auswahl[i] ? PRODUKT_CONFIG.find(p=>p.id===auswahl[i])||null : null);
  var tage = getTage(), needsArr = slots.map(p => getNeeds(p)), chargeArr = slots.map(p => getCharge(p));
  var produktNamen = auswahl.map(id => { const p = PRODUKT_CONFIG.find(p=>p.id===id); return p?p.label:''; }).filter(Boolean).join(' · ');

  var F = '"Barlow Condensed", Arial Narrow, Arial, sans-serif';
  var bdrThin = '0.4pt solid #bbb', bdrThick = '2pt solid #000', bdrFrame = '1.5pt solid #000';

  function zbg(ti) { return ti % 2 === 0 ? '#efefef' : '#ffffff'; }

  // Header 0: Produktnamen
  var h0 = '<tr>';
  h0 += `<th style="font-family:${F}; font-size:7pt; font-weight:900; padding:4pt; border:${bdrFrame}; border-right:${bdrThick}; background:#fff; text-align:left;">TAG</th>`;
  slots.forEach((p, i) => {
    if (i === 2) {
      h0 += `<th style="width:6mm; border-top:${bdrFrame}; border-bottom:${bdrThin}; background:#fff;"></th>`;
      h0 += `<th style="font-family:${F}; font-size:7pt; font-weight:900; padding:4pt; border:${bdrFrame}; border-right:${bdrThick}; background:#fff; text-align:left;">TAG</th>`;
    }
    var borderRight = (i === 1 || i === 3) ? bdrFrame : bdrThick;
    h0 += `<th colspan="4" style="font-family:${F}; font-size:8.5pt; font-weight:900; padding:4pt 6pt; border-top:${bdrFrame}; border-bottom:${bdrThin}; border-right:${borderRight}; background:#fff; text-align:left;">${p ? `<b>${p.shortLabel}</b> <span style="font-size:6pt; font-weight:500;">(${chargeArr[i]} Stk/${p.einheit})</span>` : '—'}</th>`;
  });
  h0 += '</tr>';

  // Header 1: BST / PROD / VBR / Ø
  var h1 = `<tr style="background:#e0e0e0; -webkit-print-color-adjust:exact;">`;
  h1 += `<th style="border-left:${bdrFrame}; border-right:${bdrThick}; border-bottom:${bdrThick};"></th>`;
  slots.forEach((p, i) => {
    if (i === 2) h1 += `<th style="background:#fff; border:none;"></th><th style="border-left:${bdrFrame}; border-right:${bdrThick}; border-bottom:${bdrThick};"></th>`;
    var borderRight = (i === 1 || i === 3) ? bdrFrame : bdrThick;
    h1 += `<th style="font-size:5.5pt; font-weight:800; border-right:${bdrThin}; border-bottom:${bdrThick}; text-align:center;">BST</th>`;
    h1 += `<th style="font-size:5.5pt; font-weight:800; border-right:${bdrThin}; border-bottom:${bdrThick}; text-align:center;">+PROD</th>`;
    h1 += `<th style="font-size:5.5pt; font-weight:800; border-right:${bdrThin}; border-bottom:${bdrThick}; text-align:center;">VBR</th>`;
    h1 += `<th style="font-size:5.5pt; font-weight:800; border-right:${borderRight}; border-bottom:${bdrThick}; text-align:center;">Ø</th>`;
  });
  h1 += '</tr>';

  // Body
  var rollBst = slots.map(p => getBestand(p)), bodyRows = '';
  var summeNeeds = slots.map(() => 0);

  tage.forEach((t, ti) => {
    var bg = zbg(ti), bb = (ti === tage.length - 1) ? bdrFrame : bdrThin;
    var row = `<tr style="background:${bg}; -webkit-print-color-adjust:exact; height:11mm;">`;

    // TAG L
    row += `<td style="padding:0 4pt; border-left:${bdrFrame}; border-right:${bdrThick}; border-top:${bdrThin}; border-bottom:${bb}; vertical-align:middle;">
        <div style="font-family:${F}; font-weight:900; font-size:8pt; line-height:1;">${t.wt}${t.istHeute ? ' ●' : ''}</div>
        <div style="font-family:${F}; font-size:5.5pt; color:#555;">${t.datum}</div></td>`;

    slots.forEach((p, si) => {
      if (si === 2) {
        row += `<td style="background:#fff; border-bottom:${bb};"></td>`;
        row += `<td style="padding:0 4pt; border-left:${bdrFrame}; border-right:${bdrThick}; border-top:${bdrThin}; border-bottom:${bb}; vertical-align:middle;">
            <div style="font-family:${F}; font-weight:900; font-size:8pt; line-height:1;">${t.wt}${t.istHeute ? ' ●' : ''}</div>
            <div style="font-family:${F}; font-size:5.5pt; color:#555;">${t.datum}</div></td>`;
      }
      var bRight = (si === 1 || si === 3) ? bdrFrame : bdrThick;

      if (!p) {
        row += `<td style="border-right:${bdrThin}; border-top:${bdrThin}; border-bottom:${bb};"></td>`;
        row += `<td style="border-right:${bdrThin}; border-top:${bdrThin}; border-bottom:${bb};"></td>`;
        row += `<td style="border-right:${bdrThin}; border-top:${bdrThin}; border-bottom:${bb};"></td>`;
        row += `<td style="border-right:${bRight}; border-top:${bdrThin}; border-bottom:${bb};"></td>`;
      } else {
        var vbrObj = getVbrEffektiv(p, t.isoStr);
        var vbr = vbrObj ? vbrObj.wert : null;
        var vbrIstManuell = vbrObj && vbrObj.quelle === 'manuell';
        var avg = needsArr[si][t.bos] || 0;
        var prod = getProd(p.legacyKey, t.isoStr);
        summeNeeds[si] += avg;

        var vbrAnz = vbr !== null ? vbr + (vbrIstManuell ? '*' : '') : '';

        // BST oben links, PROD unten links, VBR unten mitte, Ø unten rechts
        row += `<td style="border-right:${bdrThin}; border-top:${bdrThin}; border-bottom:${bb}; text-align:center; font-weight:900; font-size:8.5pt; vertical-align:top; padding-top:1.5pt;">${rollBst[si] !== null ? rollBst[si] : ''}</td>`;
        row += `<td style="border-right:${bdrThin}; border-top:${bdrThin}; border-bottom:${bb}; text-align:center; font-weight:900; font-size:8.5pt; vertical-align:bottom; padding-bottom:1.5pt; color:#b45309;">${prod !== null ? '+'+prod : ''}</td>`;
        row += `<td style="border-right:${bdrThin}; border-top:${bdrThin}; border-bottom:${bb}; text-align:center; font-weight:800; font-size:8.5pt; vertical-align:bottom; padding-bottom:1.5pt;${vbrIstManuell?' color:#0d9488;':''}">${vbrAnz}</td>`;
        row += `<td style="border-right:${bRight}; border-top:${bdrThin}; border-bottom:${bb}; text-align:center; font-size:7pt; color:#666; vertical-align:bottom; padding-bottom:1.5pt;">${avg > 0 ? avg : ''}</td>`;

        // Rollenden Bestand fortschreiben
        var invH = getBestandFuerDatum(p, t.isoStr);
        if (invH !== null) {
          rollBst[si] = invH;
        } else if (rollBst[si] !== null) {
          if (vbr !== null) {
            var prodAdd = prod !== null ? prod : 0;
            rollBst[si] = Math.max(0, Math.round((rollBst[si] + prodAdd - vbr) * 10) / 10);
          } else {
            rollBst[si] = null;
          }
        }
      }
    });
    bodyRows += row + '</tr>';
  });

  // Footer
  var f0 = `<tr style="background:#ddd; -webkit-print-color-adjust:exact; height:8mm; font-family:${F};">`;
  f0 += `<td style="border-left:${bdrFrame}; border-right:${bdrThick}; border-bottom:${bdrFrame}; font-size:6pt; font-weight:900; padding-left:4pt; vertical-align:middle;">Ø SUMME</td>`;
  slots.forEach((p, si) => {
    if (si === 2) {
      f0 += `<td style="background:#fff; border:none;"></td>`;
      f0 += `<td style="border-left:${bdrFrame}; border-right:${bdrThick}; border-bottom:${bdrFrame};"></td>`;
    }
    var bRight = (si === 1 || si === 3) ? bdrFrame : bdrThick;
    f0 += `<td style="border-right:${bdrThin}; border-bottom:${bdrFrame};"></td>`;
    f0 += `<td style="border-right:${bdrThin}; border-bottom:${bdrFrame};"></td>`;
    f0 += `<td style="border-right:${bdrThin}; border-bottom:${bdrFrame};"></td>`;
    f0 += `<td style="border-right:${bRight}; border-bottom:${bdrFrame}; text-align:center; font-weight:900; font-size:8.5pt; vertical-align:middle;">${p ? summeNeeds[si].toFixed(0) + ' ' + p.einheit : ''}</td>`;
  });
  f0 += '</tr>';

  var html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Barlow+Condensed:wght@600;900&display=swap" rel="stylesheet">
    <style>* { box-sizing: border-box; -webkit-print-color-adjust: exact; }
    body { padding: 8mm 10mm; font-family: ${F}; }
    .hdr { display: flex; justify-content: space-between; border-bottom: 2pt solid #000; padding-bottom: 2mm; margin-bottom: 3mm; }
    .logo { font-family: Fraunces, serif; font-size: 22pt; font-weight: 900; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    @media print { @page { size: A4 landscape; margin: 8mm 10mm; } }</style></head><body>
    <div class="hdr">
      <div class="logo">Bäckerei<em>OS</em></div>
      <div style="text-align:right;font-family:${F};"><span style="font-size:5pt;text-transform:uppercase;letter-spacing:0.5pt;">Druckdatum</span><br><b>${datStr}</b></div>
    </div>
    <div style="font-size:7pt; font-weight:900; text-transform:uppercase; letter-spacing:1.5pt; margin-bottom:2mm;">Produktionsverlauf &mdash; ${produktNamen}</div>
    <table><thead>${h0}${h1}</thead><tbody>${bodyRows}</tbody><tfoot>${f0}</tfoot></table>
    </body></html>`;

  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

/* ── Init ── */
window.addEventListener('DOMContentLoaded', async () => {
  renderChips(); aktualisiereInfo();
  await ladeProdDB();
  if (await window.BOS_GEHIRN.init()) {
    stammdaten = window.BOS_STAMMDATEN;
  }
  renderAkkordeons();
});
</script>
</body>
</html>
