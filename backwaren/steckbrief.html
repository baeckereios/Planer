<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BäckereiOS — Steckbrief</title>
<link rel="stylesheet" href="../systemdesign.css">
<script src="../inventurdaten.js"></script>
<script src="../shell.js" defer></script>
<style>
  body { background: var(--background,#f8f6f2); color: var(--text-primary,#1a1a1a); padding-bottom: 100px; }
  .container { max-width: 560px; margin: 0 auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* ── PRODUKT-KOPF ── */
  .produkt-kopf { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 16px; padding: 16px; }
  .kopf-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .lagertyp-badge { font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
  .badge-tk        { background: #dbeafe; color: #1d4ed8; }
  .badge-kuehl     { background: #dcfce7; color: #15803d; }
  .badge-trocken   { background: #fef9c3; color: #854d0e; }
  .badge-sonstiges { background: #f3e8ff; color: #6b21a8; }
  .lieferant-chip { font-size: 0.65rem; font-weight: 700; color: var(--text-secondary,#6b7280); background: var(--background,#f8f6f2); padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border-color,#e5e0d8); }
  .produkt-name { font-size: 1.6rem; font-weight: 900; line-height: 1.2; margin-bottom: 4px; }
  .produkt-info { font-size: 0.78rem; color: var(--text-secondary,#6b7280); }

  /* Froster-Bestand */
  .froster-chip { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; font-weight: 700; color: #1d4ed8; }
  .froster-chip.alt { background: #fef9c3; border-color: #fde68a; color: #854d0e; }

  /* ── TABS ── */
  .tab-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -2px; padding: 0 2px; }
  .tab-scroll::-webkit-scrollbar { display: none; }
  .tab-bar { display: flex; gap: 6px; background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 12px; padding: 4px; min-width: max-content; }
  .tab-btn { padding: 10px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 800; cursor: pointer; transition: all 0.2s; user-select: none; white-space: nowrap; border: none; font-family: inherit; background: transparent; color: var(--text-secondary,#6b7280); }
  .tab-btn.active-teig    { background: #475569; color: #fff; }
  .tab-btn.active-aufbau  { background: #d97706; color: #fff; }
  .tab-btn.active-gare    { background: #059669; color: #fff; }
  .tab-btn.active-backen  { background: #dc2626; color: #fff; }
  .tab-btn.active-versand { background: #7c3aed; color: #fff; }

  /* ── TAB INHALTE ── */
  .tab-panel { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 16px; padding: 16px; display: none; }
  .tab-panel.active { display: block; }

  .panel-titel { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
  .panel-titel.teig    { color: #475569; }
  .panel-titel.aufbau  { color: #d97706; }
  .panel-titel.gare    { color: #059669; }
  .panel-titel.backen  { color: #dc2626; }
  .panel-titel.versand { color: #7c3aed; }

  /* Freitext */
  .freitext { font-size: 0.9rem; line-height: 1.7; color: var(--text-primary,#1a1a1a); white-space: pre-wrap; }

  /* Aufbau-Checkliste */
  .check-list { display: flex; flex-direction: column; gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--background,#f8f6f2); border: 1px solid var(--border-color,#e5e0d8); border-radius: 10px; cursor: pointer; user-select: none; transition: all 0.15s; }
  .check-item.erledigt { background: #f0fdf4; border-color: #10b981; }
  .check-box { width: 22px; height: 22px; border: 2px solid var(--border-color,#e5e0d8); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: all 0.15s; }
  .check-item.erledigt .check-box { background: #10b981; border-color: #10b981; color: #fff; }
  .check-text { font-size: 0.88rem; font-weight: 700; }
  .check-item.erledigt .check-text { text-decoration: line-through; color: var(--text-secondary,#6b7280); }
  .check-reset { font-size: 0.7rem; color: var(--text-secondary,#6b7280); text-align: right; cursor: pointer; margin-top: 4px; padding: 4px 0; }

  /* Backen-Grid */
  .backen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .backen-box { background: var(--background,#f8f6f2); border: 1px solid var(--border-color,#e5e0d8); border-radius: 10px; padding: 10px 12px; }
  .backen-label { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary,#6b7280); margin-bottom: 4px; }
  .backen-wert  { font-size: 1.3rem; font-weight: 900; color: var(--text-primary,#1a1a1a); }
  .backen-unit  { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary,#6b7280); }
  .backen-hinweis { font-size: 0.85rem; line-height: 1.6; color: var(--text-primary,#1a1a1a); white-space: pre-wrap; background: #fff5f5; border-left: 3px solid #dc2626; border-radius: 0 8px 8px 0; padding: 10px 12px; margin-top: 4px; }

  /* Versand-Box */
  .versand-korb { display: flex; align-items: center; gap: 14px; background: var(--background,#f8f6f2); border: 1px solid var(--border-color,#e5e0d8); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .versand-zahl { font-size: 2.2rem; font-weight: 900; color: #7c3aed; line-height: 1; }
  .versand-label-wrap { display: flex; flex-direction: column; }
  .versand-label-gross { font-size: 0.85rem; font-weight: 800; }
  .versand-label-sub   { font-size: 0.72rem; color: var(--text-secondary,#6b7280); }
  .versand-hinweis { font-size: 0.85rem; line-height: 1.6; color: var(--text-primary,#1a1a1a); white-space: pre-wrap; background: #faf5ff; border-left: 3px solid #7c3aed; border-radius: 0 8px 8px 0; padding: 10px 12px; }

  /* ── LEER / FEHLER ── */
  .status-card { text-align: center; padding: 40px 20px; background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 16px; }
  .status-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .status-text { font-size: 0.9rem; font-weight: 700; color: var(--text-secondary,#6b7280); margin-bottom: 6px; }
  .status-sub  { font-size: 0.78rem; color: var(--text-secondary,#6b7280); }

  /* ── MOTTO ── */
  .motto { text-align: center; padding: 16px; font-size: 0.75rem; font-style: italic; color: var(--text-secondary,#6b7280); line-height: 1.6; border-top: 1px solid var(--border-color,#e5e0d8); }
</style>
</head>
<body>
<div class="container">

  <div id="main-content">
    <div class="status-card">
      <div class="status-icon">⏳</div>
      <div class="status-text">Wird geladen…</div>
    </div>
  </div>

</div>
<script>
var ABSCHNITT_META = {
  teig:    { label: '🌾 Teig',    klasse: 'teig'    },
  aufbau:  { label: '🔧 Aufbau',  klasse: 'aufbau'  },
  gare:    { label: '⏱ Gare',    klasse: 'gare'     },
  backen:  { label: '🔥 Backen',  klasse: 'backen'  },
  versand: { label: '📦 Versand', klasse: 'versand' }
};
var ABSCHNITT_ORDER = ['teig','aufbau','gare','backen','versand'];

var produktConfig     = [];
var lieferantenConfig = [];
var steckbriefe       = {};
var lieferantenDb     = [];
var legacyKey         = '';
var aktiverTab        = '';
var checkState        = {};  // Session-Checkboxen (nicht persistent)

window.onload = async function() {
  var params = new URLSearchParams(window.location.search);
  legacyKey  = params.get('id') || '';

  if (!legacyKey) { zeigeStatus('⚠️', 'Kein Produkt angegeben.', 'NFC-Chip erneut scannen.'); return; }

  // Daten laden
  await ladeJSON('../produkt_config.json',        function(d){ produktConfig     = d; });
  await ladeJSON('../backwaren_steckbrief.json',   function(d){ steckbriefe       = d; });
  await ladeJSON('../lieferanten_config.json',     function(d){ lieferantenConfig = Array.isArray(d) ? d : (d.produkte||[]); });
  await ladeJSON('../lieferanten_db.json',         function(d){ lieferantenDb     = d; });

  var produkt = produktConfig.find(function(p){ return p.legacyKey === legacyKey; });
  if (!produkt) { zeigeStatus('🔍', 'Produkt nicht gefunden.', '"' + legacyKey + '" ist nicht in der Produkt-Config.'); return; }

  var steckbrief = steckbriefe[legacyKey];
  if (!steckbrief || !steckbrief.abschnitte) {
    zeigeStatus('📋', 'Noch kein Steckbrief angelegt.', 'Im Admin-Bereich unter Steckbrief-Editor anlegen.');
    return;
  }

  renderSeite(produkt, steckbrief);
};

async function ladeJSON(pfad, onSuccess) {
  try { var r = await fetch(pfad, {cache:'no-store'}); if (r.ok) onSuccess(await r.json()); } catch(e) {}
}

// ── RENDER SEITE ────────────────────────────────────────
function renderSeite(produkt, steckbrief) {
  var container = document.getElementById('main-content');
  container.innerHTML = '';

  // Produkt-Kopf
  container.appendChild(bauKopf(produkt));

  // Froster-Bestand (optional)
  var frosterEl = bauFrosterChip(produkt);
  if (frosterEl) container.appendChild(frosterEl);

  // Sichtbare Abschnitte bestimmen
  var sichtbar = ABSCHNITT_ORDER.filter(function(k) {
    var a = steckbrief.abschnitte[k];
    return a && a.sichtbar;
  });

  if (!sichtbar.length) {
    var leer = document.createElement('div');
    leer.className = 'status-card';
    leer.innerHTML = '<div class="status-icon">📭</div><div class="status-text">Keine Abschnitte sichtbar.</div>';
    container.appendChild(leer);
  } else {
    // Tab-Leiste
    aktiverTab = sichtbar[0];
    container.appendChild(bauTabBar(sichtbar));

    // Tab-Panels
    sichtbar.forEach(function(k) {
      container.appendChild(bauPanel(k, steckbrief.abschnitte[k]));
    });
  }

  // Motto
  var motto = document.createElement('div');
  motto.className = 'motto';
  motto.textContent = '»Gute Qualität ist es, wenn du für das Produkt in einem anderen Laden bezahlen würdest.«';
  container.appendChild(motto);
}

// ── PRODUKT-KOPF ────────────────────────────────────────
function bauKopf(produkt) {
  var el = document.createElement('div');
  el.className = 'produkt-kopf';

  var typ     = (produkt.lagertyp || 'sonstiges').toLowerCase();
  var einheit = cap(produkt.soll_einheit || '');
  var infoParts = [];
  if (produkt.gebinde && produkt.gebinde.form) {
    var geb = cap(produkt.gebinde.form);
    if (produkt.gebinde.inhalt_stueck) geb += ' à ' + produkt.gebinde.inhalt_stueck;
    if (produkt.gebinde.inhalt_einheit) geb += ' ' + produkt.gebinde.inhalt_einheit;
    infoParts.push(geb);
  }
  if (produkt.charge) infoParts.push('Charge: ' + produkt.charge + ' Stk/Blech');

  el.innerHTML =
    '<div class="kopf-meta">' +
      '<span class="lagertyp-badge badge-' + esc(typ) + '">' + lagertypLabel(typ) + '</span>' +
      (produkt.lieferant ? '<span class="lieferant-chip">' + esc(produkt.lieferant) + '</span>' : '') +
    '</div>' +
    '<div class="produkt-name">' + esc(produkt.name || legacyKey) + '</div>' +
    (infoParts.length ? '<div class="produkt-info">' + esc(infoParts.join(' · ')) + '</div>' : '');
  return el;
}

// ── BESTAND-CHIP ─────────────────────────────────────────
var pad = function(n){ return n<10?'0'+n:''+n; };

function bauFrosterChip(produkt) {
  // Quelle 1: lieferanten_db (TK-Ware via lieferanten_config)
  var lProd = lieferantenConfig.find(function(p){ return p.produkt_config_key === legacyKey; });
  if (lProd) {
    var lId = lProd.id;
    var snapshot = null;
    for (var i = lieferantenDb.length - 1; i >= 0; i--) {
      var e = lieferantenDb[i];
      if (e.typ === 'bestand' && e.bestaende && e.bestaende[lId] !== undefined) {
        snapshot = e; break;
      }
    }
    if (!snapshot) return null;
    var ts = snapshot.timestamp || 0;
    if (ts === 0 || (Date.now() - ts) / 3600000 > 12) return null;

    var b       = snapshot.bestaende[lId];
    var menge   = b.menge !== undefined ? b.menge : '?';
    var einheit = cap(b.einheit || lProd.soll_einheit || '');
    var tsD     = new Date(ts);
    var el = document.createElement('div');
    el.className = 'froster-chip';
    el.innerHTML = '❄️ Froster: <strong>' + menge + ' ' + einheit + '</strong> · ' + pad(tsD.getHours()) + ':' + pad(tsD.getMinutes()) + ' Uhr';
    return el;
  }

  // Quelle 2: BOS_INVENTUR (inventurRelevant-Produkte)
  if (produkt.inventurRelevant) {
    var inv = window.BOS_INVENTUR && window.BOS_INVENTUR.products && window.BOS_INVENTUR.products[legacyKey];
    if (!inv) return null;
    var ts = inv.ts || 0;
    if (ts === 0 || (Date.now() - ts) / 3600000 > 12) return null;

    var einheit = cap(produkt.einheit || 'Stk');
    var tsD     = new Date(ts);
    var el = document.createElement('div');
    el.className = 'froster-chip';
    el.innerHTML = '🧊 Froster: <strong>' + inv.stock + ' ' + einheit + '</strong> · ' + pad(tsD.getHours()) + ':' + pad(tsD.getMinutes()) + ' Uhr';
    return el;
  }

  return null;
}

// ── TAB-LEISTE ───────────────────────────────────────────
function bauTabBar(sichtbar) {
  var wrap = document.createElement('div');
  wrap.className = 'tab-scroll';
  var bar = document.createElement('div');
  bar.className = 'tab-bar';
  sichtbar.forEach(function(k) {
    var m   = ABSCHNITT_META[k];
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (k === aktiverTab ? ' active-' + m.klasse : '');
    btn.textContent = m.label;
    btn.onclick = function() { switchTab(k, sichtbar); };
    btn.id = 'tab-btn-' + k;
    bar.appendChild(btn);
  });
  wrap.appendChild(bar);
  return wrap;
}

function switchTab(k, sichtbar) {
  aktiverTab = k;
  sichtbar.forEach(function(s) {
    var btn   = document.getElementById('tab-btn-' + s);
    var panel = document.getElementById('panel-' + s);
    var m     = ABSCHNITT_META[s];
    if (btn)   btn.className   = 'tab-btn' + (s === k ? ' active-' + m.klasse : '');
    if (panel) panel.className = 'tab-panel' + (s === k ? ' active' : '');
  });
}

// ── TAB-PANELS ───────────────────────────────────────────
function bauPanel(k, daten) {
  var el = document.createElement('div');
  el.className = 'tab-panel' + (k === aktiverTab ? ' active' : '');
  el.id = 'panel-' + k;

  var m    = ABSCHNITT_META[k];
  var html = '<div class="panel-titel ' + m.klasse + '">' + m.label + '</div>';

  switch(k) {
    case 'teig':
      html += '<div class="freitext">' + esc(daten.text || '–') + '</div>';
      break;

    case 'aufbau':
      if (!daten.schritte || !daten.schritte.length) {
        html += '<div style="font-size:0.82rem;color:var(--text-secondary,#6b7280);font-style:italic;">Keine Schritte hinterlegt.</div>';
      } else {
        html += '<div class="check-list" id="check-list"></div>';
        html += '<div class="check-reset" onclick="resetChecks()">↺ Zurücksetzen</div>';
      }
      break;

    case 'gare':
      html += '<div class="freitext">' + esc(daten.text || '–') + '</div>';
      break;

    case 'backen':
      html += '<div class="backen-grid">';
      if (daten.programm)         html += bauBackenBox('Programm',     daten.programm,          '');
      if (daten.temperatur_ober)  html += bauBackenBox('Temp. Ober',   daten.temperatur_ober,   '°C');
      if (daten.temperatur_unter) html += bauBackenBox('Temp. Unter',  daten.temperatur_unter,  '°C');
      if (daten.minuten)          html += bauBackenBox('Zeit',         daten.minuten,           'Min');
      html += '</div>';
      if (daten.hinweis) html += '<div class="backen-hinweis">' + esc(daten.hinweis) + '</div>';
      break;

    case 'versand':
      if (daten.pro_korb) {
        html +=
          '<div class="versand-korb">' +
            '<div class="versand-zahl">' + daten.pro_korb + '</div>' +
            '<div class="versand-label-wrap">' +
              '<span class="versand-label-gross">Stück pro Korb</span>' +
              '<span class="versand-label-sub">Richtwert beim Versand</span>' +
            '</div>' +
          '</div>';
      }
      if (daten.hinweis) html += '<div class="versand-hinweis">' + esc(daten.hinweis) + '</div>';
      break;
  }

  el.innerHTML = html;

  // Aufbau-Checkboxen nachträglich rendern
  if (k === 'aufbau' && daten.schritte && daten.schritte.length) {
    var liste = el.querySelector('#check-list');
    if (liste) {
      checkState[legacyKey] = checkState[legacyKey] || {};
      daten.schritte.forEach(function(schritt, idx) {
        liste.appendChild(bauCheckItem(schritt, idx));
      });
    }
  }

  return el;
}

function bauBackenBox(label, wert, einheit) {
  return '<div class="backen-box">' +
    '<div class="backen-label">' + esc(label) + '</div>' +
    '<div class="backen-wert">' + esc(String(wert)) + '<span class="backen-unit">' + esc(einheit) + '</span></div>' +
    '</div>';
}

function bauCheckItem(text, idx) {
  var erledigt = !!(checkState[legacyKey] && checkState[legacyKey][idx]);
  var el = document.createElement('div');
  el.className = 'check-item' + (erledigt ? ' erledigt' : '');
  el.id = 'check-' + idx;
  el.innerHTML =
    '<div class="check-box">' + (erledigt ? '✓' : '') + '</div>' +
    '<div class="check-text">' + esc(text) + '</div>';
  el.onclick = function() { toggleCheck(idx); };
  return el;
}

function toggleCheck(idx) {
  if (!checkState[legacyKey]) checkState[legacyKey] = {};
  checkState[legacyKey][idx] = !checkState[legacyKey][idx];
  var erledigt = checkState[legacyKey][idx];
  var el = document.getElementById('check-' + idx);
  if (!el) return;
  el.className = 'check-item' + (erledigt ? ' erledigt' : '');
  el.querySelector('.check-box').textContent = erledigt ? '✓' : '';
}

function resetChecks() {
  checkState[legacyKey] = {};
  document.querySelectorAll('.check-item').forEach(function(el, idx) {
    el.className = 'check-item';
    el.querySelector('.check-box').textContent = '';
  });
}

// ── HILFSFUNKTIONEN ──────────────────────────────────────
function zeigeStatus(icon, text, sub) {
  document.getElementById('main-content').innerHTML =
    '<div class="status-card">' +
      '<div class="status-icon">' + icon + '</div>' +
      '<div class="status-text">' + esc(text) + '</div>' +
      (sub ? '<div class="status-sub">' + esc(sub) + '</div>' : '') +
    '</div>';
}

function lagertypLabel(typ) {
  return {tk:'Tiefkühl', kuehl:'Kühl', trocken:'Trocken', sonstiges:'Sonstiges'}[typ] || typ;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
</script>
</body>
</html>
