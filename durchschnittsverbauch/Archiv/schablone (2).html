<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schablone – Ø Verbrauch</title>
<link rel="stylesheet" href="../systemdesign.css">
<style>
  /* ── Layout ─────────────────────────────────────────── */
  body { font-family: Arial, sans-serif; font-size: 13px; background: #f5f5f5; margin: 0; padding: 8px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; }
  .toolbar label { font-size: 12px; font-weight: bold; color: #333; }
  .toolbar select, .toolbar input[type=checkbox] { font-size: 12px; }
  .toolbar button { background: #c0392b; color: #fff; border: none; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 12px; font-weight: bold; }
  .toolbar button:hover { background: #a93226; }
  .toolbar .sep { width: 1px; height: 24px; background: #ddd; margin: 0 4px; }
  #ladeStatus { font-size: 12px; color: #666; margin-left: 4px; }

  /* ── Kategorie-Block ────────────────────────────────── */
  .kat-block { background: #fff; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
  .kat-header {
    background: #c0392b; color: #fff; font-weight: bold; font-size: 13px;
    padding: 6px 12px; cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center;
  }
  .kat-header:hover { background: #a93226; }
  .kat-toggle { font-size: 16px; line-height: 1; }
  .kat-body { overflow: hidden; transition: max-height 0.2s ease; }
  .kat-body.collapsed { max-height: 0 !important; }

  /* ── Tabelle ────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; }
  th { background: #333; color: #fff; font-size: 11px; padding: 4px 6px; text-align: center; position: sticky; top: 0; }
  th.col-name { text-align: left; }
  td { padding: 3px 6px; border-bottom: 1px solid #eee; vertical-align: middle; }
  td.col-name { font-size: 12px; font-weight: bold; max-width: 155px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  td.col-wt { text-align: center; font-size: 12px; min-width: 52px; }
  td.col-wt .bleche { font-size: 14px; font-weight: bold; color: #111; }
  td.col-wt .stueck { font-size: 10px; color: #666; }
  td.col-wt .basis  { font-size: 9px;  color: #aaa; }
  tr:nth-child(even) { background: #fafafa; }
  tr:hover { background: #fff3f3; }

  /* Heute-Hervorhebung */
  th.heute { background: #e67e22; }
  td.heute { background: #fff8f0; }

  /* ── Kein Wert ──────────────────────────────────────── */
  .kein-wert { color: #ccc; font-size: 11px; }

  /* ── Druckstil ──────────────────────────────────────── */
  @media print {
    body { background: #fff; padding: 0; font-size: 11px; }
    .toolbar { display: none !important; }
    .kat-block { page-break-after: always; border: none; margin: 0; }
    .kat-block:last-child { page-break-after: avoid; }
    .kat-body { max-height: none !important; display: block !important; }
    .kat-body.collapsed { max-height: none !important; display: block !important; }
    .kat-header { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-header { display: block; font-size: 10px; color: #666; text-align: right; margin-bottom: 4px; }
    td.heute { background: #fff8f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    th.heute  { background: #e67e22 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  @media screen { .print-header { display: none; } }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <label>Zeitraum:</label>
  <select id="selZeitraum">
    <option value="14" selected>14 Tage</option>
    <option value="28">28 Tage</option>
    <option value="56">56 Tage</option>
    <option value="84">84 Tage</option>
    <option value="0">Alle</option>
  </select>
  <div class="sep"></div>
  <label><input type="checkbox" id="chkHeute" checked> Heute hervorheben</label>
  <div class="sep"></div>
  <label>Spalten:</label>
  <label><input type="checkbox" class="chkWT" value="1" checked> Mo</label>
  <label><input type="checkbox" class="chkWT" value="2" checked> Di</label>
  <label><input type="checkbox" class="chkWT" value="3" checked> Mi</label>
  <label><input type="checkbox" class="chkWT" value="4" checked> Do</label>
  <label><input type="checkbox" class="chkWT" value="5" checked> Fr</label>
  <label><input type="checkbox" class="chkWT" value="6" checked> Sa</label>
  <label><input type="checkbox" class="chkWT" value="0" checked> So</label>
  <div class="sep"></div>
  <button onclick="window.print()">🖨 Drucken</button>
  <button onclick="ladeUndZeige()">↺ Neu laden</button>
  <span id="ladeStatus">Lade…</span>
</div>

<!-- Inhalt -->
<div id="inhalt"></div>

<script>
const WT_NAMEN = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const WT_INDEX = [1,2,3,4,5,6,0]; // Mo zuerst

let produktConfig = [];
let dbDaten = [];
let legacyMap = {};
let einstellungen = {};
let kategorien = {};

// ── Produkt-Config laden ──────────────────────────────────
async function ladeProduktConfig() {
  const res = await fetch('../produkt_config.json', { cache: 'no-store' });
  produktConfig = await res.json();
  legacyMap = {};
  einstellungen = {};
  kategorien = {};
  for (const p of produktConfig) {
    einstellungen[p.name] = { charge: p.charge, kategorie: p.kategorie };
    if (!kategorien[p.kategorie]) kategorien[p.kategorie] = [];
    kategorien[p.kategorie].push(p.name);
    if (p.legacyKey) legacyMap[p.legacyKey] = p.name;
  }
}

// ── DB laden ─────────────────────────────────────────────
async function ladeDB() {
  const res = await fetch('../backmengen_db.json', { cache: 'no-store' });
  dbDaten = await res.json();
}

// ── Key-Normalisierung ────────────────────────────────────
function normalKey(raw) {
  if (!raw || raw.endsWith('_bleche')) return null;
  const erlaubt = new Set(produktConfig.map(p => p.name));
  if (erlaubt.has(raw)) return raw;
  if (legacyMap[raw]) return legacyMap[raw];
  return null;
}

// ── Durchschnitt pro Wochentag ────────────────────────────
function berechne(maxTage) {
  const sortiert = [...dbDaten].sort((a,b) => b.datum.localeCompare(a.datum));
  const begrenzt = maxTage > 0 ? sortiert.slice(0, maxTage) : sortiert;

  // Pro Wochentag pro Produkt: Bleche sammeln
  const daten = {}; // { wt: { name: [bleche,...] } }
  for (let wt = 0; wt <= 6; wt++) daten[wt] = {};

  for (const eintrag of begrenzt) {
    const wt = new Date(eintrag.datum).getDay();
    for (const [rawKey, wert] of Object.entries(eintrag)) {
      if (rawKey === 'datum') continue;
      const name = normalKey(rawKey);
      if (!name) continue;
      if (!daten[wt][name]) daten[wt][name] = [];
      daten[wt][name].push(Number(wert) || 0);
    }
  }

  // Durchschnitte
  const ergebnis = {}; // { wt: { name: { avg, n } } }
  for (let wt = 0; wt <= 6; wt++) {
    ergebnis[wt] = {};
    for (const [name, werte] of Object.entries(daten[wt])) {
      const avg = werte.reduce((s,v) => s+v, 0) / werte.length;
      ergebnis[wt][name] = { avg, n: werte.length };
    }
  }
  return ergebnis;
}

// ── Zeitraum-Label ────────────────────────────────────────
function zeitraumLabel(maxTage) {
  const sorted = [...dbDaten].sort((a,b) => a.datum.localeCompare(b.datum));
  if (!sorted.length) return '–';
  const alle = maxTage > 0 ? sorted.slice(-maxTage) : sorted;
  return alle[0].datum + ' – ' + alle[alle.length-1].datum;
}

// ── HTML rendern ──────────────────────────────────────────
function render() {
  const maxTage  = parseInt(document.getElementById('selZeitraum').value);
  const heутеCbx = document.getElementById('chkHeute').checked;
  const heute    = new Date().getDay(); // 0=So
  const aktiveWT = [];
  document.querySelectorAll('.chkWT').forEach(cb => {
    if (cb.checked) aktiveWT.push(parseInt(cb.value));
  });

  const wtSpalten = WT_INDEX.filter(wt => aktiveWT.includes(wt));
  const daten     = berechne(maxTage);
  const zeitraum  = zeitraumLabel(maxTage);
  const basis     = maxTage > 0 ? maxTage : dbDaten.length;

  // Kategorien-Reihenfolge
  const katReihenfolge = ['Brötchen','Brot','Konditorei','Fettgebäck','Snack'];

  const container = document.getElementById('inhalt');
  container.innerHTML = '';

  for (const katName of katReihenfolge) {
    const produkte = kategorien[katName];
    if (!produkte) continue;

    // Nur Produkte die in min. einem WT Daten haben
    const mitDaten = produkte.filter(name =>
      wtSpalten.some(wt => daten[wt][name])
    );
    if (!mitDaten.length) continue;

    // Block
    const block = document.createElement('div');
    block.className = 'kat-block';

    // Druckkopf (nur im Druck sichtbar)
    block.innerHTML = `<div class="print-header">${katName} · Ø Verbrauch · Stand: ${new Date().toLocaleDateString('de-DE')} · Basis: ${zeitraum}</div>`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'kat-header';
    hdr.innerHTML = `<span>${katName}</span><span class="kat-toggle">▼</span>`;
    hdr.onclick = () => {
      const body = block.querySelector('.kat-body');
      const toggle = hdr.querySelector('.kat-toggle');
      body.classList.toggle('collapsed');
      toggle.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
    };
    block.appendChild(hdr);

    // Body
    const body = document.createElement('div');
    body.className = 'kat-body';
    body.style.maxHeight = '9999px';

    // Tabelle
    const tbl = document.createElement('table');

    // Kopfzeile
    let thRow = `<tr><th class="col-name">Produkt</th>`;
    for (const wt of wtSpalten) {
      const isHeute = heутеCbx && wt === heute;
      thRow += `<th class="col-wt${isHeute ? ' heute' : ''}">${WT_NAMEN[wt]}</th>`;
    }
    thRow += '</tr>';
    tbl.innerHTML = `<thead>${thRow}</thead>`;

    // Zeilen
    const tbody = document.createElement('tbody');
    for (const name of mitDaten) {
      const cfg = einstellungen[name] || { charge: 1 };
      const tr = document.createElement('tr');
      let html = `<td class="col-name" title="${name}">${name}</td>`;
      for (const wt of wtSpalten) {
        const isHeute = heутеCbx && wt === heute;
        const info = daten[wt][name];
        if (info) {
          const stueck = Math.round(info.avg * cfg.charge);
          html += `<td class="col-wt${isHeute ? ' heute' : ''}">
            <div class="bleche">${info.avg.toFixed(2)}</div>
            <div class="stueck">${stueck} Stk</div>
            <div class="basis">n=${info.n}</div>
          </td>`;
        } else {
          html += `<td class="col-wt${isHeute ? ' heute' : ''}"><span class="kein-wert">–</span></td>`;
        }
      }
      tr.innerHTML = html;
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);
    body.appendChild(tbl);
    block.appendChild(body);
    container.appendChild(block);
  }
}

// ── Alles laden und anzeigen ──────────────────────────────
async function ladeUndZeige() {
  const status = document.getElementById('ladeStatus');
  status.textContent = 'Lade…';
  try {
    await Promise.all([ladeProduktConfig(), ladeDB()]);
    render();
    status.textContent = `✓ ${dbDaten.length} Einträge · ${produktConfig.length} Produkte`;
  } catch (e) {
    status.textContent = '⚠ Fehler: ' + e.message;
    console.error(e);
  }
}

// Neurendern bei Einstellungsänderungen
document.getElementById('selZeitraum').addEventListener('change', render);
document.getElementById('chkHeute').addEventListener('change', render);
document.querySelectorAll('.chkWT').forEach(cb => cb.addEventListener('change', render));

// Start
ladeUndZeige();
</script>
</body>
</html>
