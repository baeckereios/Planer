<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BäckereiOS – Schablone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');

:root {
  --bg:       #f0ece4;
  --surface:  #faf8f4;
  --border:   #c8c0b0;
  --border2:  #d8d0c4;
  --ink:      #1a1410;
  --ink2:     #5a5040;
  --accent:   #c0392b;
  --row-alt:  #f2ede6;
  --hdr-bg:   #1a1410;
  --hdr-fg:   #faf8f4;
  --today-bg: #fff8dc;
  --today-fg: #b07800;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
}

/* ── UI BAR ── */
.ui-bar {
  background: var(--hdr-bg);
  color: var(--hdr-fg);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.ui-bar h1 {
  font-family: var(--mono);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  flex: 1;
}
.ui-bar h1 span { color: #e5a000; }
.btn {
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 6px 14px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn:hover { opacity: 0.82; }
.btn-print  { background: #e5a000; color: #1a1410; }
.btn-reload { background: #2980b9; color: #fff; }

/* ── SETTINGS ── */
.settings-panel {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 12px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: flex-end;
}
.settings-panel label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--ink2);
  display: block;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.settings-panel select {
  font-family: var(--mono);
  font-size: 0.88rem;
  padding: 4px 9px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 4px;
  color: var(--ink);
}
.day-checks { display: flex; gap: 5px; flex-wrap: wrap; }
.day-checks label {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--ink);
  background: #e8e0d0;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: background 0.12s, color 0.12s;
}
.day-checks label:has(input:checked) {
  background: var(--hdr-bg);
  color: #e5a000;
  border-color: var(--hdr-bg);
}
.day-checks input { display: none; }

/* ── STATUS ── */
.status-bar {
  background: #fff8e8;
  border-bottom: 1px solid #e0c878;
  padding: 5px 16px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--ink2);
}

/* ── CONTENT ── */
.content { padding: 16px; }

/* ── CATEGORY BLOCK ── */
.kat-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 14px;
  overflow: hidden;
}
.kat-toggle {
  background: var(--accent);
  color: #fff;
  width: 100%;
  border: none;
  padding: 8px 14px;
  text-align: left;
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
}
.kat-toggle .arrow { transition: transform 0.2s; display: inline-block; font-style: normal; }
.kat-block.collapsed .arrow { transform: rotate(-90deg); }
.kat-body { overflow: hidden; }
.kat-block.collapsed .kat-body { max-height: 0 !important; }

/* ── TABLE ── */
table {
  width: auto;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.75rem;
  margin: 0;
}
thead th {
  background: var(--hdr-bg);
  color: var(--hdr-fg);
  padding: 6px 8px;
  text-align: center;
  font-weight: 700;
  letter-spacing: 0.05em;
  font-size: 0.68rem;
  border: 1px solid #333;
  white-space: nowrap;
}
thead th.col-name {
  text-align: left;
  width: 155px;
  min-width: 120px;
}
thead th.col-charge { width: 52px; }
thead th.col-day { width: 72px; background: #2a2a2a; }
thead th.col-day.today { background: #5a4200; color: #ffd060; }

.sub-header th {
  background: #2e2e2e !important;
  color: #999 !important;
  font-size: 0.6rem !important;
  padding: 3px 8px !important;
  font-weight: 400 !important;
  border-top: none !important;
}
.sub-header th.col-day.today { background: #4a3800 !important; color: #d4a820 !important; }

tbody tr.data-row td {
  padding: 4px 8px;
  border: 1px solid var(--border2);
  vertical-align: middle;
}
tbody tr.data-row:nth-child(odd)  td { background: var(--surface); }
tbody tr.data-row:nth-child(even) td { background: var(--row-alt); }

td.col-name {
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 155px;
}
td.col-charge {
  text-align: center;
  color: var(--ink2);
  font-size: 0.7rem;
}
td.col-day { text-align: center; }
td.col-day .bl  { font-size: 0.85rem; font-weight: 700; display: block; }
td.col-day .stk { font-size: 0.58rem; color: var(--ink2); display: block; }
td.col-day.no-data { color: #b8b0a0; font-size: 0.7rem; }
td.col-day.today { background: var(--today-bg); }
td.col-day.today .bl { color: var(--today-fg); }

/* ── PRINT ── */
@media print {
  @page { size: A4 portrait; margin: 8mm 7mm; }

  .ui-bar, .settings-panel, .status-bar { display: none !important; }
  .kat-toggle .arrow { display: none !important; }

  body { background: #fff; }
  .content { padding: 0; }

  .kat-block {
    border: none;
    border-radius: 0;
    margin: 0;
    page-break-after: always;
    overflow: visible;
    background: #fff;
  }
  .kat-block:last-child { page-break-after: avoid; }

  /* Always expanded in print */
  .kat-block.collapsed .kat-body {
    max-height: none !important;
    overflow: visible !important;
  }

  .print-page-header {
    display: flex !important;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 4px;
    border-bottom: 1.5pt solid #000;
    margin-bottom: 5px;
  }
  .print-page-header .ph-left .ph-sub { font-size: 6.5pt; color: #666; }
  .print-page-header .ph-left .ph-title { font-size: 11pt; font-weight: 700; font-family: var(--mono); }
  .print-page-header .ph-right { font-size: 6.5pt; color: #666; text-align: right; line-height: 1.5; }

  .kat-toggle {
    background: #c0392b !important;
    color: #fff !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    padding: 4px 8px;
    font-size: 0.68rem;
    margin-bottom: 3px;
  }

  table { width: 100% !important; font-size: 7.5pt; }

  thead th {
    background: #111 !important;
    color: #fff !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    padding: 3px 5px !important;
    font-size: 6.5pt !important;
    border: 0.5pt solid #444 !important;
  }
  thead th.col-day { background: #2a2a2a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  thead th.col-day.today {
    background: #5a4200 !important;
    color: #ffd060 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .sub-header th {
    background: #333 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    padding: 2px 5px !important;
    font-size: 5.5pt !important;
  }
  .sub-header th.col-day.today {
    background: #4a3800 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  tbody tr.data-row td { padding: 2px 5px !important; border: 0.5pt solid #ccc !important; }
  tbody tr.data-row:nth-child(even) td {
    background: #f5f5f5 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  td.col-day.today {
    background: #fff8dc !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  td.col-day.today .bl { color: #b07800 !important; }

  td.col-day .bl  { font-size: 7.5pt; }
  td.col-day .stk { font-size: 5pt; }
  td.col-name { font-size: 7.5pt; max-width: none !important; width: 130pt; }
  thead th.col-name { width: 130pt; }
  td.col-charge { font-size: 6.5pt; }
}

/* Print header hidden on screen */
.print-page-header { display: none; }

.msg { text-align: center; padding: 50px 20px; font-family: var(--mono); color: var(--ink2); }
.msg.error { color: var(--accent); }
</style>
</head>
<body>

<div class="ui-bar">
  <h1>🥖 <span>BÄCKEREI</span>OS — Schablone</h1>
  <button class="btn btn-reload" onclick="laden()">↺ Neu laden</button>
  <button class="btn btn-print"  onclick="window.print()">🖨 Drucken</button>
</div>

<div class="settings-panel">
  <div>
    <label>Zeitraum</label>
    <select id="sel-zeitraum" onchange="rendern()">
      <option value="14">14 Tage</option>
      <option value="28" selected>28 Tage</option>
      <option value="56">56 Tage</option>
      <option value="84">84 Tage</option>
      <option value="9999">Alle Daten</option>
    </select>
  </div>
  <div>
    <label>Wochentag-Spalten</label>
    <div class="day-checks">
      <label><input type="checkbox" id="c-mo" checked onchange="rendern()"> Mo</label>
      <label><input type="checkbox" id="c-di" checked onchange="rendern()"> Di</label>
      <label><input type="checkbox" id="c-mi" checked onchange="rendern()"> Mi</label>
      <label><input type="checkbox" id="c-do" checked onchange="rendern()"> Do</label>
      <label><input type="checkbox" id="c-fr" checked onchange="rendern()"> Fr</label>
      <label><input type="checkbox" id="c-sa"           onchange="rendern()"> Sa</label>
      <label><input type="checkbox" id="c-so"           onchange="rendern()"> So</label>
    </div>
  </div>
  <div>
    <label>Heute hervorheben</label>
    <select id="sel-heute" onchange="rendern()">
      <option value="-1">— keinen —</option>
      <option value="1">Mo</option>
      <option value="2">Di</option>
      <option value="3">Mi</option>
      <option value="4">Do</option>
      <option value="5">Fr</option>
      <option value="6">Sa</option>
      <option value="0">So</option>
    </select>
  </div>
</div>

<div class="status-bar" id="status-bar">Lade Datenbank…</div>
<div class="content" id="content"><div class="msg">Lade Daten…</div></div>

<script>
const PRODUKT_CONFIG = [
  { kat:"Brot",       name:"Korbgerster 1250g",                   charge:1  },
  { kat:"Brot",       name:"Korbgerster 750g",                    charge:1  },
  { kat:"Brot",       name:"Gersterbrot 1250g",                   charge:1  },
  { kat:"Brot",       name:"Bergsteiger 750g",                    charge:1  },
  { kat:"Brot",       name:"Findling 500g",                       charge:1  },
  { kat:"Brot",       name:"Findling 250g",                       charge:1  },
  { kat:"Brot",       name:"Erntebrot 750g",                      charge:1  },
  { kat:"Brot",       name:"Vollkornbrot 750g",                   charge:1  },
  { kat:"Brot",       name:"Dinkel-Gerster 750g",                 charge:1  },
  { kat:"Brot",       name:"Kamut-Kruste",                        charge:1  },
  { kat:"Brot",       name:"Krosses Herri 750g Bierbrot",         charge:1  },
  { kat:"Brot",       name:"Stangen Gesamt",                      charge:6  },
  { kat:"Brot",       name:"Baguettestange Teig (3)",             charge:3  },
  { kat:"Brot",       name:"Zwiebelstange",                       charge:6  },
  { kat:"Brot",       name:"Zwiebelstange Teig",                  charge:3  },
  { kat:"Brot",       name:"Kastenweißbrot 450g",                 charge:1  },
  { kat:"Brot",       name:"L'amourette 250g",                    charge:1  },
  { kat:"Brötchen",   name:"Schrippen GESAMT",                    charge:28 },
  { kat:"Brötchen",   name:"Schrippen Teiglinge",                 charge:28 },
  { kat:"Brötchen",   name:"Schrippen Teiglinge gefroren",        charge:28 },
  { kat:"Brötchen",   name:"Hasenberger",                         charge:20 },
  { kat:"Brötchen",   name:"Käsebrötchen",                        charge:16 },
  { kat:"Brötchen",   name:"Kornknacker",                         charge:25 },
  { kat:"Brötchen",   name:"Dinkel-Zwerg süß",                    charge:25 },
  { kat:"Brötchen",   name:"Laugenstangen",                       charge:18 },
  { kat:"Brötchen",   name:"Laugenecken GESAMT",                  charge:15 },
  { kat:"Süßes",      name:"Rosinen-Hedwig",                      charge:20 },
  { kat:"Süßes",      name:"Hasenpfötchen",                       charge:20 },
  { kat:"Süßes",      name:"Rosinen-Batzen",                      charge:12 },
  { kat:"Süßes",      name:"Schoko-Batzen",                       charge:12 },
  { kat:"Süßes",      name:"Zimt-Wölkchen",                       charge:14 },
  { kat:"Süßes",      name:"Butter-Croissant",                    charge:16 },
  { kat:"Süßes",      name:"Schoko-Croissant",                    charge:20 },
  { kat:"Süßes",      name:"Mini-Croissant",                      charge:30 },
  { kat:"Süßes",      name:"Mini-Schoko-Croissant",               charge:30 },
  { kat:"Konditorei", name:"Käsekuchen",                          charge:1  },
  { kat:"Konditorei", name:"Oma Herta's Zuckerkuchen Stück 1/6",  charge:6  },
  { kat:"Konditorei", name:"Streuselkuchen Stück 1/6",            charge:6  },
  { kat:"Konditorei", name:"Dinkel-Apfelkuchen",                  charge:1  },
  { kat:"Konditorei", name:"Dinkel-Rüblikuchen",                  charge:1  },
  { kat:"Konditorei", name:"Schnecken",                           charge:12 },
  { kat:"Konditorei", name:"Amis",                                charge:12 },
  { kat:"Konditorei", name:"Plunderstreifen",                     charge:16 },
  { kat:"Konditorei", name:"Puddingbrezel",                       charge:16 },
  { kat:"Konditorei", name:"Käse.Mohn.To. geb. Stü",             charge:12 },
  { kat:"Konditorei", name:"Donuts",                              charge:24 },
  { kat:"Konditorei", name:"Quarkinis",                           charge:24 },
  { kat:"Konditorei", name:"Krapfen GESAMT",                      charge:24 },
  { kat:"Konditorei", name:"Schlawiner GESAMT",                   charge:48 },
  { kat:"Konditorei", name:"Veganer Himbeerkuchen",               charge:1  },
  { kat:"Konditorei", name:"Carrot Cheesecake (nur Henri)",       charge:1  },
];

const LEGACY = {
  "baguettestange_teig_stueck":  "Baguettestange Teig (3)",
  "dinkel_gerster_750g_stueck":  "Dinkel-Gerster 750g",
  "findling_500g_stueck":        "Findling 500g",
  "gersterbrot_1250g_stueck":    "Gersterbrot 1250g",
  "hasenberger_stueck":          "Hasenberger",
  "hasenpfoetchen_stueck":       "Hasenpfötchen",
  "kaesebroetchen_stueck":       "Käsebrötchen",
  "kaesekuchen_stueck":          "Käsekuchen",
  "korbgerster_1250g_stueck":    "Korbgerster 1250g",
  "kornknacker_stueck":          "Kornknacker",
  "laugenstangen_stueck":        "Laugenstangen",
  "oma_hertas_stueck":           "Oma Herta's Zuckerkuchen Stück 1/6",
  "plunderstreifen_stueck":      "Plunderstreifen",
  "puddingbrezel_stueck":        "Puddingbrezel",
  "rosinen_batzen_stueck":       "Rosinen-Batzen",
  "rosinen_hedwig_stueck":       "Rosinen-Hedwig",
  "schlawiner_gesamt_stueck":    "Schlawiner GESAMT",
  "schoko_batzen_stueck":        "Schoko-Batzen",
  "stangen_gesamt_stueck":       "Stangen Gesamt",
  "streuselkuchen_stueck":       "Streuselkuchen Stück 1/6",
  "zwiebelstange_stueck":        "Zwiebelstange",
  "zwiebelstange_teig_stueck":   "Zwiebelstange Teig",
};

const DAY_NAMES = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const DAY_IDS   = ["c-so","c-mo","c-di","c-mi","c-do","c-fr","c-sa"];
let DB = null;

async function laden() {
  document.getElementById('content').innerHTML = '<div class="msg">Lade Daten…</div>';
  document.getElementById('status-bar').textContent = 'Lade…';
  document.getElementById('sel-heute').value = new Date().getDay();
  try {
    const r = await fetch('../backmengen_db.json', { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    DB = await r.json();
    document.getElementById('status-bar').textContent =
      `✓ ${DB.length} Einträge · ${DB[0]?.datum} – ${DB[DB.length-1]?.datum}`;
    rendern();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="msg error">❌ ${e.message}</div>`;
  }
}

function normalKey(raw) {
  if (raw.endsWith('_bleche')) return null;
  if (LEGACY[raw]) return LEGACY[raw];
  if (raw.endsWith('_stueck')) return null;
  return raw;
}

function berechnen(tageLimit) {
  const result = {};
  PRODUKT_CONFIG.forEach(p => { result[p.name] = {0:[],1:[],2:[],3:[],4:[],5:[],6:[]}; });
  const today  = new Date(); today.setHours(23,59,59,999);
  const cutoff = new Date(today.getTime() - tageLimit * 86400000);
  DB.forEach(entry => {
    const d = new Date(entry.datum + 'T12:00:00');
    if (d < cutoff || d > today) return;
    const wd = d.getDay();
    for (const [raw, val] of Object.entries(entry.produkte)) {
      const key = normalKey(raw);
      if (!key || !result[key]) continue;
      const n = parseInt(val);
      if (!isNaN(n) && n > 0) result[key][wd].push(n);
    }
  });
  return result;
}

function rendern() {
  if (!DB) return;
  const tage  = parseInt(document.getElementById('sel-zeitraum').value) || 28;
  const heute = parseInt(document.getElementById('sel-heute').value);
  const aktiveTage = [1,2,3,4,5,6,0].filter(wd => document.getElementById(DAY_IDS[wd])?.checked);
  const stats = berechnen(tage);

  const now = new Date();
  const datumStr = `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()}`;
  const zeitraumLabel = tage >= 9000 ? 'Alle Daten' : `Letzte ${tage} Tage`;

  // Group by Kategorie
  const katMap = {};
  PRODUKT_CONFIG.forEach(p => {
    if (!katMap[p.kat]) katMap[p.kat] = [];
    katMap[p.kat].push(p);
  });

  function makeThead(zeitraumLabel) {
    let h = `<thead><tr>
      <th class="col-name">Bezeichnung</th>
      <th class="col-charge">Charge</th>`;
    aktiveTage.forEach(wd => {
      h += `<th class="col-day${wd===heute?' today':''}">${DAY_NAMES[wd]}${wd===heute?' ★':''}</th>`;
    });
    h += `</tr><tr class="sub-header">
      <th class="col-name">Ø ${zeitraumLabel}</th>
      <th class="col-charge">Stk/Bl</th>`;
    aktiveTage.forEach(wd => {
      h += `<th class="col-day${wd===heute?' today':''}">Ø Bleche<br><span style="font-size:.55em;opacity:.7">Ø Stück</span></th>`;
    });
    return h + `</tr></thead>`;
  }

  let html = '';
  let idx = 0;
  Object.entries(katMap).forEach(([katName, produkte]) => {
    idx++;
    html += `<div class="kat-block" id="kat-${idx}">`;

    // Print-only page header
    html += `<div class="print-page-header">
      <div class="ph-left">
        <div class="ph-sub">BäckereiOS · Schablone · ${datumStr}</div>
        <div class="ph-title">${katName}</div>
      </div>
      <div class="ph-right">Zeitraum: ${zeitraumLabel}<br>Basis: ${DB.length} Einträge</div>
    </div>`;

    html += `<button class="kat-toggle" onclick="toggleKat(${idx})">
      ▸ ${katName} <span class="arrow">▼</span>
    </button>`;

    html += `<div class="kat-body" id="kb-${idx}" style="max-height:9999px">
      <table>${makeThead(zeitraumLabel)}<tbody>`;

    produkte.forEach(({ name, charge }) => {
      html += `<tr class="data-row">
        <td class="col-name" title="${name}">${name}</td>
        <td class="col-charge">${charge > 1 ? charge : '—'}</td>`;
      aktiveTage.forEach(wd => {
        const werte = stats[name]?.[wd] || [];
        const isH = wd === heute;
        if (!werte.length) {
          html += `<td class="col-day no-data${isH?' today':''}">—</td>`;
        } else {
          const avgSt = werte.reduce((a,b)=>a+b,0) / werte.length;
          const avgBl = charge > 1 ? avgSt / charge : null;
          const blTxt = avgBl !== null ? avgBl.toFixed(1).replace(/\.0$/,'') + ' Bl' : Math.round(avgSt) + ' Stk';
          const stTxt = avgBl !== null ? `${Math.round(avgSt)} Stk · n=${werte.length}` : `n=${werte.length}`;
          html += `<td class="col-day${isH?' today':''}">
            <span class="bl">${blTxt}</span>
            <span class="stk">${stTxt}</span>
          </td>`;
        }
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function toggleKat(idx) {
  const block = document.getElementById(`kat-${idx}`);
  const body  = document.getElementById(`kb-${idx}`);
  const collapsed = block.classList.toggle('collapsed');
  if (!collapsed) body.style.maxHeight = '9999px';
}

document.addEventListener('DOMContentLoaded', laden);
</script>
</body>
</html>
