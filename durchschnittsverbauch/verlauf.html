<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BäckereiOS — Produktverlauf</title>
<link rel="stylesheet" href="../systemdesign.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: var(--background, #f8f6f2); color: var(--text-primary, #1a1a1a); }
.container { max-width: 900px; margin: 0 auto; padding: 16px 12px 80px; }
.page-header { text-align: center; margin-bottom: 20px; }
.page-header h1 { font-size: 1.3rem; font-weight: 900; margin-bottom: 4px; }
.page-header p  { font-size: 0.8rem; color: #6b7280; }
.card { background: var(--card-bg, #fff); border: 1px solid var(--border-color, #e5e0d8);
        border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.card-titel { font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px;
  text-transform: uppercase; color: #6b7280; margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-color, #e5e0d8);
  display: flex; justify-content: space-between; align-items: center; }
.zeitraum-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.zt-btn { font-family: inherit; font-size: 0.75rem; font-weight: 700; padding: 6px 12px;
  border-radius: 20px; border: 1.5px solid var(--border-color, #e5e0d8);
  background: var(--card-bg, #fff); color: #6b7280; cursor: pointer; transition: all 0.15s; }
.zt-btn:hover { border-color: #e67e22; color: #e67e22; }
.zt-btn.aktiv { background: #e67e22; border-color: #e67e22; color: #fff; }
.einheit-toggle { display: flex; gap: 6px; }
.ein-btn { font-family: inherit; font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; border: 1px solid var(--border-color, #e5e0d8);
  background: var(--card-bg, #fff); color: #6b7280; cursor: pointer; }
.ein-btn.aktiv { background: #1e293b; color: #fff; border-color: #1e293b; }
.prod-such { width: 100%; padding: 9px 12px; border-radius: 8px; margin-bottom: 10px;
  border: 1.5px solid var(--border-color, #e5e0d8); font-family: inherit; font-size: 0.85rem;
  background: var(--card-bg, #fff); color: var(--text-primary, #1a1a1a); }
.prod-such:focus { outline: none; border-color: #e67e22; }
.prod-liste { display: flex; flex-wrap: wrap; gap: 6px; max-height: 220px; overflow-y: auto; }
.prod-chip { font-size: 0.72rem; padding: 5px 10px; border-radius: 20px;
  border: 1.5px solid var(--border-color, #e5e0d8); background: var(--card-bg, #fff);
  color: #6b7280; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.prod-chip.sel-0 { background: #fee2e2; border-color: #ef4444; color: #991b1b; font-weight: 700; }
.prod-chip.sel-1 { background: #dbeafe; border-color: #3b82f6; color: #1e40af; font-weight: 700; }
.prod-chip.sel-2 { background: #d1fae5; border-color: #10b981; color: #065f46; font-weight: 700; }
.prod-chip.sel-3 { background: #fef3c7; border-color: #f59e0b; color: #92400e; font-weight: 700; }
.prod-chip.sel-4 { background: #ede9fe; border-color: #8b5cf6; color: #4c1d95; font-weight: 700; }
.max-hinweis { font-size: 0.72rem; color: #9ca3af; font-style: italic; margin-top: 6px; }
.ausgewaehlt-liste { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 28px; }
.ausgewaehlt-chip { font-size: 0.72rem; padding: 4px 9px; border-radius: 20px;
  font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.ausgewaehlt-chip .x { opacity: 0.6; font-size: 0.65rem; }
.chart-wrap { position: relative; width: 100%; height: 320px; }
.legende { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.legende-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; }
.legende-farbe { width: 20px; height: 3px; border-radius: 2px; }
.lade-info { text-align: center; padding: 30px; color: #9ca3af; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>📈 Produktverlauf</h1>
    <p>Rohdaten aus der Backmengen-Datenbank · bis zu 5 Produkte vergleichen</p>
  </div>

  <div class="card">
    <div class="card-titel">
      <span>Zeitraum &amp; Einheit</span>
      <div class="einheit-toggle">
        <button class="ein-btn aktiv" id="btn-stueck" onclick="setEinheit('stueck')">Stück</button>
        <button class="ein-btn" id="btn-bleche" onclick="setEinheit('bleche')">Bleche</button>
      </div>
    </div>
    <div class="zeitraum-btns">
      <button class="zt-btn" onclick="setZeitraum(7, this)">7 Tage</button>
      <button class="zt-btn aktiv" onclick="setZeitraum(14, this)">14 Tage</button>
      <button class="zt-btn" onclick="setZeitraum(28, this)">28 Tage</button>
      <button class="zt-btn" onclick="setZeitraum(0, this)">Alle</button>
    </div>
  </div>

  <div class="card">
    <div class="card-titel" onclick="toggleAuswahl()" style="cursor:pointer;">
      <span>Produkte wählen <span style="font-weight:400;font-size:0.65rem;">(max. 5)</span></span>
      <span id="auswahl-toggle-info" style="font-size:0.72rem;font-weight:600;color:#e67e22;"></span>
    </div>
    <div id="auswahl-body">
      <div class="ausgewaehlt-liste" id="ausgewaehlt"></div>
      <input class="prod-such" type="text" placeholder="Produkt suchen…" id="suchfeld" oninput="filterProdukte()">
      <div class="prod-liste" id="prodListe"><div class="lade-info">Lade…</div></div>
      <div class="max-hinweis" id="maxHinweis" style="display:none;">Maximal 5 Produkte — erst abwählen um ein anderes hinzuzufügen.</div>
    </div>
  </div>

  <div class="card" id="chartCard" style="display:none;">
    <div class="card-titel">Verlauf</div>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    <div class="legende" id="legende"></div>
  </div>

</div>
<script src="../shell.js"></script>
<script>
const FARBEN = [
  { line: '#ef4444', bg: 'rgba(239,68,68,0.08)' },
  { line: '#3b82f6', bg: 'rgba(59,130,246,0.08)' },
  { line: '#10b981', bg: 'rgba(16,185,129,0.08)' },
  { line: '#f59e0b', bg: 'rgba(245,158,11,0.08)' },
  { line: '#8b5cf6', bg: 'rgba(139,92,246,0.08)' },
];
const SEL_KLASSEN = ['sel-0','sel-1','sel-2','sel-3','sel-4'];

let db = [], produktConfig = [], alleProdukte = [];
let ausgewaehlt = [], gefiltertProdukte = [];
let zeitraumTage = 14, einheit = 'stueck', chart = null;

let auswahlOffen = true;

function toggleAuswahl() {
  auswahlOffen = !auswahlOffen;
  document.getElementById('auswahl-body').style.display = auswahlOffen ? 'block' : 'none';
  aktualisiereAuswahlHeader();
}

function aktualisiereAuswahlHeader() {
  const info = document.getElementById('auswahl-toggle-info');
  if (!auswahlOffen && ausgewaehlt.length > 0) {
    info.textContent = ausgewaehlt.join(', ');
  } else if (!auswahlOffen) {
    info.textContent = 'Nichts ausgewählt — tippen zum Öffnen';
  } else {
    info.textContent = '';
  }
}

async function init() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('../backmengen_db.json', { cache: 'no-store' }),
      fetch('../produkt_config.json', { cache: 'no-store' }),
    ]);
    db = await r1.json();
    produktConfig = await r2.json();
  } catch(e) {
    document.getElementById('prodListe').innerHTML = `<div class="lade-info">Fehler: ${e.message}</div>`;
    return;
  }
  alleProdukte = produktConfig.filter(p => p.legacyKey)
    .map(p => ({ name: p.name, legacyKey: p.legacyKey, einheit: p.einheit || 'stueck' }));
  gefiltertProdukte = [...alleProdukte];
  renderProdListe();
}

function renderProdListe() {
  const cont = document.getElementById('prodListe');
  cont.innerHTML = '';
  if (!gefiltertProdukte.length) {
    cont.innerHTML = '<div class="lade-info">Keine Produkte gefunden.</div>';
    return;
  }
  gefiltertProdukte.forEach(p => {
    const selIdx = ausgewaehlt.indexOf(p.name);
    const chip = document.createElement('span');
    chip.className = 'prod-chip' + (selIdx !== -1 ? ' ' + SEL_KLASSEN[selIdx] : '');
    chip.textContent = p.name;
    chip.onclick = () => toggleProdukt(p.name);
    cont.appendChild(chip);
  });
  document.getElementById('maxHinweis').style.display = ausgewaehlt.length >= 5 ? 'block' : 'none';
}

function filterProdukte() {
  const suche = document.getElementById('suchfeld').value.toLowerCase();
  gefiltertProdukte = suche ? alleProdukte.filter(p => p.name.toLowerCase().includes(suche)) : [...alleProdukte];
  renderProdListe();
}

function toggleProdukt(name) {
  const idx = ausgewaehlt.indexOf(name);
  if (idx !== -1) ausgewaehlt.splice(idx, 1);
  else { if (ausgewaehlt.length >= 5) return; ausgewaehlt.push(name); }
  renderProdListe();
  renderAusgewaehlt();
  updateChart();
}

function renderAusgewaehlt() {
  const cont = document.getElementById('ausgewaehlt');
  cont.innerHTML = '';
  ausgewaehlt.forEach((name, i) => {
    const f = FARBEN[i];
    const chip = document.createElement('span');
    chip.className = 'ausgewaehlt-chip';
    chip.style.cssText = `background:${f.bg};border:1.5px solid ${f.line};color:${f.line};`;
    chip.innerHTML = `${name} <span class="x">✕</span>`;
    chip.onclick = () => toggleProdukt(name);
    cont.appendChild(chip);
  });
  // Automatisch zuklappen sobald ein Produkt gewählt wurde
  if (ausgewaehlt.length > 0 && auswahlOffen) {
    auswahlOffen = false;
    document.getElementById('auswahl-body').style.display = 'none';
  }
  aktualisiereAuswahlHeader();
}

function setZeitraum(tage, btn) {
  zeitraumTage = tage;
  document.querySelectorAll('.zt-btn').forEach(b => b.classList.remove('aktiv'));
  if (btn) btn.classList.add('aktiv');
  updateChart();
}

function setEinheit(e) {
  einheit = e;
  document.getElementById('btn-stueck').classList.toggle('aktiv', e === 'stueck');
  document.getElementById('btn-bleche').classList.toggle('aktiv', e === 'bleche');
  updateChart();
}

function getProduktDaten(prodName) {
  const cfg = alleProdukte.find(p => p.name === prodName);
  if (!cfg) return { labels: [], werte: [] };
  const dbKey = einheit === 'bleche' ? cfg.legacyKey.replace('_stueck', '_bleche') : cfg.legacyKey;
  const sortiert = [...db].sort((a, b) => a.datum.localeCompare(b.datum));
  const begrenzt = zeitraumTage > 0 ? sortiert.slice(-zeitraumTage) : sortiert;
  const labels = [], werte = [];
  begrenzt.forEach(e => {
    const p = e.produkte || e;
    const val = p[dbKey] !== undefined ? parseFloat(p[dbKey]) : null;
    labels.push(e.datum);
    werte.push(val !== null && val > 0 ? val : null);
  });
  return { labels, werte };
}

function updateChart() {
  const card = document.getElementById('chartCard');
  if (!ausgewaehlt.length) {
    card.style.display = 'none';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }
  card.style.display = 'block';

  // Gemeinsame Zeitachse
  const alleDaten = new Set();
  ausgewaehlt.forEach(name => getProduktDaten(name).labels.forEach(l => alleDaten.add(l)));
  const zeitachse = [...alleDaten].sort();

  const datasets = ausgewaehlt.map((name, i) => {
    const { labels, werte } = getProduktDaten(name);
    const f = FARBEN[i];
    const gemappt = zeitachse.map(datum => {
      const idx = labels.indexOf(datum);
      return idx !== -1 ? werte[idx] : null;
    });
    return {
      label: name, data: gemappt,
      borderColor: f.line, backgroundColor: f.bg,
      borderWidth: 2.5, pointRadius: 4, pointHoverRadius: 7,
      pointBackgroundColor: f.line,
      tension: 0.3,  // leichte Kurve bei vorhandenen Punkten
      spanGaps: true, // Gerade zwischen fehlenden Punkten
      fill: false,
    };
  });

  const WT = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const achsenLabels = zeitachse.map(datum => {
    const d = new Date(datum + 'T12:00:00');
    return `${WT[d.getDay()]} ${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.`;
  });

  const einheitLabel = einheit === 'bleche' ? 'Bleche' : 'Stück';
  if (chart) chart.destroy();

  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: achsenLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y + ' ' + einheitLabel : '–'}`
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' },
             ticks: { font: { size: 11 } },
             title: { display: true, text: einheitLabel, font: { size: 11 }, color: '#9ca3af' } }
      }
    }
  });

  const leg = document.getElementById('legende');
  leg.innerHTML = '';
  ausgewaehlt.forEach((name, i) => {
    const f = FARBEN[i];
    leg.innerHTML += `<div class="legende-item"><div class="legende-farbe" style="background:${f.line}"></div><span>${name}</span></div>`;
  });
}

init();
</script>
</body>
</html>
