<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BäckereiOS - Pausenraum</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: sans-serif;
            touch-action: none;
        }

        canvas {
            background-color: #fdf6e3; /* Etwas wärmerer, mehliger Hintergrund */
            border: 4px solid #f39c12;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        h1 {
            color: #ecf0f1;
            margin-bottom: 5px;
            font-size: 24px;
        }
        p {
            color: #bdc3c7;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>BäckereiOS Pausenraum</h1>
    <p>Tippe zum Springen. Schlage den Kollegen-Highscore!</p>
    
    <canvas id="gameCanvas" width="600" height="300"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- NEU: Highscore aus dem lokalen Speicher laden ---
        // localStorage merkt sich den Wert auch, wenn der Browser geschlossen wird
        let score = 0;
        let highscore = localStorage.getItem("baeckereios_highscore") || 0; 
        let isGameOver = false;

        // Unsere Spielfigur (Der Bäcker)
        const player = {
            x: 50,
            y: 200,
            width: 40,
            height: 40,
            velocityY: 0,
            jumpPower: -13, // Etwas stärkerer Sprung für die Emojis
            gravity: 0.6,
            isGrounded: true
        };

        // --- NEU: Array mit Backwaren für Abwechslung ---
        const bakeryItems = ["🥐", "🥨", "🥖", "🔥"];

        // Das Hindernis
        const obstacle = {
            x: 600,
            y: 205, // Leicht nach unten versetzt für bessere Optik
            width: 35,
            height: 35,
            speed: 5,
            currentEmoji: "🥐" // Start-Hindernis
        };

        function jump() {
            if (player.isGrounded && !isGameOver) {
                player.velocityY = player.jumpPower;
                player.isGrounded = false;
            }
            if (isGameOver) {
                resetGame();
            }
        }

        canvas.addEventListener("mousedown", jump);
        canvas.addEventListener("touchstart", jump);
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
        });

        function resetGame() {
            obstacle.x = canvas.width;
            score = 0;
            obstacle.speed = 5;
            isGameOver = false;
            gameLoop();
        }

        function gameLoop() {
            if (isGameOver) return;

            // --- A) PHYSIK ---
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= 200) {
                player.y = 200;
                player.velocityY = 0;
                player.isGrounded = true;
            }

            obstacle.x -= obstacle.speed;

            // Neues Hindernis generieren
            if (obstacle.x + obstacle.width < 0) {
                obstacle.x = canvas.width;
                score++;
                
                // NEU: Zufälliges neues Backwerk auswählen
                const randomIndex = Math.floor(Math.random() * bakeryItems.length);
                obstacle.currentEmoji = bakeryItems[randomIndex];

                // Spiel wird schneller
                if (score % 5 === 0) {
                    obstacle.speed += 1.2; 
                }
            }

            // --- B) KOLLISION ---
            // Die unsichtbaren Hitboxen überprüfen
            if (
                player.x < obstacle.x + obstacle.width - 5 && // -5 für mehr Toleranz
                player.x + player.width - 5 > obstacle.x &&
                player.y < obstacle.y + obstacle.height - 5 &&
                player.y + player.height - 5 > obstacle.y
            ) {
                isGameOver = true;
                
                // NEU: Highscore aktualisieren, wenn man stirbt
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem("baeckereios_highscore", highscore);
                }
            }

            // --- C) ZEICHNEN ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Den Tresen/Boden zeichnen
            ctx.fillStyle = "#8e44ad"; // Ein schickes Violett als Kontrast
            ctx.fillRect(0, 240, canvas.width, 60);

            // --- NEU: Emojis statt Blöcke zeichnen ---
            // Da ctx.fillText die Schrift von der unteren linken Ecke (Baseline) aus zeichnet,
            // müssen wir player.y + player.height rechnen, damit das Emoji in der Hitbox sitzt.
            ctx.font = "40px Arial";
            ctx.textAlign = "left";
            
            // Spieler (Bäcker)
            ctx.fillText("👨‍🍳", player.x, player.y + player.height - 5);

            // Hindernis (Backware)
            ctx.fillText(obstacle.currentEmoji, obstacle.x, obstacle.y + obstacle.height - 5);

            // --- NEU: Großer Score und Highscore ---
            // Aktueller Score (Riesig in der Mitte)
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; // Sehr blass im Hintergrund
            ctx.font = "bold 120px Arial";
            ctx.textAlign = "center";
            ctx.fillText(score, canvas.width / 2, 180);

            // Highscore (Oben links)
            ctx.fillStyle = "#2c3e50";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "left";
            ctx.fillText("Rekord: " + highscore, 20, 30);
            ctx.fillText("Aktuell: " + score, 20, 60);

            // Game Over Screen
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                
                if (score >= highscore && score > 0) {
                    ctx.fillText("🎉 NEUER REKORD! 🎉", canvas.width / 2, 130);
                } else {
                    ctx.fillText("Verbrannt!", canvas.width / 2, 130);
                }
                
                ctx.font = "20px Arial";
                ctx.fillText("Tippe für einen neuen Versuch", canvas.width / 2, 170);
            }

            // --- D) LOOP ---
            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        gameLoop();
    </script>
</body>
</html>
