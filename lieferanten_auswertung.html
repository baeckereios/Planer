<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BäckereiOS — Lieferanten-Auswertung</title>
<link rel="stylesheet" href="systemdesign.css">
<script src="shell.js" defer></script>
<script src="lieferungen_gehirn.js"></script>
<style>
  body { background: var(--background,#f8f6f2); color: var(--text-primary,#1a1a1a); padding-bottom: 120px; }
  .container { max-width: 680px; margin: 0 auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* ── LAGERTYP-SEKTIONEN ── */
  .lagertyp-sektion { border-radius: 16px; padding: 10px 10px 4px; margin-bottom: 6px; }
  .sektion-tk       { background: #eff6ff; border: 1.5px solid #bfdbfe; }
  .sektion-kuehl    { background: #f0fdf4; border: 1.5px solid #bbf7d0; }
  .sektion-trocken  { background: #fefce8; border: 1.5px solid #fde68a; }
  .sektion-sonstiges{ background: #faf5ff; border: 1.5px solid #e9d5ff; }

  .lagertyp-header { display: flex; align-items: center; gap: 8px; padding: 4px 4px 10px; }
  .lagertyp-badge { font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; }
  .badge-tk        { background: #1d4ed8; color: #fff; }
  .badge-kuehl     { background: #15803d; color: #fff; }
  .badge-trocken   { background: #92400e; color: #fff; }
  .badge-sonstiges { background: #6b21a8; color: #fff; }

  /* ── KACHEL mit farbiger Oberkante je Lagertyp ── */
  .prod-kachel { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
  .prod-kachel.typ-tk       { border-top: 3px solid #3b82f6; }
  .prod-kachel.typ-kuehl    { border-top: 3px solid #22c55e; }
  .prod-kachel.typ-trocken  { border-top: 3px solid #f59e0b; }
  .prod-kachel.typ-sonstiges{ border-top: 3px solid #a855f7; }
  .kachel-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; cursor: pointer; user-select: none; gap: 10px; }
  .kachel-header:active { background: var(--background,#f8f6f2); }
  .kachel-name { font-size: 0.95rem; font-weight: 800; }
  .kachel-sub { font-size: 0.7rem; color: var(--text-secondary,#6b7280); margin-top: 2px; }
  .kachel-arrow { font-size: 0.8rem; color: var(--text-secondary,#6b7280); flex-shrink: 0; }

  .intervall-wrap { display: flex; gap: 8px; padding: 0 14px 14px; }
  .intervall-box { flex: 1; background: var(--background,#f8f6f2); border: 1px solid var(--border-color,#e5e0d8); border-radius: 10px; padding: 10px 12px; }
  .intervall-label { font-size: 0.68rem; font-weight: 800; color: var(--text-secondary,#6b7280); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .intervall-wert  { font-size: 1.2rem; font-weight: 900; color: var(--text-primary,#1a1a1a); }
  .intervall-einheit { font-size: 0.7rem; color: var(--text-secondary,#6b7280); font-weight: 600; }
  .intervall-n { font-size: 0.65rem; color: var(--text-secondary,#6b7280); margin-top: 3px; }
  .intervall-n.duenn { color: #f59e0b; }

  .detail-panel { display: none; border-top: 1px solid var(--border-color,#e5e0d8); padding: 14px; }
  .detail-panel.open { display: block; }
  .detail-titel { font-size: 0.72rem; font-weight: 800; color: var(--text-secondary,#6b7280); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .detail-tabelle { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 14px; }
  .detail-tabelle th { font-size: 0.65rem; font-weight: 800; color: var(--text-secondary,#6b7280); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px 8px; text-align: right; border-bottom: 2px solid var(--border-color,#e5e0d8); }
  .detail-tabelle th:first-child { text-align: left; }
  .detail-tabelle td { padding: 7px 8px; border-bottom: 1px solid var(--border-color,#e5e0d8); vertical-align: middle; }
  .detail-tabelle td:not(:first-child) { text-align: right; font-weight: 700; }
  .detail-tabelle tr:last-child td { border-bottom: none; }
  .wt-label { font-size: 0.75rem; font-weight: 700; }
  .wt-sub   { font-size: 0.65rem; color: var(--text-secondary,#6b7280); }

  .bestell-row td { border-top: 2px solid #f59e0b !important; background: #fffbeb; }
  .bestell-label { font-size: 0.72rem; font-weight: 800; color: #92400e; }
  .bestell-wert  { font-size: 0.9rem; font-weight: 900; color: #92400e; }
  .bestell-hinweis { font-size: 0.62rem; color: #b45309; }

  .quelle-chip { display: inline-block; font-size: 0.6rem; font-weight: 800; padding: 2px 6px; border-radius: 8px; margin-left: 4px; vertical-align: middle; }
  .chip-filiale   { background: #dbeafe; color: #1d4ed8; }
  .chip-backstube { background: #dcfce7; color: #15803d; }
  .chip-inventur  { background: #f3e8ff; color: #6b21a8; }

  .inventur-note { font-size: 0.75rem; color: var(--text-secondary,#6b7280); line-height: 1.6; padding: 8px 10px; background: #f3e8ff22; border-left: 3px solid #a78bfa; border-radius: 0 8px 8px 0; margin-bottom: 12px; }
  .kein-daten { font-size: 0.78rem; color: var(--text-secondary,#6b7280); text-align: center; padding: 20px; font-style: italic; }
  .daten-banner { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 10px 14px; font-size: 0.78rem; color: #92400e; line-height: 1.6; }

  /* Einstellungen-Kasten */
  .einst-card { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 14px; padding: 13px 14px; }
  .einst-label { font-size: 0.65rem; font-weight: 800; color: var(--text-secondary,#6b7280); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .einst-row { display: flex; align-items: flex-start; gap: 12px; }
  .einst-desc { flex: 1; }
  .einst-desc strong { font-size: 0.82rem; display: block; margin-bottom: 3px; }
  .einst-desc small { font-size: 0.7rem; color: var(--text-secondary,#6b7280); line-height: 1.5; display: block; }
  .einst-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .einst-inp { width: 68px; text-align: center; padding: 8px 4px; border: 1.5px solid var(--border-color,#e5e0d8); border-radius: 8px; font-size: 1rem; font-weight: 800; font-family: inherit; background: var(--card-bg,#fff); color: var(--text-primary,#1a1a1a); }
  .einst-pct { font-size: 1rem; font-weight: 800; color: #f59e0b; min-width: 38px; }

  /* Vergleichs-Hinweisbox */
  .rechen-hint { background: #f0f9ff; border-left: 3px solid #60a5fa; border-radius: 0 8px 8px 0; padding: 8px 12px; font-size: 0.72rem; color: #1e40af; line-height: 1.6; margin-bottom: 12px; }

  /* WT-Detail accordion */
  .wt-acc-header { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; cursor: pointer; background: var(--background,#f8f6f2); font-size: 0.78rem; font-weight: 700; border-top: 1px solid var(--border-color,#e5e0d8); }
  .wt-acc-body { display: none; }
  .wt-acc-body.open { display: block; }
</style>
</head>
<body>
<div class="container">

<h1 style="margin:0 0 2px;font-size:1.4rem;font-weight:900;">📊 Lieferanten-Auswertung</h1>
<p style="font-size:0.78rem;color:var(--text-secondary,#6b7280);margin:0 0 8px;">Verbrauch zwischen Liefertagen &middot; &Oslash;-Werte &middot; Bestellempfehlungen</p>

<div id="daten-status" class="daten-banner" style="display:none;"></div>

<div id="main-list"></div>

</div>
<script>
// ── DATEN ────────────────────────────────────────────────
var lieferantenConfig = []; // lieferanten_config.json
var lieferantenDb     = []; // lieferanten_db.json          — Eingang + TK-Abgang Filialen
var bestandDb         = []; // lieferanten_bestand_db.json  — Inventur-Snapshots
var backmengenDb      = []; // backmengen_db.json            — Backstube-Verbrauch
var produktConfig     = []; // produkt_config.json           — Charge-Groessen
var wochenconfig      = null; // wochenconfig.json            — Planungszeitraum (eine Wahrheit)
var einstellungen     = { sicherheitsaufschlag: 0.15 }; // lieferanten_einstellungen.json

var WT_LABEL      = ['Mo','Di','Mi','Do','Fr','Sa','So']; // Mo=0 wie in lieferanten_config
var LAGERTYP_ORDER = ['tk','kuehl','trocken','sonstiges'];
var LAGERTYP_LABEL = { tk:'Tiefk\u00fchl', kuehl:'K\u00fchl', trocken:'Trocken', sonstiges:'Sonstiges' };
var LG = null;

// ── LADEN ────────────────────────────────────────────────
window.onload = async function() {
  LG = window.LieferungenGehirn;

  var pfadPaare = [
    { key:'lieferantenConfig', pfade:['lieferanten_config.json','../lieferanten_config.json'] },
    { key:'lieferantenDb',     pfade:['lieferanten_db.json','../lieferanten_db.json'] },
    { key:'bestandDb',         pfade:['lieferanten_bestand_db.json','../lieferanten_bestand_db.json'] },
    { key:'backmengenDb',      pfade:['backmengen_db.json','../backmengen_db.json'] },
    { key:'produktConfig',     pfade:['produkt_config.json','../produkt_config.json'] },
    { key:'wochenconfig',      pfade:['wochenconfig.json','../wochenconfig.json'] }
  ];
  var fehlend = [];
  for (var i = 0; i < pfadPaare.length; i++) {
    var pp = pfadPaare[i]; var ok = false;
    for (var j = 0; j < pp.pfade.length; j++) {
      try {
        var r = await fetch(pp.pfade[j], {cache:'no-store'});
        if (r.ok) {
          var d = await r.json();
          if (pp.key === 'lieferantenConfig') {
            // Wrapper-Format: { einstellungen: {...}, produkte: [...] }
            if (Array.isArray(d)) {
              lieferantenConfig = d;
            } else {
              lieferantenConfig = d.produkte || [];
              if (d.einstellungen) einstellungen = d.einstellungen;
            }
          } else {
            window[pp.key] = d;
          }
          ok = true; break;
        }
      } catch(e) {}
    }
    if (!ok && pp.key !== 'wochenconfig') fehlend.push(pp.key);
  }
  // lieferanten_einstellungen.json nicht mehr nötig — Einstellungen kommen aus lieferanten_config.json

  if (fehlend.length) {
    var b = document.getElementById('daten-status');
    b.style.display = 'block';
    b.innerHTML = '\u26a0\ufe0f Folgende Dateien nicht geladen: <strong>' + fehlend.join(', ') + '</strong><br>'
      + 'Auswertung m\u00f6glicherweise unvollst\u00e4ndig.';
  }
  render();
};

// ── RENDER ───────────────────────────────────────────────
var LAGERTYP_EMOJI = { tk: '🧊', kuehl: '❄️', trocken: '🌾', sonstiges: '📦' };

function render() {
  var container = document.getElementById('main-list');
  container.innerHTML = '';
  if (!lieferantenConfig.length) {
    container.innerHTML = '<div class="kein-daten">lieferanten_config.json nicht geladen.</div>';
    return;
  }
  LAGERTYP_ORDER.forEach(function(typ) {
    var gruppe = lieferantenConfig.filter(function(p) { return (p.lagertyp||'sonstiges') === typ; });
    if (!gruppe.length) return;

    var sektion = document.createElement('div');
    sektion.className = 'lagertyp-sektion sektion-'+typ;

    var h = document.createElement('div');
    h.className = 'lagertyp-header';
    h.innerHTML = '<span class="lagertyp-badge badge-'+typ+'">'
      + (LAGERTYP_EMOJI[typ]||'') + '&nbsp;' + (LAGERTYP_LABEL[typ]||typ) + '</span>'
      + '<span style="font-size:0.72rem;color:var(--text-secondary,#6b7280);font-weight:700;">'
      + gruppe.length + ' Produkt'+(gruppe.length!==1?'e':'')+'</span>';
    sektion.appendChild(h);

    gruppe.forEach(function(p) { sektion.appendChild(buildKachel(p, typ)); });
    container.appendChild(sektion);
  });
}

// ── KACHEL BAUEN ─────────────────────────────────────────
function buildKachel(p, typ) {
  var wrapper = document.createElement('div');
  wrapper.className = 'prod-kachel typ-'+(typ||p.lagertyp||'sonstiges');
  wrapper.id = 'kachel_'+p.id;

  var chips = '';
  if (p.lieferung_filiale)       chips += '<span class="quelle-chip chip-filiale">Filiale</span>';
  if (p.in_backstube_gebacken)   chips += '<span class="quelle-chip chip-backstube">Backstube</span>';
  if (p.verbrauch_nicht_messbar) chips += '<span class="quelle-chip chip-inventur">Inventur</span>';

  var ltStr = (p.liefertage||[]).length
    ? (p.liefertage||[]).map(function(i) { return WT_LABEL[i]; }).join(' \u00b7 ')
    : 'keine Liefertage';

  var alleIntervalle    = LG.berechneIntervalle(p, lieferantenDb, bestandDb, backmengenDb, produktConfig, wochenconfig);
  var intervallSchnitte = LG.berechneIntervallSchnitte(alleIntervalle);

  // Header — nur Info, kein Click
  var header = document.createElement('div');
  header.className = 'kachel-header';
  header.style.cursor = 'default';
  header.innerHTML =
    '<div style="flex:1;"><div class="kachel-name">'+esc(p.name)+chips+'</div>'
    + '<div class="kachel-sub">Liefertage: '+ltStr+'</div></div>';
  wrapper.appendChild(header);

  // Bestellempfehlung-Kasten — immer sichtbar, ist der Akkordeon-Trigger
  var auf    = (einstellungen && einstellungen.sicherheitsaufschlag !== undefined)
               ? einstellungen.sicherheitsaufschlag : 0.15;
  var aufPct = Math.round((1 + auf) * 100);
  var bt     = p.bestelltage || [];
  var btMit  = bt.filter(function(b) {
    return intervallSchnitte.some(function(iv) { return iv.tage.indexOf(b) !== -1; });
  });
  var fenster    = LG.leseFenster(wochenconfig);
  // Zeige echten Datenzeitraum: ältester bis neuester Snapshot dieses Produkts
  var snapshotDaten = bestandDb
    .filter(function(s){ return s.bestaende && s.bestaende[p.id] !== undefined; })
    .map(function(s){ return s.datum; })
    .sort();
  var fensterStr = snapshotDaten.length >= 2
    ? fmtDatum(snapshotDaten[0]) + ' \u2013 ' + fmtDatum(snapshotDaten[snapshotDaten.length-1])
    : (snapshotDaten.length === 1 ? fmtDatum(snapshotDaten[0]) : 'alle Daten');

  var bestell = document.createElement('div');
  bestell.style.cssText = 'border-top:1px solid var(--border-color,#e5e0d8);'
    + 'background:#fffbeb;padding:10px 14px;cursor:pointer;user-select:none;';
  bestell.onclick = function() { toggleDetail(p.id); };

  if (btMit.length && intervallSchnitte.length) {
    var zeilen = btMit.map(function(b) {
      var ivFuer = intervallSchnitte.find(function(iv){ return iv.tage.indexOf(b) !== -1; });
      var empf   = ivFuer ? LG.berechneBestellempfehlung(ivFuer.schnitt_inventur, auf) : null;
      return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;">'
           + '<span style="font-size:0.85rem;font-weight:800;color:#92400e;">'
           + '&#9999;&#65039; Bestellung '+WT_LABEL[b]+'</span>'
           + '<span style="font-size:1.05rem;font-weight:900;color:#92400e;">'
           + (empf !== null ? fmt(empf)+'\u00a0'+(p.soll_einheit||'') : '\u2014')+'</span>'
           + '</div>';
    }).join('');

    bestell.innerHTML = zeilen
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid #fde68a;">'
      + '<span style="font-size:0.65rem;color:#b45309;">'
      + '\u00d8 Inventur \u00d7 '+aufPct+'% \u00b7 '+fensterStr+'</span>'
      + '<span id="arrow_'+p.id+'" style="font-size:0.75rem;color:#b45309;">\u25bc</span>'
      + '</div>';
  } else {
    bestell.innerHTML = '<div style="font-size:0.78rem;color:var(--text-secondary,#6b7280);font-style:italic;">'
      + 'Noch keine Berechnungsgrundlage \u2014 '
      + (intervallSchnitte.length ? 'keine Bestelltage definiert' : 'Inventur-Snapshots ben\u00f6tigt')
      + '</div>'
      + '<span id="arrow_'+p.id+'" style="display:none;"></span>';
  }
  wrapper.appendChild(bestell);

  // Detail-Panel — wird durch Klick auf Bestell-Kasten geöffnet
  var detail = document.createElement('div');
  detail.className = 'detail-panel';
  detail.id = 'detail_'+p.id;
  detail.innerHTML = buildDetailHTML(p, alleIntervalle, intervallSchnitte);
  wrapper.appendChild(detail);
  return wrapper;
}

// ── DETAIL HTML ──────────────────────────────────────────
function buildDetailHTML(p, alleIntervalle, intervallSchnitte) {
  var html = '';
  var hatF  = p.lieferung_filiale;
  var hatB  = p.in_backstube_gebacken && !p.verbrauch_nicht_messbar;
  var nurI  = p.verbrauch_nicht_messbar;
  var auf   = (einstellungen && einstellungen.sicherheitsaufschlag !== undefined)
              ? einstellungen.sicherheitsaufschlag : 0.15;
  var aufPct = Math.round((1 + auf) * 100);
  var lt    = p.liefertage  || [];
  var bt    = p.bestelltage || [];

  // Intervall-Farben: max 3 Intervalle, je eine Farbe
  var ivFarben = ['#eff6ff','#f0fdf4','#fffbeb']; // blau, grün, amber
  var ivBorderFarben = ['#bfdbfe','#bbf7d0','#fde68a'];

  // Welchem Intervall gehört ein Wochentag?
  function wtZuIntervall(wtIdx) {
    for (var i = 0; i < intervallSchnitte.length; i++) {
      if (intervallSchnitte[i].tage.indexOf(wtIdx) !== -1) return i;
    }
    return -1;
  }

  if (nurI) {
    html += '<div class="inventur-note"><strong>Verbrauch nur \u00fcber Inventurdifferenz messbar.</strong><br>'
          + 'Verbrauch = Bestand(t) + Eingang \u2212 Bestand(t+1).</div>';
  }
  if (!alleIntervalle.length) {
    html += '<div class="kein-daten">Mindestens 2 Inventur-Snapshots ben\u00f6tigt.</div>';
    return html;
  }
  if (!intervallSchnitte.length) return html;

  // Wochentags-Schnitte über ALLE Intervalle zusammen
  var wtS = LG.berechneWochentagsSchnitte(alleIntervalle);

  // ── ZUSAMMENFASSUNGS-TABELLE (Intervalle nebeneinander) ──
  html += '<div class="detail-titel">Zusammenfassung</div>';
  html += '<table class="detail-tabelle"><thead><tr><th></th>';
  intervallSchnitte.forEach(function(iv, i) {
    var farbe = ivBorderFarben[i] || '#e5e0d8';
    html += '<th style="text-align:center;border-bottom:3px solid '+farbe+';">'
          + esc(iv.label)+'<br>'
          + '<span style="font-weight:600;font-size:0.6rem;color:var(--text-secondary,#6b7280);">'
          + iv.n+' Messung'+(iv.n!==1?'en':'')+'</span></th>';
  });
  html += '</tr></thead><tbody>';

  if (!nurI) {
    html += '<tr style="background:#eff6ff;"><td><div class="wt-label" style="color:#1d4ed8;">\u2460 Berechnet</div>'
          + '<div class="wt-sub">Filiale + Backstube</div></td>';
    intervallSchnitte.forEach(function(iv) {
      html += '<td style="text-align:center;font-weight:900;color:#1d4ed8;">'
            + (iv.schnitt_berechnet !== null ? fmt(iv.schnitt_berechnet) : '\u2013')
            + '&nbsp;<small>'+(p.soll_einheit||'')+'</small></td>';
    });
    html += '</tr>';
  }

  html += '<tr style="background:#f3e8ff22;"><td><div class="wt-label" style="color:#6b21a8;">'
        + (nurI?'\u2460':'\u2461')+' Inventur</div>'
        + '<div class="wt-sub">Z\u00e4hlung</div></td>';
  intervallSchnitte.forEach(function(iv) {
    html += '<td style="text-align:center;font-weight:900;color:#6b21a8;">'
          + (iv.schnitt_inventur !== null ? fmt(iv.schnitt_inventur) : '\u2013')
          + '&nbsp;<small>'+(p.soll_einheit||'')+'</small></td>';
  });
  html += '</tr>';

  if (!nurI) {
    html += '<tr><td><div class="wt-label">Differenz</div>'
          + '<div class="wt-sub">\u2461\u2212\u2460 ungekl\u00e4rter Rest</div></td>';
    intervallSchnitte.forEach(function(iv) {
      var d  = (iv.schnitt_inventur !== null && iv.schnitt_berechnet !== null)
               ? iv.schnitt_inventur - iv.schnitt_berechnet : null;
      var fc = d === null ? '#6b7280' : Math.abs(d) < 0.3 ? '#16a34a' : Math.abs(d) < 1.0 ? '#d97706' : '#dc2626';
      html += '<td style="text-align:center;font-weight:900;color:'+fc+';">'
            + (d !== null ? (d >= 0 ? '+' : '') + fmt(d) : '\u2013')
            + '&nbsp;<small>'+(p.soll_einheit||'')+'</small></td>';
    });
    html += '</tr>';
  }
  html += '</tbody></table>';

  if (!nurI) {
    html += '<div class="rechen-hint">'
          + '<strong>\u2460 Berechnet</strong> = TK-Zettel + Backzettel.<br>'
          + '<strong>\u2461 Inventur</strong> = Bestand-Anfang + Eingang \u2212 Bestand-Ende.'
          + ' Differenz = nicht erfasster Verbrauch / Messfehler.</div>';
  }

  // ── WOCHENTABELLE Mo–So ──────────────────────────────────
  html += '<div class="detail-titel" style="margin-top:14px;">Wochendetail</div>';
  html += '<table class="detail-tabelle"><thead><tr><th>Tag</th>';
  if (hatF) html += '<th>Filiale</th>';
  if (hatB) html += '<th>Backstube</th>';
  if (hatF && hatB) html += '<th>Gesamt</th>';
  if (nurI) html += '<th>Verbrauch</th>';
  html += '</tr></thead><tbody>';

  // Mo(0) bis So(6)
  for (var wi = 0; wi < 7; wi++) {
    var s       = wtS[wi];
    var ivIdx   = wtZuIntervall(wi);
    var bgFarbe = ivIdx >= 0 ? ivFarben[ivIdx] : 'transparent';
    var bdFarbe = ivIdx >= 0 ? ivBorderFarben[ivIdx] : 'transparent';

    // Icons
    var istLt = lt.indexOf(wi) !== -1;
    var istBt = bt.indexOf(wi) !== -1;
    var icons = '';
    if (istLt) icons += ' <span title="Liefertag" style="font-size:0.85rem;">&#128666;</span>';
    if (istBt) icons += ' <span title="Bestelltag" style="font-size:0.9rem;">&#9999;&#65039;</span>';

    html += '<tr style="background:'+bgFarbe+';border-left:3px solid '+bdFarbe+';">';
    html += '<td><div class="wt-label">'+WT_LABEL[wi]+icons+'</div></td>';

    if (hatF)       html += '<td>'+(s ? fmt(s.abgang_filialen_schnitt) : '\u2013')+'</td>';
    if (hatB)       html += '<td>'+(s ? fmt(s.backstube_schnitt)        : '\u2013')+'</td>';
    if (hatF && hatB) html += '<td><strong>'+(s ? fmt(s.abgang_filialen_schnitt + s.backstube_schnitt) : '\u2013')+'</strong></td>';
    if (nurI)       html += '<td>\u2013</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';

  return html;
}

// ── TOGGLE ───────────────────────────────────────────────
function toggleDetail(id) {
  var panel = document.getElementById('detail_'+id);
  var arrow = document.getElementById('arrow_'+id);
  var open  = panel.classList.contains('open');
  panel.classList.toggle('open', !open);
  arrow.textContent = open ? '\u25bc' : '\u25b2';
}

// ── HILFSFUNKTIONEN ──────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined) return '\u2013';
  return Number(v).toLocaleString('de-DE', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function fmtDatum(d) {
  if (!d) return '?';
  var parts = d.split('-');
  return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}
function wtKurz(idx) {
  return WT_LABEL[idx] || '?';
}
