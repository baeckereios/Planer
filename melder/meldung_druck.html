<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BäckereiOS — Meldung Druckansicht</title>
    <style>
        :root {
            --cream:  #f7f3ec;
            --warm:   #ede5d4;
            --border: #c8bfa8;
            --text:   #1e1a14;
            --muted:  #8a7f6e;
            --gold:   #a07020;
            --red:    #c0392b;
            --amber:  #d97706;
            --green:  #16a34a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #d8d0c0;
            font-family: 'Georgia', serif;
            color: var(--text);
            min-height: 100vh;
            padding: 20px 14px 60px;
        }

        /* ── Import-UI (versteckt beim Druck) ── */
        .import-ui {
            background: var(--text);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 18px;
        }
        .import-label {
            color: #a09080;
            font-size: 0.7rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 7px;
        }
        .import-row { display: flex; gap: 8px; }
        .import-input {
            flex: 1;
            background: #2a2520;
            border: 1px solid #3a3530;
            border-radius: 7px;
            padding: 9px 11px;
            color: #e8e0d0;
            font-family: monospace;
            font-size: 0.78rem;
        }
        .import-input:focus { outline: none; border-color: var(--gold); }
        .btn-import {
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 7px;
            padding: 9px 14px;
            font-size: 0.82rem;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            white-space: nowrap;
        }
        .btn-print {
            width: 100%;
            background: white;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 9px;
            font-size: 0.85rem;
            color: var(--text);
            font-family: sans-serif;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
        }
        .import-error {
            color: #f87171;
            font-size: 0.75rem;
            font-family: monospace;
            margin-top: 6px;
            display: none;
        }

        /* ── Formular-Blatt ── */
        .blatt {
            background: white;
            border-radius: 4px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
            display: none;
        }
        .blatt.visible { display: block; }

        /* Kopfzeile */
        .blatt-header {
            background: var(--text);
            padding: 18px 22px 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .bh-brand {
            color: white;
        }
        .bh-bos {
            font-size: 0.65rem;
            font-family: monospace;
            letter-spacing: 0.12em;
            color: #7a6e5e;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .bh-name {
            font-size: 1.2rem;
            font-weight: normal;
            letter-spacing: 0.02em;
        }
        .bh-sub {
            font-size: 0.72rem;
            color: #7a6e5e;
            margin-top: 2px;
            font-family: sans-serif;
        }
        .bh-meta {
            text-align: right;
            color: #a09080;
            font-size: 0.72rem;
            font-family: monospace;
            line-height: 1.7;
        }
        .bh-meta strong { color: #d0c8b8; }

        /* Einreichungs-Zeile */
        .einreich-bar {
            background: var(--warm);
            border-bottom: 1px solid var(--border);
            padding: 9px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            font-family: sans-serif;
            color: var(--muted);
        }
        .einreich-bar strong { color: var(--text); }

        /* Positionen */
        .positionen { padding: 16px 22px; }

        .pos-box {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .pos-box:last-child { margin-bottom: 0; }

        .pos-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 13px;
            border-bottom: 1px solid var(--border);
        }
        .pos-box-header.mat { background: #fef9ec; }
        .pos-box-header.def { background: #fff4f4; }

        .pos-typ-badge {
            font-size: 0.68rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: sans-serif;
        }
        .pos-typ-badge.mat { color: var(--amber); }
        .pos-typ-badge.def { color: var(--red); }

        .pos-dring {
            font-size: 0.68rem;
            font-weight: bold;
            font-family: sans-serif;
            padding: 2px 9px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .dring-normal  { background: #f0fdf4; color: var(--green); }
        .dring-dringend{ background: #fef3c7; color: #b45309; }
        .dring-sofort  { background: #fee2e2; color: var(--red); }

        .pos-body { padding: 11px 13px; }
        .pos-bezeichnung {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 4px;
        }
        .pos-beschreibung {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
            font-family: sans-serif;
            border-left: 2px solid var(--border);
            padding-left: 8px;
            margin-top: 6px;
        }

        /* Fußzeile */
        .blatt-footer {
            border-top: 1px solid var(--border);
            padding: 10px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-stamp {
            font-size: 0.65rem;
            color: var(--muted);
            font-family: monospace;
            line-height: 1.6;
        }
        .footer-id {
            font-size: 0.62rem;
            color: #c0b8a8;
            font-family: monospace;
        }

        /* ── Druck ── */
        @media print {
            body { background: white; padding: 0; }
            .import-ui { display: none !important; }
            .blatt { display: block !important; box-shadow: none; border-radius: 0; }
        }
    </style>
</head>
<body>

<!-- Import-UI -->
<div class="import-ui" id="import-ui">
    <span class="import-label">📋 BOS-Meldung importieren</span>
    <div class="import-row">
        <input class="import-input" id="b64-input"
               placeholder="[BOS-MELDUNG:…] aus WhatsApp hier einfügen…">
        <button class="btn-import" onclick="importieren()">Laden</button>
    </div>
    <div class="import-error" id="import-error">Ungültiger Code — bitte den vollständigen [BOS-MELDUNG:…] Block einfügen.</div>
    <button class="btn-print" onclick="window.print()" style="display:none" id="btn-print">🖨 Drucken</button>
</div>

<!-- Formular-Blatt -->
<div class="blatt" id="blatt">

    <div class="blatt-header">
        <div class="bh-brand">
            <div class="bh-bos">BäckereiOS · Bäckerei Langrehr</div>
            <div class="bh-name">Meldebogen</div>
            <div class="bh-sub">Material &amp; Defekte</div>
        </div>
        <div class="bh-meta">
            <div>Datum <strong id="out-datum">–</strong></div>
            <div>Uhrzeit <strong id="out-uhrzeit">–</strong></div>
        </div>
    </div>

    <div class="einreich-bar">
        <span>Eingereicht von <strong id="out-absender">–</strong></span>
        <span id="out-anzahl" style="color:var(--text);font-weight:bold;">–</span>
    </div>

    <div class="positionen" id="out-positionen"></div>

    <div class="blatt-footer">
        <div class="footer-stamp">
            Generiert mit BäckereiOS<br>
            Bäckerei Langrehr
        </div>
        <div class="footer-id" id="footer-id"></div>
    </div>

</div>

<script>
function importieren() {
    const raw = document.getElementById('b64-input').value.trim();
    const err = document.getElementById('import-error');
    err.style.display = 'none';

    // Den [BOS-MELDUNG:…] Block extrahieren
    const match = raw.match(/\[BOS-MELDUNG:([A-Za-z0-9+/=]+)\]/);
    const b64 = match ? match[1] : raw; // auch puren Base64 akzeptieren

    let data;
    try {
        data = JSON.parse(decodeURIComponent(escape(atob(b64))));
    } catch(e) {
        err.style.display = 'block';
        return;
    }

    render(data);
}

function render(data) {
    const dringLabel = { normal: 'Normal', dringend: 'Dringend', sofort: 'SOFORT' };
    const dringClass = { normal: 'dring-normal', dringend: 'dring-dringend', sofort: 'dring-sofort' };

    // Formatiertes Datum
    let datumFormatiert = data.datum || '–';
    try {
        const [y,m,d] = data.datum.split('-');
        datumFormatiert = `${d}.${m}.${y}`;
    } catch(e) {}

    document.getElementById('out-datum').textContent    = datumFormatiert;
    document.getElementById('out-uhrzeit').textContent  = data.uhrzeit ? data.uhrzeit + ' Uhr' : '–';
    document.getElementById('out-absender').textContent = data.absender || '–';

    const pos = data.positionen || [];
    const matN  = pos.filter(p => p.typ === 'material').length;
    const defN  = pos.filter(p => p.typ === 'defekt').length;
    const parts = [];
    if (matN) parts.push(`${matN} Material`);
    if (defN) parts.push(`${defN} Defekt${defN > 1 ? 'e' : ''}`);
    document.getElementById('out-anzahl').textContent =
        pos.length + ' Position' + (pos.length !== 1 ? 'en' : '') +
        (parts.length ? ' (' + parts.join(', ') + ')' : '');

    const container = document.getElementById('out-positionen');
    container.innerHTML = '';
    pos.forEach((p, i) => {
        const isMat = p.typ === 'material';
        const div = document.createElement('div');
        div.className = 'pos-box';
        div.innerHTML = `
            <div class="pos-box-header ${isMat ? 'mat' : 'def'}">
                <span class="pos-typ-badge ${isMat ? 'mat' : 'def'}">
                    ${isMat ? '📦 Material' : '🔧 Defekt'} · Position ${i+1}
                </span>
                <span class="pos-dring ${dringClass[p.dringlichkeit] || 'dring-normal'}">
                    ${dringLabel[p.dringlichkeit] || '–'}
                </span>
            </div>
            <div class="pos-body">
                <div class="pos-bezeichnung">${escHtml(p.bezeichnung)}</div>
                ${p.beschreibung
                    ? `<div class="pos-beschreibung">${escHtml(p.beschreibung)}</div>`
                    : ''}
            </div>
        `;
        container.appendChild(div);
    });

    // Footer-ID
    document.getElementById('footer-id').textContent =
        'Ref: BOS-' + (data.datum || '').replace(/-/g,'') + '-' + (data.uhrzeit || '').replace(':','');

    // Blatt zeigen
    document.getElementById('blatt').classList.add('visible');
    document.getElementById('btn-print').style.display = 'block';
}

function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// URL-Parameter: ?d=BASE64 für direkten Import (z.B. QR-Code-Link)
window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const d = params.get('d');
    if (d) {
        document.getElementById('b64-input').value = d;
        importieren();
    }
});
</script>
</body>
</html>
