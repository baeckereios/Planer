<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BäckereiOS — Meldungs-Postfach</title>
    <style>
        :root {
            --cream:   #f7f3ec;
            --warm:    #ede5d4;
            --border:  #d0c8b0;
            --text:    #1e1a14;
            --muted:   #8a7f6e;
            --gold:    #a07020;
            --gold-dk: #7a5518;
            --red:     #c0392b;
            --amber:   #d97706;
            --green:   #16a34a;
            --blue:    #1d4ed8;
            --r:       10px;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            background: var(--cream);
            color: var(--text);
            font-family: 'Georgia', serif;
            font-size: 15px;
            min-height: 100vh;
            padding-bottom: 160px;
        }

        /* ── Header ── */
        .header {
            background: var(--text);
            color: var(--cream);
            padding: 14px 16px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display:flex; align-items:center; gap:10px; }
        .header-title { font-size:1.1rem; font-weight:normal; letter-spacing:0.02em; }
        .header-sub { font-size:0.7rem; color:#7a6a5a; margin-top:1px; font-family:monospace; }
        .btn-back {
            font-size:0.75rem; color:#a09080; text-decoration:none;
            border:1px solid #3a3530; border-radius:6px; padding:4px 10px;
            font-family:sans-serif;
        }

        .wrap { padding:14px; max-width:560px; margin:0 auto; }

        /* ── Status-Leiste ── */
        .status-bar {
            background:white;
            border:1px solid var(--border);
            border-radius:var(--r);
            padding:10px 14px;
            margin-bottom:12px;
            display:flex;
            gap:16px;
            align-items:center;
            font-family:sans-serif;
            font-size:0.8rem;
            color:var(--muted);
        }
        .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .status-dot.ok   { background:var(--green); }
        .status-dot.warn { background:var(--amber); }
        .status-dot.err  { background:#9ca3af; }
        .status-count { margin-left:auto; font-weight:bold; color:var(--text); }

        /* ── Import-Block ── */
        .import-block {
            background:white;
            border:1px solid var(--border);
            border-radius:var(--r);
            padding:13px 14px;
            margin-bottom:14px;
        }
        .block-title {
            font-size:0.68rem; font-weight:bold; letter-spacing:0.1em;
            text-transform:uppercase; color:var(--muted);
            font-family:sans-serif; margin-bottom:9px;
        }
        .import-row { display:flex; gap:8px; }
        textarea.import-ta {
            flex:1; background:var(--cream); border:1px solid var(--border);
            border-radius:7px; padding:9px 11px; font-family:monospace;
            font-size:0.76rem; color:var(--text); resize:none; height:60px;
        }
        textarea.import-ta:focus { outline:none; border-color:var(--gold); background:white; }
        .btn-import {
            background:var(--gold); color:white; border:none; border-radius:7px;
            padding:9px 14px; font-size:0.82rem; font-weight:bold; cursor:pointer;
            font-family:sans-serif; align-self:flex-end;
        }
        .import-feedback {
            margin-top:7px; font-size:0.75rem; font-family:sans-serif;
            display:none; padding:5px 9px; border-radius:6px;
        }
        .import-feedback.ok  { background:#f0fdf4; color:var(--green); border:1px solid #bbf7d0; }
        .import-feedback.err { background:#fef2f2; color:var(--red);   border:1px solid #fecaca; }

        /* ── Filter-Tabs ── */
        .filter-tabs {
            display:flex; gap:6px; margin-bottom:10px;
        }
        .filter-tab {
            padding:6px 13px; border-radius:20px; border:1px solid var(--border);
            background:white; color:var(--muted); font-size:0.78rem; font-weight:bold;
            cursor:pointer; font-family:sans-serif; transition:all 0.15s;
        }
        .filter-tab.active { background:var(--text); color:var(--cream); border-color:var(--text); }

        /* ── Postfach-Liste ── */
        .mail-item {
            background:white;
            border:1px solid var(--border);
            border-radius:var(--r);
            margin-bottom:8px;
            overflow:hidden;
            transition:box-shadow 0.15s;
        }
        .mail-item.unread { border-left:3px solid var(--gold); }
        .mail-item.erledigt { opacity:0.6; }

        .mail-header {
            display:flex; align-items:center; gap:10px;
            padding:11px 13px; cursor:pointer;
        }
        .mail-icon { font-size:1.1rem; flex-shrink:0; }
        .mail-main { flex:1; min-width:0; }
        .mail-top {
            display:flex; justify-content:space-between; align-items:center;
            gap:6px;
        }
        .mail-von {
            font-size:0.88rem; font-weight:bold; color:var(--text);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .mail-date {
            font-size:0.7rem; color:var(--muted); font-family:monospace;
            flex-shrink:0;
        }
        .mail-preview {
            font-size:0.76rem; color:var(--muted); margin-top:2px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            font-family:sans-serif;
        }
        .mail-badges { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
        .badge {
            font-size:0.62rem; font-weight:bold; font-family:sans-serif;
            padding:2px 7px; border-radius:9px; text-transform:uppercase;
            letter-spacing:0.05em;
        }
        .badge-mat    { background:#fef3c7; color:#92400e; }
        .badge-def    { background:#fee2e2; color:#991b1b; }
        .badge-normal { background:#f0fdf4; color:var(--green); }
        .badge-dringend{ background:#fef3c7; color:#b45309; }
        .badge-sofort { background:#fee2e2; color:var(--red); }
        .badge-erl    { background:#f3f4f6; color:#6b7280; }

        /* ── Detail-Aufklapper ── */
        .mail-detail {
            display:none;
            border-top:1px solid var(--border);
            padding:13px 14px;
            background:var(--cream);
        }
        .mail-detail.open { display:block; }

        /* Positions-Boxen (analog Druckformular) */
        .pos-box {
            border:1px solid var(--border); border-radius:7px;
            margin-bottom:9px; overflow:hidden;
            background:white;
        }
        .pos-box:last-of-type { margin-bottom:10px; }
        .pos-box-hd {
            display:flex; justify-content:space-between; align-items:center;
            padding:7px 11px; border-bottom:1px solid var(--border);
        }
        .pos-box-hd.mat { background:#fef9ec; }
        .pos-box-hd.def { background:#fff4f4; }
        .pos-typ { font-size:0.68rem; font-weight:bold; font-family:sans-serif;
                   text-transform:uppercase; letter-spacing:0.07em; }
        .pos-typ.mat { color:var(--amber); }
        .pos-typ.def { color:var(--red); }
        .dring-pill {
            font-size:0.65rem; font-weight:bold; font-family:sans-serif;
            padding:2px 8px; border-radius:9px; text-transform:uppercase;
        }
        .dp-normal  { background:#f0fdf4; color:var(--green); }
        .dp-dringend{ background:#fef3c7; color:#b45309; }
        .dp-sofort  { background:#fee2e2; color:var(--red); }
        .pos-body { padding:9px 11px; }
        .pos-bez { font-size:0.9rem; font-weight:bold; }
        .pos-desc {
            font-size:0.78rem; color:var(--muted); font-family:sans-serif;
            border-left:2px solid var(--border); padding-left:8px; margin-top:5px;
            line-height:1.5;
        }

        /* Aktions-Leiste im Detail */
        .detail-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-erl {
            flex:1; min-width:120px; background:#f0fdf4; border:1px solid #bbf7d0;
            color:var(--green); border-radius:7px; padding:8px 12px;
            font-size:0.8rem; font-weight:bold; cursor:pointer; font-family:sans-serif;
        }
        .btn-erl.rueck {
            background:#f3f4f6; border-color:var(--border); color:var(--muted);
        }
        .btn-print-single {
            flex:1; min-width:120px; background:white; border:1px solid var(--border);
            color:var(--text); border-radius:7px; padding:8px 12px;
            font-size:0.8rem; font-weight:bold; cursor:pointer; font-family:sans-serif;
        }
        .btn-del {
            background:#fef2f2; border:1px solid #fecaca;
            color:var(--red); border-radius:7px; padding:8px 12px;
            font-size:0.8rem; font-weight:bold; cursor:pointer; font-family:sans-serif;
        }

        .empty-hint {
            text-align:center; padding:30px 20px;
            color:var(--muted); font-size:0.85rem; font-family:sans-serif;
            display:none;
        }

        /* ── Speichern-Button ── */
        .save-bar {
            position:fixed; bottom:95px; left:0; right:0;
            background:white; border-top:1px solid var(--border);
            padding:10px 14px;
        }
        .btn-save {
            width:100%; background:var(--text); color:var(--cream);
            border:none; border-radius:9px; padding:13px;
            font-size:0.95rem; font-weight:bold; cursor:pointer;
            font-family:sans-serif; letter-spacing:0.02em;
        }
        .btn-save:active { background:#3a3530; }

        /* ── Druck-Overlay ── */
        .print-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
            z-index:200; overflow-y:auto; padding:20px;
        }
        .print-overlay.open { display:block; }
        .print-sheet {
            background:white; border-radius:4px;
            max-width:580px; margin:0 auto; overflow:hidden;
        }
        .po-header {
            background:var(--text); color:var(--cream); padding:16px 20px;
            display:flex; justify-content:space-between; align-items:flex-start;
        }
        .po-brand-bos { font-size:0.62rem; font-family:monospace; letter-spacing:0.12em;
                         color:#7a6a5a; text-transform:uppercase; margin-bottom:3px; }
        .po-brand-name { font-size:1.15rem; }
        .po-brand-sub { font-size:0.7rem; color:#7a6a5a; font-family:sans-serif; margin-top:2px; }
        .po-meta { text-align:right; font-size:0.7rem; font-family:monospace;
                   color:#a09080; line-height:1.7; }
        .po-meta strong { color:#d0c8b8; }
        .po-einreich {
            background:var(--warm); border-bottom:1px solid var(--border);
            padding:8px 20px; font-size:0.78rem; font-family:sans-serif;
            color:var(--muted); display:flex; justify-content:space-between;
        }
        .po-einreich strong { color:var(--text); }
        .po-positionen { padding:14px 20px; }
        .po-footer {
            border-top:1px solid var(--border); padding:9px 20px;
            display:flex; justify-content:space-between;
            font-size:0.63rem; color:var(--muted); font-family:monospace;
        }
        .print-btns {
            display:flex; gap:8px; padding:12px 20px 14px;
            border-top:1px solid var(--border); background:var(--cream);
        }
        .pb-print {
            flex:1; background:var(--text); color:white; border:none;
            border-radius:7px; padding:10px; font-weight:bold; cursor:pointer;
            font-family:sans-serif;
        }
        .pb-close {
            background:white; border:1px solid var(--border); color:var(--muted);
            border-radius:7px; padding:10px 16px; font-weight:bold; cursor:pointer;
            font-family:sans-serif;
        }

        @media print {
            body > *:not(.print-overlay) { display:none !important; }
            .print-overlay { display:block !important; position:static !important;
                              background:none !important; padding:0 !important; }
            .print-btns { display:none !important; }
            .print-sheet { box-shadow:none; border-radius:0; }
        }
    </style>
    <script src="../shell.js"></script>
</head>
<body>


<div class="wrap">

    <!-- Status -->
    <div class="status-bar" id="status-bar">
        <div class="status-dot err" id="status-dot"></div>
        <span id="status-text" style="font-family:sans-serif;">Lade meldungen_speicher.js…</span>
        <span class="status-count" id="status-count"></span>
    </div>

    <!-- Import -->
    <div class="import-block">
        <div class="block-title">📲 Neue Meldung einlesen</div>
        <div class="import-row">
            <textarea class="import-ta" id="import-ta"
                placeholder="[BOS-MELDUNG:…] aus WhatsApp hier einfügen…"></textarea>
            <button class="btn-import" onclick="importMeldung()">Einlesen</button>
        </div>
        <div class="import-feedback" id="import-feedback"></div>
    </div>

    <!-- Filter -->
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="offen"    onclick="setFilter('offen',this)">Offen</button>
        <button class="filter-tab"        data-filter="erledigt" onclick="setFilter('erledigt',this)">Erledigt</button>
        <button class="filter-tab"        data-filter="alle"     onclick="setFilter('alle',this)">Alle</button>
    </div>

    <!-- Liste -->
    <div id="mail-list"></div>
    <div class="empty-hint" id="empty-hint">Keine Meldungen in dieser Ansicht.</div>

</div>

<!-- Speichern -->
<div class="save-bar">
    <button class="btn-save" onclick="speichern()">💾 meldungen_speicher.js herunterladen</button>
</div>

<!-- Druck-Overlay -->
<div class="print-overlay" id="print-overlay">
    <div class="print-sheet" id="print-sheet"></div>
    <div class="print-btns">
        <button class="pb-print" onclick="window.print()">🖨 Drucken</button>
        <button class="pb-close" onclick="closePrint()">Schließen</button>
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let meldungen = [];   // Array aller Meldungs-Objekte
let activeFilter = 'offen';

// ── Auto-Fetch beim Start ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    fetch('../meldungen_speicher.js')
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(text => {
            // window.BOS_MELDUNGEN aus dem Script-Text extrahieren
            const fn = new Function(text + '; return window.BOS_MELDUNGEN || [];');
            const data = fn();
            meldungen = Array.isArray(data) ? data : [];
            setStatus('ok', `meldungen_speicher.js geladen`, meldungen.length);
            renderList();
        })
        .catch(() => {
            setStatus('warn', 'Keine Speicherdatei gefunden — Postfach leer.');
            renderList();
        });
});

// ── Status-Bar ─────────────────────────────────────────────────
function setStatus(type, text, count) {
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    const cnt  = document.getElementById('status-count');
    dot.className = 'status-dot ' + (type === 'ok' ? 'ok' : type === 'warn' ? 'warn' : 'err');
    txt.textContent = text;
    const offen = meldungen.filter(m => m._status === 'offen').length;
    cnt.textContent = offen > 0 ? offen + ' offen' : '';
}

// ── Meldung importieren ────────────────────────────────────────
function importMeldung() {
    const raw = document.getElementById('import-ta').value.trim();
    const fb  = document.getElementById('import-feedback');
    fb.style.display = 'none';

    const match = raw.match(/\[BOS-MELDUNG:([A-Za-z0-9+/=]+)\]/);
    const b64   = match ? match[1] : raw;

    let data;
    try {
        data = JSON.parse(decodeURIComponent(escape(atob(b64))));
    } catch(e) {
        showFeedback('err', '❌ Ungültiger Code — bitte den vollständigen [BOS-MELDUNG:…] Block einfügen.');
        return;
    }

    // Duplikat prüfen (gleiche datum+uhrzeit+absender)
    const id = 'BOS-' + (data.datum||'').replace(/-/g,'') + '-' + (data.uhrzeit||'').replace(':','')
             + '-' + (data.absender||'X').replace(/\s/g,'').toUpperCase().slice(0,4);

    if (meldungen.find(m => m._id === id)) {
        showFeedback('err', '⚠ Diese Meldung ist bereits im Postfach.');
        return;
    }

    const eintrag = {
        ...data,
        _id:        id,
        _importiert: new Date().toISOString().slice(0,16),
        _status:    'offen'
    };

    meldungen.unshift(eintrag);
    document.getElementById('import-ta').value = '';
    showFeedback('ok', `✓ Meldung von ${data.absender || '?'} eingelesen.`);
    updateStatusCount();
    renderList();
}

function showFeedback(type, text) {
    const fb = document.getElementById('import-feedback');
    fb.className = 'import-feedback ' + type;
    fb.textContent = text;
    fb.style.display = 'block';
    setTimeout(() => fb.style.display = 'none', 3500);
}

// ── Filter ─────────────────────────────────────────────────────
function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}

// ── Liste rendern ──────────────────────────────────────────────
function renderList() {
    const list = document.getElementById('mail-list');
    const hint = document.getElementById('empty-hint');
    list.innerHTML = '';

    const filtered = meldungen.filter(m => {
        if (activeFilter === 'offen')    return m._status === 'offen';
        if (activeFilter === 'erledigt') return m._status === 'erledigt';
        return true;
    });

    if (filtered.length === 0) {
        hint.style.display = 'block';
        return;
    }
    hint.style.display = 'none';

    filtered.forEach(m => {
        const div = document.createElement('div');
        div.className = 'mail-item' + (m._status === 'offen' ? ' unread' : ' erledigt');
        div.id = 'mi-' + m._id;

        const pos      = m.positionen || [];
        const hasSofort = pos.some(p => p.dringlichkeit === 'sofort');
        const hasDring  = pos.some(p => p.dringlichkeit === 'dringend');
        const matN      = pos.filter(p => p.typ === 'material').length;
        const defN      = pos.filter(p => p.typ === 'defekt').length;
        const icon      = defN > 0 ? '🔧' : '📦';

        const badgesHtml = [
            matN    ? `<span class="badge badge-mat">${matN}× Material</span>` : '',
            defN    ? `<span class="badge badge-def">${defN}× Defekt</span>` : '',
            hasSofort ? `<span class="badge badge-sofort">🔴 Sofort</span>` : '',
            hasDring  ? `<span class="badge badge-dringend">⚠ Dringend</span>` : '',
            m._status === 'erledigt' ? `<span class="badge badge-erl">✓ Erledigt</span>` : ''
        ].filter(Boolean).join('');

        const preview = pos.map(p => p.bezeichnung).join(' · ').slice(0,80);

        div.innerHTML = `
            <div class="mail-header" onclick="toggleDetail('${m._id}')">
                <div class="mail-icon">${icon}</div>
                <div class="mail-main">
                    <div class="mail-top">
                        <span class="mail-von">${escHtml(m.absender || '?')}</span>
                        <span class="mail-date">${m.datum || '?'}</span>
                    </div>
                    <div class="mail-preview">${escHtml(preview)}</div>
                    <div class="mail-badges">${badgesHtml}</div>
                </div>
            </div>
            <div class="mail-detail" id="detail-${m._id}">
                ${renderPositionen(pos)}
                <div class="detail-actions">
                    ${m._status === 'offen'
                        ? `<button class="btn-erl"  onclick="setStatus('${m._id}','erledigt')">✓ Als erledigt markieren</button>`
                        : `<button class="btn-erl rueck" onclick="setStatus('${m._id}','offen')">↩ Wieder öffnen</button>`
                    }
                    <button class="btn-print-single" onclick="drucken('${m._id}')">🖨 Drucken</button>
                    <button class="btn-del" onclick="loeschen('${m._id}')">✕</button>
                </div>
            </div>
        `;
        list.appendChild(div);
    });
}

function renderPositionen(pos) {
    const dringClass = { normal:'dp-normal', dringend:'dp-dringend', sofort:'dp-sofort' };
    const dringLabel = { normal:'Normal', dringend:'Dringend', sofort:'SOFORT' };
    return pos.map((p, i) => {
        const isMat = p.typ === 'material';
        return `
        <div class="pos-box">
            <div class="pos-box-hd ${isMat?'mat':'def'}">
                <span class="pos-typ ${isMat?'mat':'def'}">${isMat?'📦 Material':'🔧 Defekt'} · Pos. ${i+1}</span>
                <span class="dring-pill ${dringClass[p.dringlichkeit]||'dp-normal'}">${dringLabel[p.dringlichkeit]||'–'}</span>
            </div>
            <div class="pos-body">
                <div class="pos-bez">${escHtml(p.bezeichnung)}</div>
                ${p.beschreibung ? `<div class="pos-desc">${escHtml(p.beschreibung)}</div>` : ''}
            </div>
        </div>`;
    }).join('');
}

// ── Detail togglen ─────────────────────────────────────────────
function toggleDetail(id) {
    const el = document.getElementById('detail-' + id);
    el.classList.toggle('open');
}

// ── Status ändern ──────────────────────────────────────────────
function setStatus(id, status) {
    const m = meldungen.find(m => m._id === id);
    if (m) m._status = status;
    updateStatusCount();
    renderList();
}

function updateStatusCount() {
    const offen = meldungen.filter(m => m._status === 'offen').length;
    document.getElementById('status-count').textContent = offen > 0 ? offen + ' offen' : '';
}

// ── Löschen ────────────────────────────────────────────────────
function loeschen(id) {
    if (!confirm('Meldung endgültig löschen?')) return;
    meldungen = meldungen.filter(m => m._id !== id);
    renderList();
}

// ── Drucken ────────────────────────────────────────────────────
function drucken(id) {
    const m = meldungen.find(m => m._id === id);
    if (!m) return;

    const pos    = m.positionen || [];
    const matN   = pos.filter(p => p.typ === 'material').length;
    const defN   = pos.filter(p => p.typ === 'defekt').length;
    const parts  = [];
    if (matN) parts.push(matN + '× Material');
    if (defN) parts.push(defN + '× Defekt');

    let datumF = m.datum || '–';
    try { const [y,mo,d] = m.datum.split('-'); datumF = `${d}.${mo}.${y}`; } catch(e) {}

    const dringClass = { normal:'dp-normal', dringend:'dp-dringend', sofort:'dp-sofort' };
    const dringLabel = { normal:'Normal', dringend:'Dringend', sofort:'SOFORT' };

    const posHtml = pos.map((p, i) => {
        const isMat = p.typ === 'material';
        return `
        <div class="pos-box" style="margin-bottom:9px;">
            <div class="pos-box-hd ${isMat?'mat':'def'}">
                <span class="pos-typ ${isMat?'mat':'def'}">${isMat?'📦 Material':'🔧 Defekt'} · Position ${i+1}</span>
                <span class="dring-pill ${dringClass[p.dringlichkeit]||'dp-normal'}">${dringLabel[p.dringlichkeit]||'–'}</span>
            </div>
            <div class="pos-body">
                <div class="pos-bez">${escHtml(p.bezeichnung)}</div>
                ${p.beschreibung ? `<div class="pos-desc">${escHtml(p.beschreibung)}</div>` : ''}
            </div>
        </div>`;
    }).join('');

    document.getElementById('print-sheet').innerHTML = `
        <div class="po-header">
            <div>
                <div class="po-brand-bos">BäckereiOS · Bäckerei Langrehr</div>
                <div class="po-brand-name">Meldebogen</div>
                <div class="po-brand-sub">Material &amp; Defekte</div>
            </div>
            <div class="po-meta">
                <div>Datum <strong>${datumF}</strong></div>
                <div>Uhrzeit <strong>${m.uhrzeit ? m.uhrzeit + ' Uhr' : '–'}</strong></div>
            </div>
        </div>
        <div class="po-einreich">
            <span>Eingereicht von <strong>${escHtml(m.absender||'?')}</strong></span>
            <span style="font-weight:bold;color:#1e1a14;">${pos.length} Position${pos.length!==1?'en':''} ${parts.length?'('+parts.join(', ')+')\':''}</span>
        </div>
        <div class="po-positionen">${posHtml}</div>
        <div class="po-footer">
            <span>Generiert mit BäckereiOS · Bäckerei Langrehr</span>
            <span>${m._id || ''}</span>
        </div>
    `;
    document.getElementById('print-overlay').classList.add('open');
}

function closePrint() {
    document.getElementById('print-overlay').classList.remove('open');
}

// ── Speichern / Download ───────────────────────────────────────
function speichern() {
    const json   = JSON.stringify(meldungen, null, 2);
    const inhalt = `// BäckereiOS — Meldungs-Postfach\n// Zuletzt gespeichert: ${new Date().toISOString().slice(0,16)}\n// NICHT manuell bearbeiten.\nwindow.BOS_MELDUNGEN = ${json};\n`;
    const blob   = new Blob([inhalt], { type: 'text/javascript' });
    const url    = URL.createObjectURL(blob);
    const a      = document.createElement('a');
    a.href = url; a.download = 'meldungen_speicher.js';
    a.click();
    URL.revokeObjectURL(url);
}

// ── Hilfsfunktionen ────────────────────────────────────────────
function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
