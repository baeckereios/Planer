<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BäckereiOS — Steckbrief-Editor</title>
<link rel="stylesheet" href="../systemdesign.css">
<script src="../shell.js" defer></script>
<style>
  body { background: var(--background,#f8f6f2); color: var(--text-primary,#1a1a1a); padding-bottom: 40px; }
  .container { max-width: 680px; margin: 0 auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

  /* ── TOP-BAR ── */
  .top-bar { position: sticky; top: 0; z-index: 100; background: var(--card-bg,#fff); border-bottom: 1.5px solid var(--border-color,#e5e0d8); padding: 10px 14px; display: flex; align-items: center; gap: 8px; margin: -12px -12px 0; }
  .top-bar-titel { font-size: 1rem; font-weight: 900; flex: 1; }
  .top-bar-titel span { font-size: 0.72rem; font-weight: 600; color: var(--text-secondary,#6b7280); display: block; }
  .btn-speichern { background: #10b981; color: #fff; font-size: 0.85rem; padding: 10px 16px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(16,185,129,0.25); transition: all 0.2s; white-space: nowrap; }
  .btn-speichern:disabled { background: #cbd5e1; box-shadow: none; cursor: default; }
  .btn-speichern.done { background: #059669; }
  .btn-vorschau { background: var(--background,#f8f6f2); color: var(--text-primary,#1a1a1a); font-size: 0.85rem; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-color,#e5e0d8); font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; display: none; align-items: center; white-space: nowrap; }

  /* ── PRODUKT-AUSWAHL ── */
  .auswahl-card { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 14px; padding: 14px; }
  .auswahl-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary,#6b7280); margin-bottom: 8px; }
  .auswahl-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border-color,#e5e0d8); border-radius: 10px; font-size: 0.92rem; font-weight: 700; font-family: inherit; background: var(--card-bg,#fff); color: var(--text-primary,#1a1a1a); }
  .auswahl-select:focus { border-color: #e67e22; outline: none; }

  /* ── ABSCHNITT-KARTE ── */
  .abschnitt-card { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 14px; overflow: hidden; }
  .abschnitt-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; user-select: none; gap: 12px; }
  .abschnitt-header:active { background: var(--background,#f8f6f2); }
  .abschnitt-titel { font-size: 0.92rem; font-weight: 900; }
  .abschnitt-titel.teig    { color: #475569; }
  .abschnitt-titel.aufbau  { color: #d97706; }
  .abschnitt-titel.gare    { color: #059669; }
  .abschnitt-titel.backen  { color: #dc2626; }
  .abschnitt-titel.versand { color: #7c3aed; }

  /* Toggle Switch */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .toggle-label { font-size: 0.72rem; font-weight: 700; color: var(--text-secondary,#6b7280); }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 24px; cursor: pointer; transition: 0.2s; }
  .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: #10b981; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  .abschnitt-body { display: none; border-top: 1px solid var(--border-color,#e5e0d8); padding: 14px; }
  .abschnitt-body.open { display: block; }

  /* Felder */
  .feld-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary,#6b7280); margin-bottom: 5px; margin-top: 12px; }
  .feld-label:first-child { margin-top: 0; }
  .feld-textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border-color,#e5e0d8); border-radius: 9px; font-size: 0.88rem; line-height: 1.6; font-family: inherit; background: var(--card-bg,#fff); color: var(--text-primary,#1a1a1a); resize: vertical; min-height: 80px; box-sizing: border-box; }
  .feld-textarea:focus { border-color: #e67e22; outline: none; }
  .feld-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border-color,#e5e0d8); border-radius: 9px; font-size: 0.92rem; font-weight: 700; font-family: inherit; background: var(--card-bg,#fff); color: var(--text-primary,#1a1a1a); box-sizing: border-box; }
  .feld-input:focus { border-color: #e67e22; outline: none; }
  .feld-row { display: flex; gap: 8px; }
  .feld-row .feld-input { flex: 1; }
  .feld-hint { font-size: 0.68rem; color: var(--text-secondary,#6b7280); margin-top: 4px; line-height: 1.5; }



  .kein-produkt { text-align: center; padding: 40px; font-size: 0.85rem; color: var(--text-secondary,#6b7280); font-style: italic; }
</style>
</head>
<body>
<div class="container">

  <!-- Top-Bar -->
  <div class="top-bar">
    <div class="top-bar-titel">📋 Steckbrief-Editor
      <span>Abschnitte ein/ausschalten und Inhalte pflegen.</span>
    </div>
    <a id="btn-vorschau" class="btn-vorschau" href="#" target="_blank">👁 Vorschau</a>
    <button id="btn-speichern" class="btn-speichern" onclick="speichern()" disabled>⬇️ Speichern</button>
  </div>

  <!-- Produkt-Auswahl -->
  <div class="auswahl-card">
    <div class="auswahl-label">Produkt auswählen</div>
    <select id="produkt-select" class="auswahl-select" onchange="produktGewaehlt()">
      <option value="">— Produkt wählen —</option>
    </select>
  </div>

  <!-- Editor-Bereich -->
  <div id="editor-bereich">
    <div class="kein-produkt">Bitte oben ein Produkt auswählen.</div>
  </div>

</div>



<script>
var ABSCHNITT_META = {
  teig:    { label: '🌾 Teig',    klasse: 'teig'    },
  aufbau:  { label: '🔧 Aufbau',  klasse: 'aufbau'  },
  gare:    { label: '⏱ Gare',    klasse: 'gare'     },
  backen:  { label: '🔥 Backen',  klasse: 'backen'  },
  versand: { label: '📦 Versand', klasse: 'versand' }
};
var ABSCHNITT_ORDER = ['teig','aufbau','gare','backen','versand'];

var produktConfig = [];
var steckbriefe   = {};
var aktivesProdukt = null;  // { produkt, legacyKey }

window.onload = async function() {
  await ladeJSON('../produkt_config.json', function(d){ produktConfig = d; });
  await ladeJSON('../backwaren_steckbrief.json', function(d){ steckbriefe = d; });

  befuelleDropdown();
};

async function ladeJSON(pfad, onSuccess) {
  try { var r = await fetch(pfad, {cache:'no-store'}); if (r.ok) onSuccess(await r.json()); } catch(e) {}
}

// ── DROPDOWN ─────────────────────────────────────────────
function befuelleDropdown() {
  var select = document.getElementById('produkt-select');
  var relevant = produktConfig.slice();
  relevant.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  relevant.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value       = p.legacyKey || p.id;
    opt.textContent = p.name || p.legacyKey || p.id;
    if (steckbriefe[opt.value]) opt.textContent += ' ✓';
    select.appendChild(opt);
  });
}

// ── PRODUKT GEWÄHLT ──────────────────────────────────────
function produktGewaehlt() {
  var legacyKey = document.getElementById('produkt-select').value;
  if (!legacyKey) {
    document.getElementById('editor-bereich').innerHTML = '<div class="kein-produkt">Bitte oben ein Produkt auswählen.</div>';
    document.getElementById('btn-speichern').disabled = true;
    document.getElementById('btn-vorschau').style.display = 'none';
    aktivesProdukt = null;
    return;
  }

  var produkt = produktConfig.find(function(p){ return (p.legacyKey||p.id) === legacyKey; });
  aktivesProdukt = { produkt: produkt, legacyKey: legacyKey };

  // Vorhandene Daten laden oder Leer-Struktur
  var vorhandene = steckbriefe[legacyKey] || { abschnitte: {} };

  renderEditor(vorhandene);
  document.getElementById('btn-speichern').disabled = false;

  // Vorschau-Link
  var vorschau = document.getElementById('btn-vorschau');
  vorschau.style.display = 'flex';
  vorschau.href = '../backwaren/steckbrief.html?id=' + encodeURIComponent(legacyKey);
}

// ── EDITOR RENDERN ───────────────────────────────────────
function renderEditor(daten) {
  var container = document.getElementById('editor-bereich');
  container.innerHTML = '';

  ABSCHNITT_ORDER.forEach(function(k) {
    var m      = ABSCHNITT_META[k];
    var aDaten = (daten.abschnitte && daten.abschnitte[k]) || { sichtbar: false };

    var karte = document.createElement('div');
    karte.className = 'abschnitt-card';

    // Header mit Toggle
    var header = document.createElement('div');
    header.className = 'abschnitt-header';
    header.onclick = function() { toggleBody(k); };
    header.innerHTML =
      '<span class="abschnitt-titel ' + m.klasse + '">' + m.label + '</span>' +
      '<div class="toggle-wrap">' +
        '<span class="toggle-label" id="toggle-label-' + k + '">' + (aDaten.sichtbar ? 'Sichtbar' : 'Versteckt') + '</span>' +
        '<label class="toggle" onclick="event.stopPropagation()">' +
          '<input type="checkbox" id="toggle-' + k + '"' + (aDaten.sichtbar ? ' checked' : '') +
            ' onchange="onToggleChange(\'' + k + '\')">' +
          '<span class="toggle-slider"></span>' +
        '</label>' +
      '</div>';

    // Body
    var body = document.createElement('div');
    body.className = 'abschnitt-body' + (aDaten.sichtbar ? ' open' : '');
    body.id = 'body-' + k;
    body.innerHTML = bauFelder(k, aDaten);

    karte.appendChild(header);
    karte.appendChild(body);
    container.appendChild(karte);
  });
}

function toggleBody(k) {
  var body = document.getElementById('body-' + k);
  if (body) body.classList.toggle('open');
}

function onToggleChange(k) {
  var checked = document.getElementById('toggle-' + k).checked;
  document.getElementById('toggle-label-' + k).textContent = checked ? 'Sichtbar' : 'Versteckt';
  var body = document.getElementById('body-' + k);
  if (body) body.classList.toggle('open', checked);
}

// ── FELDER PRO ABSCHNITT ─────────────────────────────────
function bauFelder(k, daten) {
  switch(k) {
    case 'teig':
      return '<div class="feld-label">Teig-Beschreibung</div>' +
        '<textarea class="feld-textarea" id="feld-teig-text" placeholder="Teigführung, Zutaten, Besonderheiten…" rows="5">' +
        esc(daten.text||'') + '</textarea>';

    case 'aufbau':
      return '<div class="feld-label">Schritte (ein Schritt pro Zeile)</div>' +
        '<textarea class="feld-textarea" id="feld-aufbau-schritte" placeholder="Blech einölen&#10;Teiglinge auslegen&#10;Abstand lassen" rows="6">' +
        esc((daten.schritte||[]).join('\n')) + '</textarea>' +
        '<div class="feld-hint">Jede Zeile wird auf der Steckbrief-Seite als ankreuzbare Aufgabe angezeigt.</div>';

    case 'gare':
      return '<div class="feld-label">Gare-Beschreibung</div>' +
        '<textarea class="feld-textarea" id="feld-gare-text" placeholder="Temperatur, Dauer, Luftfeuchtigkeit…" rows="4">' +
        esc(daten.text||'') + '</textarea>';

    case 'backen':
      return '<div class="feld-label">Backprogramm</div>' +
        '<input type="text" class="feld-input" id="feld-backen-programm" placeholder="z.B. P12" value="' + esc(daten.programm||'') + '">' +
        '<div class="feld-label" style="margin-top:10px;">Temperaturen</div>' +
        '<div class="feld-row">' +
          '<div style="flex:1;">' +
            '<div class="feld-hint" style="margin:0 0 4px;">Ober</div>' +
            '<input type="number" class="feld-input" id="feld-backen-temp-ober" placeholder="185" value="' + esc(String(daten.temperatur_ober||'')) + '">' +
          '</div>' +
          '<div style="flex:1;">' +
            '<div class="feld-hint" style="margin:0 0 4px;">Unter</div>' +
            '<input type="number" class="feld-input" id="feld-backen-temp-unter" placeholder="170" value="' + esc(String(daten.temperatur_unter||'')) + '">' +
          '</div>' +
          '<div style="flex:1;">' +
            '<div class="feld-hint" style="margin:0 0 4px;">Minuten</div>' +
            '<input type="number" class="feld-input" id="feld-backen-minuten" placeholder="18" value="' + esc(String(daten.minuten||'')) + '">' +
          '</div>' +
        '</div>' +
        '<div class="feld-label" style="margin-top:10px;">Hinweis</div>' +
        '<textarea class="feld-textarea" id="feld-backen-hinweis" placeholder="Besonderheiten beim Backen…" rows="3">' +
        esc(daten.hinweis||'') + '</textarea>';

    case 'versand':
      return '<div class="feld-label">Stück pro Korb</div>' +
        '<input type="number" class="feld-input" id="feld-versand-pro-korb" placeholder="z.B. 12" value="' + esc(String(daten.pro_korb||'')) + '">' +
        '<div class="feld-label" style="margin-top:10px;">Hinweis</div>' +
        '<textarea class="feld-textarea" id="feld-versand-hinweis" placeholder="Was ist beim Versand zu beachten?" rows="3">' +
        esc(daten.hinweis||'') + '</textarea>';
  }
  return '';
}

// ── DATEN AUSLESEN ───────────────────────────────────────
function leseFormularDaten() {
  function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
  function num(id) { var v = parseInt(val(id)); return isNaN(v) ? null : v; }

  return {
    teig: {
      sichtbar: !!document.getElementById('toggle-teig').checked,
      text:     val('feld-teig-text')
    },
    aufbau: {
      sichtbar: !!document.getElementById('toggle-aufbau').checked,
      schritte: val('feld-aufbau-schritte').split('\n').map(function(s){ return s.trim(); }).filter(Boolean)
    },
    gare: {
      sichtbar: !!document.getElementById('toggle-gare').checked,
      text:     val('feld-gare-text')
    },
    backen: {
      sichtbar:          !!document.getElementById('toggle-backen').checked,
      programm:          val('feld-backen-programm'),
      temperatur_ober:   num('feld-backen-temp-ober'),
      temperatur_unter:  num('feld-backen-temp-unter'),
      minuten:           num('feld-backen-minuten'),
      hinweis:           val('feld-backen-hinweis')
    },
    versand: {
      sichtbar: !!document.getElementById('toggle-versand').checked,
      pro_korb: num('feld-versand-pro-korb'),
      hinweis:  val('feld-versand-hinweis')
    }
  };
}

// ── SPEICHERN ────────────────────────────────────────────
function speichern() {
  if (!aktivesProdukt) return;

  steckbriefe[aktivesProdukt.legacyKey] = {
    produktname: aktivesProdukt.produkt ? (aktivesProdukt.produkt.name || aktivesProdukt.legacyKey) : aktivesProdukt.legacyKey,
    abschnitte:  leseFormularDaten()
  };

  var blob = new Blob([JSON.stringify(steckbriefe, null, 2)], {type:'application/json'});
  var a    = document.createElement('a');
  a.href   = URL.createObjectURL(blob);
  a.download = 'backwaren_steckbrief.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);

  // Dropdown-Option mit ✓ markieren
  var opts = document.getElementById('produkt-select').options;
  for (var i = 0; i < opts.length; i++) {
    if (opts[i].value === aktivesProdukt.legacyKey) {
      if (opts[i].textContent.indexOf('✓') === -1) opts[i].textContent += ' ✓';
    }
  }

  var btn = document.getElementById('btn-speichern');
  btn.textContent = '✓ Gespeichert';
  btn.classList.add('done');
  setTimeout(function() { btn.textContent = '⬇️ Steckbrief speichern'; btn.classList.remove('done'); }, 3000);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
