<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produkt-Config Editor – BäckereiOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rot:    #c0392b;
    --rot2:   #a93226;
    --dunkel: #f4f2ee;
    --grau1:  #ffffff;
    --grau2:  #f0ede8;
    --grau3:  #e8e4dd;
    --hell:   #1c1a17;
    --border: #d8d3ca;
    --akzent: #d49a36;
    --gruen:  #2d7a4f;
    --font:   'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--dunkel);
    color: var(--hell);
    min-height: 100vh;
  }

  /* ── Header ────────────────────────────────────────────── */
  header {
    background: var(--rot);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #8b1a12;
  }
  header h1 { font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: #ffffff; }
  header .meta { font-size: 11px; color: rgba(255,255,255,0.7); text-align: right; }

  /* ── Toolbar ───────────────────────────────────────────── */
  .toolbar {
    background: var(--grau1);
    border-bottom: 2px solid var(--border);
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .btn {
    font-family: var(--font);
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    padding: 7px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-rot    { background: var(--rot); color: #ffffff; }
  .btn-gruen  { background: var(--gruen); color: #ffffff; }
  .btn-akzent { background: var(--akzent); color: #ffffff; }
  .btn-grau   { background: var(--grau3); color: #ffffff; }
  .toolbar .sep { width: 1px; height: 28px; background: var(--border); }
  .toolbar label { font-size: 11px; color: var(--dim); }
  #filterKat {
    font-family: var(--font);
    font-size: 11px;
    background: var(--grau2);
    color: var(--hell);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 8px;
  }
  #suchfeld {
    font-family: var(--font);
    font-size: 11px;
    background: var(--grau2);
    color: var(--hell);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 10px;
    width: 200px;
  }
  #suchfeld::placeholder { color: var(--dim); }
  #statusBar {
    font-size: 11px;
    color: var(--dim);
    margin-left: auto;
  }
  #statusBar.ok  { color: var(--gruen); }
  #statusBar.err { color: var(--rot); }

  /* ── Upload-Zone ───────────────────────────────────────── */
  #uploadZone {
    margin: 30px auto;
    max-width: 500px;
    border: 2px dashed var(--grau3);
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    color: var(--dim);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  #uploadZone:hover, #uploadZone.drag { border-color: var(--rot); color: var(--hell); }
  #uploadZone .icon { font-size: 40px; margin-bottom: 12px; }
  #uploadZone p { margin: 6px 0; }
  #uploadZone small { font-size: 10px; color: var(--dim); }
  #fileInput { display: none; }

  /* ── Haupt-Tabellen-Container ──────────────────────────── */
  #tabellen { padding: 0 0 40px; }

  /* ── Kategorie-Sektion ─────────────────────────────────── */
  .kat-sektion { margin-bottom: 2px; }
  .kat-kopf {
    background: var(--grau2);
    border-left: 4px solid var(--rot);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: bold;
    color: var(--dim);
  }
  .kat-kopf:hover { background: var(--grau3); }
  .kat-kopf .anzahl { color: var(--rot); font-size: 11px; margin-left: 8px; }
  .kat-kopf .toggle-icon { color: var(--dim); font-size: 14px; }

  /* ── Tabelle ───────────────────────────────────────────── */
  .prod-tabelle { width: 100%; border-collapse: collapse; }
  .prod-tabelle thead th {
    background: var(--grau2);
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: normal;
  }
  .prod-tabelle tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .prod-tabelle tbody tr:hover { background: var(--grau2); }
  .prod-tabelle tbody tr.neu { background: #e8f5ec; }
  .prod-tabelle td {
    padding: 4px 6px;
    vertical-align: middle;
  }

  /* ── Eingabefelder in Zeilen ───────────────────────────── */
  .prod-tabelle input, .prod-tabelle select {
    font-family: var(--font);
    font-size: 11px;
    background: transparent;
    color: var(--hell);
    border: 1px solid transparent;
    border-radius: 2px;
    padding: 3px 5px;
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .prod-tabelle input:focus, .prod-tabelle select:focus {
    outline: none;
    border-color: var(--rot);
    background: var(--grau2);
  }
  .prod-tabelle select { cursor: pointer; }
  .prod-tabelle select option { background: var(--dunkel); }

  /* Spaltenbreiten */
  .col-artnr   { width: 75px; }
  .col-name    { width: 220px; }
  .col-kat     { width: 110px; }
  .col-charge  { width: 65px; }
  .col-einheit { width: 60px; text-align: center; }
  .col-legacy  { width: 185px; }
  .col-hinweis { min-width: 100px; }
  .col-cfg     { width: 30px; text-align: center; }
  .col-del     { width: 36px; text-align: center; }

  /* Detail-Zeile */
  .detail-row td { padding: 0 !important; background: var(--dunkel); border-bottom: 2px solid var(--border); }
  .detail-inner { display: none; padding: 16px; flex-direction: column; gap: 0; }
  .detail-inner.open { display: flex; }
  .detail-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 16px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .detail-section:last-child { border-bottom: none; }
  .detail-section.full { grid-template-columns: 1fr; }
  .detail-section.two { grid-template-columns: 1fr 1fr; }
  .detail-feld { display: flex; flex-direction: column; gap: 5px; }
  .detail-feld label { font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--dim); font-weight: 800; }
  .detail-feld select, .detail-feld input[type=number], .detail-feld input[type=text] {
    background: var(--grau2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--hell); padding: 7px 10px; font-size: 13px; font-family: inherit; width: 100%; box-sizing: border-box;
  }
  .detail-feld select:focus, .detail-feld input:focus { outline: none; border-color: var(--akzent); background: var(--grau2); }
  .detail-feld-check { display: flex; flex-direction: column; gap: 5px; }
  .detail-feld-check label.lbl-head { font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--dim); font-weight: 800; }
  .detail-feld-check .check-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .detail-feld-check .check-row span { font-size: 12px; color: var(--dim); }
  .detail-feld-check input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
  .backtage-buttons { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }

  /* BackTage Toggles */
  .backtage-wrap { display: flex; flex-direction: column; gap: 4px; }
  .bt-btn {
    font-family: var(--font); font-size: 10px; font-weight: bold;
    padding: 4px 7px; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--border); background: var(--grau2); color: var(--dim); transition: all 0.15s;
  }
  .bt-btn.aktiv { background: var(--akzent); border-color: var(--akzent); color: #ffffff; }

  /* Einheit-Checkbox */
  .einheit-wrap { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .einheit-wrap input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--akzent); cursor: pointer; border: none; background: transparent; }
  .einheit-wrap label { font-size: 9px; color: var(--dim); letter-spacing: 0.5px; cursor: pointer; user-select: none; }
  .einheit-wrap input[type=checkbox]:checked + label { color: var(--akzent); font-weight: bold; }

  /* Cfg-Button */
  .btn-cfg {
    background: none; border: 1px solid #444; color: var(--dim);
    font-size: 11px; width: 22px; height: 22px;
    border-radius: 3px; cursor: pointer; line-height: 1; transition: all 0.15s;
  }
  .btn-cfg:hover, .btn-cfg.offen { background: var(--grau2); border-color: var(--akzent); color: var(--akzent); }

  /* Badges */
  .badge-hinweis { font-size: 9px; color: var(--akzent); }
  .badge-null { color: var(--dim); font-style: italic; font-size: 10px; }

  /* Löschen-Button */
  .btn-del {
    background: none;
    border: 1px solid #444;
    color: var(--dim);
    font-size: 13px;
    width: 26px; height: 26px;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1;
    transition: all 0.15s;
  }
  .btn-del:hover { background: var(--rot); border-color: var(--rot); color: #ffffff; }

  /* ── Download-Banner ───────────────────────────────────── */
  #downloadBanner {
    display: none;
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--gruen);
    color: #ffffff;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: slideIn 0.3s ease;
    cursor: pointer;
  }
  /* ── Einstellungen Block ───────────────────────────────── */

  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  /* ── Neue Zeile Animation ─────────────────────────────── */
  @keyframes highlight {
    0%   { background: #e8f5ec; }
    100% { background: transparent; }
  }
  .neu-flash { animation: highlight 1.5s ease forwards; }

  /* ── Leerzustand ───────────────────────────────────────── */
  #leerZustand {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>⚙ Produkt-Config Editor</h1>
  <div class="meta">
    <div>BäckereiOS Admin</div>
    <div id="dateiName">keine Datei geladen</div>
  </div>
</header>

<div class="toolbar">
  <button class="btn btn-grau" onclick="document.getElementById('fileInput').click()">📂 Datei laden</button>
  <button class="btn btn-grau" onclick="ladeVonServer()">↻ Auto-Laden</button>
  <input type="file" id="fileInput" accept=".json">
  <div class="sep"></div>
  <label>Filter:</label>
  <select id="filterKat" onchange="render()">
    <option value="">Alle Kategorien</option>
    <option>Brötchen</option>
    <option>Brot</option>
    <option>Konditorei</option>
    <option>Fettgebäck</option>
    <option>Snack</option>
  </select>
  <input type="text" id="suchfeld" placeholder="Suchen…" oninput="render()">
  <div class="sep"></div>
  <button class="btn btn-rot" onclick="neuesProdukt()">＋ Produkt</button>
  <div class="sep"></div>
  <button class="btn btn-gruen" onclick="downloadJSON()">⬇ JSON speichern</button>
  <span id="statusBar">—</span>
</div>

<!-- Upload-Zone (nur wenn keine Daten) -->
<div id="uploadZone" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📋</div>
  <p><strong>produkt_config.json laden</strong></p>
  <p>Klicken oder Datei hierher ziehen</p>
  <small>Oder „Auto-Laden" wenn die App auf einem Server läuft</small>
</div>

<div id="tabellen"></div>

<div id="downloadBanner" onclick="downloadJSON()">⬇ JSON jetzt speichern</div>

<script src="../feiertage_nds.js"></script>
<script>
const KATEGORIEN  = ['Brötchen','Brot','Konditorei','Fettgebäck','Snack','Schlawiner'];
const KAT_FARBEN  = { Brötchen:'#c0392b', Brot:'#8b5a2b', Konditorei:'#6c3483', Fettgebäck:'#1a6b8a', Snack:'#27ae60' };
let daten = [];
let geaendert = false;
let eingeklappt = {};

// ── Datei-Upload ──────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      daten = JSON.parse(ev.target.result);
      document.getElementById('dateiName').textContent = file.name;
      geaendert = false;
      render();
      status('✓ ' + daten.length + ' Produkte geladen', 'ok');
    } catch(err) {
      status('⚠ JSON-Fehler: ' + err.message, 'err');
    }
  };
  reader.readAsText(file);
});

// Drag & Drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('fileInput').files = e.dataTransfer.files; document.getElementById('fileInput').dispatchEvent(new Event('change')); }
});

// Auto-Laden vom Server
async function ladeVonServer() {
  try {
    status('Lade…', '');
    const res = await fetch('../produkt_config.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    daten = await res.json();
    document.getElementById('dateiName').textContent = 'produkt_config.json (Server)';
    geaendert = false;
    render();
    status('✓ ' + daten.length + ' Produkte vom Server', 'ok');
  } catch(err) {
    status('⚠ ' + err.message, 'err');
  }
}

// ── Status ────────────────────────────────────────────────
function status(msg, typ) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = typ;
}

// ── Render ────────────────────────────────────────────────
function render() {
  if (!daten.length) {
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('tabellen').innerHTML = '';
    return;
  }
  document.getElementById('uploadZone').style.display = 'none';

  const filterKat = document.getElementById('filterKat').value;
  const suche     = document.getElementById('suchfeld').value.toLowerCase();

  const container = document.getElementById('tabellen');
  container.innerHTML = '';

  const kats = filterKat ? [filterKat] : KATEGORIEN;

  for (const kat of kats) {
    let produkte = daten.filter(p => p.kategorie === kat);
    if (suche) produkte = produkte.filter(p =>
      (p.name||'').toLowerCase().includes(suche) ||
      (p.artNr||'').toLowerCase().includes(suche) ||
      (p.legacyKey||'').toLowerCase().includes(suche)
    );
    if (!produkte.length) continue;

    const sektion = document.createElement('div');
    sektion.className = 'kat-sektion';
    const isCollapsed = eingeklappt[kat] || false;

    const farbe = KAT_FARBEN[kat] || '#555';
    sektion.innerHTML = `
      <div class="kat-kopf" style="border-left-color:${farbe}" onclick="toggleKat('${kat}')">
        <span>${kat} <span class="anzahl">[${produkte.length}]</span></span>
        <span class="toggle-icon">${isCollapsed ? '▶' : '▼'}</span>
      </div>`;

    if (!isCollapsed) {
      const tbl = document.createElement('table');
      tbl.className = 'prod-tabelle';
      tbl.innerHTML = `<thead><tr>
        <th class="col-artnr">ArtNr</th>
        <th class="col-name">Bezeichnung</th>
        <th class="col-kat">Kategorie</th>
        <th class="col-charge">Charge</th>
        <th class="col-einheit">Bleche</th>
        <th class="col-legacy">Legacy-Key</th>
        <th class="col-hinweis">Hinweis</th>
        <th class="col-cfg">⚙</th>
        <th class="col-del">✕</th>
      </tr></thead>`;

      const tbody = document.createElement('tbody');
      for (const p of produkte) {
        const idx = daten.indexOf(p);
        const tr = document.createElement('tr');
        tr.dataset.idx = idx;
        tr.innerHTML = `
          <td class="col-artnr">
            <input type="text" value="${p.artNr||''}" placeholder="—"
              onchange="aendere(${idx},'artNr',this.value)">
          </td>
          <td class="col-name">
            <input type="text" value="${esc(p.name||'')}"
              onchange="aendere(${idx},'name',this.value)">
          </td>
          <td class="col-kat">
            <select onchange="aendere(${idx},'kategorie',this.value)">
              ${KATEGORIEN.map(k => `<option${k===p.kategorie?' selected':''}>${k}</option>`).join('')}
            </select>
          </td>
          <td class="col-charge">
            <input type="number" value="${p.charge||1}" min="1" style="width:55px"
              onchange="aendere(${idx},'charge',parseInt(this.value)||1)">
          </td>
          <td class="col-einheit">
            <div class="einheit-wrap">
              <input type="checkbox" id="ein_${idx}" ${p.einheit==='bleche'?'checked':''}
                onchange="aendere(${idx},'einheit',this.checked?'bleche':'stueck');document.getElementById('lbl_${idx}').textContent=this.checked?'Blch':'Stk'">
              <label id="lbl_${idx}" for="ein_${idx}">${p.einheit==='bleche'?'Blch':'Stk'}</label>
            </div>
          </td>
          <td class="col-legacy">
            <input type="text" value="${p.legacyKey||''}" placeholder="—"
              onchange="aendere(${idx},'legacyKey',this.value||null)"
              style="font-size:10px; color:#888;">
          </td>
          <td class="col-hinweis">
            <input type="text" value="${esc(p.hinweis||'')}" placeholder="—"
              onchange="aendere(${idx},'hinweis',this.value||null)"
              style="font-size:10px; color:#e67e22;">
          </td>
          <td class="col-cfg">
            <button class="btn-cfg" id="cfg_${idx}" onclick="toggleDetail(${idx})" title="Station / BackTage">⚙</button>
          </td>
          <td class="col-del">
            <button class="btn-del" onclick="loescheProdukt(${idx})" title="Löschen">✕</button>
          </td>`;
        tbody.appendChild(tr);

        // ── Detail-Zeile ──────────────────────────────────
        const trD = document.createElement('tr');
        trD.className = 'detail-row';
        trD.id = 'detail_' + idx;
        const colCount = 9;

        const stationVal = p.station || '';
        const stOpts = '<option value="">— Station wählen —</option><option>Brötchenstraße</option><option>Nachtschicht</option><option>Frühschicht</option><option>Rondo</option><option>Konditorei</option><option>Versand</option>'.replace(
            stationVal ? '<option>' + stationVal + '</option>' : 'value=""',
            stationVal ? '<option selected>' + stationVal + '</option>' : 'value="" selected');
        const uOpts = '<option value="0">🫓 Bleche</option><option value="1">🌽 Pressen (KK)</option><option value="2">🔧 Pressen (HB)</option><option value="3">☕ Brühstücke</option>'.replace('value="' + (p.unit??0) + '"',
            'value="' + (p.unit??0) + '" selected');

        // BackTage Buttons
        const BT_LABELS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
        const BT_IDX    = [1,2,3,4,5,6,0];
        const backTage  = p.backTage || [];
        let btHTML = '';
        BT_IDX.forEach((jsIdx, i) => {
            const aktiv = backTage.includes(jsIdx) ? ' aktiv' : '';
            btHTML += `<button class="bt-btn${aktiv}" onclick="toggleBackTag(${idx},${jsIdx},this)">${BT_LABELS[i]}</button>`;
        });

        trD.innerHTML = `<td colspan="${colCount}">
          <div class="detail-inner" id="detail-inner_${idx}">

            <!-- Sektion 1: Station, Einheit, BatchSize -->
            <div class="detail-section">
              <div class="detail-feld">
                <label>Station</label>
                <select onchange="aendere(${idx},'station',this.value)">${stOpts}</select>
              </div>
              <div class="detail-feld">
                <label>Zähleinheit</label>
                <select onchange="aendere(${idx},'unit',parseInt(this.value))">${uOpts}</select>
              </div>
              <div class="detail-feld">
                <label>BatchSize (Schritte)</label>
                <input type="number" min="1" value="${p.batchSize||1}"
                  onchange="aendere(${idx},'batchSize',parseInt(this.value)||1)">
              </div>
            </div>

            <!-- Sektion 2: BackTage -->
            <div class="detail-section full">
              <div class="detail-feld backtage-wrap">
                <label>BackTage</label>
                <div class="backtage-buttons">${btHTML}</div>
              </div>
            </div>

            <!-- Sektion 3: Checkboxen -->
            <div class="detail-section full">
              <div class="detail-feld-check">
                <label class="lbl-head">Einstellungen</label>
                <div class="check-row">
                  <input type="checkbox" id="inv_${idx}" ${p.inventurRelevant?'checked':''}
                    onchange="aendere(${idx},'inventurRelevant',this.checked)"
                    style="accent-color:var(--akzent);">
                  <span>Wichtig für die Frosterzählung (Inventur)</span>
                </div>
                <div class="check-row">
                  <input type="checkbox" id="sr_${idx}" ${p.schnellrechnerRelevant?'checked':''}
                    onchange="aendere(${idx},'schnellrechnerRelevant',this.checked)"
                    style="accent-color:#10b981;">
                  <span>Im Schnellrechner anzeigen</span>
                </div>
                <div class="check-row">
                  <input type="checkbox" id="fil_${idx}" ${p.filialeProdukt?'checked':''}
                    onchange="aendere(${idx},'filialeProdukt',this.checked)"
                    style="accent-color:#3b82f6;">
                  <span>Kann in der Filiale gebacken werden</span>
                </div>
                <div class="check-row">
                  <input type="checkbox" id="fl_${idx}" ${p.frosterliste!==false?'checked':''}
                    onchange="aendere(${idx},'frosterliste',this.checked)"
                    style="accent-color:var(--akzent);">
                  <span>In der Frosterliste anzeigen</span>
                </div>
              </div>
            </div>

            <!-- Sektion 4: Einheit & Lagerort -->
            <div class="detail-section two">
              <div class="detail-feld">
                <label>Einheit (Anzeige)</label>
                <input type="text" value="${p.einheit||''}" placeholder="z.B. rote Dielen"
                  onchange="aendere(${idx},'einheit',this.value.trim()||null)">
              </div>
              <div class="detail-feld">
                <label>Lagerort</label>
                <input type="text" value="${p.lagerort||''}" placeholder="z.B. Kühlraum 1"
                  onchange="aendere(${idx},'lagerort',this.value.trim()||null)">
              </div>
            </div>

          </div>
        </td>`;
        tbody.appendChild(trD);
      }
      tbl.appendChild(tbody);
      sektion.appendChild(tbl);
    }

    container.appendChild(sektion);
  }

  // Statuszeile
  status(`${daten.length} Produkte${geaendert ? ' · ⚠ ungespeicherte Änderungen' : ''}`, geaendert ? 'err' : 'ok');
  document.getElementById('downloadBanner').style.display = geaendert ? 'block' : 'none';
}

function toggleKat(kat) {
  eingeklappt[kat] = !eingeklappt[kat];
  render();
}

// ── Detail-Zeile togglen ─────────────────────────────────
function toggleDetail(idx) {
  const inner = document.getElementById('detail-inner_' + idx);
  const btn   = document.getElementById('cfg_' + idx);
  if (!inner) return;
  inner.classList.toggle('open');
  btn.classList.toggle('offen');
}

// ── BackTag togglen ───────────────────────────────────────
function toggleBackTag(idx, jsIdx, btn) {
  const p = daten[idx];
  let tags = Array.isArray(p.backTage) ? [...p.backTage] : [];
  if (tags.includes(jsIdx)) {
    tags = tags.filter(t => t !== jsIdx);
    btn.classList.remove('aktiv');
  } else {
    tags.push(jsIdx);
    btn.classList.add('aktiv');
  }
  tags.sort();
  aendere(idx, 'backTage', tags);
}

// ── Feldänderung ──────────────────────────────────────────
function aendere(idx, feld, wert) {
  daten[idx][feld] = wert;
  geaendert = true;
  status(`${daten.length} Produkte · ⚠ ungespeicherte Änderungen`, 'err');
  document.getElementById('downloadBanner').style.display = 'block';

  // Label dynamisch aktualisieren
  if (feld === 'inventurRelevant') {

    }
  }

    const lbl = document.getElementById('fil_lbl_' + idx);
    if (lbl) {
      
    }
  }
}

// ── Neues Produkt ─────────────────────────────────────────
function neuesProdukt() {
  const kat = document.getElementById('filterKat').value || 'Brötchen';
  daten.push({
    artNr:      null,
    name:       'Neues Produkt',
    kategorie:  kat,
    charge:     1,
    einheit:    'stueck',
    station:    'Nachtschicht',
    unit:       0,
    batchSize:  1,
    backTage:   [],
    inventurRelevant: false,
    schnellrechnerRelevant: false,
    filialeProdukt: false,
    legacyKey:  null,
    hinweis:    null,
  });
  geaendert = true;
  // Kategorie aufklappen
  eingeklappt[kat] = false;
  render();
  // Fokus auf neuen Eintrag
  const rows = document.querySelectorAll('tr[data-idx]');
  const letzteIdx = daten.length - 1;
  for (const row of rows) {
    if (parseInt(row.dataset.idx) === letzteIdx) {
      row.classList.add('neu-flash');
      row.querySelector('input').focus();
      row.querySelector('input').select();
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
    }
  }
}

// ── Löschen ───────────────────────────────────────────────
function loescheProdukt(idx) {
  const p = daten[idx];
  if (!confirm(`„${p.name}" wirklich löschen?`)) return;
  daten.splice(idx, 1);
  geaendert = true;
  render();
}

// ── Download ──────────────────────────────────────────────
function downloadJSON() {
  const json = JSON.stringify(daten, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'produkt_config.json';
  a.click();
  URL.revokeObjectURL(url);
  geaendert = false;
  document.getElementById('downloadBanner').style.display = 'none';
  status(`✓ ${daten.length} Produkte gespeichert`, 'ok');
}

// ── Escape ────────────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// Ungespeicherte Änderungen warnen
window.addEventListener('beforeunload', e => {
  if (geaendert) { e.preventDefault(); e.returnValue = ''; }
});
