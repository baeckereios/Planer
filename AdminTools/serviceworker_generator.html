<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>V109 Update Assistent</title>
    <script src="serviceworker_version_gehirn.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; line-height: 1.6;">
    <h2>Planer Update-Zentrale (V109)</h2>
    <p>Aktuelle Version im Gehirn: <b id="display-v" style="color: #007bff;">Lade...</b></p>
    
    <button onclick="generateUpdate()" style="padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px;">
        Update generieren & 'ballern'
    </button>

    <script>
        // Prüft, ob die Variable aus der externen JS geladen wurde
        const currentV = typeof PLANER_REVISION !== 'undefined' ? PLANER_REVISION : 100;
        const nextV = currentV + 1;
        document.getElementById('display-v').innerText = "V" + currentV;

        function download(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.click();
        }

        function generateUpdate() {
            // 1. Die neue Gehirn-Datei mit dem neuen Namen
            const newGehirn = `// Aktuelle Revisionsnummer deines Planers\nconst PLANER_REVISION = ${nextV};`;
            
            // 2. Der neue Service Worker (Inhalt bleibt sw.js)
            const newSW = `
const CACHE_NAME = 'planer-cache-v${nextV}';
const ASSETS = ['./', './index.html', './systemdesign.css'];

self.addEventListener('install', e => {
    self.skipWaiting();
    console.log('Service Worker V${nextV} installiert');
});

self.addEventListener('activate', e => {
    e.waitUntil(
        caches.keys().then(keys => Promise.all(
            keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
        ))
    );
});

self.addEventListener('fetch', e => {
    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
});`;

            // Downloads auslösen
            // Zuerst das Gehirn mit deinem neuen Dateinamen
            download('serviceworker_version_gehirn.js', newGehirn);
            
            // Dann der eigentliche Service Worker
            setTimeout(() => download('service-worker.js', newSW), 500);
            
            alert("Erfolg! V" + nextV + " wurde erstellt.\n\nEinfach beide Dateien in den Planer-Ordner schieben und synchronisieren.");
        }
    </script>
</body>
</html>
