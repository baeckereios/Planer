<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NFC Visitenkarte – BäckereiOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<link rel="stylesheet" href="admin_design.css">
<script src="../shell.js"></script>
<style>
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .pulsing { animation: pulse 1.3s ease-in-out infinite; }
</style>
</head>
<body>

<div class="adm-page">

  <header class="adm-header">
    <a class="adm-back" href="admin_landing.html">
      <i class="ph ph-caret-left"></i> Admin
    </a>
    <div class="adm-header-body">
      <h1 class="adm-title">NFC Visitenkarte</h1>
      <span class="adm-subtitle">Kontaktdaten auf Chip schreiben</span>
    </div>
  </header>

  <!-- Person -->
  <div class="adm-card">
    <div class="adm-card-header">Person</div>
    <div class="adm-card-body">
      <div class="adm-field">
        <label class="adm-label">Vorname</label>
        <input class="adm-input" type="text" id="fname" placeholder="Vorname" autocomplete="off">
      </div>
      <div class="adm-field">
        <label class="adm-label">Nachname</label>
        <input class="adm-input" type="text" id="lname" placeholder="Nachname" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Kontakt -->
  <div class="adm-card">
    <div class="adm-card-header">Kontakt</div>
    <div class="adm-card-body">
      <div class="adm-field">
        <label class="adm-label">Mobil</label>
        <input class="adm-input" type="tel" id="mobile" placeholder="+49 …" autocomplete="off">
      </div>
      <div class="adm-field">
        <label class="adm-label">E-Mail (optional)</label>
        <input class="adm-input" type="email" id="email" placeholder="name@example.de" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Arbeit -->
  <div class="adm-card">
    <div class="adm-card-header">Arbeit</div>
    <div class="adm-card-body">
      <div class="adm-field">
        <label class="adm-label">Firma</label>
        <input class="adm-input" type="text" id="org" placeholder="Firma" autocomplete="off">
      </div>
      <div class="adm-field" style="margin-bottom:0">
        <label class="adm-label">Position (optional)</label>
        <input class="adm-input" type="text" id="jobtitle" placeholder="Position" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- vCard Vorschau -->
  <div class="adm-card">
    <div class="adm-card-header">vCard 3.0 Vorschau</div>
    <div class="adm-card-body">
      <pre id="preview" class="adm-text-mono adm-text-dim" style="white-space:pre;overflow-x:auto;line-height:1.7;">—</pre>
    </div>
  </div>

  <!-- Status -->
  <div id="status" style="display:none;" class="adm-info">
    <span id="status-icon" style="margin-right:6px;"></span>
    <span id="status-text"></span>
  </div>

  <!-- Button -->
  <button class="adm-btn adm-btn-primary adm-w-full" onclick="writeNFC()" style="justify-content:center;">
    <i class="ph-fill ph-broadcast"></i>
    Auf NFC-Chip schreiben
  </button>

  <p class="adm-text-dim adm-text-small adm-mt-sm" style="text-align:center;line-height:1.5;padding-bottom:16px;">
    Web NFC: nur Chrome auf Android (ab v89). iOS nicht unterstützt.
  </p>

</div>

<script>
  ['fname','lname','mobile','email','org','jobtitle'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', updatePreview);
  });
  updatePreview();

  function v(id) { return document.getElementById(id).value.trim(); }

  function buildVCard() {
    var fn = [v('fname'), v('lname')].filter(Boolean).join(' ') || '—';
    var lines = ['BEGIN:VCARD','VERSION:3.0','FN:' + fn,'N:' + v('lname') + ';' + v('fname') + ';;;'];
    if (v('org'))      lines.push('ORG:' + v('org'));
    if (v('jobtitle')) lines.push('TITLE:' + v('jobtitle'));
    if (v('mobile'))   lines.push('TEL;TYPE=CELL:' + v('mobile'));
    if (v('email'))    lines.push('EMAIL:' + v('email'));
    lines.push('END:VCARD');
    return lines.join('\r\n');
  }

  function updatePreview() {
    document.getElementById('preview').textContent = buildVCard();
  }

  async function writeNFC() {
    if (!('NDEFReader' in window)) {
      setStatus('red', '✕', 'Web NFC wird von diesem Browser nicht unterstützt.');
      return;
    }
    setStatus('amber', '📡', 'Warte auf Chip … jetzt ans Gerät halten.', true);
    try {
      var ndef = new NDEFReader();
      await ndef.write({
        records: [{ recordType: 'mime', mediaType: 'text/vcard',
                    data: new TextEncoder().encode(buildVCard()) }]
      });
      setStatus('green', '✓', 'Chip erfolgreich beschrieben.');
    } catch(e) {
      var msg = e.name === 'NotAllowedError' ? 'Berechtigung verweigert.'
              : e.name === 'NotSupportedError' ? 'NFC nicht aktiv — bitte im Gerät einschalten.'
              : e.message;
      setStatus('red', '✕', msg);
    }
  }

  function setStatus(color, icon, text, pulse) {
    var el  = document.getElementById('status');
    var ico = document.getElementById('status-icon');
    el.style.display = '';
    el.className = 'adm-info adm-info-' + color;
    ico.textContent = icon;
    ico.classList.toggle('pulsing', !!pulse);
    document.getElementById('status-text').textContent = text;
  }
</script>
</body>
</html>
