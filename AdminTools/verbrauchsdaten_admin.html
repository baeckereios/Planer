<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BäckereiOS - Verbrauchsdaten Master</title>
    <link rel="stylesheet" href="admin_design.css">
    <style>
        .container { max-width: 800px; } /* Etwas breiter für das Grid */
        .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;}
        .inp-batch-wrap { display: flex; align-items: center; gap: 5px; background: #fafafa; border: 1px solid var(--border-color); border-radius: 4px; padding: 0 10px; height: 43px; }
        .inp-batch-label { font-size: 0.7rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }
        .inp-batch { width: 50px; border: none; background: transparent; text-align: center; font-weight: bold; outline: none; margin: 0; padding: 0;}
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr) 0.8fr; gap: 8px; }
        .day-col { display: flex; flex-direction: column; gap: 4px; text-align: center; }
        .day-lbl { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }
        .day-inp { width: 100%; text-align: center; padding: 8px 0; border: 1px solid var(--border-color); border-radius: 4px; font-weight: bold; }
        .inp-sun { border-color: #f39c12; color: #f39c12; background-color: rgba(243, 156, 18, 0.05);}
        
        .row-tools { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-t { background: #eee; border: 1px solid var(--border-color); border-radius: 4px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; color: var(--text-muted); padding: 0;}
        .btn-t:hover { background: #ddd; }
        
        .action-bar { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0; font-size: 1.8rem;">📊 Verbrauchs-Master</h1>
        <a href="admin_landing.html" style="text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: bold;">← ZURÜCK</a>
    </div>

    <div id="mainList" style="display: flex; flex-direction: column; gap: 15px;"></div>

    <div class="action-bar">
        <button style="background-color: #ecf0f1; color: var(--text-main); border: 1px solid var(--border-color);" onclick="addRow()">➕ Neues Produkt</button>
        <button style="background-color: var(--btn-primary);" onclick="saveMaster()">💾 Master Speichern</button>
        <button style="background-color: var(--success-color);" onclick="generateDataFile()">⬇️ JS-Datei Generieren</button>
    </div>

</div>

<script id="db-data" type="application/json">
[
  { "id": "p1", "name": "Hasenpfoten", "needs": [14, 14, 14, 14, 16, 30, 23], "sun": 0, "unit": 0, "station": "Brötchenstraße", "batchSize": 12 },
  { "id": "p2", "name": "Laugenstangen", "needs": [23, 23, 23, 23, 24, 35, 28], "sun": 10, "unit": 0, "station": "Brötchenstraße", "batchSize": 1 },
  { "id": "p3", "name": "Rosinenbroetchen", "needs": [9, 10, 9, 10, 10, 14, 12], "sun": 0, "unit": 0, "station": "Brötchenstraße", "batchSize": 1 },
  { "id": "p4", "name": "Kaesebroetchen", "needs": [16, 16, 17, 17, 18, 23, 20], "sun": 5, "unit": 0, "station": "Brötchenstraße", "batchSize": 1 },
  { "id": "p5", "name": "SchokoBatzen", "needs": [25, 26, 27, 27, 28, 40, 28], "sun": 0, "unit": 0, "station": "Frühschicht", "batchSize": 1 },
  { "id": "p6", "name": "RosinenBatzen", "needs": [23, 23, 23, 23, 24, 35, 24], "sun": 0, "unit": 0, "station": "Frühschicht", "batchSize": 1 },
  { "id": "p7", "name": "Zimtwolken", "needs": [24, 24, 24, 24, 24, 24, 0], "sun": 0, "unit": 0, "station": "Brötchenstraße", "batchSize": 1 },
  { "id": "p14", "name": "Mohnschnecken", "needs": [10, 12, 10, 12, 10, 12, 0], "sun": 0, "unit": 0, "station": "Rondo", "batchSize": 1 },
  { "id": "p8", "name": "Schlawiner", "needs": [160, 160, 160, 170, 180, 300, 200], "sun": 0, "unit": 3, "station": "Nachtschicht", "batchSize": 1 },
  { "id": "p9", "name": "Kornknacker", "needs": [38, 39, 38, 40, 48, 59, 42], "sun": 0, "unit": 1, "station": "Nachtschicht", "batchSize": 1 },
  { "id": "p10", "name": "Hasenberger", "needs": [42, 45, 45, 45, 50, 69, 50], "sun": 0, "unit": 2, "station": "Nachtschicht", "batchSize": 1 },
  { "id": "p11", "name": "Plunderstreifen", "needs": [12, 12, 12, 12, 12, 12, 0], "sun": 0, "unit": 0, "station": "Rondo", "batchSize": 1 },
  { "id": "p12", "name": "Eiszapfen", "needs": [0, 14, 0, 14, 0, 13, 0], "sun": 0, "unit": 0, "station": "Rondo", "batchSize": 1 },
  { "id": "p13", "name": "Puddingbrezeln", "needs": [11, 0, 11, 0, 11, 0, 0], "sun": 0, "unit": 0, "station": "Rondo", "batchSize": 1 },
  { "id": "p1771487098374", "name": "Baguette (Bleche)", "needs": [11, 10, 10, 11, 12, 25, 11], "sun": 0, "unit": 0, "station": "Nachtschicht", "batchSize": 1 },
  { "id": "p1771567530004", "name": "Zwiebelbaguette (Bleche)", "needs": [1, 1, 2, 1, 2, 5, 1], "sun": 0, "unit": 0, "station": "Nachtschicht", "batchSize": 1 },
  { "id": "p1771567585845", "name": "Baguette (rote Diele)", "needs": [22, 22, 21, 22, 22, 25, 7], "sun": 0, "unit": 0, "station": "Nachtschicht", "batchSize": 1 },
  { "id": "p1771567637826", "name": "Zwiebelbaguette (rote Diele)", "needs": [7, 7, 8, 8, 7, 7, 3], "sun": 0, "unit": 0, "station": "Nachtschicht", "batchSize": 1 }
]
</script>

<script>
    let db = [];
    try { db = JSON.parse(document.getElementById('db-data').textContent); } catch(e) { alert("Fehler!"); }

    function render() {
        const container = document.getElementById('mainList'); container.innerHTML = '';
        db.forEach((item, idx) => {
            const card = document.createElement('div'); card.className = 'card';
            const units = ["Bleche", "Pressen (K)", "Pressen (H)", "Brühstücke"];
            
            let unitSel = `<select style="width: auto; margin-top: 0;" onchange="db[${idx}].unit=parseInt(this.value)">`;
            units.forEach((u, i) => unitSel += `<option value="${i}" ${item.unit===i?'selected':''}>${u}</option>`);
            unitSel += `</select>`;

            const stations = ["Brötchenstraße", "Nachtschicht", "Frühschicht", "Rondo", "Konditorei", "Versand"];
            let statSel = `<select style="width: auto; margin-top: 0; border-color: var(--btn-primary);" onchange="db[${idx}].station=this.value">`;
            stations.forEach(s => statSel += `<option value="${s}" ${item.station===s?'selected':''}>${s}</option>`);
            statSel += `</select>`;

            const batchVal = item.batchSize || 1;
            const batchInput = `
                <div class="inp-batch-wrap" title="Gebindegröße (z.B. 12er Blech)">
                    <span class="inp-batch-label">Gebinde</span>
                    <input type="number" class="inp-batch" min="1" value="${batchVal}" onchange="db[${idx}].batchSize=parseInt(this.value)||1">
                </div>
            `;

            let daysHtml = '';
            ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach((d, i) => {
                daysHtml += `<div class="day-col"><span class="day-lbl">${d}</span><input type="number" class="day-inp" value="${item.needs[i]}" onchange="db[${idx}].needs[${i}]=parseInt(this.value)||0"></div>`;
            });
            daysHtml += `<div class="day-col"><span class="day-lbl" style="color:#f39c12;">☀️</span><input type="number" class="day-inp inp-sun" value="${item.sun}" onchange="db[${idx}].sun=parseInt(this.value)||0"></div>`;

            card.innerHTML = `
                <div class="row-tools">
                    <button class="btn-t" onclick="move(${idx},-1)">▲</button>
                    <button class="btn-t" onclick="move(${idx},1)">▼</button>
                    <button class="btn-t" style="color:var(--alert-color); border-color:var(--alert-color);" onclick="del(${idx})">×</button>
                </div>
                <div class="card-top">
                    <input type="text" style="flex: 1; min-width: 150px; margin-top: 0;" value="${item.name}" onchange="db[${idx}].name=this.value">
                    ${batchInput}
                    ${unitSel}
                    ${statSel}
                </div>
                <div class="days-grid">${daysHtml}</div>`;
            container.appendChild(card);
        });
    }

    function move(idx, dir) { let t = idx + dir; if (t>=0 && t<db.length) { [db[idx], db[t]] = [db[t], db[idx]]; render(); } }
    function del(idx) { if(confirm("Löschen?")) { db.splice(idx,1); render(); } }
    function addRow() { db.push({id:'p'+Date.now(), name:"Neu", needs:[0,0,0,0,0,0,0], sun:0, unit:0, station:"Brötchenstraße", batchSize:1}); render(); }

    function saveMaster() {
        let root = document.documentElement.cloneNode(true);
        root.querySelector('#db-data').textContent = '\n' + JSON.stringify(db, null, 2) + '\n';
        root.querySelector('#mainList').innerHTML = ''; 
        let blob = new Blob(["<!DOCTYPE html>\n" + root.outerHTML], {type: "text/html;charset=utf-8"});
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "verbrauchsdaten_admin.html"; a.click();
    }

    function generateDataFile() {
        let exportObj = {};
        db.forEach(item => {
            exportObj[item.id] = { 
                name: item.name, needs: item.needs, sun: item.sun, unit: item.unit, station: item.station || "Brötchenstraße", batchSize: item.batchSize || 1 
            };
        });
        let blob = new Blob(["window.BOS_STAMMDATEN = " + JSON.stringify(exportObj, null, 2) + ";"], {type: "text/javascript;charset=utf-8"});
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "stammdaten.js"; a.click();
    }
    
    window.onload = render;
</script>
</body>
</html>
