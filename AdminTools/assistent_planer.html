<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BäckereiOS - Assistenten Planer</title>
    <link rel="stylesheet" href="admin_design.css">
    
    <script src="assistent_plan.js"></script>
    
    <style>
        .tool-card { border-left: 4px solid var(--btn-primary); position: relative; padding-top: 25px; margin-bottom: 15px; }
        .control-row { position: absolute; top: 10px; right: 10px; display: flex; gap: 15px; }
        .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); padding: 0; }
        .btn-icon:hover { color: var(--text-main); }
        .btn-icon.delete:hover { color: var(--alert-color); }
        
        .day-grid { display: flex; gap: 4px; overflow-x: auto; margin-top: 10px; padding-bottom: 5px;}
        .day-btn { 
            flex: 1; min-width: 40px; padding: 10px 4px; border: 1px solid var(--border-color); 
            background: #f8fafc; border-radius: 8px; font-size: 0.8rem; font-weight: 700; 
            color: var(--text-muted); cursor: pointer; text-align: center; transition: 0.2s;
        }
        .day-btn.active { background: var(--success-color); color: white; border-color: var(--success-color); box-shadow: 0 2px 5px rgba(16,185,129,0.3);}
        
        .btn-add { background: #f8fafc; color: var(--text-main); border: 2px dashed #cbd5e1; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 1rem; width: 100%; cursor: pointer; margin-bottom: 30px; }
        .btn-export { background-color: var(--success-color); font-size: 1.1rem; padding: 16px; margin-bottom: 40px; box-shadow: 0 4px 12px rgba(16,185,129,0.2); }
        
        input.tool-input { margin-top: 2px; margin-bottom: 10px; font-weight: bold; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h1 style="margin: 0; font-size: 1.5rem; font-weight: 800;">⚙️ Assistenten Planer</h1>
        <a href="admin_landing.html" style="text-decoration: none; color: var(--text-muted); font-size: 0.8rem; font-weight: bold; padding: 5px 10px; border-radius: 6px; background: #fff; border: 1px solid var(--border-color);">Zurück</a>
    </div>

    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0; margin-bottom: 20px;">
        Konfiguriere hier deinen Tages-Assistenten. Aktiviere die Wochentage, an denen das Werkzeug im Ablauf erscheinen soll.
    </p>

    <div id="plan-container"></div>

    <button class="btn-add" onclick="addNewTool()">➕ NEUES WERKZEUG HINZUFÜGEN</button>

    <div class="card" style="background-color: #f8fafc; border: 1px dashed var(--border-color); box-shadow: none;">
        <h3 style="margin-top: 0; font-size: 1.1rem; color: var(--text-main);">💾 Plan Speichern</h3>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Sichere den Plan und lade die generierte Datei anschließend auf den Server hoch.</p>
        <button class="btn-export" onclick="exportPlan()">DOWNLOAD ASSISTENT_PLAN.JS</button>
    </div>
</div>

<script>
    // Lädt die bestehenden Daten oder erstellt einen leeren Plan
    let planData = window.BOS_ASSISTENT_PLAN || [];
    const tageKeys = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
    const tageKurz = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];

    function renderPlan() {
        const container = document.getElementById('plan-container');
        container.innerHTML = '';

        planData.forEach((tool, index) => {
            const card = document.createElement('div');
            card.className = 'card tool-card';

            // Buttons für Wochentage generieren
            let daysHtml = '';
            tageKeys.forEach((tag, tIndex) => {
                const isActive = tool.tage[tag] ? 'active' : '';
                daysHtml += `<button class="day-btn ${isActive}" onclick="toggleDay(${index}, '${tag}')">${tageKurz[tIndex]}</button>`;
            });

            card.innerHTML = `
                <div class="control-row">
                    <button class="btn-icon" onclick="moveUp(${index})" title="Nach oben" ${index === 0 ? 'style="opacity:0.3; pointer-events:none;"' : ''}>⬆️</button>
                    <button class="btn-icon" onclick="moveDown(${index})" title="Nach unten" ${index === planData.length - 1 ? 'style="opacity:0.3; pointer-events:none;"' : ''}>⬇️</button>
                    <button class="btn-icon delete" onclick="deleteTool(${index})" title="Löschen" style="margin-left: 10px;">🗑️</button>
                </div>

                <label>Anzeige-Name im Assistenten</label>
                <input type="text" class="tool-input" value="${tool.titel}" onchange="updateField(${index}, 'titel', this.value)" placeholder="z.B. Inventur">

                <label>Dateiname (muss im selben Ordner liegen)</label>
                <input type="text" class="tool-input" value="${tool.datei}" onchange="updateField(${index}, 'datei', this.value)" placeholder="z.B. inventur.html">

                <label style="margin-top: 10px;">Aktiv an folgenden Tagen:</label>
                <div class="day-grid">
                    ${daysHtml}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleDay(toolIndex, tag) {
        planData[toolIndex].tage[tag] = !planData[toolIndex].tage[tag];
        renderPlan();
    }

    function updateField(index, field, value) {
        planData[index][field] = value;
    }

    function moveUp(index) {
        if (index > 0) {
            const temp = planData[index - 1];
            planData[index - 1] = planData[index];
            planData[index] = temp;
            renderPlan();
        }
    }

    function moveDown(index) {
        if (index < planData.length - 1) {
            const temp = planData[index + 1];
            planData[index + 1] = planData[index];
            planData[index] = temp;
            renderPlan();
        }
    }

    function deleteTool(index) {
        if(confirm("Dieses Werkzeug wirklich aus dem Plan löschen?")) {
            planData.splice(index, 1);
            renderPlan();
        }
    }

    function addNewTool() {
        planData.push({
            titel: "Neues Werkzeug",
            datei: "neue_datei.html",
            tage: { Montag: false, Dienstag: false, Mittwoch: false, Donnerstag: false, Freitag: false, Samstag: false, Sonntag: false }
        });
        renderPlan();
        // Scrollt automatisch nach unten zum neuen Eintrag
        window.scrollTo(0, document.body.scrollHeight);
    }

    function exportPlan() {
        const jsCode = `/* =========================================================\n   BÄCKEREIOS - TAGES-ASSISTENT KONFIGURATION\n   Generiert am: ${new Date().toLocaleString('de-DE')}\n   ========================================================= */\n\nwindow.BOS_ASSISTENT_PLAN = ${JSON.stringify(planData, null, 4)};`;
        
        const blob = new Blob([jsCode], { type: "text/javascript" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "assistent_plan.js";
        a.click();
    }

    window.onload = renderPlan;
</script>
</body>
</html>
