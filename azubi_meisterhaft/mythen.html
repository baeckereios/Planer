<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythen & Legenden | Bäckerei OS</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <style>
        .myth-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .myth-card {
            background: var(--surface); border: 2px solid var(--border); border-radius: 20px;
            padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100%;
            transition: 0.2s; box-shadow: 0 5px 15px var(--shadow);
        }
        .myth-card:hover { border-color: var(--amber); transform: translateY(-3px); }

        .m-header {
            background: linear-gradient(135deg, #4a2c5a, #2c1a35); /* Mystisches Lila */
            padding: 20px; color: white; border-bottom: 2px solid var(--border-s);
        }
        .m-icon { font-size: 2rem; display: block; margin-bottom: 5px; }
        .m-title { font-family: 'Fraunces', serif; font-size: 1.4rem; margin: 0; line-height: 1.2; }

        .m-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .myth-box {
            background: rgba(231, 76, 60, 0.08); border-left: 3px solid #e74c3c;
            padding: 12px; margin-bottom: 15px; border-radius: 0 8px 8px 0;
        }
        .truth-box {
            background: rgba(39, 174, 96, 0.08); border-left: 3px solid #27ae60;
            padding: 12px; margin-bottom: 20px; border-radius: 0 8px 8px 0;
        }
        
        .label-mini { font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem; margin-bottom: 5px; display: block; }
        .text-content { font-size: 0.95rem; line-height: 1.5; opacity: 0.9; }

        /* Truth Meter */
        .meter-container { margin-top: auto; background: var(--surface2); padding: 12px; border-radius: 12px; }
        .meter-bar-bg { height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .meter-bar-fill { height: 100%; border-radius: 3px; }
        .meter-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

        .nav-back { margin-bottom: 20px; }
        .nav-back a { text-decoration: none; color: var(--dim); font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; padding: 10px; border: 1px solid var(--border); border-radius: 8px; display: inline-block; background: var(--surface); transition: 0.2s; }
        .nav-back a:hover { border-color: var(--amber); color: var(--amber); }
    </style>
</head>
<body>

    <header class="brand-header">
        <div class="brand-logo">BÄCKEREI<span>OS</span></div>
        <div class="slogan-bar">Mythen-Jäger</div>
    </header>

    <div style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
        
        <div class="nav-back"><a href="wissen_start.html">← ZURÜCK ZUM HUB</a></div>

        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-family: 'Fraunces', serif; font-size: 2.5rem; margin-bottom: 10px;">Glaube nicht alles,<br>was erzählt wird.</h1>
            <p style="color: var(--dim); max-width: 600px; margin: 0 auto;">Viele "alte Traditionen" sind jünger als dein Smartphone. Hier trennen wir Marketing von Geschichte.</p>
        </div>

        <div class="myth-grid" id="mythContainer"></div>

    </div>

    <script>
        const myths = [
            {
                title: "Der Ciabatta-Schwindel",
                icon: "🇮🇹",
                mythos: "Ein uraltes römisches Landbrot, das schon Cäsar aß.",
                wahrheit: "Es wurde erst 1982 erfunden! Arnaldo Cavallari entwickelte es als Marketing-Antwort auf das französische Baguette. Es ist ein reines Industrieprodukt der 80er.",
                truth: 0,
                verdict: "MARKETING-ERFINDUNG"
            },
            {
                title: "Marie Antoinette",
                icon: "🍰",
                mythos: "'Wenn sie kein Brot haben, sollen sie doch Kuchen essen!'",
                wahrheit: "Sie hat das nie gesagt. Der Satz stammt von Jean-Jacques Rousseau und wurde ihr von Revolutionären angedichtet, um Hass zu schüren. Fake News 1789.",
                truth: 0,
                verdict: "HISTORISCHE LÜGE"
            },
            {
                title: "German Chocolate Cake",
                icon: "🍫",
                mythos: "Ein traditioneller deutscher Schokoladenkuchen.",
                wahrheit: "Hat nichts mit Deutschland zu tun. Er ist benannt nach dem Amerikaner Sam German, der 1852 eine Schokolade für die Firma Baker's entwickelte.",
                truth: 0,
                verdict: "NAMENS-ZUFALL"
            },
            {
                title: "Tiramisu-Legende",
                icon: "☕",
                mythos: "Ein Renaissance-Dessert der Medici in Florenz.",
                wahrheit: "Es gibt keine Quelle vor den 1960er Jahren! Vermutlich entstanden im Restaurant 'Le Beccherie' in Treviso als Resteverwertung. Ein moderner Klassiker.",
                truth: 10,
                verdict: "MODERNES REZEPT"
            },
            {
                title: "Der 'Amerikaner'",
                icon: "🇺🇸",
                mythos: "GIs brachten das Gebäck 1945 nach Deutschland.",
                wahrheit: "Wahrscheinlicher ist die Verballhornung von 'Ammoniakaner'. Früher nutzte man Hirschhornsalz (Ammoniumcarbonat) als Triebmittel. Der Name war zu kompliziert für den Volksmund.",
                truth: 20,
                verdict: "CHEMISCHES MISSVERSTÄNDNIS"
            },
            {
                title: "Dunkles Brot = Vollkorn",
                icon: "🍞",
                mythos: "Je dunkler das Brot, desto gesünder und vollkörniger.",
                wahrheit: "Oft ist es nur Färbemalz (geröstetes Getreide) oder Zuckercouleur. Echtes Vollkorn kann hell sein. Braun wird genutzt, weil Kunden es für gesünder halten.",
                truth: 10,
                verdict: "OPTISCHE TÄUSCHUNG"
            },
            {
                title: "Berliner & Kanonen",
                icon: "💣",
                mythos: "Ein Feldbäcker 1756 formte Teig wie Kanonenkugeln.",
                wahrheit: "Siedegebäck in Fett gab es schon im Mittelalter (Schmalzgebäck). Die Kugelform ist physikalisch einfach am besten für schwimmendes Fett geeignet.",
                truth: 5,
                verdict: "NETTE GESCHICHTE"
            },
            {
                title: "Spaghetti-Eis",
                icon: "🍝",
                mythos: "Ein italienischer Klassiker aus Rom oder Neapel.",
                wahrheit: "Erfunden 1969 in Mannheim! Dario Fontanella drückte Vanilleeis durch eine Spätzlepresse. In Italien kennt man das Gericht kaum.",
                truth: 0,
                verdict: "MADE IN MANNHEIM"
            },
            {
                title: "Napoleon & Baguette",
                icon: "👖",
                mythos: "Das Brot ist lang, damit es in die Hosenbeine der Soldaten passte.",
                wahrheit: "Hygienisch und praktisch völliger Unsinn (es würde zerbröseln). Die Form dient der kürzeren Backzeit und dem Krustenanteil.",
                truth: 0,
                verdict: "MILITÄRISCH SINNLOS"
            },
            {
                title: "Glückskekse",
                icon: "🥠",
                mythos: "Eine alte chinesische Tradition.",
                wahrheit: "Erfunden in Kalifornien (USA) um 1900, wahrscheinlich von japanischen Einwanderern. In China serviert man Obst zum Nachtisch, keine Kekse mit Zetteln.",
                truth: 0,
                verdict: "US-ERFINDUNG"
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('mythContainer');
            
            myths.forEach(item => {
                // Farbe basierend auf Wahrheit (meistens rot)
                let color = '#e74c3c'; // Rot
                if(item.truth > 30) color = '#f1c40f'; // Gelb
                if(item.truth > 70) color = '#27ae60'; // Grün

                container.innerHTML += `
                    <div class="myth-card">
                        <div class="m-header">
                            <span class="m-icon">${item.icon}</span>
                            <h3 class="m-title">${item.title}</h3>
                        </div>
                        <div class="m-body">
                            <div class="myth-box">
                                <span class="label-mini" style="color:#c0392b">Der Mythos</span>
                                <div class="text-content">${item.mythos}</div>
                            </div>
                            <div class="truth-box">
                                <span class="label-mini" style="color:#27ae60">Die Wahrheit</span>
                                <div class="text-content">${item.wahrheit}</div>
                            </div>
                            
                            <div class="meter-container">
                                <div class="meter-label">
                                    <span>Wahrheitsgehalt</span>
                                    <span style="color:${color}">${item.verdict} (${item.truth}%)</span>
                                </div>
                                <div class="meter-bar-bg">
                                    <div class="meter-bar-fill" style="width:${item.truth}%; background:${color}; min-width: 4px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
  <script src="../shell.js"></script>
</body>
</html>
