<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronik</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <style>
        .timeline-wrapper { position: relative; padding-left: 30px; margin-bottom: 50px; }
        .timeline-line { position: absolute; left: 10px; top: 0; bottom: 0; width: 4px; background: var(--border-s); }
        
        .history-card {
            background: var(--surface); border: 2px solid var(--border); border-radius: 0 20px 20px 20px;
            padding: 25px; margin-bottom: 30px; position: relative; box-shadow: 0 5px 15px var(--shadow);
        }
        .history-card::before {
            content: ''; position: absolute; left: -36px; top: 20px; width: 16px; height: 16px; 
            background: var(--amber); border: 4px solid var(--bg); border-radius: 50%; z-index: 2;
        }

        .era-label { font-family: 'Barlow Condensed'; font-weight: 900; font-size: 1.2rem; color: var(--amber); text-transform: uppercase; }
        .hist-title { font-family: 'Fraunces', serif; font-size: 1.8rem; margin: 5px 0 10px; line-height: 1.1; }
        
        /* WAHRHEITS-METER */
        .truth-meter-container { margin-top: 15px; background: var(--surface2); padding: 10px; border-radius: 8px; }
        .truth-bar-bg { height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .truth-bar-fill { height: 100%; width: 0%; transition: width 1s; }
        .truth-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }
        
        .nav-back { margin-bottom: 15px; }
        .nav-back a { text-decoration: none; color: var(--dim); font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header class="brand-header">
        <div class="brand-logo">BÄCKEREI<span>OS</span></div>
        <div class="slogan-bar">Die Chronik der Kruste</div>
    </header>

    <div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
        <div class="nav-back"><a href="wissen_start.html">← Zurück zum Hub</a></div>
        
        <div class="timeline-wrapper">
            <div class="timeline-line"></div>
            <div id="historyContainer"></div>
        </div>
    </div>

    <script src="history.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hCont = document.getElementById('historyContainer');
            if (typeof historyData !== 'undefined') {
                
                // Manuelles sortieren (nur zur Sicherheit, falls Array nicht sortiert ist)
                // Wir gehen davon aus, dass historyData jetzt grob sortiert ist in der Datei.
                
                historyData.forEach(item => {
                    // Farbe für Wahrheit: Rot (0-30), Gelb (31-70), Grün (71-100)
                    let color = '#e74c3c';
                    let text = 'MYTHOS';
                    if(item.wahrheitsGrad > 30) { color = '#f1c40f'; text = 'UMSTRITTEN'; }
                    if(item.wahrheitsGrad > 70) { color = '#27ae60'; text = 'HISTORISCH BELEGT'; }

                    hCont.innerHTML += `
                        <div class="history-card">
                            <div class="era-label">${item.image} ${item.era}</div>
                            <h2 class="hist-title">${item.headline}</h2>
                            <p>${item.story}</p>
                            
                            <div class="truth-meter-container">
                                <div class="truth-label">
                                    <span>Wahrheitsgehalt</span>
                                    <span style="color:${color}">${text}</span>
                                </div>
                                <div class="truth-bar-bg">
                                    <div class="truth-bar-fill" style="width:${item.wahrheitsGrad}%; background:${color}"></div>
                                </div>
                                <div style="font-size:0.7rem; margin-top:5px; opacity:0.6;">Quelle: ${item.quelle}</div>
                            </div>
                        </div>
                    `;
                });
            }
        });
    </script>
  <script src="../shell.js"></script>
</body>
</html>
