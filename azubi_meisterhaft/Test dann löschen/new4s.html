<!DOCTYPE html>
<html lang="de" data-theme="light"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Ticker</title>
    <link rel="stylesheet" href="systemdesign.css">
    <style>
        .news-filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        
        .pill {
            background: var(--surface); border: 2px solid var(--border-s); border-radius: 20px;
            padding: 8px 16px; font-family: 'Barlow Condensed'; font-weight: 800; color: var(--dim);
            cursor: pointer; text-transform: uppercase;
        }
        .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); } /* Schwarz/Weiß Kontrast für News */

        .news-card {
            background: var(--surface); border: 2px solid var(--border); border-radius: 20px;
            overflow: hidden; margin-bottom: 25px; transition: 0.2s;
        }
        .nc-stripe { height: 8px; width: 100%; }
        
        .nc-content { padding: 25px; }
        .nc-headline { font-family: 'Fraunces', serif; font-size: 1.8rem; margin: 0 0 10px; line-height: 1.1; color: var(--text); }
        .nc-teaser { font-size: 1.1rem; color: var(--text); opacity: 0.8; line-height: 1.5; }
        
        .btn-expand {
            width: 100%; padding: 15px; background: var(--surface2); border: none; border-top: 2px solid var(--border);
            color: var(--text); font-family: 'Barlow Condensed'; font-weight: 900; text-transform: uppercase; cursor: pointer;
        }
        .badge-hot { background: #c94a4a; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight:bold; }
        
        .nav-back { margin-bottom: 15px; }
        .nav-back a { text-decoration: none; color: var(--dim); font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header class="brand-header">
        <div class="brand-logo">BÄCKEREI<span>OS</span></div>
        <div class="slogan-bar">News Ticker 2026</div>
    </header>

    <div style="max-width: 700px; margin: 30px auto; padding: 0 20px;">
        <div class="nav-back"><a href="wissen_start.html">← Zurück zum Hub</a></div>

        <div class="news-filter-bar" id="filterContainer">
            <button class="pill active" onclick="filterNews('all')" data-filter="all">ALLE</button>
        </div>
        <div id="newsGrid"></div>
    </div>

    <script src="news.js"></script>
    <script>
        // ... (Identischer JS Code wie vorher, aber renderNews nutzt die neuen CSS Klassen)
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('newsGrid');
            const filterContainer = document.getElementById('filterContainer');
            if (typeof newsData === 'undefined') return;

            const categories = [...new Set(newsData.map(item => item.category))];
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'pill';
                btn.innerText = cat.toUpperCase();
                btn.dataset.filter = cat;
                btn.onclick = () => filterNews(cat);
                filterContainer.appendChild(btn);
            });

            renderNews(newsData);

            window.filterNews = function(cat) {
                document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
                const btn = document.querySelector(`[data-filter="${cat}"]`);
                if(btn) btn.classList.add('active');
                if(cat === 'all') renderNews(newsData);
                else renderNews(newsData.filter(item => item.category === cat));
            }

            function renderNews(data) {
                grid.innerHTML = '';
                data.forEach(item => {
                    const color = item.category === 'Trends' ? '#e74c3c' : (item.category === 'Technologie' ? '#3498db' : '#f1c40f');
                    const hotBadge = item.hot ? '<span class="badge-hot">HOT</span>' : '';
                    
                    const html = `
                        <div class="news-card">
                            <div class="nc-stripe" style="background:${color}"></div>
                            <div class="nc-content">
                                <div style="font-family:'Barlow Condensed'; color:var(--dim); font-weight:800; margin-bottom:5px; text-transform:uppercase; font-size:0.8rem;">
                                    ${hotBadge} ${item.category} • ${new Date(item.date).toLocaleDateString('de-DE')}
                                </div>
                                <h3 class="nc-headline">${item.headline}</h3>
                                <div class="nc-teaser">${item.teaser}</div>
                                <div style="display:none; margin-top:15px; font-size:1rem; line-height:1.6;" id="content-${item.id}">${item.content}</div>
                            </div>
                            <button class="btn-expand" onclick="toggleNews(${item.id}, this)">ARTIKEL LESEN ⇩</button>
                        </div>`;
                    grid.innerHTML += html;
                });
            }
            window.toggleNews = function(id, btn) {
                const el = document.getElementById(`content-${id}`);
                if (el.style.display === 'block') { el.style.display = 'none'; btn.innerText = 'ARTIKEL LESEN ⇩'; } 
                else { el.style.display = 'block'; btn.innerText = 'SCHLIESSEN ⇧'; }
            }
        });
    </script>
  <script src="../shell.js"></script>
</body>
</html>
