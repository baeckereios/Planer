<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meister-Wissen</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <style>
        .search-container { margin-bottom: 25px; }
        .search-input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 2px solid var(--border-s); background: var(--surface);
            font-family: 'Barlow', sans-serif; font-size: 1.1rem; color: var(--text);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); outline: none; transition: 0.2s;
        }
        .search-input:focus { border-color: var(--amber); }

        /* REPARIERTES FILTER DESIGN */
        .filter-wrapper {
            display: flex;
            flex-wrap: wrap; /* WICHTIG: Erlaubt Umbruch */
            gap: 10px;
            margin-bottom: 25px;
            justify-content: flex-start;
        }
        
        .filter-btn {
            background: var(--surface);
            border: 2px solid var(--border-s);
            border-radius: 12px;
            padding: 12px 18px; /* Größere Klickfläche */
            font-family: 'Barlow Condensed';
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--dim);
            flex: 1 1 auto; /* Tasten wachsen automatisch */
            text-align: center;
            min-width: 80px;
        }
        
        .filter-btn.active {
            background: var(--amber);
            border-color: var(--amber);
            color: white;
            box-shadow: 0 4px 10px rgba(192, 122, 16, 0.3);
        }

        .knowledge-card {
            background: var(--surface); border: 2px solid var(--border); border-radius: 20px;
            padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px var(--shadow);
            transition: 0.2s;
        }
        .k-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 2px dashed var(--border-s); padding-bottom: 10px; }
        .k-icon { font-size: 1.5rem; background: var(--surface2); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .k-title { font-family: 'Fraunces', serif; font-size: 1.5rem; margin: 0 0 10px; color: var(--text); line-height: 1.2; }
        .k-body { font-size: 1rem; line-height: 1.6; color: var(--text); opacity: 0.9; }

        .nav-back { margin-bottom: 15px; }
        .nav-back a { text-decoration: none; color: var(--dim); font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header class="brand-header">
        <div class="brand-logo">BÄCKEREI<span>OS</span></div>
        <div class="slogan-bar">Meister-Wissen</div>
    </header>

    <div style="max-width: 800px; margin: 30px auto; padding: 0 20px;">
        <div class="nav-back"><a href="wissen_start.html">← Zurück zum Hub</a></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Suchbegriff (z.B. Sauerteig)...">
        </div>

        <div class="filter-wrapper" id="filterContainer">
            <button class="filter-btn active" data-filter="all" onclick="filterContent('all')">ALLE THEMEN</button>
        </div>

        <div id="contentArea"></div>
    </div>

    <script src="wissen.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('contentArea');
            const searchInput = document.getElementById('searchInput');
            const filterContainer = document.getElementById('filterContainer');

            if (typeof azubiWissen === 'undefined') return;

            // Buttons erstellen
            const categories = [...new Set(azubiWissen.map(item => item.kategorie))];
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = cat.toUpperCase();
                btn.dataset.filter = cat;
                btn.onclick = () => filterContent(cat);
                filterContainer.appendChild(btn);
            });

            renderCards(getAllEntries());

            // Suchfunktion
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = getAllEntries().filter(entry => 
                    entry.titel.toLowerCase().includes(term) || 
                    entry.inhalt.toLowerCase().includes(term)
                );
                renderCards(filtered);
            });

            // Globale Filter Funktion
            window.filterContent = function(category) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`[data-filter="${category}"]`);
                if(activeBtn) activeBtn.classList.add('active');

                let data = getAllEntries();
                if (category !== 'all') {
                    data = data.filter(item => item.kategorieName === category);
                }
                renderCards(data);
            }

            function getAllEntries() {
                let all = [];
                azubiWissen.forEach(catBlock => {
                    catBlock.eintraege.forEach(entry => {
                        all.push({ ...entry, kategorieName: catBlock.kategorie, icon: catBlock.icon });
                    });
                });
                return all;
            }

            function renderCards(data) {
                contentArea.innerHTML = '';
                if (data.length === 0) { contentArea.innerHTML = 'Keine Treffer.'; return; }
                data.forEach(item => {
                     const html = `
                        <div class="knowledge-card">
                            <div class="k-header">
                                <div class="k-icon">${item.icon}</div>
                                <div style="font-family:'Barlow Condensed'; font-weight:800; text-transform:uppercase; color:var(--dim);">${item.kategorieName}</div>
                            </div>
                            <div class="k-title">${item.titel}</div>
                            <div class="k-body">${item.inhalt}</div>
                            ${item.proTipp ? `<div style="margin-top:15px; background:var(--amber-light); padding:10px; border-radius:8px; border-left:3px solid var(--amber); font-size:0.9rem;">💡 <b>Profi-Tipp:</b> ${item.proTipp}</div>` : ''}
                        </div>`;
                    contentArea.innerHTML += html;
                });
            }
        });
    </script>
  <script src="../shell.js"></script>
</body>
</html>
