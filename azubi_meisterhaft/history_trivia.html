<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronik & Trivia | Bäckerei OS</title>
    <link rel="stylesheet" href="systemdesign.css">
    <style>
        .timeline-wrapper { position: relative; padding-left: 30px; margin-bottom: 50px; }
        .timeline-line { position: absolute; left: 10px; top: 0; bottom: 0; width: 4px; background: var(--border-s); }
        
        .history-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 0 20px 20px 20px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 5px 15px var(--shadow);
        }
        
        .history-card::before {
            content: ''; position: absolute; left: -36px; top: 20px;
            width: 16px; height: 16px; background: var(--amber);
            border: 4px solid var(--bg); border-radius: 50%; z-index: 2;
        }

        .era-label { font-family: 'Barlow Condensed'; font-weight: 900; font-size: 1.2rem; color: var(--amber); text-transform: uppercase; margin-bottom: 5px; }
        .hist-title { font-family: 'Fraunces', serif; font-size: 1.8rem; margin: 5px 0 10px; line-height: 1.1; }
        .hist-text { font-family: 'Barlow', sans-serif; font-size: 1rem; line-height: 1.6; color: var(--text); opacity: 0.9; }

        .trivia-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .trivia-card {
            background: var(--surface); border: 2px solid var(--border); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; height: 100%;
            transition: 0.2s;
        }
        .trivia-card:hover { border-color: var(--amber); transform: translateY(-3px); }

        .trivia-cat { font-family: 'Barlow Condensed'; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem; margin-bottom: 10px; }
        .trivia-q { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; line-height: 1.3; }
        .trivia-a { color: var(--amber); font-weight: 900; font-family: 'Barlow Condensed'; font-size: 1.2rem; margin-bottom: 10px; }
        .trivia-fact { font-size: 0.85rem; background: var(--surface2); padding: 10px; border-radius: 10px; margin-top: auto; border-left: 3px solid var(--amber); }

        .nav-back { margin-bottom: 15px; }
        .nav-back a { text-decoration: none; color: var(--dim); font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="brand-header">
        <div class="brand-logo">BÄCKEREI<span>OS</span></div>
        <div class="slogan-bar">Chronik & Pause</div>
    </header>

    <div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
        
        <div class="nav-back">
            <a href="wissen_start.html">← Zurück zum Hub</a>
        </div>

        <div class="label">Die Chronik der Kruste</div>
        <div class="timeline-wrapper">
            <div class="timeline-line"></div>
            <div id="historyContainer"></div>
        </div>

        <hr style="border:0; border-top: 2px dashed var(--border); margin: 50px 0;">

        <div class="label">5-Minuten Pause</div>
        <div class="trivia-grid" id="triviaContainer"></div>

    </div>

    <script src="history.js"></script>
    <script src="trivia.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hCont = document.getElementById('historyContainer');
            const tCont = document.getElementById('triviaContainer');

            if (typeof historyData !== 'undefined') {
                historyData.forEach(item => {
                    hCont.innerHTML += `
                        <div class="history-card">
                            <div class="era-label">${item.image} ${item.era}</div>
                            <h2 class="hist-title">${item.headline}</h2>
                            <p class="hist-text">${item.story}</p>
                            <div style="margin-top:15px; font-size:0.7rem; color:var(--dim); text-transform:uppercase;">Quelle: ${item.quelle}</div>
                        </div>
                    `;
                });
            }

            if (typeof triviaData !== 'undefined') {
                triviaData.forEach(item => {
                    tCont.innerHTML += `
                        <div class="trivia-card">
                            <div class="trivia-cat">${item.icon} ${item.kategorie}</div>
                            <div class="trivia-q">${item.frage}</div>
                            <div class="trivia-a">➜ ${item.antwort}</div>
                            <p style="font-size:0.9rem; margin-bottom:15px;">${item.story}</p>
                            <div class="trivia-fact">FUN FACT: ${item.funFact}</div>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
