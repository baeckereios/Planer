<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosterliste – Smart Scale</title>
    <link rel="stylesheet" href="../systemdesign.css">
<style>
/* ── SCREEN LAYOUT (Wie gehabt) ── */
body { background: var(--bg-main, #f0ebe2); padding-top: 45px; padding-bottom: 85px; font-family: 'Barlow', sans-serif; }
.controls { display: flex; gap: 8px; justify-content: center; padding: 8px; position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ccc; }
.btn-tool { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; text-transform: uppercase; }
.btn-save { background: #16a34a; color: #fff; }
.btn-add  { background: #2563eb; color: #fff; }
.btn-rem  { background: #dc2626; color: #fff; }
.btn-prt  { background: #444; color: #fff; }

.page { background: #fff; width: 210mm; margin: 0 auto; padding: 5mm 8mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
.page-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid var(--amber, #c07a10); margin-bottom: 3mm; }
.header-title { font-size: 22pt; font-weight: 800; font-family: 'Barlow Condensed'; margin: 0; }
.header-title span { color: var(--amber, #c07a10); }

table { width: 100%; border-collapse: collapse; font-size: 9pt; }
th { background: #1a1a1a; color: #fff; padding: 4px; border: 1px solid #000; text-transform: uppercase; }
td { border: 1px solid #ccc; height: 26px; padding: 0 4px; }
.sep-r { border-right: 3.5px solid #000 !important; }

tbody tr:nth-child(even) td { background-color: #f9f9f9; }
tbody tr:nth-child(even) td.no-sunday { background-color: #e5e5e5; }

input.product-input, select.location-select { width: 100%; height: 100%; border: none; background: transparent; font-family: inherit; font-size: 10pt; font-weight: 700; outline: none; }
select.location-select { font-size: 8pt; text-align: center; font-weight: 700; color: var(--amber, #c07a10); cursor: pointer; }
.no-sunday { background: #f0f0f0 !important; }

/* ── PRINT: SMART SCALING ── */
@media print {
    @page { margin: 4mm; }
    
    /* Zwingt den Body, exakt den sichtbaren Bereich zu nutzen, Überlauf wird gnadenlos gekappt */
    html, body { height: 100%; margin: 0 !important; padding: 0 !important; overflow: hidden; background: #fff !important; filter: grayscale(100%); }
    .no-print, .controls, .bos-shell-header, .bos-shell-bottom { display: none !important; }
    
    /* Flex-Container, der exakt 98% der Druckseite einnimmt */
    .page { 
        display: flex !important; 
        flex-direction: column !important; 
        width: 100% !important; 
        height: 98vh !important; 
        margin: 0 !important; 
        padding: 0 !important; 
        box-shadow: none !important; 
        border: none !important; 
    }
    
    /* Header nimmt festen Platz oben ein */
    .page-header { flex-shrink: 0; border-bottom: 3px solid #000 !important; margin-bottom: 1.5mm !important; }
    .header-title { font-size: 20pt !important; }
    .header-title span { color: #000; }
    
    /* Die Tabelle "saugt" den restlichen Platz auf */
    table { flex-grow: 1 !important; display: table; width: 100%; border-collapse: collapse; }
    th { background: #333 !important; color: #fff !important; padding: 3px !important; font-size: 8pt !important; -webkit-print-color-adjust: exact; }
    
    /* Die Höhe der Zellen regelt der Browser jetzt selbst, passend zum Papier! */
    td { border: 1px solid #999 !important; padding: 0 4px !important; height: auto !important; }
    
    tbody tr:nth-child(even) td { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
    .no-sunday { background: #ddd !important; -webkit-print-color-adjust: exact; }
    
    input.product-input { color: #000; border: none !important; font-size: 10pt !important; font-weight: 700 !important; }
    select.location-select { appearance: none; -webkit-appearance: none; color: #000; font-weight: 700; font-size: 8pt !important; }
    
    /* Notizen nehmen festen Platz unten ein */
    .notes-container { flex-shrink: 0; margin-top: 3px !important; }
    .notes-label { font-size: 8pt !important; border-bottom: 1px solid #000 !important; }
    .notes-area { height: 40px !important; font-size: 9pt !important; }
}
</style>
</head>
<body>

<div class="controls no-print">
    <button class="btn-tool btn-save" onclick="saveConfig()">💾 Speichern</button>
    <button class="btn-tool btn-add"  onclick="addRow()">➕ Zeile</button>
    <button class="btn-tool btn-rem"  onclick="removeRow()">➖ Löschen</button>
    <button class="btn-tool btn-prt"  onclick="window.print()">🖨 Drucken</button>
</div>

<div class="page">
    <div class="page-header">
        <div class="header-title">Froster<span>liste</span></div>
        <div style="text-align: right; font-family: 'Barlow Condensed';">
            <div style="font-size: 8pt; font-weight: 700;">DATUM:</div>
            <div contenteditable="true" style="font-size: 11pt; font-weight: 800; border-bottom: 1px solid #000; min-width: 80px;">___ . ___ . 20___</div>
        </div>
    </div>

    <table id="productTable">
        <thead>
            <tr>
                <th colspan="2">Produkt (Wählen oder Tippen)</th>
                <th rowspan="2" style="width:9%">Bestand</th>
                <th rowspan="2" style="width:9%" class="sep-r">Zuviel</th>
                <th rowspan="2" style="width:9%" class="sep-r">Soll</th>
                <th rowspan="2" style="width:9%">Fehlt</th>
                <th rowspan="2">Wohin</th>
            </tr>
            <tr>
                <th style="background: var(--amber, #444); font-size: 7pt;">Mo-Sa</th>
                <th style="background: var(--amber, #444); font-size: 7pt;">Sonntag</th>
            </tr>
        </thead>
        <tbody id="tabellenBody"></tbody>
    </table>

    <div class="notes-container">
        <div class="notes-label" style="font-family: 'Barlow Condensed'; font-weight: 800;">NOTIZEN / SONDERBESTELLUNGEN</div>
        <div class="notes-area" contenteditable="true"></div>
    </div>
</div>

<datalist id="productList"></datalist>

<script src="../produktions_gehirn.js"></script>
<script src="../frosterliste_produkte.js"></script>

<script>
let ALL_PRODUCT_NAMES = [];
const LOCATIONS = ["", "Koma 7", "Schrippen-Koma", "Froster", "Kühlung"];

(async function init() {
    const ok = await window.BOS_GEHIRN.init();
    if (ok) {
        const dbProducts = Object.entries(window.BOS_STAMMDATEN)
            .filter(([id, p]) => p.frosterliste !== false)
            .map(([id, p]) => p.name || id)
            .sort((a, b) => a.localeCompare(b));

        ALL_PRODUCT_NAMES = dbProducts;
        const dl = document.getElementById('productList');
        ALL_PRODUCT_NAMES.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            dl.appendChild(opt);
        });

        // 28 Zeilen voreingestellt
        const presets = window.FROSTER_PRESETS || Array(28).fill({ mosa: '', so: '', wohin: '' });
        document.getElementById('tabellenBody').innerHTML = '';
        presets.forEach(p => addRow(p.mosa, p.so, p.wohin || ""));
    }
})();

function addRow(valMosa = "", valSo = "", valWohin = "") {
    const body = document.getElementById('tabellenBody');
    const tr = document.createElement('tr');
    const isNoSun = (valSo === null);
    
    tr.innerHTML = `
        <td style="width:25%"><input class="product-input" list="productList" value="${valMosa}"></td>
        <td style="width:25%" class="${isNoSun ? 'no-sunday' : ''} sep-r">
            ${isNoSun ? '' : `<input class="product-input" list="productList" value="${valSo}">`}
        </td>
        <td></td><td class="sep-r"></td><td class="sep-r"></td><td></td>
        <td style="width:15%">${createLocationSelect(valWohin)}</td>
    `;
    body.appendChild(tr);
}

function removeRow() { document.getElementById('tabellenBody').deleteRow(-1); }

function createLocationSelect(selectedLoc) {
    let h = `<select class="location-select">`;
    LOCATIONS.forEach(loc => {
        h += `<option value="${loc}" ${loc === selectedLoc ? 'selected' : ''}>${loc}</option>`;
    });
    return h + `</select>`;
}

function saveConfig() {
    const config = Array.from(document.querySelectorAll('#tabellenBody tr')).map(row => {
        const inputs = row.querySelectorAll('input.product-input');
        const w = row.cells[row.cells.length - 1].querySelector('select');
        return { 
            mosa: inputs[0] ? inputs[0].value : '', 
            so: row.cells[1].classList.contains('no-sunday') ? null : (inputs[1] ? inputs[1].value : ''),
            wohin: w ? w.value : ''
        };
    });
    const blob = new Blob([`window.FROSTER_PRESETS = ${JSON.stringify(config, null, 2)};`], {type: 'text/javascript'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'frosterliste_produkte.js'; a.click();
}
</script>
<script src="../shell.js" defer></script>
</body>
</html>
