<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BOS · Frühschicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../systemdesign.css">
  <script src="../feiertage_nds.js"></script>
  <script src="../produktions_gehirn.js"></script>
  <script src="../froster_gehirn.js"></script>
  <script src="../inventurdaten.js"></script>
  <style>
    body { padding-bottom: 130px; margin: 0; background: var(--bg); }
    .nfc-header { background: #111; padding: 24px 20px 18px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.45); }
    .nfc-kicker { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
    .nfc-title { font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.2rem; color: var(--amber); line-height: 1; margin: 0; }
    .nfc-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 5px; letter-spacing: 1px; }
    .brain-status { padding: 9px 18px; text-align: center; font-size: 0.76rem; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
    .brain-status.loading { color: var(--amber); background: rgba(192,122,16,0.06); }
    .brain-status.ready   { color: var(--green);  background: rgba(77,184,122,0.06); }
    .brain-status.error   { color: var(--red);    background: rgba(201,74,74,0.06); }
    /* Banner von _zeigeKritischenFehler ausblenden */
    body > div[style*="position:fixed"][style*="background:#ef4444"] { display: none !important; }
    body > div[style*="position:fixed"][style*="background: #ef4444"] { display: none !important; }
    .froster-bar { padding: 10px 16px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .froster-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); flex-shrink: 0; }
    .f-toggle { flex: 1; display: flex; gap: 6px; }
    .f-btn { flex: 1; padding: 9px 6px; border: 1.5px solid var(--border-s); background: var(--surface2); border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.78rem; color: var(--dim); cursor: pointer; transition: 0.15s; -webkit-tap-highlight-color: transparent; }
    .f-btn.yes.active { border-color: var(--green); background: rgba(77,184,122,0.1); color: var(--green); }
    .f-btn.no.active  { border-color: var(--amber); background: rgba(192,122,16,0.1); color: var(--amber); }
    .container { max-width: 600px; margin: 0 auto; padding: 12px 12px; }
    .prod-card { background: var(--surface); border: 2px solid var(--border); border-radius: 18px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 3px 12px var(--shadow); transition: border-color 0.25s; }
    .prod-card::before { content: ''; display: block; height: 3px; background: var(--border-s); transition: background 0.25s; }
    .prod-card.configured { border-color: rgba(77,184,122,0.4); }
    .prod-card.configured::before { background: linear-gradient(90deg, var(--green), rgba(77,184,122,0.2)); }
    .prod-name { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.1rem; padding: 12px 14px 4px; color: var(--text); }
    .prod-status { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; color: var(--dim); padding: 0 14px 10px; }
    .prod-status.ok { color: var(--green); }
    .day-section { padding: 0 12px 10px; }
    .section-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--amber); margin-bottom: 6px; }
    .day-row { display: flex; gap: 4px; }
    .day-btn { flex: 1; height: 42px; border-radius: 9px; border: 1.5px solid var(--border-s); background: var(--surface2); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; transition: all 0.12s; -webkit-tap-highlight-color: transparent; user-select: none; padding: 0; }
    .day-btn .d-emoji { font-size: 0.85rem; line-height: 1; display: none; }
    .day-btn .d-name  { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.75rem; color: var(--dim); line-height: 1; }
    .day-btn.on { background: rgba(192,122,16,0.12); border-color: var(--amber); }
    .day-btn.on .d-emoji { display: block; }
    .day-btn.on .d-name  { font-size: 0.65rem; color: var(--amber); }
    .day-btn:not(.on) { opacity: 0.45; }
    .day-btn:active { transform: scale(0.88); }
    .ziel-row { display: flex; gap: 4px; }
    .ziel-btn { flex: 1; height: 42px; border-radius: 9px; border: 1.5px solid var(--border-s); background: var(--surface2); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; transition: all 0.12s; -webkit-tap-highlight-color: transparent; padding: 0; }
    .ziel-btn .z-day  { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.75rem; color: var(--dim); line-height: 1; }
    .ziel-btn .z-date { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.6rem; color: var(--dim); line-height: 1; opacity: 0.7; }
    .ziel-btn.ziel-on { background: var(--amber); border-color: var(--amber); }
    .ziel-btn.ziel-on .z-day  { color: white; }
    .ziel-btn.ziel-on .z-date { color: rgba(255,255,255,0.8); opacity: 1; }
    .ziel-btn:active { transform: scale(0.88); }
    .vorschlag-section { margin: 0 12px 14px; background: var(--surface2); border: 1.5px solid var(--border-s); border-radius: 12px; overflow: hidden; }
    .vorschlag-header { padding: 8px 12px; background: rgba(77,184,122,0.08); border-bottom: 1.5px solid var(--border-s); display: flex; align-items: center; justify-content: space-between; }
    .vorschlag-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--green); }
    .vorschlag-hint  { font-size: 0.65rem; color: var(--dim); font-family: 'Barlow Condensed', sans-serif; }
    .vorschlag-days { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
    .vday-block { flex: 1 1 0; min-width: 60px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .vday-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 0.68rem; text-transform: uppercase; color: var(--dim); }
    .vday-date  { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.6rem; color: var(--dim); opacity: 0.6; }
    .vday-input { width: 100%; min-width: 0; height: 48px; border: 2px solid var(--border-s); border-radius: 10px; background: var(--surface); color: var(--text); font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.4rem; text-align: center; box-sizing: border-box; }
    .vday-input:focus { outline: none; border-color: var(--amber); }
    .vday-input.err { border-color: var(--red); background: rgba(201,74,74,0.06); }
    .vday-unit { font-size: 0.6rem; color: var(--dim); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
    .vday-min { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.62rem; color: var(--dim); opacity: 0.7; }
    .vday-min span { color: var(--amber); font-weight: 900; }
    .warn-row { padding: 7px 12px; background: rgba(201,74,74,0.07); border-top: 1.5px solid rgba(201,74,74,0.2); font-size: 0.72rem; color: var(--red); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 2px solid var(--border); padding: 12px 16px 26px; z-index: 100; box-shadow: 0 -4px 20px var(--shadow); }
    .btn-send { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--amber); color: white; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.25rem; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.22); transition: 0.1s; -webkit-tap-highlight-color: transparent; }
    .btn-send:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.22); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-hint { text-align: center; font-size: 0.72rem; color: var(--dim); margin-top: 7px; font-family: 'Barlow Condensed', sans-serif; }
    .send-count { font-weight: 900; color: var(--text); }
  </style>
</head>
<body>
<div class="nfc-header">
  <div class="nfc-kicker">BäckereiOS · Station</div>
  <h1 class="nfc-title">🌅 Frühschicht</h1>
  <div class="nfc-sub">6 Produkte · Tage wählen · Zahlen bestätigen</div>
</div>
<div class="brain-status loading" id="brain-status">⏳ Produktdaten werden geladen…</div>
<div class="froster-bar">
  <span class="froster-label">Froster</span>
  <div class="f-toggle">
    <button class="f-btn yes"       id="f-ja"   onclick="setFroster(true)">✓ Befüllt</button>
    <button class="f-btn no active" id="f-nein" onclick="setFroster(false)">noch nicht</button>
  </div>
</div>
<div class="container" id="prod-container"></div>
<div class="bottom-bar">
  <button class="btn-send" id="btn-send" disabled onclick="sendWhatsApp()">🥐 Per WhatsApp senden</button>
  <div class="send-hint"><span class="send-count" id="send-count">0 / 6</span> Produkte mit Vorschlag</div>
</div>
<script>
const STATION_ID   = 'fruehschicht';
const STATION_NAME = 'Frühschicht';
const DAYS = [
  { idx:1, short:'Mo' }, { idx:2, short:'Di' }, { idx:3, short:'Mi' },
  { idx:4, short:'Do' }, { idx:5, short:'Fr' }, { idx:6, short:'Sa' },
  { idx:0, short:'So' },
];
const DAY_NAMES = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const PRODUCTS = [
  { key: 'hasenberger_stueck', name: 'Hasenberger', defaultDays: [] },
  { key: 'kornknacker_stueck', name: 'Kornknacker', defaultDays: [] },
  { key: 'dinkel_zwerg_stueck', name: 'Dinkel-Zwerg süß', defaultDays: [] },
  { key: 'rosinen_batzen_stueck', name: 'Rosinen-Batzen', defaultDays: [] },
  { key: 'schoko_batzen_stueck', name: 'Schoko-Batzen', defaultDays: [] },
  { key: 'schlawiner_gesamt_stueck', name: 'Schlawiner GESAMT', defaultDays: [] },
];

let brainReady  = false;
let frosterDone = false;
const today    = new Date(); today.setHours(0,0,0,0);
const todayIdx = today.getDay();

function nextDate(jsDay) {
  const d = new Date(today);
  let off = (jsDay - todayIdx + 7) % 7;
  if (!off) off = 7;
  d.setDate(d.getDate() + off);
  return d;
}
function fmt(date) {
  return String(date.getDate()).padStart(2,'0') + '.' + String(date.getMonth()+1).padStart(2,'0') + '.';
}

const state = {};
PRODUCTS.forEach(p => {
  state[p.key] = { backtage: new Set(p.defaultDays), ziel: null, planned: null, confirmed: {}, minima: {} };
});

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderAll() {
  const c = document.getElementById('prod-container');
  if (!c) return;
  c.innerHTML = '';
  PRODUCTS.forEach(p => c.appendChild(buildCard(p)));
  updateCount();
}

function buildCard(p) {
  const s = state[p.key];
  const hasV = s.planned !== null && s.planned.some(v => v > 0);
  const card = document.createElement('div');
  card.className = 'prod-card' + (hasV ? ' configured' : '');
  card.id = 'card-' + p.key;
  let h = '';
  h += '<div class="prod-name">' + p.name + '</div>';
  h += '<div class="prod-status' + (hasV ? ' ok' : '') + '" id="st-' + p.key + '">' + (hasV ? '✓ Vorschlag — Zahlen prüfen' : 'Produktionstage und Ziel wählen') + '</div>';
  // Produktionstage
  h += '<div class="day-section"><div class="section-label">🥐 Produktionstage</div><div class="day-row">';
  DAYS.forEach(d => {
    const on = s.backtage.has(d.idx);
    h += '<button class="day-btn' + (on ? ' on' : '') + '" onclick="toggleDay(\'' + p.key + '\',' + d.idx + ',this)">'
       + '<span class="d-emoji">🥐</span><span class="d-name">' + d.short + '</span></button>';
  });
  h += '</div></div>';
  // Ziel
  h += '<div class="day-section"><div class="section-label">Bis wann nächste Woche?</div><div class="ziel-row">';
  DAYS.forEach(d => {
    const on = s.ziel === d.idx;
    h += '<button class="ziel-btn' + (on ? ' ziel-on' : '') + '" onclick="setZiel(\'' + p.key + '\',' + d.idx + ',this)">'
       + '<span class="z-day">' + d.short + '</span><span class="z-date">' + fmt(nextDate(d.idx)) + '</span></button>';
  });
  h += '</div></div>';
  // Vorschlag
  if (hasV) h += buildVorschlag(p);
  card.innerHTML = h;
  return card;
}

function buildVorschlag(p) {
  const s = state[p.key];
  let blocks = '';
  s.planned.forEach((amount, stepIdx) => {
    if (!amount) return;
    const dIdx = (todayIdx + stepIdx) % 7;
    const val  = s.confirmed[dIdx] !== undefined ? s.confirmed[dIdx] : amount;
    const unit = getUnit(p.key);
    const ld   = new Date(today); ld.setDate(today.getDate() + stepIdx);
    const min  = s.minima[stepIdx] !== undefined ? s.minima[stepIdx] : '';
    blocks += '<div class="vday-block">'
            + '<div class="vday-label">' + DAY_NAMES[dIdx].slice(0,2) + '</div>'
            + '<div class="vday-date">'  + fmt(ld) + '</div>'
            + '<input class="vday-input" type="number" min="0" step="1" value="' + val + '"'
            + ' data-key="' + p.key + '" data-si="' + stepIdx + '" data-di="' + dIdx + '"'
            + ' oninput="onInput(this)">'
            + '<div class="vday-unit">' + unit + '</div>'
            + (min !== '' ? '<div class="vday-min">min <span>' + min + '</span></div>' : '')
            + '</div>';
  });
  return '<div class="vorschlag-section">'
       + '<div class="vorschlag-header"><span class="vorschlag-title">✓ Vorschlag</span><span class="vorschlag-hint">Werte änderbar</span></div>'
       + '<div class="vorschlag-days">' + blocks + '</div>'
       + '<div class="warn-row" id="warn-' + p.key + '" style="display:none"></div>'
       + '</div>';
}

function getUnit(key) {
  if (!window.BOS_STAMMDATEN || !window.BOS_GEHIRN) return 'Bl.';
  const id = window.BOS_GEHIRN.bosIdFuerKey(key);
  const p  = id && window.BOS_STAMMDATEN[id];
  return (p && p.charge > 1) ? 'Bl.' : 'St.';
}

// ─── INTERAKTION ─────────────────────────────────────────────────────────────

function toggleDay(key, dayIdx, btn) {
  const s = state[key];
  if (s.backtage.has(dayIdx)) { s.backtage.delete(dayIdx); btn.classList.remove('on'); btn.querySelector('.d-emoji').style.display='none'; }
  else                        { s.backtage.add(dayIdx);    btn.classList.add('on');    btn.querySelector('.d-emoji').style.display='block'; }
  recalc(key);
}

function setZiel(key, dayIdx, btn) {
  const s = state[key];
  const row = btn.closest('.ziel-row');
  if (s.ziel === dayIdx) {
    s.ziel = null;
    row.querySelectorAll('.ziel-btn').forEach(b => b.classList.remove('ziel-on'));
  } else {
    s.ziel = dayIdx;
    row.querySelectorAll('.ziel-btn').forEach((b, i) => b.classList.toggle('ziel-on', DAYS[i].idx === dayIdx));
  }
  recalc(key);
}

function onInput(input) {
  const key   = input.dataset.key;
  const si    = parseInt(input.dataset.si);
  const di    = parseInt(input.dataset.di);
  const newV  = parseInt(input.value) || 0;
  const s     = state[key];
  if (!s.planned || !window.BOS_BRAIN || !window.BOS_STAMMDATEN) return;
  const bosId = window.BOS_GEHIRN.bosIdFuerKey(key);
  if (!bosId) return;
  const sess  = buildSession(key, bosId);
  const res   = window.BOS_BRAIN.recalculateShift(bosId, sess, [...s.planned], si, newV);
  const warn  = document.getElementById('warn-' + key);
  if (res === null) {
    input.classList.add('err');
    const mn = s.minima[si] !== undefined ? s.minima[si] : '?';
    if (warn) { warn.style.display = 'block'; warn.textContent = '⚠ Minimum: ' + mn + ' — Froster läuft sonst leer.'; }
  } else {
    input.classList.remove('err');
    if (warn) warn.style.display = 'none';
    s.planned = res;
    res.forEach((a, idx) => {
      if (idx === si) return;
      const odi = (todayIdx + idx) % 7;
      const el  = document.querySelector('input[data-key="' + key + '"][data-si="' + idx + '"]');
      if (el) { el.value = a; s.confirmed[odi] = a; }
    });
    s.confirmed[di] = newV;
  }
  updateCount();
}

// ─── BERECHNUNG ──────────────────────────────────────────────────────────────

function buildSession(key, bosId) {
  const s = state[key];
  let bestand = 0;
  if (window.BOS_INVENTUR && window.BOS_INVENTUR.products && window.BOS_INVENTUR.products[key]) {
    const inv = window.BOS_INVENTUR.products[key];
    bestand = inv.stueck !== undefined ? inv.stueck : (inv.bleche !== undefined ? inv.bleche : 0);
  }
  const wc = {};
  for (let d = 0; d < 7; d++) wc[d] = { status:'auf', hamster:0, grill:false };
  return {
    startDayIdx:    todayIdx,
    frosterDone:    frosterDone,
    inventory:      { [bosId]: bestand },
    shortages:      { [bosId]: 0 },
    targetDays:     { [bosId]: s.ziel },
    productionDays: { [bosId]: Array.from(s.backtage) },
    weekConfig:     wc
  };
}

function calcMin(key, bosId, session, planned, stepIdx) {
  if (!window.BOS_BRAIN || !window.BOS_BRAIN.recalculateShift) return 0;
  for (var v = 0; v <= 300; v++) {
    if (window.BOS_BRAIN.recalculateShift(bosId, session, planned.slice(), stepIdx, v) !== null) return v;
  }
  return 0;
}

function recalc(key) {
  const s = state[key];
  if (!brainReady || !window.BOS_BRAIN || !window.BOS_STAMMDATEN) return;
  if (!s.ziel && s.ziel !== 0) { s.planned = null; s.confirmed = {}; s.minima = {}; updateCard(key); return; }
  if (!s.backtage.size) { s.planned = null; s.confirmed = {}; s.minima = {}; updateCard(key); return; }
  const bosId   = window.BOS_GEHIRN.bosIdFuerKey(key);
  if (!bosId) return;
  const session = buildSession(key, bosId);
  const planned = window.BOS_BRAIN.calculateAutoPlanning(bosId, session);
  s.planned = planned; s.confirmed = {}; s.minima = {};
  planned.forEach((amount, si) => {
    if (!amount) return;
    s.confirmed[(todayIdx + si) % 7] = amount;
    s.minima[si] = calcMin(key, bosId, session, planned, si);
  });
  updateCard(key);
}

function updateCard(key) {
  const old = document.getElementById('card-' + key);
  if (!old) return;
  const p = PRODUCTS.find(x => x.key === key);
  if (p) old.replaceWith(buildCard(p));
  updateCount();
}

function updateCount() {
  const ready = PRODUCTS.filter(p => state[p.key].planned && state[p.key].planned.some(v => v > 0)).length;
  const el = document.getElementById('send-count');
  if (el) el.textContent = ready + ' / ' + PRODUCTS.length;
  const btn = document.getElementById('btn-send');
  if (btn) btn.disabled = !ready;
}

function setFroster(val) {
  frosterDone = val;
  document.getElementById('f-ja').classList.toggle('active', val === true);
  document.getElementById('f-nein').classList.toggle('active', val === false);
  PRODUCTS.forEach(p => recalc(p.key));
}

// ─── WHATSAPP ────────────────────────────────────────────────────────────────

function sendWhatsApp() {
  const now     = new Date();
  const dateStr = now.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
  const timeStr = now.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
  const lines = [], pP = {}, pZ = {}, pPl = {};
  PRODUCTS.forEach(p => {
    const s = state[p.key];
    if (!s.planned || !s.planned.some(v => v > 0)) return;
    const bt = {};
    s.backtage.forEach(d => { bt[String(d)] = 1; });
    pP[p.key] = bt;
    if (s.ziel !== null) pZ[p.key] = s.ziel;
    const pl = {};
    s.planned.forEach((a, si) => {
      if (!a) return;
      const di = (todayIdx + si) % 7;
      pl[String(di)] = s.confirmed[di] !== undefined ? s.confirmed[di] : a;
    });
    pPl[p.key] = pl;
    const tage = Object.entries(pl).map(([d,v]) => DAY_NAMES[+d].slice(0,2) + ' ' + v).join(', ');
    lines.push(p.name + ': ' + tage + (s.ziel !== null ? ' → bis ' + DAY_NAMES[s.ziel].slice(0,2) : ''));
  });
  const b64 = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify({
    stationId: STATION_ID, stationName: STATION_NAME, exportedAt: now.toISOString(),
    frosterDone: frosterDone, products: pP, ziele: pZ, planung: pPl
  }))));
  const msg = ['📋 BäckereiOS · Produktionsplan', '📍 Station: ' + STATION_NAME,
    '📅 ' + dateStr + ', ' + timeStr + ' Uhr', '', ...lines, '',
    '────────────────────', 'Import-Code für BäckereiOS:', b64].join('\n');
  try {
    const raw = localStorage.getItem('bos_produktionsplan');
    const plan = raw ? JSON.parse(raw) : {version:1, stations:{}};
    plan.stations[STATION_ID] = {configured:true, configuredAt:now.toISOString(),
      products:pP, ziele:pZ, planung:pPl, frosterDone:frosterDone};
    plan.savedAt = now.toISOString();
    localStorage.setItem('bos_produktionsplan', JSON.stringify(plan));
  } catch(e) {}
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

// ─── BOOT ────────────────────────────────────────────────────────────────────

// 1. Karten sofort rendern
renderAll();

// 2. Brain laden — async, sicher gewrappt
(function initBrain() {
  var st = document.getElementById('brain-status');
  if (!window.BOS_GEHIRN || typeof window.BOS_GEHIRN.init !== 'function') {
    if (st) { st.className = 'brain-status error'; st.textContent = '⚠ Produktdaten nicht verfügbar'; }
    return;
  }
  window.BOS_GEHIRN.init().then(function(ok) {
    if (!ok) {
      if (st) { st.className = 'brain-status error'; st.textContent = '⚠ Produktdaten konnten nicht geladen werden'; }
      return;
    }
    brainReady = true;
    if (st) { st.className = 'brain-status ready'; st.textContent = '✓ Bestandsdaten geladen'; }
    renderAll();
  }).catch(function() {
    if (st) { st.className = 'brain-status error'; st.textContent = '⚠ Produktdaten konnten nicht geladen werden'; }
  });
})();
</script>
