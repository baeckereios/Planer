<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOS - BlechRechner</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <style>
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        input { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Barlow'; font-weight: 800; font-size: 1.2rem; text-align: center; background: var(--surface); color: var(--text); }
        input:focus { border-color: var(--amber); outline: none; }
        .info-bar { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: var(--dim); margin-top: 10px; font-family: 'Barlow Condensed'; text-transform: uppercase; }
        .special-section { border-left: 6px solid var(--text); background: var(--surface2); }
        .calc-section { border-left: 6px solid var(--amber); }
        .today-highlight { color: var(--amber); font-weight: 900; }
        .hint { font-size: 0.7rem; color: var(--dim); margin-top: 8px; display: block; }
    </style>
</head>
<body>
    <header class="brand-header">
        <div class="brand-logo" onclick="location.href='../index.html'">Bäckerei<span>OS</span></div>
        <div class="slogan-bar">KREUZ- & QUER RECHNER</div>
    </header>

    <main class="container">
        <div id="specialList"></div>
        
        <div class="slogan-bar" style="margin: 30px -20px; font-size: 0.8rem; background: #333;">FROSTERWARE & KARTON-UMRECHNUNG</div>
        
        <div id="standardList"></div>
    </main>

    <script src="baeko_bestand.js"></script>
    <script src="lager_gehirn.js"></script>
    <script>
        const dayIdx = (new Date().getDay() + 6) % 7; 

        function render() {
            const specList = document.getElementById('specialList');
            const stdList = document.getElementById('standardList');
            const products = window.BOS_BAEKO_CONFIG.products;
            
            specList.innerHTML = '';
            stdList.innerHTML = '';

            for (let id in products) {
                const p = products[id];
                if (!p.show_in_calc) continue;

                const card = document.createElement('div');
                const todayNeed = p.needs_blech ? p.needs_blech[dayIdx] : "0";

                if (p.type === 'cross') {
                    // HASENBERGER & KORNKNACKER (Ohne "Soll Heute")
                    card.className = 'card special-section';
                    card.innerHTML = `
                        <h2 class="fraunces" style="margin:0;">${p.name}</h2>
                        <div class="info-bar" style="justify-content: flex-end;">
                            <span>1 ${p.unit_alt} = ${p.val_alt} Stk.</span>
                        </div>
                        <div class="input-row">
                            <div><div class="label" style="text-align:center;">${p.unit_alt}</div><input type="number" id="${id}_alt" oninput="runCross('${id}', 'alt')" placeholder="0"></div>
                            <div><div class="label" style="text-align:center;">Bleche</div><input type="number" id="${id}_blech" oninput="runCross('${id}', 'blech')" placeholder="0"></div>
                        </div>
                        ${p.factor ? `<span class="hint">ℹ️ Inkl. Schlüsselzahl ${p.factor} bei Blech-Eingabe</span>` : ''}
                    `;
                    specList.appendChild(card);
                } else {
                    // CROISSANTS & CO (Mit "Soll Heute")
                    card.className = 'card calc-section';
                    card.innerHTML = `
                        <h2 class="fraunces" style="margin:0;">${p.name}</h2>
                        <div class="info-bar">
                            <span>Soll Heute: <span class="today-highlight">${todayNeed} Bleche</span></span>
                            <span>${p.stueck_pro_blech} Stk/Bl. | ${p.stueck_pro_karton} Stk/Kt.</span>
                        </div>
                        <div class="input-row">
                            <div><div class="label" style="text-align:center;">Absetzen (Bl.)</div><input type="number" oninput="runStandard('${id}', this.value, '${id}_res')" placeholder="0"></div>
                            <div><div class="label" style="text-align:center;">Aus Froster</div><input type="text" id="${id}_res" readonly style="background:var(--surface2); border-color:transparent;"></div>
                        </div>
                    `;
                    stdList.appendChild(card);
                }
            }
        }

        function runCross(id, source) {
            const val = parseFloat(document.getElementById(id + '_' + source).value || 0);
            const target = document.getElementById(id + '_' + (source === 'alt' ? 'blech' : 'alt'));
            if (val === 0) { target.value = ""; return; }
            const res = window.BOS_LAGER_BRAIN.convertCross(id, val, source);
            target.value = Math.round(res * 100) / 100;
        }

        function runStandard(id, val, targetId) {
            const bleche = parseFloat(val || 0);
            const target = document.getElementById(targetId);
            if (bleche === 0) { target.value = ""; return; }
            const res = window.BOS_LAGER_BRAIN.convertStandard(id, bleche);
            target.value = Math.round(res * 10) / 10 + " Kartons";
        }
        window.onload = render;
    </script>
</body>
</html>
