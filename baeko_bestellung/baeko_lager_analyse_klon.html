<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOS - Verbrauchsanalyse</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <script src="../baeko_bestand.js"></script>
    <script src="../baeko_historie.js"></script>
    <style>
        .analysis-card { border-left: 4px solid var(--border); margin-bottom: 10px; }
        .status-ok { border-left-color: var(--success, #27ae60); }
        .status-warn { border-left-color: var(--alert, #c0392b); background-color: rgba(192,57,43,0.06); }
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; text-align: center; }
        .metric { background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .metric-val { font-size: 1.2rem; font-weight: 900; color: var(--text); }
        .metric-lbl { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h1 style="margin: 0; font-size: 1.5rem; font-weight: 800;">📊 Verbrauchsanalyse</h1>
        
    </div>

    <div id="info-box" class="card" style="margin-bottom: 20px; background-color: #f1f5f9; border: none;">
        Lädt Daten...
    </div>

    <div id="analysis-list"></div>
</div>

<script>
    window.onload = function() {
        const history = window.BOS_BAEKO_HISTORIE || [];
        const infoBox = document.getElementById('info-box');
        
        if (history.length < 2) {
            infoBox.innerHTML = "<strong>Nicht genug Daten.</strong><br>Du benötigst mindestens 2 durchgeführte Zählungen in der Historie, um einen Verbrauch berechnen zu können.";
            return;
        }

        // Holt die beiden letzten Zählungen
        const last = history[history.length - 1];
        const prev = history[history.length - 2];
        
        // Berechnet die Tage dazwischen
        const daysDiff = Math.max(1, Math.round((new Date(last.date) - new Date(prev.date)) / (1000 * 3600 * 24)));
        
        infoBox.innerHTML = `<strong>Analyse-Zeitraum:</strong> ${daysDiff} Tage<br><small>Differenz zwischen der vorletzten und der letzten Zählung.</small>`;

        const products = window.BOS_BAEKO_CONFIG.products;
        const list = document.getElementById('analysis-list');

        for (let id in products) {
            const p = products[id];
            if (!p.show_in_inventory) continue;

            const prevData = prev.stocks[id] || {count: 0, delivery: 0};
            const currData = last.stocks[id] || {count: 0, delivery: 0};

            // RECHNUNG: (Alter Bestand + Alte Lieferung) - Neuer Bestand = Verbrauch
            const startAmount = parseFloat(prevData.count) + parseFloat(prevData.delivery);
            const leftOver = parseFloat(currData.count);
            const consumed = startAmount - leftOver;

            // Logik: Ist das SOLL viel zu hoch eingestellt? (Verbrauch < 50% vom Soll)
            let statusClass = "status-ok";
            let alertMsg = "";
            if (consumed < (p.soll * 0.5) && p.soll > 0) {
                statusClass = "status-warn";
                alertMsg = `<div style="color: var(--alert-color); font-size: 0.8rem; font-weight: bold; margin-top: 10px;">⚠️ Soll zu hoch! Lagerplatz wird blockiert.</div>`;
            } else if (leftOver <= 0) {
                statusClass = "status-warn";
                alertMsg = `<div style="color: var(--alert-color); font-size: 0.8rem; font-weight: bold; margin-top: 10px;">⚠️ Komplett leer! War das Regal zwischenzeitlich ausverkauft? Soll evtl. erhöhen!</div>`;
            }

            const card = document.createElement('div');
            card.className = `card analysis-card ${statusClass}`;
            card.innerHTML = `
                <h3 style="margin: 0; font-size: 1.1rem; border: none; padding: 0;">${p.name}</h3>
                <div class="metric-grid">
                    <div class="metric"><div class="metric-val">${startAmount}</div><div class="metric-lbl">War da</div></div>
                    <div class="metric"><div class="metric-val" style="color:var(--btn-primary);">${consumed}</div><div class="metric-lbl">Verbraucht</div></div>
                    <div class="metric"><div class="metric-val">${p.soll}</div><div class="metric-lbl">Dein Soll</div></div>
                </div>
                ${alertMsg}
            `;
            list.appendChild(card);
        }
    };
</script>
    <script src="../shell.js"></script>
</body>
</html>
