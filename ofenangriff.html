<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ofenangriff – BäckereiOS</title>
    <script>
        (function() {
            try { document.documentElement.setAttribute('data-theme', localStorage.getItem('BOS_THEME') || 'light'); }
            catch(e) { document.documentElement.setAttribute('data-theme', 'light'); }
        })();
    </script>
    <link rel="stylesheet" href="systemdesign.css">
    <script src="ofenangriff.js"></script>
    <style>
        body { padding-bottom: 40px; background: var(--bg); }

        /* ── HEADER ── */
        .brand-header { background: var(--surface); text-align: center; padding-top: 15px; box-shadow: 0 4px 10px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 5px; }
        .btn-back-nav { background: var(--surface2); border: 2px solid var(--border-s); color: var(--text); font-weight: 900; padding: 8px 15px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }
        .page-subtitle { font-family: 'Barlow Condensed'; font-weight: 900; color: var(--amber); letter-spacing: 1px; font-size: 1rem; }
        .brand-logo { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: var(--text); line-height: 1; margin: 8px 0; }
        .brand-logo span { color: var(--amber); font-style: italic; }
        .slogan-bar { background: #111; color: var(--amber); padding: 10px; margin-top: 20px; font-family: 'Barlow Condensed'; font-weight: 800; font-size: 0.9rem; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }

        /* ── TAGES-TABS ── */
        .day-tabs { display: flex; gap: 6px; padding: 14px 15px 0; overflow-x: auto; background: var(--surface); -webkit-overflow-scrolling: touch; }
        .day-tabs::-webkit-scrollbar { display: none; }
        .tab { background: var(--surface2); border: 2px solid var(--border-s); padding: 10px 18px; border-radius: 12px 12px 0 0; cursor: pointer; font-weight: 800; font-family: 'Barlow Condensed'; font-size: 1rem; color: var(--dim); letter-spacing: 0.5px; flex-shrink: 0; transition: 0.15s; }
        .tab.active { border-color: var(--amber); color: var(--amber); background: var(--bg); border-bottom-color: var(--bg); }

        /* ── CONTAINER ── */
        .container { max-width: 700px; margin: 0 auto; padding: 20px 15px; }

        /* ── PRODUKT-GRUPPE ── */
        .prod-group { background: var(--surface); border: 2px solid var(--border); border-radius: 18px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 4px 12px var(--shadow); }
        .prod-header { background: var(--amber); padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; }
        .prod-header-name { font-family: 'Barlow Condensed'; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: white; }
        .prod-header-arrow { color: white; font-size: 0.9rem; transition: transform 0.2s; }
        .prod-group.collapsed .prod-header-arrow { transform: rotate(-90deg); }
        .prod-group.collapsed .prod-body { display: none; }
        .prod-group.all-done .prod-header { background: var(--border-s); }
        .prod-group.all-done .prod-header-name { text-decoration: line-through; opacity: 0.5; }
        .prod-group.all-done .prod-header-arrow { opacity: 0.4; }

        /* ── PROGRAMM-ZEILE ── */
        .prog-row { display: grid; grid-template-columns: 70px 1fr; gap: 0; border-top: 1px solid var(--border-s); cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
        .prog-row:active { background: var(--surface2); }
        .prog-row.done { opacity: 0.3; }
        .prog-row.done .prog-name { text-decoration: line-through; }

        .prog-left { padding: 14px 12px; border-right: 1px solid var(--border-s); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: var(--bg); }
        .id-num { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; color: var(--text); line-height: 1; }
        .st-badge { font-family: 'Barlow Condensed'; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px; color: white; background: var(--amber); padding: 2px 7px; border-radius: 20px; }

        .prog-right { padding: 12px 14px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
        .prog-name { font-family: 'Barlow Condensed'; font-weight: 800; font-size: 1rem; letter-spacing: 0.5px; color: var(--text); text-transform: uppercase; }
        .prog-note { font-size: 0.8rem; color: var(--amber); font-weight: 600; line-height: 1.3; }

        /* ── FOOTER AKTIONSLEISTE ── */
        .action-bar { display: flex; gap: 10px; margin-top: 24px; }
        .btn-action { flex: 1; padding: 16px; border-radius: 14px; border: 2px solid var(--border-s); background: var(--surface); color: var(--text); font-family: 'Barlow Condensed'; font-weight: 900; font-size: 1rem; letter-spacing: 1px; cursor: pointer; text-align: center; }
        .btn-action.amber { background: var(--amber); border-color: var(--amber); color: white; }

        /* ── LEER-STATE ── */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--dim); font-family: 'Barlow Condensed'; font-size: 1.1rem; }

        /* ── DRUCKEN ── */
        @media print {
            * { color: black !important; background: white !important; box-shadow: none !important; }

            .brand-header, .day-tabs, .action-bar, .container > :not(#checklist) { display: none !important; }
            .container { padding: 0 !important; }

            /* Drucktitel */
            #checklist::before {
                content: "Ofenangriff";
                display: block;
                font-family: 'Fraunces', serif;
                font-size: 32pt;
                font-weight: 900;
                letter-spacing: -1px;
                text-align: center;
                border-bottom: 3px solid black;
                padding-bottom: 10px;
                margin-bottom: 16px;
            }

            /* Tag-Label unter Titel */
            #checklist::after {
                content: attr(data-print-day);
                display: block;
                font-family: 'Barlow Condensed', sans-serif;
                font-size: 11pt;
                font-weight: 800;
                text-align: center;
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-top: -12px;
                margin-bottom: 20px;
            }

            /* Gruppen aufklappen */
            .prod-group.collapsed .prod-body { display: block !important; }
            .prod-group { border: none !important; margin-bottom: 0 !important; break-inside: avoid; }

            /* Produktname als fette Tabellenzeile */
            .prod-header { background: black !important; padding: 5px 8px !important; margin-top: 10px; }
            .prod-header-name { color: white !important; font-size: 10pt; letter-spacing: 1px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .prod-header-arrow { display: none; }

            /* Programmzeilen als Tabellenzeilen */
            .prog-row { border-top: 1px solid #ccc !important; padding: 5px 8px !important; grid-template-columns: 55px 1fr !important; }
            .prog-left { border-right: 1px solid #ccc !important; padding: 4px 8px 4px 0 !important; background: white !important; flex-direction: row; gap: 8px; align-items: center; }
            .id-num { font-size: 13pt !important; }
            .st-badge { background: black !important; color: white !important; font-size: 6pt !important; padding: 1px 4px !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .prog-right { padding: 4px 8px !important; }
            .prog-name { font-size: 9pt !important; }
            .prog-note { font-size: 8pt !important; color: #444 !important; }

            /* Abgehaktes trotzdem drucken */
            .prog-row.done { opacity: 1 !important; }
            .prog-row.done .prog-name { text-decoration: none !important; }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="top-nav">
        <a href="index.html" class="btn-back-nav">&#8592; COCKPIT</a>
        <div class="page-subtitle">OFENANGRIFF</div>
        <button onclick="resetDay()" style="background:var(--surface2); border:2px solid var(--border-s); color:var(--dim); font-weight:900; padding:8px 12px; border-radius:12px; font-size:0.85rem; cursor:pointer;">&#8635; Reset</button>
    </div>
    <div class="brand-logo">Bäckerei<span>OS</span></div>
    <div class="day-tabs" id="tabs"></div>
</div>

<div class="container">
    <div id="checklist"></div>
    <div class="action-bar">
        <button class="btn-action" onclick="shareDay()">&#8679; Teilen</button>
        <button class="btn-action amber" onclick="printAll()">&#128438; Drucken</button>
    </div>
</div>

<script>
var activeDay = '';

window.onload = function() {
    if (!window.BOS_OFENANGRIFF) {
        document.getElementById('checklist').innerHTML =
            '<div class="empty-state">&#9888; ofenangriff.js nicht geladen.<br>' +
            '<small>Datei vom Admin generieren lassen.</small></div>';
        return;
    }
    buildTabs();
    var today = new Date().getDay();
    var bosDay = ['So','Mo','Di','Mi','Do','Fr','Sa'][today];
    setDay(bosDay);
};

function buildTabs() {
    var days = ['Mo','Di','Mi','Do','Fr','Sa','So'];
    var wrap = document.getElementById('tabs');
    wrap.innerHTML = '';
    for (var i = 0; i < days.length; i++) {
        (function(d) {
            var btn = document.createElement('div');
            btn.className = 'tab';
            btn.id = 'tab-' + d;
            btn.innerText = d;
            btn.onclick = function() { setDay(d); };
            wrap.appendChild(btn);
        })(days[i]);
    }
}

function setDay(d) {
    activeDay = d;

    // Tag auf Container für Drucktitel setzen
    document.getElementById('checklist').setAttribute('data-print-day', d);

    // Tabs aktualisieren
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].innerText === d);
    }

    // Daten für diesen Tag filtern & gruppieren
    var items = [];
    var data = window.BOS_OFENANGRIFF;
    for (var j = 0; j < data.length; j++) {
        if (data[j].d.indexOf(d) !== -1) items.push(data[j]);
    }

    var grouped = {};
    var groupOrder = [];
    for (var k = 0; k < items.length; k++) {
        var name = items[k].n;
        if (!grouped[name]) { grouped[name] = []; groupOrder.push(name); }
        grouped[name].push(items[k]);
    }

    var container = document.getElementById('checklist');
    container.innerHTML = '';

    if (groupOrder.length === 0) {
        container.innerHTML = '<div class="empty-state">Keine Programme für ' + d + '.</div>';
        return;
    }

    for (var g = 0; g < groupOrder.length; g++) {
        var groupName = groupOrder[g];
        var progs = grouped[groupName];

        var group = document.createElement('div');
        group.className = 'prod-group collapsed';

        var header = document.createElement('div');
        header.className = 'prod-header';
        header.innerHTML =
            '<div class="prod-header-name">' + groupName + '</div>' +
            '<div class="prod-header-arrow">&#9660;</div>';
        header.onclick = function() { this.parentElement.classList.toggle('collapsed'); };
        group.appendChild(header);

        var body = document.createElement('div');
        body.className = 'prod-body';

        for (var p = 0; p < progs.length; p++) {
            (function(prog) {
                var row = document.createElement('div');
                row.className = 'prog-row';
                row.onclick = function() {
                    this.classList.toggle('done');
                };

                var noteHtml = prog.c
                    ? '<div class="prog-note">' + prog.c + '</div>'
                    : '';

                row.innerHTML =
                    '<div class="prog-left">' +
                        '<div class="id-num">' + prog.p + '</div>' +
                        '<div class="st-badge">' + prog.s + ' Sticken</div>' +
                    '</div>' +
                    '<div class="prog-right">' +
                        '<div class="prog-name">' + prog.pn + '</div>' +
                        noteHtml +
                    '</div>';

                body.appendChild(row);
            })(progs[p]);
        }

        group.appendChild(body);
        container.appendChild(group);
    }
}

function resetDay() {
    var rows = document.querySelectorAll('.prog-row.done');
    for (var i = 0; i < rows.length; i++) {
        rows[i].classList.remove('done');
    }
    var groups = document.querySelectorAll('.prod-group');
    for (var j = 0; j < groups.length; j++) {
        groups[j].classList.remove('all-done', 'collapsed');
    }
}

function printAll() {
    var data = window.BOS_OFENANGRIFF;
    var items = [];
    for (var j = 0; j < data.length; j++) {
        if (data[j].d.indexOf(activeDay) !== -1) items.push(data[j]);
    }

    var grouped = {};
    var groupOrder = [];
    for (var k = 0; k < items.length; k++) {
        var n = items[k].n;
        if (!grouped[n]) { grouped[n] = []; groupOrder.push(n); }
        grouped[n].push(items[k]);
    }

    var rows = '';
    for (var g = 0; g < groupOrder.length; g++) {
        var gName = groupOrder[g];
        var progs = grouped[gName];
        rows += '<tr><td colspan="3" style="background:#111;color:white;font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:11pt;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;">' + gName + '</td></tr>';
        for (var p = 0; p < progs.length; p++) {
            var pr = progs[p];
            rows += '<tr>' +
                '<td style="font-family:Fraunces,serif;font-size:14pt;font-weight:900;padding:6px 10px;border-bottom:1px solid #ddd;white-space:nowrap;width:60px;">' + pr.p + '</td>' +
                '<td style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10pt;padding:6px 10px;border-bottom:1px solid #ddd;text-transform:uppercase;width:180px;">' + pr.pn + '<br><span style="font-size:8pt;font-weight:600;color:#666;">' + pr.s + ' Sticken</span></td>' +
                '<td style="font-size:9pt;color:#444;padding:6px 10px;border-bottom:1px solid #ddd;">' + (pr.c || '') + '</td>' +
            '</tr>';
        }
    }

    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
        '<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,900&family=Barlow+Condensed:wght@600;800;900&display=swap" rel="stylesheet">' +
        '<style>' +
        'body{margin:24px;font-family:sans-serif;}' +
        '.print-header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid black;padding-bottom:10px;margin-bottom:20px;}' +
        'h1{font-family:Fraunces,serif;font-size:32pt;font-weight:900;letter-spacing:-1px;margin:0;}' +
        '.day-label{font-family:"Barlow Condensed",sans-serif;font-size:12pt;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#555;}' +
        '.btn-print{background:black;color:white;border:none;padding:10px 20px;font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:11pt;letter-spacing:1px;border-radius:8px;cursor:pointer;}' +
        'table{width:100%;border-collapse:collapse;}' +
        '@media print{.btn-print{display:none!important;}@page{margin:12mm;}}' +
        '<\/style>' +
        '<\/head><body>' +
        '<div class="print-header">' +
            '<h1>Ofen<em>angriff<\/em><\/h1>' +
            '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">' +
                '<div class="day-label">' + activeDay + '<\/div>' +
                '<button class="btn-print" onclick="window.print()">&#128438; Drucken<\/button>' +
            '<\/div>' +
        '<\/div>' +
        '<table>' + rows + '<\/table>' +
        '<\/body><\/html>';

    var w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
}

function shareDay() {
    var data = window.BOS_OFENANGRIFF;
    var items = [];
    for (var j = 0; j < data.length; j++) {
        if (data[j].d.indexOf(activeDay) !== -1) items.push(data[j]);
    }

    var grouped = {};
    var groupOrder = [];
    for (var k = 0; k < items.length; k++) {
        var name = items[k].n;
        if (!grouped[name]) { grouped[name] = []; groupOrder.push(name); }
        grouped[name].push(items[k]);
    }

    var lines = ['🔥 OFENANGRIFF – ' + activeDay, ''];
    for (var g = 0; g < groupOrder.length; g++) {
        lines.push('▸ ' + groupOrder[g]);
        var progs = grouped[groupOrder[g]];
        for (var p = 0; p < progs.length; p++) {
            var prog = progs[p];
            var line = '  [' + prog.p + '] ' + prog.pn + ' (' + prog.s + ' Sticken)';
            if (prog.c) line += ' – ' + prog.c;
            lines.push(line);
        }
        lines.push('');
    }

    var text = lines.join('\n');

    if (navigator.share) {
        navigator.share({ text: text });
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
            alert('In Zwischenablage kopiert!');
        });
    } else {
        alert(text);
    }
}
</script>
</body>
</html>
