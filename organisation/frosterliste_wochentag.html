<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Frosterliste — BäckereiOS</title>
<script>var BOS_SUBFOLDER = true;</script>
<script src="../shell.js"></script>
<script src="../produktions_gehirn.js"></script>
<style>

/* ══════════════════════════════════════════════════════
   SCREEN
══════════════════════════════════════════════════════ */

body {
  margin: 0;
  padding: 0;
  font-family: 'Barlow', Arial, sans-serif;
  background: var(--bg, #f0f0f0);
  color: var(--text, #111);
}

/* ── Kopfzeile ── */
.fl-screen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--border, #ddd);
  gap: 8px;
}
.fl-screen-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22pt;
  font-weight: 800;
  margin: 0;
  letter-spacing: -0.5px;
  line-height: 1;
}
.fl-print-btn {
  flex-shrink: 0;
  background: var(--accent, #111);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13pt;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
}
.fl-print-btn:active { opacity: 0.75; }

/* ── Wochentag-Strip ── */
.wt-strip {
  display: flex;
  gap: 5px;
  padding: 8px 10px;
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--border, #ddd);
}
.wt-btn {
  flex: 1;
  padding: 7px 2px;
  border: 2px solid var(--border, #ccc);
  border-radius: 8px;
  background: transparent;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13pt;
  font-weight: 700;
  cursor: pointer;
  color: var(--text-muted, #666);
  transition: background .12s, color .12s, border-color .12s;
  text-align: center;
}
.wt-btn.active {
  background: var(--accent, #111);
  color: #fff;
  border-color: var(--accent, #111);
}
.wt-btn:not(.active):hover {
  border-color: var(--accent, #555);
  color: var(--text, #111);
}

/* ── Status ── */
.fl-status {
  padding: 5px 12px 4px;
  font-size: 10.5px;
  color: var(--text-muted, #888);
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--border, #eee);
  min-height: 20px;
}
.fl-status.err { color: #c0392b; }
.fl-status.ok  { color: #27ae60; }

/* ── Tabellen-Wrapper ── */
.fl-table-wrap {
  padding: 10px 6px 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Tabelle ── */
.fl-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Barlow', Arial, sans-serif;
  font-size: 8.2pt;
  min-width: 480px;
}
.fl-table th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 8.5pt;
  font-weight: 700;
  text-transform: uppercase;
  padding: 4px 5px;
  text-align: center;
  border: 1px solid #000;
}
.fl-table thead tr:first-child th {
  background: #000;
  color: #fff;
}
.fl-table thead tr:last-child th {
  background: #e0e0e0;
  color: #000;
  font-size: 7.5pt;
  padding: 3px 4px;
  border: 1px solid #000;
}
.fl-table th.col-produkt { text-align: left !important; padding-left: 6px !important; }
.fl-table th.col-mosa    { width: 16%; text-align: left !important; padding-left: 6px !important; }
.fl-table th.col-so      { width: 26%; text-align: left !important; padding-left: 6px !important; }
.fl-table th.col-zahlen  { width: 9%; }
.fl-table th.col-soll    { width: 12%; }

.fl-table tbody tr:nth-child(even) td:not(.no-sunday) { background: #f7f7f7; }
.fl-table tbody tr:nth-child(odd)  td:not(.no-sunday) { background: #fff; }

.fl-table td {
  border: 1px solid #000;
  padding: 2px 4px;
  text-align: center;
  vertical-align: middle;
  height: 24px;
  color: #000;
}
.fl-table td.sep-r,
.fl-table th.sep-r { border-right: 2px solid #000 !important; }

.fl-table td.produkt-mosa,
.fl-table td.produkt-so {
  text-align: left;
  font-weight: 600;
  font-size: 8.5pt;
  padding-left: 6px;
}
.fl-table td.no-sunday {
  background: #ddd !important;
  border-color: #ddd !important;
}
.fl-table td.soll-cell {
  background: #fffdf0 !important;
  padding: 1px 2px;
}
.fl-table thead th.col-soll {
  background: #e8d800 !important;
  color: #000 !important;
}

/* ── Soll-Eingabe ── */
.soll-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.soll-input {
  width: 34px;
  border: 1px solid #bbb;
  border-radius: 4px;
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9.5pt;
  font-weight: 700;
  padding: 1px 0;
  background: #fff;
  color: #000;
  -moz-appearance: textfield;
}
.soll-input::-webkit-outer-spin-button,
.soll-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.soll-input:focus {
  outline: 2px solid var(--accent, #333);
  border-color: transparent;
}
.soll-input.has-value {
  background: #fffde7;
  border-color: #e6c800;
}
.soll-input.empty {
  background: #fafafa;
  border-color: #ddd;
}

.blech-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  padding: 1px 3px;
  border: 1px solid #bbb;
  border-radius: 3px;
  background: #f0f0f0;
  cursor: pointer;
  white-space: nowrap;
  line-height: 1.5;
  color: #333;
  flex-shrink: 0;
}
.blech-btn:active { background: #ddd; }

/* ── Zeile hinzufügen ── */
.fl-add-section {
  padding: 8px 6px 0;
}
.fl-add-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11pt;
  font-weight: 700;
  padding: 6px 14px;
  border: 2px dashed #aaa;
  border-radius: 8px;
  background: transparent;
  color: #666;
  cursor: pointer;
  width: 100%;
}
.fl-add-btn:active { background: #eee; }

/* manuelle Zeile: Name editierbar */
.fl-table td.manual-name {
  text-align: left;
  padding-left: 6px;
}
.manual-name-input {
  border: none;
  background: transparent;
  font-family: 'Barlow', Arial, sans-serif;
  font-size: 8.2pt;
  font-weight: 600;
  width: 100%;
  color: #000;
  outline: none;
}
.manual-name-input:focus {
  outline: 1px solid #aaa;
  border-radius: 2px;
}
.manual-name-input::placeholder { color: #bbb; font-style: italic; font-weight: 400; }

/* ── Notizen ── */
.fl-notes-section {
  padding: 10px 8px 50px;
}
.fl-notes-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 8pt;
  font-weight: 800;
  text-transform: uppercase;
  color: #000;
  margin-bottom: 4px;
  padding-left: 2px;
}
.fl-notes-box {
  border: 1.5px solid #000;
  border-radius: 4px;
  padding: 6px 8px;
  min-height: 55px;
  font-size: 9pt;
  background: #fff;
}

/* Print-Header nur im Druck */
.print-only { display: none !important; }

/* ══════════════════════════════════════════════════════
   PRINT
══════════════════════════════════════════════════════ */

@media print {

  .no-print { display: none !important; }
  .print-only { display: block !important; }

  body { background: #fff; margin: 0; padding: 0; }

  .fl-print-header {
    position: relative;
    text-align: center;
    margin-bottom: 6mm;
    padding-bottom: 3mm;
    border-bottom: 2.5px solid #000;
    font-family: 'Barlow', Arial, sans-serif;
  }
  .fl-print-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.5px;
    margin: 0;
    line-height: 1;
  }
  .fl-print-meta {
    position: absolute;
    right: 0;
    bottom: 3mm;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .fl-print-meta-lbl {
    font-size: 8pt;
    font-weight: 600;
    color: #555;
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase;
    margin: 0;
  }
  .fl-print-meta-val {
    font-size: 11pt;
    font-weight: 700;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    margin: 0;
  }

  .fl-table-wrap { padding: 0; overflow: visible; }
  .fl-table { min-width: 0; margin-bottom: 20px; }

  .fl-table thead th.col-soll { background: #e0e0e0 !important; color: #000 !important; }
  .fl-table td.soll-cell      { background: #f5f5f5 !important; }

  .soll-input {
    border: none !important;
    background: transparent !important;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9.5pt;
    font-weight: 700;
    width: 100%;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
    color: #000;
  }
  .soll-wrap { justify-content: center; }
  .blech-btn { display: none !important; }
  .fl-add-section { display: none !important; }
  .manual-name-input { font-weight: 600; }

  .fl-notes-section { padding: 4mm 0 0; }
  .fl-notes-box { min-height: 22mm; }
}

</style>
</head>
<body>

<!-- Screen-Steuerung -->
<div class="no-print">
  <div class="fl-screen-header">
    <div class="fl-screen-title">Frosterliste</div>
    <button class="fl-print-btn" onclick="window.print()">Drucken</button>
  </div>
  <div class="wt-strip" id="wt-strip"></div>
  <div class="fl-status" id="fl-status">Lade Daten…</div>
</div>

<!-- Druck-Kopfzeile -->
<div class="fl-print-header print-only">
  <div class="fl-print-title">Frosterliste</div>
  <div class="fl-print-meta">
    <div class="fl-print-meta-lbl">Datum:</div>
    <div class="fl-print-meta-val">___ . ___ . 20___</div>
  </div>
</div>

<!-- Tabelle -->
<div class="fl-table-wrap">
  <table class="fl-table">
    <thead>
      <tr>
        <th colspan="2" class="col-produkt">Produkt</th>
        <th rowspan="2" class="col-zahlen">Bestand</th>
        <th rowspan="2" class="col-zahlen sep-r">Zu&shy;viel</th>
        <th rowspan="2" class="col-zahlen col-soll">Soll<br>nä. Tag</th>
        <th rowspan="2" class="col-zahlen">Fehlt</th>
        <th rowspan="2" class="col-zahlen">Wohin</th>
      </tr>
      <tr>
        <th class="col-mosa">MoSa</th>
        <th class="col-so">Sonntag</th>
      </tr>
    </thead>
    <tbody id="fl-tbody"></tbody>
  </table>
</div>

<!-- Zeile hinzufügen -->
<div class="fl-add-section no-print">
  <button class="fl-add-btn" id="fl-add-btn">+ Zeile hinzufügen</button>
</div>

<!-- Notizen -->
<div class="fl-notes-section">
  <div class="fl-notes-lbl">Notizen / Sonderbestellungen</div>
  <div class="fl-notes-box" contenteditable="true" id="fl-notes"></div>
</div>


<script>
(function () {
'use strict';

// ── Wochentag-Konstanten ─────────────────────────────────────────────────────
// BOS-Index: Mo=0 … Sa=5, So=6  |  backTage in produkt_config: Mo=0 … Sa=5, So=6
// JS getDay(): So=0, Mo=1 … Sa=6
var WT_LABELS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
var JS_TO_BOS = [6, 0, 1, 2, 3, 4, 5];

var WOHIN_TEXT = {
  koma7:          'Koma 7',
  schrippen_koma: 'Schrippen Koma',
  froster:        'Froster',
  kuehlung:       'Kühlung',
  '':             ''
};

// ── Zustand ──────────────────────────────────────────────────────────────────
var aktiverTag    = 0;
var gehirnBereit  = false;
var produktListe  = [];   // aufgebaut aus produkt_config.json

// ── Hilfsfunktionen ──────────────────────────────────────────────────────────

function heuteBosIdx() {
  return JS_TO_BOS[new Date().getDay()];
}

/**
 * Hat das Produkt Sonntag (BOS-Index 6) in seinen backTage?
 * Gibt true wenn backTage fehlt (Annahme: täglich).
 */
function hatSonntag(backTage) {
  if (!Array.isArray(backTage)) return true;
  return backTage.indexOf(6) !== -1;
}

/**
 * Soll-Wert aus BOS_STAMMDATEN für einen legacyKey + BOS-Wochentag-Index.
 */
function getSoll(legacyKey, bosIdx) {
  if (!legacyKey || !window.BOS_STAMMDATEN || !window.BOS_GEHIRN) return '';
  var bosId = window.BOS_GEHIRN.bosIdFuerKey(legacyKey);
  var prod  = bosId ? window.BOS_STAMMDATEN[bosId] : null;
  if (!prod || !Array.isArray(prod.needs)) return '';
  var v = prod.needs[bosIdx];
  return (v != null && !isNaN(v) && v > 0) ? Math.ceil(v) : '';
}

// ── produkt_config.json laden & Produktliste bauen ───────────────────────────

async function ladeProduktConfig() {
  var resp = await fetch('../produkt_config.json');
  if (!resp.ok) throw new Error('produkt_config.json nicht geladen (' + resp.status + ')');
  var config = await resp.json();

  // Nur inventurRelevant: true, sortiert nach Kategorie → Name
  var gefiltert = config.filter(function (p) { return p.inventurRelevant === true; });
  gefiltert.sort(function (a, b) {
    var ka = (a.kategorie || '').localeCompare(b.kategorie || '', 'de');
    if (ka !== 0) return ka;
    return (a.name || '').localeCompare(b.name || '', 'de');
  });

  produktListe = gefiltert.map(function (p) {
    var so = hatSonntag(p.backTage);
    return {
      legacyKey: p.legacyKey || null,
      // So-Spalte zeigt den Namen wenn Produkt an Sonntagen gebacken wird
      mosa:      so ? ''      : (p.name || ''),
      so:        so ? (p.name || '') : null,
      wohin:     p.frosterWohin || '',
      charge:    p.charge || null
    };
  });
}

// ── Wochentag-Strip ──────────────────────────────────────────────────────────

function buildStrip() {
  var strip = document.getElementById('wt-strip');
  if (!strip) return;
  strip.innerHTML = '';
  WT_LABELS.forEach(function (label, i) {
    var btn = document.createElement('button');
    btn.className = 'wt-btn' + (i === aktiverTag ? ' active' : '');
    btn.textContent = label;
    btn.onclick = (function (idx) { return function () { setTag(idx); }; })(i);
    strip.appendChild(btn);
  });
}

function setTag(bosIdx) {
  aktiverTag = bosIdx;
  document.querySelectorAll('.wt-btn').forEach(function (b, i) {
    b.classList.toggle('active', i === bosIdx);
  });
  renderTable(bosIdx);
}

// ── Tabelle rendern ──────────────────────────────────────────────────────────

function renderTable(bosIdx) {
  var tbody = document.getElementById('fl-tbody');
  if (!tbody) return;

  // Manuelle Zeilen merken (am Ende der tbody, class="manual-row")
  var manuelleZeilen = Array.from(tbody.querySelectorAll('tr.manual-row'));

  tbody.innerHTML = '';

  var mitDaten = 0, ohneDaten = 0;

  // ── Automatische Zeilen aus produkt_config ──
  produktListe.forEach(function (p) {
    tbody.appendChild(baueZeile(p, bosIdx, false, function(hatWert) {
      if (hatWert) mitDaten++; else if (p.legacyKey) ohneDaten++;
    }));
  });

  // ── Manuelle Zeilen wieder anhängen ──
  manuelleZeilen.forEach(function (tr) { tbody.appendChild(tr); });

  setStatus(mitDaten, ohneDaten);
}

/**
 * Baut eine Tabellenzeile.
 * onSoll(hatWert) wird nach Soll-Berechnung aufgerufen (Statistik).
 */
function baueZeile(p, bosIdx, manuell, onSoll) {
  var tr = document.createElement('tr');
  if (manuell) tr.className = 'manual-row';

  // MoSa-Spalte
  var tdM = document.createElement('td');
  if (manuell) {
    tdM.className = 'manual-name';
    tdM.colSpan = 2;
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'manual-name-input';
    inp.placeholder = 'Produktname …';
    tdM.appendChild(inp);
    tr.appendChild(tdM);
  } else {
    tdM.className = 'produkt-mosa';
    tdM.textContent = p.mosa || '';
    tr.appendChild(tdM);

    // So-Spalte
    var tdS = document.createElement('td');
    if (p.so === null) {
      tdS.className = 'no-sunday';
    } else {
      tdS.className = 'produkt-so';
      tdS.textContent = p.so || '';
    }
    tr.appendChild(tdS);
  }

  // Bestand (leer)
  tr.appendChild(document.createElement('td'));

  // Zuviel
  var tdZ = document.createElement('td');
  tdZ.className = 'sep-r';
  tr.appendChild(tdZ);

  // Soll nä. Tag
  var tdSoll = document.createElement('td');
  tdSoll.className = 'soll-cell';
  var soll = manuell ? '' : getSoll(p.legacyKey, bosIdx);
  var wrap = document.createElement('div');
  wrap.className = 'soll-wrap';
  var sollInp = document.createElement('input');
  sollInp.type = 'number';
  sollInp.min  = '0';
  sollInp.step = '1';
  sollInp.className = 'soll-input';
  if (soll !== '') {
    sollInp.value = soll;
    sollInp.classList.add('has-value');
    if (onSoll) onSoll(true);
  } else {
    sollInp.classList.add('empty');
    if (onSoll) onSoll(false);
  }
  sollInp.addEventListener('input', function () {
    this.classList.toggle('has-value', this.value !== '');
    this.classList.toggle('empty',     this.value === '');
  });
  wrap.appendChild(sollInp);

  // +Blech Button (nur wenn legacyKey vorhanden oder manuell)
  if (p.legacyKey || manuell) {
    var blechBtn = document.createElement('button');
    blechBtn.className = 'blech-btn no-print';
    blechBtn.textContent = '+Bl.';
    blechBtn.title = '+1 Blech';
    (function (input) {
      blechBtn.onclick = function () {
        var v = parseInt(input.value, 10) || 0;
        input.value = v + 1;
        input.classList.add('has-value');
        input.classList.remove('empty');
      };
    })(sollInp);
    wrap.appendChild(blechBtn);
  }

  tdSoll.appendChild(wrap);
  tr.appendChild(tdSoll);

  // Fehlt (leer)
  tr.appendChild(document.createElement('td'));

  // Wohin
  var tdW = document.createElement('td');
  tdW.textContent = WOHIN_TEXT[p.wohin || ''] || p.wohin || '';
  tr.appendChild(tdW);

  return tr;
}

// ── Manuelle Zeile hinzufügen ────────────────────────────────────────────────

function addManuelleZeile() {
  var tbody = document.getElementById('fl-tbody');
  if (!tbody) return;
  var p = { legacyKey: null, mosa: '', so: null, wohin: '' };
  var tr = baueZeile(p, aktiverTag, true, null);
  tbody.appendChild(tr);
}

// ── Statuszeile ──────────────────────────────────────────────────────────────

function setStatus(mitDaten, ohneDaten) {
  var el = document.getElementById('fl-status');
  if (!el) return;
  var wt = WT_LABELS[aktiverTag];

  if (!gehirnBereit) {
    el.className = 'fl-status err';
    el.textContent = '⚠ Produktions-Gehirn nicht verfügbar — Soll-Spalte leer';
    return;
  }
  el.className = 'fl-status ok';
  var txt = '✓ ' + wt + '-Durchschnitt · ' + produktListe.length + ' Produkte geladen · '
            + mitDaten + ' mit Wert';
  if (ohneDaten > 0) txt += ' · ' + ohneDaten + ' ohne Datenbasis';
  el.textContent = txt;
}

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  aktiverTag = heuteBosIdx();
  buildStrip();

  // Statuszeile sofort
  var el = document.getElementById('fl-status');
  if (el) el.textContent = 'Lade Konfiguration…';

  // produkt_config + Gehirn parallel laden
  try {
    await Promise.all([
      ladeProduktConfig(),
      (async function () {
        if (window.BOS_GEHIRN && typeof window.BOS_GEHIRN.init === 'function') {
          try {
            var ok = await window.BOS_GEHIRN.init();
            gehirnBereit = !!ok;
          } catch (e) {
            console.warn('[Frosterliste] BOS_GEHIRN.init() Fehler:', e.message || e);
          }
        }
      })()
    ]);
  } catch (e) {
    console.error('[Frosterliste] Ladefehler:', e.message || e);
    if (el) { el.className = 'fl-status err'; el.textContent = '⚠ ' + (e.message || e); }
    return;
  }

  // Tabelle mit echten Daten
  renderTable(aktiverTag);

  // + Zeile hinzufügen Button
  var addBtn = document.getElementById('fl-add-btn');
  if (addBtn) addBtn.onclick = addManuelleZeile;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>

</body>
</html>
