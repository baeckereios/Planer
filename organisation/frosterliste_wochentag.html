<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frosterliste – Wochentag</title>
<link rel="stylesheet" href="../systemdesign.css">
<style>
/* ── SCREEN: TAG-AUSWAHL ── */
.tage-leiste {
  display: flex; gap: 4px; flex-wrap: nowrap;
  padding: 16px 12px 0;
}
.tag-btn {
  flex: 1; min-width: 0;
  padding: 8px 2px;
  border: 2px solid var(--border-color);
  border-radius: 10px;
  background: var(--card-bg);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 0.9rem;
  letter-spacing: 0.3px;
  cursor: pointer; text-align: center;
  transition: all 0.15s;
  color: var(--text-muted);
}
.tag-btn:hover { border-color: #1e293b; color: #1e293b; }
.tag-btn.aktiv {
  background: #1e293b;
  border-color: #1e293b;
  color: #fff;
}
.tag-btn.heute {
  border-color: var(--amber);
  border-width: 2px;
}
.tag-btn.heute::after {
  content: '●';
  display: block;
  font-size: 0.4rem;
  color: var(--amber);
  margin-top: 2px;
  line-height: 1;
}
.tag-btn.heute.aktiv {
  background: var(--amber, #e67e22); border-color: var(--amber, #e67e22); color: #fff;
}
.tag-btn.heute.aktiv::after { color: #fff; }
.tag-label { font-size: 0.62rem; display: block; margin-top: 2px; opacity: 0.75; }

.screen-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 0; gap: 10px; flex-wrap: wrap;
}
.datum-zeile {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 8px;
}
.datum-zeile strong { color: var(--text-main); }

/* ── PRINT: A4 ── */
@media print {
  body { background: #fff !important; }
  .no-print { display: none !important; }
  .page { box-shadow: none !important; page-break-after: avoid; }
  @page { size: A4 portrait; margin: 10mm 8mm; }
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}

/* ── PAGE (both screen + print) ── */
.page {
  max-width: 210mm;
  margin: 14px auto 60px;
  background: #fff;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  overflow: hidden;
  font-family: 'Barlow Condensed', sans-serif;
}

/* PAGE HEADER */
.page-header {
  background: #1a1a1a;
  color: #fff;
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; }
.header-title span { color: var(--amber, #f59e0b); }
.header-right { text-align: right; }
.header-tag {
  font-size: 1.3rem; font-weight: 900;
  color: var(--amber, #f59e0b); letter-spacing: 1px;
  text-transform: uppercase;
}
.header-datum {
  font-size: 0.75rem; color: #aaa; margin-top: 2px;
}
.header-datum-val {
  display: inline-block;
  border-bottom: 1px solid #555;
  min-width: 80px; text-align: center;
  font-size: 0.85rem; color: #fff;
}

/* TABELLE */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  font-size: 0.8rem;
}
thead tr:first-child th {
  background: #f1f5f9;
  color: #334155;
  font-weight: 700;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 5px 6px;
  border-bottom: 2px solid #cbd5e1;
}
th, td { border: 1px solid #e2e8f0; padding: 4px 6px; vertical-align: middle; }
td { color: #1e293b; }

.col-nr    { width: 22px; text-align: center; color: #94a3b8; font-size: 0.7rem; }
.col-name  { min-width: 110px; font-weight: 700; }
.col-soll  { width: 38px; text-align: center; font-weight: 900;
             background: #fefce8; color: #92400e; }
.col-zahl  { width: 42px; text-align: center; }
.col-sep   { border-left: 2px solid #94a3b8 !important; }

/* Zell-Typ-Farben */
tr.station-header td {
  background: #f8fafc; color: #64748b;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 6px;
}
tr.station-header td:first-child { padding-left: 8px; }

.soll-0 { color: #cbd5e1 !important; }

/* NOTIZEN */
.notes-section {
  padding: 8px 12px 12px;
  border-top: 1px solid #e2e8f0;
}
.notes-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: #94a3b8; margin-bottom: 4px;
}
.notes-lines {
  display: flex; flex-direction: column; gap: 6px;
}
.notes-line {
  height: 18px; border-bottom: 1px solid #e2e8f0;
}
/* Filter Panel */
.filter-panel {
  margin: 16px; padding: 12px 14px;
  background: var(--card-bg, #fff);
  border: 1px solid var(--border-color, #e5e0d8);
  border-radius: 12px;
}
.filter-toggle {
  font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted, #6b7280);
  cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; user-select: none;
}
.filter-body { display: none; margin-top: 10px; flex-wrap: wrap; gap: 6px; }
.filter-body.open { display: flex; }
.filter-chip {
  font-size: 0.72rem; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; border: 1.5px solid var(--border-color, #e5e0d8);
  background: var(--card-bg, #fff); cursor: pointer;
  color: var(--text-primary, #1a1a1a); transition: all 0.15s;
}
.filter-chip.versteckt {
  background: #fee2e2; border-color: #fca5a5; color: #991b1b;
  text-decoration: line-through; opacity: 0.7;
}
</style>
</head>
<body>

<!-- CONTROLS (nur Screen) -->
<div class="no-print">
  <header class="brand-header">
    <div class="brand-logo" onclick="location.href='../index.html'">Bäckerei<span>OS</span></div>
    <div class="slogan-bar">FROSTERLISTE PRO TAG</div>
  </header>

  <div class="tage-leiste">
    <button class="tag-btn" id="btn-0" onclick="setTag(0)">Mo<span class="tag-label">Montag</span></button>
    <button class="tag-btn" id="btn-1" onclick="setTag(1)">Di<span class="tag-label">Dienstag</span></button>
    <button class="tag-btn" id="btn-2" onclick="setTag(2)">Mi<span class="tag-label">Mittwoch</span></button>
    <button class="tag-btn" id="btn-3" onclick="setTag(3)">Do<span class="tag-label">Donnerstag</span></button>
    <button class="tag-btn" id="btn-4" onclick="setTag(4)">Fr<span class="tag-label">Freitag</span></button>
    <button class="tag-btn" id="btn-5" onclick="setTag(5)">Sa<span class="tag-label">Samstag</span></button>
    <button class="tag-btn" id="btn-6" onclick="setTag(6)">So<span class="tag-label">Sonntag</span></button>
  </div>

  <div class="screen-header">
    <div class="datum-zeile" id="basis-info">
      Ø-Werte aus Backmengen-Datenbank — wird geladen…
    </div>
    <button class="btn-main" style="padding:8px 18px;font-size:0.9rem" onclick="window.print()">
      🖨 Drucken
    </button>
  </div>
</div>

<!-- DRUCKSEITE -->
<div class="page">
  <div class="page-header">
    <div class="header-title">Froster<span>liste</span></div>
    <div class="header-right">
      <div class="header-tag" id="print-tagname">—</div>
      <div class="header-datum">
        Datum: <span class="header-datum-val" contenteditable="true" id="datumFeld"> ___ . ___ . 20___ </span>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="frosterTabelle">
      <thead>
        <tr>
          <th class="col-nr">#</th>
          <th class="col-name">Produkt</th>
          <th class="col-soll">Soll</th>
          <th class="col-zahl col-sep">Bestand</th>
          <th class="col-zahl">Zuviel</th>
          <th class="col-zahl col-sep">Fehlt</th>
          <th class="col-zahl">Wohin</th>
        </tr>
      </thead>
      <tbody id="tabellenBody">
        <tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:20px">
          Lädt Stammdaten…
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="notes-section">
    <div class="notes-label">Notizen / Sonderbestellungen</div>
    <div class="notes-lines">
      <div class="notes-line"></div>
      <div class="notes-line"></div>
      <div class="notes-line"></div>
    </div>
  </div>
</div>

<script src="../produktions_gehirn.js"></script>
<script>
const TAGNAMEN = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const TAGKURZ  = ['Mo','Di','Mi','Do','Fr','Sa','So'];

let aktiverTag = 0;

// Boot: Gehirn laden dann initialisieren
(async function() {
  const ok = await window.BOS_GEHIRN.init();
  if (ok) {
    const db = window.BOS_GEHIRN._db || [];
    if (db.length) {
      const sortiert = [...db].sort((a,b) => a.datum.localeCompare(b.datum));
      const von = sortiert[0].datum;
      const bis = sortiert[sortiert.length-1].datum;
      const fmt = d => { const p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0].slice(2); };
      const anzahl = window.BOS_GEHIRN._db.length;
      document.getElementById('basis-info').innerHTML =
        `📅 Ø-Werte aus DB &nbsp;·&nbsp; ${fmt(von)} – ${fmt(bis)} &nbsp;·&nbsp; ${anzahl} Tage`;
    }
    setTag(heuteIdx());
  }
})();

function heuteIdx() {
  const d = new Date().getDay(); // 0=So
  return d === 0 ? 6 : d - 1;   // Mo=0 … So=6
}

function setTag(idx) {
  aktiverTag = idx;
  const heuteI = heuteIdx();
  document.querySelectorAll('.tag-btn').forEach((b, i) => {
    b.classList.toggle('aktiv', i === idx);
    // heute-Klasse NICHT anfassen — wird einmal gesetzt und bleibt
  });
  // Print-Header
  document.getElementById('print-tagname').textContent = TAGNAMEN[idx];
  // Datum vorschlagen
  const heute = heuteIdx();
  if (idx === heute) {
    const d = new Date();
    document.getElementById('datumFeld').textContent =
      String(d.getDate()).padStart(2,'0') + '.' +
      String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
  } else {
    document.getElementById('datumFeld').textContent = ' ___ . ___ . 20___ ';
  }
  rendereTabelle(idx);
}

function rendereTabelle(tagIdx) {
  const body = document.getElementById('tabellenBody');

  if (!window.BOS_STAMMDATEN) {
    body.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:20px">
      ⚠ Backmengen-Datenbank nicht geladen
    </td></tr>`;
    return;
  }

  const produkte = Object.entries(window.BOS_STAMMDATEN)
    .filter(([id, p]) => p.frosterliste !== false);

  let html = '';
  let nr = 1;

  produkte.forEach(([id, p]) => {
    const soll = p.needs?.[tagIdx] ?? 0;
    const sollKlasse = soll === 0 ? 'soll-0' : '';
    const sollText = soll === 0 ? '—' : soll;
    const einheit = p.lagerort ? '' : ((p.unit === undefined || p.unit === 0) ? 'Bl.' : 'St.');
    const wohin = p.lagerort || '';

    html += `<tr>
      <td class="col-nr">${nr++}</td>
      <td class="col-name">${p.name || id}</td>
      <td class="col-soll ${sollKlasse}">${sollText}<span style="font-size:0.6rem;font-weight:400;opacity:0.6"> ${soll > 0 ? ((p.unit === undefined || p.unit === 0) ? 'Bl.' : 'St.') : ''}</span></td>
      <td class="col-zahl col-sep"></td>
      <td class="col-zahl"></td>
      <td class="col-zahl col-sep"></td>
      <td class="col-zahl" style="font-size:0.65rem;color:#475569;font-weight:700;">${wohin}</td>
    </tr>`;
  });

  // 3 Leerzeilen
  for (let i = 0; i < 3; i++) {
    html += `<tr>
      <td class="col-nr" style="color:#e2e8f0">${nr++}</td>
      <td class="col-name"></td>
      <td class="col-soll soll-0">—</td>
      <td class="col-zahl col-sep"></td>
      <td class="col-zahl"></td>
      <td class="col-zahl col-sep"></td>
      <td class="col-zahl"></td>
    </tr>`;
  }

  body.innerHTML = html;
}

// Init
window.addEventListener('load', () => {
  const heute = heuteIdx();
  document.getElementById('btn-' + heute).classList.add('heute');
  // setTag wird vom async Boot aufgerufen nach BOS_GEHIRN.init()
});
</script>

<script src="../shell.js"></script>
</body>
</html>
