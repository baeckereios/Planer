<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbeitsplan — BäckereiOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="arbeitsplan_nachtschicht.js" onerror="handleNoData()"></script>
  <style>
    :root{--amber:#b8790a;--ink:#1a1510;--dim:#7a6e60;--rule:#d0c8bc;--bg:#f5f2ee;
      --green:#2e6b42;--red:#b03030;--sa:#fff3d0;--bg2:#ffffff;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--ink);font-family:'Barlow Condensed',sans-serif;min-height:100vh;}

    .header{background:var(--bg2);border-bottom:1px solid var(--rule);padding:12px 16px;
      display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
    .header-back{color:var(--amber);text-decoration:none;font-size:20px;}
    .header-title{font-family:'Fraunces',serif;font-size:18px;color:var(--amber);flex:1;}

    .wochenav{display:flex;align-items:center;justify-content:space-between;
      padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--rule);}
    .navbtn{background:none;border:1px solid var(--rule);color:var(--ink);
      padding:6px 14px;border-radius:6px;cursor:pointer;font-size:18px;}
    .navbtn:hover{border-color:var(--amber);color:var(--amber);}
    .wklabel{font-family:'Fraunces',serif;font-size:16px;color:var(--dim);}
    .wklabel span{color:var(--amber);font-size:20px;}

    .content{padding:14px 16px;}

    .status-banner{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;
      display:flex;align-items:center;gap:8px;}
    .status-ok{background:#e8f5ec;border:1px solid #b0d8bc;color:var(--green);}
    .status-warn{background:#fdf0f0;border:1px solid #e8b0b0;color:var(--red);}

    .section-title{font-family:'Fraunces',serif;font-size:15px;color:var(--amber);
      margin:14px 0 8px;}

    /* Plan table */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{width:100%;border-collapse:collapse;min-width:380px;}
    thead th{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--dim);
      padding:6px 7px;text-align:center;border-bottom:2px solid var(--rule);}
    thead th:first-child{text-align:left;min-width:80px;}
    tbody td{padding:5px 7px;text-align:center;border-bottom:1px solid var(--rule);font-size:13px;}
    tbody td:first-child{text-align:left;font-size:11px;text-transform:uppercase;
      letter-spacing:.3px;color:var(--dim);white-space:nowrap;}
    .s{font-weight:700;color:var(--green);}
    .k{color:var(--ink);}
    .w{color:var(--dim);}
    .j{font-style:italic;color:var(--red);}
    .g{color:var(--rule);}
    .fr-row td{border-top:2px solid var(--rule);font-size:11px;color:var(--red);}
    .tc{background:#fffbf0;}

    /* Freie Tage */
    .ft-row{display:flex;align-items:center;justify-content:space-between;
      padding:8px 12px;background:var(--bg2);border:1px solid var(--rule);
      border-radius:6px;margin-bottom:6px;}
    .ft-name{font-weight:700;font-size:14px;}
    .ft-right{text-align:right;font-size:13px;}
    .ft-tag{color:var(--ink);}
    .ft-wunsch{font-size:11px;margin-top:2px;}
    .wok{color:var(--green);}
    .wno{color:var(--red);}

    /* No data */
    .no-data{text-align:center;padding:40px 20px;color:var(--dim);}
    .no-data h2{font-family:'Fraunces',serif;font-size:22px;color:var(--amber);margin-bottom:10px;}
    .no-data p{font-size:14px;line-height:1.6;}
    .no-data code{background:var(--bg2);border:1px solid var(--rule);padding:2px 6px;
      border-radius:3px;font-size:12px;}
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-back">←</a>
  <span class="header-title">Arbeitsplan</span>
</header>

<div class="wochenav">
  <button class="navbtn" onclick="changeWeek(-1)">‹</button>
  <div class="wklabel" id="wklabel"><span>—</span></div>
  <button class="navbtn" onclick="changeWeek(+1)">›</button>
</div>

<div class="content" id="content">
  <div class="no-data" id="noData" style="display:none">
    <h2>Kein Arbeitsplan gefunden</h2>
    <p>Die Datei <code>arbeitsplan_nachtschicht.js</code> fehlt im Hauptordner.<br><br>
    Im Fluss-Planer → "Plan exportieren" drücken, die heruntergeladene Datei in den BäckereiOS-Hauptordner legen.</p>
  </div>
  <div id="planContent"></div>
</div>

<script>
const TL=['montag','dienstag','mittwoch','donnerstag','freitag','samstag'];
const TK=['Mo','Di','Mi','Do','Fr','Sa'];
const TN=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

let plaene = null;
let currentWK = null;
let alleWochen = [];

function handleNoData() {
  document.getElementById('noData').style.display = 'block';
}

function init() {
  if (typeof window.NACHTSCHICHT_PLAENE === 'undefined') {
    handleNoData(); return;
  }
  plaene = window.NACHTSCHICHT_PLAENE;
  alleWochen = Object.keys(plaene).sort((a,b) => b.localeCompare(a));
  if (!alleWochen.length) { handleNoData(); return; }
  // Start mit aktuellster Woche
  currentWK = alleWochen[0];
  render();
}

function changeWeek(d) {
  const idx = alleWochen.indexOf(currentWK);
  const newIdx = idx + d;
  if (newIdx < 0 || newIdx >= alleWochen.length) return;
  currentWK = alleWochen[newIdx];
  render();
}

function render() {
  const plan = plaene[currentWK];
  if (!plan) return;
  const kw = currentWK.split('-W')[1];
  document.getElementById('wklabel').innerHTML = `<span>KW ${kw}</span> / ${currentWK.split('-W')[0]}`;

  const jokerCount = plan.wochenplan?.flatMap(t =>
    Object.values(t.zuweisung||{}).filter(z=>z.status==='joker')).length || 0;

  let html = '';

  if (jokerCount > 0) {
    html += `<div class="status-banner status-warn">⚠ ${jokerCount} Joker in dieser Woche</div>`;
  } else {
    html += `<div class="status-banner status-ok">✓ Vollbesetzt</div>`;
  }

  // Besetzungsplan
  html += '<div class="section-title">Besetzungsplan</div><div class="table-wrap">';
  html += '<table><thead><tr><th></th>';
  plan.wochenplan.forEach((t,i) => {
    html += `<th>${TK[i]}<br><span style="font-size:9px;font-weight:400">${t.datumFormatiert}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  (plan.positionen||[]).forEach(pos => {
    html += `<tr><td>${pos.label}</td>`;
    plan.wochenplan.forEach(t => {
      const z = t.zuweisung[pos.id];
      if (!z) { html += '<td>—</td>'; return; }
      const cl = {stammkraft:'s',kaskade:'k',wolke:'w',joker:'j',gesperrt:'g'}[z.status]||'k';
      html += `<td><span class="${cl}">${z.status==='gesperrt'?'–':(z.person||'—')}</span></td>`;
    });
    html += '</tr>';
  });

  // Frei-Zeile
  html += '<tr class="fr-row"><td>Frei</td>';
  plan.wochenplan.forEach(t => {
    html += `<td>${(t.freiPersonen||[]).join(', ')}</td>`;
  });
  html += '</tr></tbody></table></div>';

  // Freie Tage
  html += '<div class="section-title">Freie Tage</div>';
  (plan.freieTage||[]).forEach(f => {
    const ti = TL.indexOf(f.tag);
    const tagLabel = f.tag ? TK[ti]||f.tag : '—';
    let wunschHtml = '';
    if (f.wunschFreierTag) {
      const wi = TL.indexOf(f.wunschFreierTag);
      const wn = TN[wi]||f.wunschFreierTag;
      wunschHtml = f.tag===f.wunschFreierTag
        ? `<div class="ft-wunsch wok">✓ Wunschtag: ${wn}</div>`
        : `<div class="ft-wunsch wno">✗ Wunsch war: ${wn}</div>`;
    }
    html += `<div class="ft-row">
      <div class="ft-name">${f.name}</div>
      <div class="ft-right"><div class="ft-tag">${tagLabel}</div>${wunschHtml}</div>
    </div>`;
  });

  document.getElementById('planContent').innerHTML = html;
}

init();
</script>
</body>
</html>
