<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stempeluhr — BäckereiOS</title>
  <link rel="stylesheet" href="../systemdesign.css">

  <style>
    body { padding-bottom: 80px; }

    /* ── Shell übernimmt Navigation ── */
    .app-header { display: none; }

    /* Druck-Button im Panel */
    .st-print-btn {
      background: none; border: 1.5px solid var(--border-s);
      border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; line-height: 1;
      padding: 8px 18px;
      color: var(--dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    .st-print-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Stempel-Panel ── */
    .st-panel {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 32px 24px 28px;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }

    /* Sanduhr — Emoji, immer sichtbar */
    .st-hg {
      font-size: 72px;
      line-height: 1;
      filter: grayscale(1) opacity(0.25);
      transition: filter 0.5s;
      user-select: none;
    }
    .st-hg.aktiv {
      filter: grayscale(0) opacity(1);
      animation: hg-flip 4s ease-in-out infinite;
    }
    @keyframes hg-flip {
      0%   { transform: rotate(0deg);   }
      42%  { transform: rotate(0deg);   }
      58%  { transform: rotate(180deg); }
      100% { transform: rotate(180deg); }
    }

    /* Status-Text */
    .st-status {
      font-size: 0.95rem; letter-spacing: 0.04em;
      color: var(--dim); min-height: 22px; text-align: center;
    }
    .st-status.aktiv { color: var(--amber); font-weight: 700; font-size: 1.05rem; }

    /* Laufzeit */
    .st-clock {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem; font-weight: 700;
      letter-spacing: 0.06em; min-height: 56px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .st-clock.aktiv { color: var(--amber); }

    /* Stempel-Buttons */
    .st-btn-row { display: flex; gap: 12px; width: 100%; max-width: 380px; }
    .st-btn {
      flex: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      border: none; border-radius: 10px;
      padding: 14px 10px; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .st-btn:active:not(:disabled) { transform: scale(0.97); }
    .st-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .st-btn-ein { background: var(--amber); color: #fff; }
    .st-btn-aus {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border-s);
    }
    .st-btn-aus:not(:disabled):hover { border-color: var(--amber); }

    /* Datenschutz-Hinweis */
    .st-privacy {
      padding: 8px 16px;
      font-size: 0.72rem;
      color: var(--dim);
      background: var(--bg);
      border-bottom: 1.5px solid var(--border);
      letter-spacing: 0.01em;
    }

    /* ── Filter-Leiste ── */
    .st-filter {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1.5px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr auto 1fr;
      align-items: center;
      gap: 8px 10px;
    }
    .st-filter label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--dim);
    }
    .st-filter input[type="date"] {
      width: 100%;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      padding: 7px 10px;
      color-scheme: light dark;
    }
    .st-filter-total {
      grid-column: 1 / -1;
      text-align: right;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      color: var(--text);
    }
    .st-filter-total span { color: var(--amber); }

    /* Manuell-Button */
    .st-manual-btn {
      display: block; width: 100%;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      background: none; border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 10px 16px;
      color: var(--dim); cursor: pointer;
      text-align: left;
      transition: color 0.15s, background 0.15s;
    }
    .st-manual-btn:hover { color: var(--amber); background: var(--surface2); }
    .st-manual-btn i { margin-right: 6px; }

    /* ── Tabelle ── */
    .st-empty {
      padding: 48px 24px; text-align: center;
      color: var(--dim); font-size: 0.9rem;
    }
    table.st {
      width: 100%; border-collapse: collapse;
      font-family: 'Barlow', sans-serif; font-size: 0.9rem;
    }
    table.st th {
      text-align: left; padding: 7px 10px;
      font-size: 0.68rem; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--dim); background: var(--surface2);
      border-bottom: 1.5px solid var(--border);
    }
    table.st td { padding: 10px 10px; border-bottom: 1px solid var(--border); }
    table.st tr:hover td { background: var(--surface2); }
    table.st th:first-child, table.st td:first-child { padding-left: 16px; }
    table.st th:last-child,  table.st td:last-child  { padding-right: 16px; text-align: right; }
    table.st th:nth-child(4), table.st td:nth-child(4) { text-align: right; }
    .st-dauer { font-weight: 700; }

    /* KW-Zeile */
    .kw-row td {
      background: var(--bg);
      font-size: 0.7rem; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--dim); padding: 5px 10px;
      border-top: 1.5px solid var(--border);
      border-bottom: 1.5px solid var(--border);
    }
    .kw-row td:nth-child(3) { text-align: right; color: var(--text); font-size: 0.85rem; }
    .kw-row td:last-child { padding-right: 16px; }

    /* Löschen-Button */
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--dim); font-size: 0.85rem; font-weight: 700;
      padding: 4px 8px; vertical-align: middle;
      transition: color 0.15s, background 0.15s;
      border-radius: 6px;
    }
    .del-btn:hover { color: var(--red); background: rgba(200,70,70,0.08); }

    /* ── Manuell-Eintrag Modal ── */
    .st-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.45);
    }
    .st-overlay.open { display: block; }

    .st-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 24px 20px 32px;
      z-index: 201;
      box-shadow: 0 -6px 30px rgba(0,0,0,0.15);
    }
    .st-sheet-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--dim); margin-bottom: 18px;
    }
    .st-field {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 14px;
    }
    .st-field label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--dim); width: 50px; flex-shrink: 0;
    }
    .st-field input { flex: 1; }
    .st-dauer-preview {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--amber); text-align: right;
      min-height: 24px; margin-bottom: 18px;
    }
    .st-sheet-btns { display: flex; gap: 10px; }
    .st-sheet-btns button {
      flex: 1; font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem; font-weight: 900;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 13px; border-radius: 10px; border: none; cursor: pointer;
    }
    .st-sheet-cancel {
      background: var(--surface2); color: var(--text);
      border: 1.5px solid var(--border-s) !important;
    }
    .st-sheet-save { background: var(--amber); color: #fff; }
    .st-error {
      font-size: 0.8rem; color: var(--red);
      margin-bottom: 12px; min-height: 18px;
    }

    /* ── Druck ── */
    @media print {
      .bos-shell-header, .bos-shell-bottom, .st-panel, .st-privacy, .st-filter, .st-manual-btn,
      .del-btn, .st-overlay, .st-sheet { display: none !important; }
      .st-print-head { display: block !important; }
      table.st th { background: #eee; color: #333; }
      table.st td { border-color: #ddd; }
      table.st tr:hover td { background: #fff; }
      .kw-row td { background: #e0e0e0; color: #333; }
      body { padding: 0; background: #fff; }
    }
    .st-print-head {
      display: none; padding: 0 16px 16px;
      border-bottom: 2px solid #000; margin-bottom: 14px;
    }
    .st-ph-logo {
      font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 300;
    }
    .st-ph-sub  { font-size: 0.75rem; color: #666; margin-top: 2px; }
    .st-ph-range { font-size: 0.9rem; font-weight: 700; margin-top: 8px; }
    .st-ph-total {
      font-size: 1rem; font-weight: 700; margin-top: 10px;
      padding-top: 8px; border-top: 1px solid #bbb; text-align: right;
    }
  </style>
</head>
<body>

<!-- Druckkopf -->
<div class="st-print-head" id="phHead">
  <div class="st-ph-logo">🥐 BäckereiOS — Stempeluhr</div>
  <div class="st-ph-sub">Bäckerei Langrehr · Schichtzeiterfassung</div>
  <div class="st-ph-range" id="phRange"></div>
  <div class="st-ph-total" id="phTotal"></div>
</div>

<!-- Kopf (wird von shell.js versteckt) -->
<header class="app-header">
  <a href="../index.html">← Start</a>
  <span>Stempeluhr</span>
</header>

<!-- Panel -->
<section class="st-panel">
  <div class="st-hg" id="stHg">⏳</div>
  <div class="st-status" id="stStatus">Nicht eingestempelt</div>
  <div class="st-clock"  id="stClock"></div>
  <div class="st-btn-row">
    <button class="st-btn st-btn-ein" id="btnEin" onclick="stempelEin()">Einstempeln</button>
    <button class="st-btn st-btn-aus" id="btnAus" onclick="stempelAus()" disabled>Ausstempeln</button>
  </div>
  <button class="st-print-btn" onclick="window.print()">🖨 Drucken</button>
</section>

<!-- Datenschutz-Hinweis -->
<div class="st-privacy">
  🔒 Alle Daten werden ausschließlich lokal auf diesem Gerät gespeichert — keine Serverübertragung.
</div>

<!-- Filter -->
<div class="st-filter">
  <label>Von</label>
  <input type="date" id="fVon" onchange="renderTable()">
  <label>Bis</label>
  <input type="date" id="fBis" onchange="renderTable()">
  <div class="st-filter-total" id="filterTotal"></div>
</div>

<!-- Manuell eintragen -->
<button class="st-manual-btn" onclick="openManual()">
  + Manuell eintragen
</button>

<!-- Tabelle -->
<div id="tableWrap"></div>

<!-- ── Manuell-Eintrag Sheet ── -->
<div class="st-overlay" id="overlay" onclick="closeManual()"></div>
<div class="st-sheet" id="sheet" style="display:none">
  <div class="st-sheet-title">Manuellen Eintrag erfassen</div>

  <div class="st-field">
    <label>Datum</label>
    <input type="date" id="mDatum">
  </div>
  <div class="st-field">
    <label>Von</label>
    <input type="time" id="mVon" oninput="updatePreview()">
  </div>
  <div class="st-field">
    <label>Bis</label>
    <input type="time" id="mBis" oninput="updatePreview()">
  </div>
  <div class="st-dauer-preview" id="dauerPreview"></div>
  <div class="st-error" id="mError"></div>

  <div class="st-sheet-btns">
    <button class="st-sheet-cancel" onclick="closeManual()">Abbrechen</button>
    <button class="st-sheet-save"   onclick="saveManual()">Speichern</button>
  </div>
</div>

<script>
// ── Helfer ────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');
const $ = id => document.getElementById(id);

function tsToDateStr(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function tsToTimeStr(ts) {
  const d = new Date(ts);
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function todayStr() { return tsToDateStr(Date.now()); }

function formatDE(str) {
  if (!str) return '–';
  const [y,m,d] = str.split('-');
  return d + '.' + m + '.' + y;
}
function wt(str) {
  const t = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const [y,m,d] = str.split('-').map(Number);
  return t[new Date(y, m-1, d).getDay()];
}
function getKW(str) {
  const [y,m,d] = str.split('-').map(Number);
  const dt   = new Date(y, m-1, d);
  const jan4 = new Date(y, 0, 4);
  const mon  = new Date(jan4);
  mon.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  return 'KW ' + pad(Math.floor((dt - mon) / 86400000 / 7) + 1);
}
function durStr(min) {
  if (min <= 0) return '0:00 h';
  return Math.floor(min/60) + ':' + pad(min%60) + ' h';
}
function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

// ── Storage ───────────────────────────────────────────────────────
const K_AK = 'BOS_STEMPEL_AKTIV';
const K_DB = 'BOS_STEMPELUHR';
const ldAk = () => { try { return JSON.parse(localStorage.getItem(K_AK)) || null; } catch { return null; } };
const ldDB = () => { try { return JSON.parse(localStorage.getItem(K_DB))  || []; }  catch { return []; } };
const svAk = v => localStorage.setItem(K_AK, JSON.stringify(v));
const svDB = v => localStorage.setItem(K_DB, JSON.stringify(v));

// ── Stempel ───────────────────────────────────────────────────────
function stempelEin() {
  if (ldAk()) return;
  const ts = Date.now();
  svAk({ ein_ts: ts, ein_str: tsToTimeStr(ts), ein_datum: tsToDateStr(ts) });
  updatePanel();
}

function stempelAus() {
  const ak = ldAk();
  if (!ak) return;
  const aus = Date.now();
  const db  = ldDB();
  db.push({
    id:        aus,
    datum:     ak.ein_datum,
    ein:       ak.ein_str,
    aus:       tsToTimeStr(aus),
    dauer_min: Math.round((aus - ak.ein_ts) / 60000)
  });
  svDB(db);
  localStorage.removeItem(K_AK);
  updatePanel();
  renderTable();
}

function loeschen(id) {
  const e = ldDB().find(x => x.id === id);
  if (!e) return;
  const msg = `Eintrag löschen?\n\n${wt(e.datum)}, ${formatDE(e.datum)}\n${e.ein} – ${e.aus} Uhr (${durStr(e.dauer_min)})`;
  if (!confirm(msg)) return;
  svDB(ldDB().filter(x => x.id !== id));
  renderTable();
}

// ── Panel ─────────────────────────────────────────────────────────
let ticker = null;

function updatePanel() {
  const ak = ldAk();
  clearInterval(ticker);

  if (ak) {
    $('stHg').classList.add('aktiv');
    $('stStatus').textContent = 'Eingestempelt seit ' + ak.ein_str + ' Uhr';
    $('stStatus').classList.add('aktiv');
    $('btnEin').disabled = true;
    $('btnAus').disabled = false;
    const tick = () => {
      const s = Math.floor((Date.now() - ak.ein_ts) / 1000);
      $('stClock').textContent = pad(Math.floor(s/3600)) + ':' + pad(Math.floor(s%3600/60)) + ':' + pad(s%60);
      $('stClock').classList.add('aktiv');
    };
    tick();
    ticker = setInterval(tick, 1000);
  } else {
    $('stHg').classList.remove('aktiv');
    $('stStatus').textContent = 'Nicht eingestempelt';
    $('stStatus').classList.remove('aktiv');
    $('stClock').textContent = '';
    $('stClock').classList.remove('aktiv');
    $('btnEin').disabled = false;
    $('btnAus').disabled = true;
  }
}

// ── Filter ────────────────────────────────────────────────────────
function initFilter() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  $('fVon').value = y + '-' + pad(m) + '-01';
  $('fBis').value = y + '-' + pad(m) + '-' + pad(new Date(y, m, 0).getDate());
}

// ── Tabelle ───────────────────────────────────────────────────────
function renderTable() {
  const von = $('fVon').value, bis = $('fBis').value;
  const liste = ldDB()
    .filter(e => (!von || e.datum >= von) && (!bis || e.datum <= bis))
    .sort((a,b) => a.datum.localeCompare(b.datum) || a.ein.localeCompare(b.ein));

  const gesamt = liste.reduce((s,e) => s + e.dauer_min, 0);
  $('filterTotal').innerHTML = liste.length
    ? 'Gesamt: <span>' + durStr(gesamt) + '</span>' : '';

  $('phRange').textContent  = 'Zeitraum: ' + formatDE(von) + ' – ' + formatDE(bis);
  $('phTotal').textContent  = 'Gesamtstunden: ' + durStr(gesamt);

  const wrap = $('tableWrap');
  if (!liste.length) {
    wrap.innerHTML = '<div class="st-empty">Keine Einträge in diesem Zeitraum.</div>';
    return;
  }

  const gruppen = {};
  for (const e of liste) {
    const k = getKW(e.datum);
    (gruppen[k] = gruppen[k] || []).push(e);
  }

  let h = `<table class="st"><thead><tr>
    <th>Datum</th><th>Ein</th><th>Aus</th><th>Dauer</th><th></th>
  </tr></thead><tbody>`;

  for (const [k, eintr] of Object.entries(gruppen)) {
    const summe = eintr.reduce((s,e) => s + e.dauer_min, 0);
    for (const e of eintr) {
      h += `<tr>
        <td>${wt(e.datum)}, ${formatDE(e.datum)}</td>
        <td>${e.ein} Uhr</td>
        <td>${e.aus} Uhr</td>
        <td class="st-dauer">${durStr(e.dauer_min)}</td>
        <td><button class="del-btn" onclick="loeschen(${e.id})" title="Löschen">✕</button></td>
      </tr>`;
    }
    h += `<tr class="kw-row">
      <td colspan="2">${k} — Summe</td>
      <td>${durStr(summe)}</td>
      <td></td><td></td>
    </tr>`;
  }

  h += '</tbody></table>';
  wrap.innerHTML = h;
}

// ── Manueller Eintrag ─────────────────────────────────────────────
function openManual() {
  $('mDatum').value = todayStr();
  $('mVon').value   = '';
  $('mBis').value   = '';
  $('dauerPreview').textContent = '';
  $('mError').textContent = '';
  $('overlay').classList.add('open');
  $('sheet').style.display = 'block';
}

function closeManual() {
  $('overlay').classList.remove('open');
  $('sheet').style.display = 'none';
}

function updatePreview() {
  const von = $('mVon').value, bis = $('mBis').value;
  if (!von || !bis) { $('dauerPreview').textContent = ''; return; }
  let min = timeToMin(bis) - timeToMin(von);
  if (min < 0) min += 24 * 60; // Nachtschicht über Mitternacht
  $('dauerPreview').textContent = durStr(min);
}

function saveManual() {
  const datum = $('mDatum').value;
  const von   = $('mVon').value;
  const bis   = $('mBis').value;
  $('mError').textContent = '';

  if (!datum) { $('mError').textContent = 'Bitte Datum angeben.'; return; }
  if (!von)   { $('mError').textContent = 'Bitte Von-Zeit angeben.'; return; }
  if (!bis)   { $('mError').textContent = 'Bitte Bis-Zeit angeben.'; return; }

  let min = timeToMin(bis) - timeToMin(von);
  if (min < 0) min += 24 * 60;
  if (min === 0) { $('mError').textContent = 'Von und Bis dürfen nicht identisch sein.'; return; }

  const msg = `Eintrag speichern?\n\n${wt(datum)}, ${formatDE(datum)}\n${von} – ${bis} Uhr\nDauer: ${durStr(min)}`;
  if (!confirm(msg)) return;

  const id = Date.now();
  const db = ldDB();
  db.push({ id, datum, ein: von, aus: bis, dauer_min: min });
  svDB(db);
  closeManual();
  renderTable();
}

// ── Start ─────────────────────────────────────────────────────────
initFilter();
updatePanel();
renderTable();
</script>
  <script src="../shell.js"></script>
</body>
</html>
