<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Der Fluss — BäckereiOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  <style>
    :root {
      --amber:    #b8790a;
      --amber-dim:#d49a36;
      --bg:       #f5f2ee;
      --bg2:      #ffffff;
      --bg3:      #ede9e3;
      --border:   #d4cdc4;
      --text:     #2a2420;
      --text-dim: #8a7e74;
      --green:    #2e6b42;
      --green-bright: #3a8a55;
      --green-bg: #e8f5ec;
      --red:      #9b2c2c;
      --red-bright:#c04040;
      --red-bg:   #fdf0f0;
      --blue:     #2a4e7a;
      --blue-bright:#3a6aa0;
      --blue-bg:  #eef4fb;
      --radius:   8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-back {
      color: var(--amber);
      text-decoration: none;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .header h1 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      color: var(--amber);
      flex: 1;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .header-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
    }
    .header-btn i { font-size: 18px; }
    .header-btn span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
    .header-btn:hover { color: var(--amber); border-color: var(--amber); }

    /* ── Wochennavigation ───────────────────────── */
    .wochennav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .wochennavBtn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      transition: border-color 0.15s;
    }
    .wochennavBtn:hover { border-color: var(--amber); color: var(--amber); }
    .wochenLabel {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }
    .wochenLabel span { color: var(--amber); font-size: 20px; }

    /* ── Warnungen ──────────────────────────────── */
    .warnungen {
      padding: 0 16px;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .warnung-item {
      background: var(--red-bg);
      border: 1px solid #e8b0b0;
      color: var(--red);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Wochenplan Tabelle ─────────────────────── */
    .table-wrapper {
      overflow-x: auto;
      padding: 12px 16px 0;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }
    thead th {
      padding: 8px 10px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
    }
    thead th.today-col { color: var(--amber); border-bottom-color: var(--amber); }
    thead th:first-child { text-align: left; min-width: 100px; }

    tbody td {
      padding: 5px 6px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody td:first-child {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding-left: 0;
      white-space: nowrap;
    }
    .plan-cell {
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      min-width: 70px;
      line-height: 1.2;
      user-select: none;
    }
    .plan-cell:active { transform: scale(0.96); }
    .plan-cell.stammkraft { background: var(--green-bg); color: var(--green); border: 1px solid #b0d8bc; }
    .plan-cell.kaskade    { background: #fff8e8; color: #7a5200; border: 1px solid #e8d090; }
    .plan-cell.wolke      { background: var(--blue-bg); color: var(--blue); border: 1px solid #b8d0e8; }
    .plan-cell.joker      { background: var(--red-bg);  color: var(--red); border: 1px solid #e8b0b0; }
    .plan-cell.gesperrt   { background: var(--bg3); color: var(--text-dim); font-style: italic; font-weight: 400; border: 1px solid var(--border); }
    .plan-cell .cell-name { display: block; }
    .plan-cell .cell-sub  { display: block; font-size: 11px; opacity: 0.7; font-weight: 400; }

    /* ── Legende ────────────────────────────────── */
    .legende {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .legende-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .legende-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    /* ── Tabs ───────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 16px;
      margin-top: 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      padding: 10px 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active, .tab-btn:hover {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    /* ── Tab-Inhalte ────────────────────────────── */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      color: var(--amber);
      margin-bottom: 14px;
    }

    /* ── Formulare ──────────────────────────────── */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
    }
    .form-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    select, input[type="text"], input[type="date"] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      width: 100%;
      -webkit-appearance: none;
    }
    select:focus, input:focus {
      outline: none;
      border-color: var(--amber);
    }
    .btn {
      background: var(--amber);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #e5ab47; }
    .btn-danger {
      background: none;
      border: 1px solid var(--red-bright);
      color: var(--red-bright);
    }
    .btn-danger:hover { background: var(--red); color: #ffd0d0; }
    .btn-secondary {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Listen ─────────────────────────────────── */
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      gap: 10px;
    }
    .list-item-info { flex: 1; }
    .list-item-name { font-weight: 700; font-size: 15px; }
    .list-item-sub  { font-size: 12px; color: var(--text-dim); }

    /* ── Freie Tage Grid ────────────────────────── */
    .freitag-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .freitag-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
    }
    .freitag-name {
      font-weight: 700;
      min-width: 90px;
      font-size: 15px;
    }
    .freitag-row select { flex: 1; }

    /* ── Konfiguration ──────────────────────────── */
    .person-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .person-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
    }
    .person-card-header:hover { background: var(--bg3); }
    .person-card-body {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .person-card-body.open { display: block; }
    .person-card-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .attr-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .attr-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .attr-tag button {
      background: none;
      border: none;
      color: var(--red-bright);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }
    .attr-prio {
      font-size: 10px;
      color: var(--amber);
      font-weight: 700;
      min-width: 10px;
    }

    /* ── Archiv ──────────────────────────────────── */
    .archiv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .archiv-table th {
      padding: 6px 8px; text-align: center;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
      color: var(--text-dim); border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .archiv-table th:first-child { text-align: left; min-width: 80px; }
    .archiv-table td {
      padding: 5px 8px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .archiv-table td:first-child { font-weight: 700; text-align: left; }
    .archiv-cell-sa   { background: #fff3d0; color: #8a6000; border-radius: 4px; padding: 2px 6px; font-weight: 700; }
    .archiv-cell-tag  { background: var(--bg3); color: var(--text-dim); border-radius: 4px; padding: 2px 6px; }
    .archiv-cell-leer { color: var(--border); }
    .archiv-kw-header { color: var(--text-dim); font-size: 10px; }
    .archiv-kw-header.current { color: var(--amber); }

    /* ── Übersicht ───────────────────────────────── */
    .uebersicht-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ue-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .ue-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .ue-name {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      flex: 1;
    }
    .ue-rolle {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .ue-rolle.stammkraft { background: var(--green-bg); color: var(--green); border: 1px solid #b0d8bc; }
    .ue-rolle.wolke      { background: var(--blue-bg); color: var(--blue); border: 1px solid #b8d0e8; }
    .ue-attr-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .ue-attr {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 13px;
    }
    .ue-attr-num {
      font-size: 10px;
      color: var(--amber);
      font-weight: 700;
    }
    .ue-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .ue-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 7px;
    }
    .ue-tag.sperr { border-color: var(--red); color: #f08080; }

    /* ── Detail-Modal ───────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      color: var(--amber);
      margin-bottom: 12px;
    }
    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-label { color: var(--text-dim); }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      margin-top: -4px;
    }

    /* ── Export/Import ──────────────────────────── */
    .import-export {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    #importInput { display: none; }

    .azubi-badge {
      font-size: 10px;
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid #b8d0e8;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 4px;
    }

    /* ── Print ──────────────────────────────────── */
    #print-header { display: none; }
    #print-freitag { display: none; }

    @media print {
      @page { size: A4 landscape; margin: 8mm; }

      body { background: white !important; }

      .header, .wochennavigation-bar, .warnungen, .legende,
      .tabs, .tab-content, .modal-overlay { display: none !important; }

      /* Print-Header */
      #print-header {
        display: grid !important;
        grid-template-columns: 1fr auto;
        align-items: end;
        border-bottom: 2px solid #1a1510;
        padding-bottom: 5px;
        margin-bottom: 6px;
        page-break-inside: avoid;
      }
      .print-kicker { font-size: 7px; text-transform: uppercase; letter-spacing: 2px; color: #b8790a; }
      .print-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 900; line-height: 1.1; }
      .print-sub { font-size: 9.5px; color: #7a6e60; }
      .print-meta { font-size: 8px; color: #7a6e60; text-align: right; line-height: 1.6; }

      /* Tabelle nimmt den größten Teil */
      .table-wrapper {
        overflow: visible !important;
        padding: 0 !important;
        page-break-inside: avoid;
      }

      #wochenplanTable {
        width: 100% !important;
        border-collapse: collapse !important;
        font-size: 11px !important;
        font-family: 'Barlow Condensed', sans-serif !important;
        page-break-inside: avoid;
      }
      #wochenplanTable thead th {
        font-size: 9px !important; text-transform: uppercase !important;
        letter-spacing: 0.3px !important; color: #7a6e60 !important;
        padding: 5px 7px !important; text-align: center !important;
        border-bottom: 2px solid #1a1510 !important; background: white !important;
      }
      #wochenplanTable thead th:first-child { text-align: left !important; }
      #wochenplanTable tbody td {
        padding: 5px 7px !important; text-align: center !important;
        border-bottom: 1px solid #ddd !important; font-size: 11px !important;
        background: white !important;
      }
      #wochenplanTable tbody td:first-child {
        text-align: left !important; font-size: 8.5px !important;
        text-transform: uppercase !important; letter-spacing: 0.3px !important;
        color: #7a6e60 !important; white-space: nowrap !important;
      }
      .plan-cell {
        background: none !important; border: none !important;
        padding: 0 !important; border-radius: 0 !important;
        display: inline !important; cursor: default !important;
      }
      .plan-cell.stammkraft { color: #2e6b42 !important; font-weight: 700 !important; }
      .plan-cell.kaskade, .plan-cell.wolke { color: #1a1510 !important; }
      .plan-cell.joker { color: #b03030 !important; font-style: italic !important; }
      .plan-cell.gesperrt { color: #ccc !important; }
      .plan-cell .cell-sub { display: none !important; }

      /* Freie Tage: kompakter Streifen, keine eigene Tabelle */
      #print-freitag {
        display: block !important;
        border-top: 1.5px solid #ddd;
        margin-top: 6px;
        padding-top: 5px;
        page-break-inside: avoid;
        page-break-before: avoid;
      }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="../index.html" class="header-back">
    <i class="ph ph-arrow-left"></i>
  </a>
  <h1>Der Fluss</h1>
  <div class="header-actions">
    <button class="header-btn" onclick="window.print()" title="Drucken">
      <i class="ph ph-printer"></i><span>Drucken</span>
    </button>
    <label class="header-btn" for="importArbeitsplan" title="Arbeitsplan-JS laden" style="cursor:pointer">
      <i class="ph ph-file-arrow-up"></i><span>Plan laden</span>
    </label>
    <input type="file" id="importArbeitsplan" accept=".js" onchange="importArbeitsplanJS(event)" style="display:none">
    <button class="header-btn" onclick="exportArbeitsplan()" title="Arbeitsplan exportieren">
      <i class="ph ph-export"></i><span>Plan speichern</span>
    </button>
  </div>
</header>
<input type="file" id="importInput" accept=".json" onchange="importConfig(event)" style="display:none">

<!-- ── Print Header (nur im Druck sichtbar) ──────────── -->
<div id="print-header">
  <div>
    <div class="print-kicker">Nachtschicht · Bäckerei</div>
    <div class="print-title" id="print-title"></div>
    <div class="print-sub" id="print-sub"></div>
  </div>
  <div class="print-meta" id="print-meta"></div>
</div>

<!-- ── Wochennavigation ────────────────────────────────── -->
<div class="wochennavigation wochennavigation-bar" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);">
  <button class="wochennavBtn" onclick="changeWeek(-1)">
    <i class="ph ph-caret-left"></i>
  </button>
  <div class="wochenLabel" id="wochenLabel"></div>
  <button class="wochennavBtn" onclick="changeWeek(+1)">
    <i class="ph ph-caret-right"></i>
  </button>
</div>

<!-- ── Warnungen ──────────────────────────────────────── -->
<div class="warnungen" id="warnungenBox"></div>

<!-- ── Wochenplan Tabelle ─────────────────────────────── -->
<div class="table-wrapper">
  <table id="wochenplanTable"></table>
</div>

<!-- ── Legende ───────────────────────────────────────── -->
<div class="legende">
  <div class="legende-item"><div class="legende-dot" style="background:var(--green-bg);border:1px solid #b0d8bc"></div>Stammkraft</div>

<script src="fluss_logik.js"></script>
<script>
// ── Config & State ──────────────────────────────────────
const STORAGE_KEY = 'fluss_config_v1';
const TAGE_NAMEN_LANG = ['montag','dienstag','mittwoch','donnerstag','freitag','samstag'];
const TAGE_NAMEN_KURZ = ['Mo','Di','Mi','Do','Fr','Sa'];

let config = null;
let currentMonday = FLUSS_LOGIK.getMondayOfWeek(new Date());

// ── Config laden / speichern ────────────────────────────
async function loadConfig() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { config = JSON.parse(stored); return; } catch(e) {}
  }
  // Fallback: fluss_config.json laden
  try {
    const res = await fetch('fluss_config.json', { cache: 'no-store' });
    config = await res.json();
  } catch(e) {
    config = { positionen: [], personen: [], joker: '', fehlzeiten: [], freieTage: {} };
  }
  saveToStorage();
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
}

function importArbeitsplanJS(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      // window.NACHTSCHICHT_PLAENE aus dem JS-Inhalt extrahieren
      const content = e.target.result;
      // Sicher evaluieren: JSON-Teil extrahieren
      const match = content.match(/window\.NACHTSCHICHT_PLAENE\s*=\s*(\{[\s\S]*?\});\s*$/m)
                 || content.match(/window\.NACHTSCHICHT_PLAENE\s*=\s*(\{[\s\S]*\})/);
      if (!match) throw new Error('Format nicht erkannt');
      const data = JSON.parse(match[1]);
      localStorage.setItem('fluss_arbeitsplaene', JSON.stringify(data));
      const count = Object.keys(data).length;
      alert(`${count} Woche(n) geladen. Jetzt exportieren um aktuelle Woche hinzuzufügen.`);
    } catch(err) {
      alert('Fehler beim Laden: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function exportArbeitsplan() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const plan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const personen = config.personen || [];
  const positionen = config.positionen || [];

  // Frei-Personen pro Tag vorberechnen
  plan.forEach(tag => {
    tag.freiPersonen = personen.filter(p => {
      if (p.azubi) return false;
      if ((config.fehlzeiten||[]).some(f => f.personId===p.id && tag.datum>=f.von && tag.datum<=f.bis)) return false;
      return FLUSS_LOGIK.getFreierTag(p.id, weekKey, config.freieTage) === tag.tag;
    }).map(p => p.name);
  });

  // Freie-Tage-Liste
  const freieTageList = personen.filter(p => !p.azubi).map(p => ({
    name: p.name,
    tag: FLUSS_LOGIK.getFreierTag(p.id, weekKey, config.freieTage),
    typ: FLUSS_LOGIK.getFreierTagTyp(p.id, weekKey, config.freieTage),
    wunschFreierTag: p.wunschFreierTag || null
  }));

  // Bestehende Pläne laden und neuen hinzufügen
  let existing = {};
  try {
    const stored = localStorage.getItem('fluss_arbeitsplaene');
    if (stored) existing = JSON.parse(stored);
  } catch(e) {}

  existing[weekKey] = {
    erstellt: new Date().toISOString(),
    wochenplan: plan,
    freieTage: freieTageList,
    positionen: positionen
  };

  // Als JS-Datei exportieren
  const js = `// Arbeitsplan Nachtschicht — BäckereiOS\n// Erstellt: ${new Date().toLocaleString('de-DE')}\n\nwindow.NACHTSCHICHT_PLAENE = ${JSON.stringify(existing, null, 2)};\n`;
  const blob = new Blob([js], { type: 'application/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'arbeitsplan_nachtschicht.js';
  a.click();

  // Auch lokal speichern
  localStorage.setItem('fluss_arbeitsplaene', JSON.stringify(existing));
}

function exportConfig() {
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fluss_config.json';
  a.click();
}

function importConfig(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      config = JSON.parse(e.target.result);
      saveToStorage();
      renderAll();
      alert('Konfiguration geladen.');
    } catch(err) {
      alert('Fehler beim Laden: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function buildPrintFreitag(weekKey, plan) {
  const el = document.getElementById('print-freitag');
  if (!el) return;
  const TL = TAGE_NAMEN_LANG;
  const TK = TAGE_NAMEN_KURZ;
  const TN = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const pers = (config.personen || []).filter(p => !p.azubi);

  // Kompakte Chips: "Rosa: Di ✓" oder "Harrison: Do ✗Di"
  const chips = pers.map(p => {
    const tag = FLUSS_LOGIK.getFreierTag(p.id, weekKey, config.freieTage);
    const ti = TL.indexOf(tag);
    const tl = tag ? TK[ti] || tag : '—';
    let suffix = '';
    if (p.wunschFreierTag) {
      const wi = TL.indexOf(p.wunschFreierTag);
      suffix = tag === p.wunschFreierTag
        ? ` <span style="color:#2e6b42">✓</span>`
        : ` <span style="color:#b03030" title="Wunsch: ${TN[wi]}">✗</span>`;
    }
    return `<span style="display:inline-block;margin-right:14px;white-space:nowrap;font-size:9px">
      <strong style="font-size:9px">${p.name}</strong> ${tl}${suffix}
    </span>`;
  }).join('');

  // Joker
  const jokers = plan.flatMap(t =>
    Object.entries(t.zuweisung || {})
      .filter(([,z]) => z.status === 'joker')
      .map(([posId]) => {
        const pos = (config.positionen||[]).find(p=>p.id===posId);
        return `${t.tagKurz}/${pos?.label||posId}`;
      })
  );

  const jokerHtml = jokers.length > 0
    ? `<span style="color:#b03030;font-size:9px;font-weight:700;margin-left:20px">⚠ Joker: ${jokers.join(', ')}</span>`
    : `<span style="color:#2e6b42;font-size:9px;margin-left:20px">✓ Vollbesetzt</span>`;

  el.innerHTML = `
    <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:4px">
      <div>
        <span style="font-size:7px;text-transform:uppercase;letter-spacing:1.5px;color:#b8790a;margin-right:10px">Freie Tage</span>
        ${chips}
      </div>
      <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
        ${jokerHtml}
        <span style="font-size:8px;color:#7a6e60"><strong style="color:#2e6b42">Fett</strong>=Stamm · Kursiv=Joker</span>
      </div>
    </div>`;
}

// ── Woche navigieren ────────────────────────────────────
function changeWeek(delta) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + delta * 7);
  renderAll();
}

function renderWochenLabel() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const kw = weekKey.split('-W')[1];
  const jahr = weekKey.split('-W')[0];
  const thisMonday = FLUSS_LOGIK.getMondayOfWeek(new Date());
  const isThisWeek = FLUSS_LOGIK.dateToISO(currentMonday) === FLUSS_LOGIK.dateToISO(thisMonday);
  document.getElementById('wochenLabel').innerHTML =
    `<span>KW ${kw}</span> / ${jahr}` + (isThisWeek ? ' <span class="heute-badge">Diese Woche</span>' : '');
  document.getElementById('freieTageWochLabel').textContent = `KW ${kw} / ${jahr}`;

  // Print-Header befüllen
  const plan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const monStr = plan[0]?.datumFormatiert || '';
  const saStr  = plan[5]?.datumFormatiert || '';
  const el = document.getElementById('print-title');
  if (el) el.textContent = `KW ${kw} · ${jahr}`;
  const es = document.getElementById('print-sub');
  if (es) es.textContent = `${monStr} — ${saStr}`;
  const em = document.getElementById('print-meta');
  if (em) em.innerHTML = `Gedruckt ${new Date().toLocaleDateString('de-DE')}, ${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr`;

  // Print-Freitag befüllen
  buildPrintFreitag(weekKey, plan);
}

// ── Wochenplan rendern ──────────────────────────────────
function renderWochenplan() {
  const wochenplan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const today = FLUSS_LOGIK.dateToISO(new Date());
  const table = document.getElementById('wochenplanTable');

  // Header
  let html = '<thead><tr><th></th>';
  wochenplan.forEach((tag, i) => {
    const isToday = tag.datum === today;
    html += `<th class="${isToday ? 'today-col' : ''}">
      ${TAGE_NAMEN_KURZ[i]}<br>
      <span style="font-size:11px;font-weight:400">${tag.datumFormatiert}</span>
    </th>`;
  });
  html += '</tr></thead><tbody>';

  // Zeilen pro Position
  const positionen = config.positionen || [];
  positionen.forEach(pos => {
    html += `<tr><td>${pos.label}</td>`;
    wochenplan.forEach(tag => {
      const z = tag.zuweisung[pos.id];
      if (!z) {
        html += '<td></td>';
        return;
      }
      const statusClass = z.status;
      const subText = z.status === 'gesperrt' ? '—' :
                      z.status === 'joker' ? 'Joker!' : '';
      html += `<td>
        <div class="plan-cell ${statusClass}"
             onclick="showDetail('${pos.id}', '${tag.datum}')"
             data-posid="${pos.id}" data-datum="${tag.datum}">
          <span class="cell-name">${z.person || '—'}</span>
          ${subText ? `<span class="cell-sub">${subText}</span>` : ''}
        </div>
      </td>`;
    });
    html += '</tr>';
  });

  // Frei-Zeile
  html += `<tr><td style="color:var(--text-dim);font-size:12px">FREI</td>`;
  wochenplan.forEach(tag => {
    const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
    const freiPersonen = (config.personen || []).filter(p => {
      if (p.azubi) return false;
      // Krank/Urlaub → nicht als "frei" anzeigen
      const istFehlend = (config.fehlzeiten || []).some(f =>
        f.personId === p.id && tag.datum >= f.von && tag.datum <= f.bis
      );
      if (istFehlend) return false;
      const freiTag = FLUSS_LOGIK.getFreierTag(p.id, weekKey, config.freieTage);
      return freiTag === tag.tag;
    });
    const gesperrtPersonen = (config.personen || []).filter(p =>
      !p.azubi && (p.gesperrt || []).includes(tag.tag) &&
      !(config.fehlzeiten || []).some(f =>
        f.personId === p.id && tag.datum >= f.von && tag.datum <= f.bis
      )
    );
    const alle = [...freiPersonen, ...gesperrtPersonen];
    if (alle.length === 0) {
      html += `<td></td>`;
    } else {
      const namen = alle.map(p => {
        const isGesperrt = (p.gesperrt || []).includes(tag.tag);
        return `<div style="font-size:11px;color:${isGesperrt ? 'var(--text-dim)' : 'var(--red)'};line-height:1.4">${p.name}</div>`;
      }).join('');
      html += `<td>${namen}</td>`;
    }
  });
  html += '</tr>';

  // Azubi-Zeile
  const azubi = (config.personen || []).find(p => p.azubi);
  if (azubi) {
    const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
    html += `<tr><td style="color:var(--blue);font-size:12px">AZUBI</td>`;
    wochenplan.forEach(tag => {
      const isGesperrt = (azubi.gesperrt || []).includes(tag.tag);
      const fehlzeit = (config.fehlzeiten || []).find(f =>
        f.personId === azubi.id && tag.datum >= f.von && tag.datum <= f.bis
      );
      const assigned = Object.entries(tag.zuweisung || {})
        .find(([, z]) => z.personId === azubi.id);

      if (isGesperrt) {
        const label = tag.tag === 'freitag' ? 'Schule' : 'Frei';
        html += `<td><div class="plan-cell gesperrt"><span class="cell-name">${label}</span></div></td>`;
      } else if (fehlzeit) {
        html += `<td><div class="plan-cell joker"><span class="cell-name">${fehlzeit.typ}</span></div></td>`;
      } else if (assigned) {
        const pos = (config.positionen || []).find(p => p.id === assigned[0]);
        html += `<td><div class="plan-cell kaskade" onclick="showDetail('${assigned[0]}','${tag.datum}')">
          <span class="cell-name">${azubi.name}</span>
          <span class="cell-sub">${pos?.label || assigned[0]}</span>
        </div></td>`;
      } else {
        html += `<td><div class="plan-cell" style="background:#f5f2ee;border:1px dashed #ccc;color:#aaa;cursor:default">
          <span class="cell-name" style="font-size:12px">Lernt</span>
        </div></td>`;
      }
    });
    html += '</tr>';
  }

  // Sonderschicht-Zeile (Samstag)
  const samstag = wochenplan[5];
  if (samstag?.sonderschicht?.length > 0) {
    html += `<tr>
      <td style="color:var(--blue-bright);font-size:11px">SONDER&shy;SCHICHT</td>`;
    wochenplan.forEach((tag, i) => {
      if (i < 5) {
        html += '<td></td>';
      } else {
        const namen = tag.sonderschicht.map(p =>
          `<div class="plan-cell wolke" style="margin-bottom:4px;cursor:default">
            <span class="cell-name">${p.name}</span>
            <span class="cell-sub">optional</span>
          </div>`
        ).join('');
        html += `<td>${namen}</td>`;
      }
    });
    html += '</tr>';
  }

  html += '</tbody>';
  table.innerHTML = html;

  // Warnungen
  const alleWarnungen = wochenplan.flatMap(t => t.warnungen);
  const warnBox = document.getElementById('warnungenBox');
  if (alleWarnungen.length > 0) {
    warnBox.innerHTML = alleWarnungen.map(w =>
      `<div class="warnung-item"><i class="ph ph-warning"></i>${w}</div>`
    ).join('');
  } else {
    warnBox.innerHTML = '';
  }

  // Vorschläge aktualisieren wenn Freie-Tage-Tab aktiv
  if (document.getElementById('tab-freieTage')?.classList.contains('active')) {
    renderVorschlaege();
    renderWocheStatus();
  }
}

// ── Detail-Modal ────────────────────────────────────────
function showDetail(posId, datum) {
  const wochenplan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const tag = wochenplan.find(t => t.datum === datum);
  if (!tag) return;
  const z = tag.zuweisung[posId];
  const pos = (config.positionen || []).find(p => p.id === posId);

  document.getElementById('modalTitle').textContent =
    `${pos?.label || posId} — ${tag.tagKurz} ${tag.datumFormatiert}`;

  let content = '';
  const rows = [
    ['Besetzt durch', z.person || '—'],
    ['Status', statusLabel(z.status)],
  ];
  if (z.stammkraftName) {
    rows.push(['Stammkraft', z.stammkraftName]);
    rows.push(['Stammkraft-Status', z.stammkraftGrund || '?']);
  }
  if (z.grund) rows.push(['Grund', z.grund]);

  content = rows.map(([l, v]) =>
    `<div class="modal-row"><span class="modal-label">${l}</span><span>${v}</span></div>`
  ).join('');

  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('detailModal').classList.add('open');
}

function statusLabel(s) {
  return { stammkraft: 'Stammkraft', kaskade: 'Kaskade', wolke: 'Wolke', joker: 'Joker', gesperrt: 'Gesperrt', offen: 'Offen' }[s] || s;
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) {
    document.getElementById('detailModal').classList.remove('open');
  }
}

// ── Tab-Switching ───────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');

  if (id === 'freieTage') { renderFreieTage(); renderWocheStatus(); renderVorschlaege(); }
  if (id === 'konfiguration') renderKonfiguration();
  if (id === 'fehlzeiten') renderFehlzeiten();
  if (id === 'uebersicht') renderUebersicht();
  if (id === 'archiv') renderArchiv();
}

function renderArchiv() {
  const container = document.getElementById('archivInhalt');
  const currentWeekKey = FLUSS_LOGIK.getWeekKey(currentMonday);

  // Alle gespeicherten Wochen sammeln und sortieren (neueste zuerst)
  const alleWochen = Object.keys(config.freieTage || {})
    .sort((a, b) => b.localeCompare(a))
    .slice(0, 12); // Max 12 Wochen anzeigen

  if (alleWochen.length === 0) {
    container.innerHTML = '<p style="color:var(--text-dim);padding:16px;font-size:14px">Noch keine Wochen gespeichert.</p>';
    return;
  }

  const personen = (config.personen || []).filter(p => !p.azubi);

  // Sa-Gesamtstatistik
  const saGesamt = {};
  personen.forEach(p => {
    saGesamt[p.id] = 0;
    alleWochen.forEach(wk => {
      const tag = FLUSS_LOGIK.getFreierTag(p.id, wk, config.freieTage);
      if (tag === 'samstag') saGesamt[p.id]++;
    });
  });

  // KW-Header
  const kwHeaders = alleWochen.map(wk => {
    const kw = wk.split('-W')[1];
    const isCurrent = wk === currentWeekKey;
    return `<th class="archiv-kw-header ${isCurrent ? 'current' : ''}">KW${kw}</th>`;
  }).join('');

  // Zeilen pro Person
  const rows = personen.map(p => {
    const zellen = alleWochen.map(wk => {
      const tag = FLUSS_LOGIK.getFreierTag(p.id, wk, config.freieTage);
      const typ = FLUSS_LOGIK.getFreierTagTyp(p.id, wk, config.freieTage);
      if (!tag) return `<td><span class="archiv-cell-leer">—</span></td>`;
      const tagIdx = TAGE_NAMEN_LANG.indexOf(tag);
      const label = TAGE_NAMEN_KURZ[tagIdx] || tag;
      const isSa = tag === 'samstag';
      return `<td><span class="${isSa ? 'archiv-cell-sa' : 'archiv-cell-tag'}" title="${typ || ''}">${label}</span></td>`;
    }).join('');

    const saCount = saGesamt[p.id];
    const saBar = saCount > 0
      ? `<span style="background:#fff3d0;color:#8a6000;border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px">${saCount}× Sa</span>`
      : '';

    return `<tr>
      <td>${p.name}${saBar}</td>
      ${zellen}
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="section-title" style="padding:16px 0 8px">Freie Tage — letzte ${alleWochen.length} Wochen</div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px">
      Samstag <span class="archiv-cell-sa" style="font-size:11px">Sa</span> farblich hervorgehoben.
      Wird vom Auto-Verteilen zur fairen Rotation genutzt.
    </p>
    <div style="overflow-x:auto">
      <table class="archiv-table">
        <thead>
          <tr>
            <th>Person</th>
            ${kwHeaders}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderUebersicht() {
  const positionen = config.positionen || [];
  const grid = document.getElementById('uebersichtGrid');
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const historie = FLUSS_LOGIK.getFreierTagHistorie(config, null);

  // Sa-Ranking für alle Personen
  const saZaehler = {};
  (config.personen || []).forEach(p => {
    saZaehler[p.id] = (historie[p.id] || {})['samstag'] || 0;
  });

  grid.innerHTML = '<div class="uebersicht-grid">' +
    (config.personen || []).map(p => {
      const stammkraftPos = positionen.find(pp => pp.id === p.stammkraft_von);
      const rolle = stammkraftPos
        ? `<span class="ue-rolle stammkraft">${stammkraftPos.label}</span>`
        : `<span class="ue-rolle wolke">Wolke</span>`;
      const azubiBadge = p.azubi ? '<span class="azubi-badge">Azubi</span>' : '';

      const attrPills = (p.attribute || []).map((a, i) =>
        `<div class="ue-attr"><span class="ue-attr-num">${i+1}</span>${a}</div>`
      ).join('');

      const tags = [];
      if ((p.gesperrt || []).length > 0) {
        const sperr = p.gesperrt.map(t => t.substring(0,2).toUpperCase()).join(', ');
        tags.push(`<span class="ue-tag sperr">Gesperrt: ${sperr}</span>`);
      }
      const freiTag = FLUSS_LOGIK.getFreierTag(p.id, weekKey, config.freieTage);
      const freiTyp = FLUSS_LOGIK.getFreierTagTyp(p.id, weekKey, config.freieTage);
      if (freiTag) {
        const idx = TAGE_NAMEN_LANG.indexOf(freiTag);
        const typLabel = freiTyp === 'wunsch' ? ' ★' : freiTyp === 'auto' ? ' (Auto)' : ' (M)';
        tags.push(`<span class="ue-tag">Frei KW ${weekKey.split('-W')[1]}: ${TAGE_NAMEN_KURZ[idx] || freiTag}${typLabel}</span>`);
      }
      if (p.wunschFreierTag) {
        const idx = TAGE_NAMEN_LANG.indexOf(p.wunschFreierTag);
        tags.push(`<span class="ue-tag">Wunsch: ${TAGE_NAMEN_KURZ[idx] || p.wunschFreierTag}</span>`);
      }

      // Sa-Statistik
      if (!p.azubi) {
        const saAnzahl = saZaehler[p.id] || 0;
        tags.push(`<span class="ue-tag" style="color:var(--amber);border-color:var(--amber)">Sa frei: ${saAnzahl}×</span>`);
      }

      return `<div class="ue-card">
        <div class="ue-card-top">
          <div class="ue-name">${p.name}${azubiBadge}</div>
          ${rolle}
        </div>
        <div class="ue-attr-list">${attrPills || '<span style="color:var(--text-dim);font-size:13px">Keine Attribute</span>'}</div>
        ${tags.length > 0 ? `<div class="ue-footer">${tags.join('')}</div>` : ''}
      </div>`;
    }).join('') +
  '</div>';
}

// ── Fehlzeiten ──────────────────────────────────────────
function renderPersonSelect(selectId) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  sel.innerHTML = (config.personen || [])
    .map(p => `<option value="${p.id}">${p.name}</option>`)
    .join('');
}

function addFehlzeit() {
  const personId = document.getElementById('fz-person').value;
  const typ = document.getElementById('fz-typ').value;
  const von = document.getElementById('fz-von').value;
  const bis = document.getElementById('fz-bis').value;
  if (!personId || !von || !bis) { alert('Bitte alle Felder ausfüllen.'); return; }
  if (von > bis) { alert('"Von" muss vor "Bis" liegen.'); return; }
  if (!config.fehlzeiten) config.fehlzeiten = [];
  config.fehlzeiten.push({ personId, typ, von, bis });
  saveToStorage();
  renderFehlzeiten();
  renderWochenplan();
}

function removeFehlzeit(idx) {
  config.fehlzeiten.splice(idx, 1);
  saveToStorage();
  renderFehlzeiten();
  renderWochenplan();
}

function renderFehlzeiten() {
  renderPersonSelect('fz-person');
  const liste = document.getElementById('fehlzeitenListe');
  if (!config.fehlzeiten || config.fehlzeiten.length === 0) {
    liste.innerHTML = '<p style="color:var(--text-dim);font-size:14px">Keine Fehlzeiten erfasst.</p>';
    return;
  }
  const sorted = [...config.fehlzeiten].map((f, i) => ({...f, _idx: i}))
    .sort((a, b) => b.von.localeCompare(a.von));
  liste.innerHTML = sorted.map(f => {
    const person = (config.personen || []).find(p => p.id === f.personId);
    const typBadge = f.typ === 'krank'
      ? `<span style="color:#f08080">${f.typ}</span>`
      : `<span style="color:#80c0f0">${f.typ}</span>`;
    return `<div class="list-item">
      <div class="list-item-info">
        <div class="list-item-name">${person?.name || f.personId}</div>
        <div class="list-item-sub">${typBadge} · ${f.von} bis ${f.bis}</div>
      </div>
      <button class="btn btn-danger" onclick="removeFehlzeit(${f._idx})">
        <i class="ph ph-trash"></i>
      </button>
    </div>`;
  }).join('');
}

// ── Freie Tage ──────────────────────────────────────────
function renderFreieTage() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const grid = document.getElementById('freitagGrid');

  const typBadge = (typ) => {
    if (!typ) return '';
    if (typ === 'wunsch')  return `<span style="background:#fff8e0;color:#8a6000;border:1px solid #e8d090;border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px">★ Wunsch</span>`;
    if (typ === 'auto')    return `<span style="background:#f0f0f0;color:#666;border:1px solid #ccc;border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px">Auto</span>`;
    return `<span style="background:#eef4fb;color:var(--blue);border:1px solid #b8d0e8;border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px">Manuell</span>`;
  };

  // Übersichtstabelle
  const tabelleRows = (config.personen || []).filter(p => !p.azubi).map(p => {
    const tag = FLUSS_LOGIK.getFreierTag(p.id, weekKey, config.freieTage);
    const typ = FLUSS_LOGIK.getFreierTagTyp(p.id, weekKey, config.freieTage);

    // Wunsch-Indikator
    let wunschIndikator = '';
    if (p.wunschFreierTag) {
      if (tag === p.wunschFreierTag) {
        wunschIndikator = `<span style="color:var(--green);font-size:14px;margin-left:4px" title="Wunschtag hat geklappt">✓</span>`;
      } else if (tag) {
        const wunschIdx = TAGE_NAMEN_LANG.indexOf(p.wunschFreierTag);
        wunschIndikator = `<span style="color:var(--red-bright);font-size:14px;margin-left:4px" title="Wunsch war ${TAGE_NAMEN_KURZ[wunschIdx]}">✗</span>`;
      }
    }

    const locked = p.gesperrt || [];
    const options = `<option value="">—</option>` + TAGE_NAMEN_LANG.map((t, i) => {
      const disabled = locked.includes(t) ? 'disabled' : '';
      return `<option value="${t}" ${tag === t ? 'selected' : ''} ${disabled}>${TAGE_NAMEN_KURZ[i]}</option>`;
    }).join('');

    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 12px;font-weight:700;white-space:nowrap">${p.name}</td>
      <td style="padding:4px 12px">
        <select id="frei-${p.id}" onchange="liveFreierTag('${p.id}', this.value)"
          style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;width:60px">
          ${options}
        </select>
        ${wunschIndikator}
      </td>
      <td style="padding:7px 8px">${typBadge(typ)}</td>
    </tr>`;
  });

  // Azubi-Zeile
  const azubi = (config.personen || []).find(p => p.azubi);
  const azubiRow = azubi ? `<tr style="border-bottom:1px solid var(--border);opacity:0.5">
    <td style="padding:7px 12px;font-weight:700">${azubi.name} <span class="azubi-badge">Azubi</span></td>
    <td colspan="2" style="padding:7px 12px;font-size:13px;color:var(--text-dim)">Über Sperrtage geregelt</td>
  </tr>` : '';

  const tabelle = `<table style="width:100%;border-collapse:collapse;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
    <thead><tr style="border-bottom:2px solid var(--border)">
      <th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim)">Person</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim)">Freier Tag</th>
      <th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim)">Typ</th>
    </tr></thead>
    <tbody>${tabelleRows.join('')}${azubiRow}</tbody>
  </table>
  <button class="btn" style="margin-bottom:14px;width:100%" onclick="saveFreieTage()">
    <i class="ph ph-floppy-disk"></i> Woche speichern
  </button>`;

  grid.innerHTML = tabelle;
}

function saveFreieTage() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (!config.freieTage) config.freieTage = {};
  const bestehend = config.freieTage[weekKey] || {};
  config.freieTage[weekKey] = {};
  (config.personen || []).forEach(p => {
    const val = document.getElementById(`frei-${p.id}`)?.value;
    if (!val) return;
    const oldEntry = bestehend[p.id];
    const oldTag = typeof oldEntry === 'string' ? oldEntry : oldEntry?.tag;
    const oldTyp = typeof oldEntry === 'string' ? 'auto' : (oldEntry?.typ || 'auto');
    if (val === oldTag) {
      // Unverändert → Typ beibehalten
      config.freieTage[weekKey][p.id] = { tag: val, typ: oldTyp };
    } else {
      // Aktiv geändert
      const typ = val === p.wunschFreierTag ? 'wunsch' : 'manuell';
      config.freieTage[weekKey][p.id] = { tag: val, typ };
    }
  });
  saveToStorage();
  renderWochenplan();
  renderFreieTage();
  renderVorschlaege();
}

function istWocheBestaetigt(weekKey) {
  return !!(config.freieTage?.[weekKey]?._meta?.bestaetigt);
}

function wocheBestaetigen() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (!config.freieTage) config.freieTage = {};
  if (!config.freieTage[weekKey]) config.freieTage[weekKey] = {};
  config.freieTage[weekKey]._meta = {
    bestaetigt: new Date().toISOString(),
    bestaetigtAm: new Date().toLocaleDateString('de-DE')
  };
  saveToStorage();
  renderFreieTage();
  renderVorschlaege();
}

function renderWocheStatus() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const banner = document.getElementById('wocheStatusBanner');
  const btnAuto = document.getElementById('btnAutoVerteilen');
  const btnBestaetigen = document.getElementById('btnWocheBestaetigen');
  if (!banner) return;

  const hatFreieTage = Object.keys(config.freieTage?.[weekKey] || {})
    .filter(k => k !== '_meta').length > 0;
  const bestaetigt = istWocheBestaetigt(weekKey);
  const bestaetigtAm = config.freieTage?.[weekKey]?._meta?.bestaetigtAm;

  if (bestaetigt) {
    banner.innerHTML = `<div style="background:#e8f5ec;border:1px solid #b0d8bc;border-radius:var(--radius);padding:10px 14px;font-size:14px;color:var(--green);display:flex;align-items:center;gap:8px">
      <i class="ph ph-check-circle" style="font-size:18px"></i>
      <div><strong>Woche bestätigt</strong> am ${bestaetigtAm} — freie Tage sind gesperrt.
      Fehlzeiten können weiterhin eingetragen werden.</div>
    </div>`;
    if (btnAuto) btnAuto.style.display = 'none';
    if (btnBestaetigen) btnBestaetigen.style.display = 'none';
  } else if (hatFreieTage) {
    banner.innerHTML = `<div style="background:#fff8e0;border:1px solid #e8d090;border-radius:var(--radius);padding:10px 14px;font-size:14px;color:#7a5200;display:flex;align-items:center;gap:8px">
      <i class="ph ph-warning" style="font-size:18px"></i>
      <div>Freie Tage verteilt aber <strong>noch nicht bestätigt</strong>. Jetzt bestätigen um die Basis zu sichern.</div>
    </div>`;
    if (btnAuto) btnAuto.style.display = '';
    if (btnBestaetigen) btnBestaetigen.style.display = '';
  } else {
    banner.innerHTML = `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;color:var(--text-dim)">
      Noch keine freien Tage für diese Woche. Auto-Verteilen starten.
    </div>`;
    if (btnAuto) btnAuto.style.display = '';
    if (btnBestaetigen) btnBestaetigen.style.display = 'none';
  }
}

function resetWoche() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (istWocheBestaetigt(weekKey)) {
    if (!confirm('Diese Woche ist bereits bestätigt. Wirklich zurücksetzen?')) return;
  } else {
    if (!confirm('Alle freien Tage dieser Woche zurücksetzen?')) return;
  }
  if (config.freieTage) delete config.freieTage[weekKey];
  saveToStorage();
  renderFreieTage();
  renderWochenplan();
  document.getElementById('vorschlaegeBanner').innerHTML = '';
}

function liveFreierTag(personId, val) {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (!config.freieTage) config.freieTage = {};
  if (!config.freieTage[weekKey]) config.freieTage[weekKey] = {};
  const person = (config.personen || []).find(p => p.id === personId);
  if (val) {
    const typ = val === person?.wunschFreierTag ? 'wunsch' : 'manuell';
    config.freieTage[weekKey][personId] = { tag: val, typ };
  } else {
    delete config.freieTage[weekKey][personId];
  }
  saveToStorage();
  renderWochenplan();
  renderFreieTage();
  renderWocheStatus();
  renderVorschlaege();
}

function renderVarianten(varianten) {
  const banner = document.getElementById('variantenBanner');
  if (!banner) return;
  if (!varianten || varianten.length <= 1) { banner.innerHTML = ''; return; }
  const items = varianten.map((v, i) => {
    const tage = Object.entries(v)
      .filter(([k]) => k !== '_meta')
      .map(([id, e]) => {
        const p = (config.personen||[]).find(p=>p.id===id);
        const tag = typeof e==='string'?e:e.tag;
        const ti = TAGE_NAMEN_LANG.indexOf(tag);
        return `${p?.name||id}: ${TAGE_NAMEN_KURZ[ti]||tag}`;
      }).join(' · ');
    return `<div style="padding:8px 0;border-bottom:1px solid #e8d8a0">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span style="color:#7a5200;font-weight:700;font-size:12px">Variante ${i+1}</span>
        <button class="btn" style="padding:3px 10px;font-size:12px" onclick="varianteUebernehmen(${i})">Übernehmen</button>
      </div>
      <div style="font-size:11px;color:#5a4a20;margin-top:2px">${tage}</div>
    </div>`;
  }).join('');
  banner.innerHTML = `<div style="background:#fffbf0;border:1px solid #e8d090;border-radius:var(--radius);padding:12px 14px;margin-bottom:12px">
    <div style="font-size:12px;font-weight:700;color:#7a5200;margin-bottom:6px">
      <i class="ph ph-shuffle"></i> ${varianten.length} Verteilungsvarianten
    </div>${items}</div>`;
  window._aktuelleVarianten = varianten;
}

function varianteUebernehmen(idx) {
  const v = window._aktuelleVarianten?.[idx];
  if (!v) return;
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (!config.freieTage) config.freieTage = {};
  config.freieTage[weekKey] = v;
  saveToStorage();
  renderFreieTage();
  renderWochenplan();
  renderWocheStatus();
  renderVorschlaege();
  document.getElementById('variantenBanner').innerHTML = '';
}

function renderVorschlaege() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const banner = document.getElementById('vorschlaegeBanner');
  if (!banner) return;
  const wochenplan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const hatJoker = wochenplan.some(tag =>
    Object.values(tag.zuweisung || {}).some(z => z.status === 'joker')
  );
  if (!hatJoker) { banner.innerHTML = ''; return; }
  const vorschlaege = FLUSS_LOGIK.berechneVorschlaege(config, weekKey, currentMonday);
  if (vorschlaege.length === 0) {
    banner.innerHTML = `<div style="background:#fff8e0;border:1px solid #e8d090;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:14px;color:#7a5200">
      <strong>Joker erkannt</strong> — kein automatischer Lösungsvorschlag gefunden.
    </div>`;
    return;
  }
  const items = vorschlaege.map((v, i) => {
    const vonIdx = TAGE_NAMEN_LANG.indexOf(v.vonTag);
    const aufIdx = TAGE_NAMEN_LANG.indexOf(v.aufTag);
    const hint = v.hint ? `<span style="font-size:11px;color:#5a8a60;margin-left:6px">(${v.hint})</span>` : '';
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e8d090">
      <span><strong>${v.personName}</strong>: ${TAGE_NAMEN_KURZ[vonIdx]} → ${TAGE_NAMEN_KURZ[aufIdx]}${hint}</span>
      <button class="btn" style="padding:4px 12px;font-size:13px" onclick="vorschlagUebernehmen(${i})">Übernehmen</button>
    </div>`;
  }).join('');
  banner.innerHTML = `<div style="background:#fff8e0;border:1px solid #e8d090;border-radius:var(--radius);padding:12px 14px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:#7a5200;margin-bottom:8px">
      <i class="ph ph-lightbulb"></i> Joker erkannt — Vorschläge:
    </div>${items}</div>`;
  window._aktuelleVorschlaege = vorschlaege;
}

function autoVerteilen() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (istWocheBestaetigt(weekKey)) {
    alert('Diese Woche ist bereits bestätigt. Erst "Zurücksetzen" um neu zu planen.');
    return;
  }
  // Varianten berechnen
  const varianten = FLUSS_LOGIK.autoVerteilVarianten(config, weekKey, 3);
  // Erste Variante direkt anwenden
  if (!config.freieTage) config.freieTage = {};
  config.freieTage[weekKey] = varianten[0];
  saveToStorage();
  renderFreieTage();
  renderWochenplan();
  renderWocheStatus();
  renderVorschlaege();
  // Varianten anzeigen wenn es mehrere gibt
  renderVarianten(varianten);
}

function saveJoker() {
  config.joker = document.getElementById('jokerName').value;
  saveToStorage();
  renderWochenplan();
}

function renderKonfiguration() {
  document.getElementById('jokerName').value = config.joker || '';
  renderPersonenListe();
  renderPositionenListe();
}

function renderPersonenListe() {
  const liste = document.getElementById('personenListe');
  const positionen = config.positionen || [];

  liste.innerHTML = (config.personen || []).map((p, idx) => {
    const stammkraftPos = positionen.find(pp => pp.id === p.stammkraft_von);
    const azuBadge = p.azubi ? '<span class="azubi-badge">Azubi</span>' : '';
    return `<div class="person-card">
      <div class="person-card-header" onclick="togglePersonCard(${idx})">
        <div>
          <strong>${p.name}</strong>${azuBadge}
          <div style="font-size:12px;color:var(--text-dim)">
            ${stammkraftPos ? `Stammkraft: ${stammkraftPos.label}` : 'Wolke'}
            · Attr: ${(p.attribute||[]).join(', ')}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-danger" onclick="event.stopPropagation();removePerson(${idx})">
            <i class="ph ph-trash"></i>
          </button>
        </div>
      </div>
      <div class="person-card-body" id="pcard-${idx}">
        <div class="person-card-fields">
          <div class="form-group">
            <label>Name</label>
            <input type="text" value="${p.name}" onchange="updatePerson(${idx},'name',this.value)">
          </div>
          <div class="form-group">
            <label>Stammkraft von</label>
            <select onchange="updatePerson(${idx},'stammkraft_von',this.value)">
              <option value="">— Wolke —</option>
              ${positionen.map(pp =>
                `<option value="${pp.id}" ${p.stammkraft_von === pp.id ? 'selected' : ''}>${pp.label}</option>`
              ).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Attribute (in Priorität)</label>
            <div class="attr-tags" id="attrTags-${idx}">
              ${(p.attribute||[]).map((a, ai) =>
                `<div class="attr-tag"><span class="attr-prio">${ai+1}</span>${a}<button onclick="removeAttr(${idx},${ai})">×</button></div>`
              ).join('')}
            </div>
            <div style="display:flex;gap:6px;margin-top:6px">
              <select id="newAttr-${idx}" style="flex:1">
                <option value="">— Attribut wählen —</option>
                ${[...new Set((config.positionen||[]).map(pp => pp.attribut))]
                  .filter(a => !(p.attribute||[]).includes(a))
                  .map(a => `<option value="${a}">${a}</option>`).join('')}
              </select>
              <button class="btn btn-secondary" onclick="addAttr(${idx})">+</button>
            </div>
          </div>
          <div class="form-group">
            <label>Sperrtage</label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
              ${TAGE_NAMEN_LANG.map((t, ti) => `
                <label style="display:flex;align-items:center;gap:4px;font-size:14px;cursor:pointer">
                  <input type="checkbox" ${(p.gesperrt||[]).includes(t) ? 'checked' : ''}
                    onchange="toggleSperrtag(${idx},'${t}',this.checked)">
                  ${TAGE_NAMEN_KURZ[ti]}
                </label>
              `).join('')}
            </div>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
              <input type="checkbox" ${p.azubi ? 'checked' : ''}
                onchange="updatePerson(${idx},'azubi',this.checked)">
              Azubi (darf keine Versand-Positionen füllen)
            </label>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function togglePersonCard(idx) {
  const body = document.getElementById(`pcard-${idx}`);
  body.classList.toggle('open');
}

function updatePerson(idx, field, value) {
  config.personen[idx][field] = value;
  saveToStorage();
  renderWochenplan();
}

function addAttr(idx) {
  const input = document.getElementById(`newAttr-${idx}`);
  const val = input.value.trim().toLowerCase();
  if (!val) return;
  if (!config.personen[idx].attribute) config.personen[idx].attribute = [];
  config.personen[idx].attribute.push(val);
  input.value = '';
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
  document.getElementById(`pcard-${idx}`)?.classList.add('open');
}

function removeAttr(personIdx, attrIdx) {
  config.personen[personIdx].attribute.splice(attrIdx, 1);
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
  document.getElementById(`pcard-${personIdx}`)?.classList.add('open');
}

function toggleSperrtag(idx, tag, checked) {
  if (!config.personen[idx].gesperrt) config.personen[idx].gesperrt = [];
  if (checked) {
    if (!config.personen[idx].gesperrt.includes(tag)) config.personen[idx].gesperrt.push(tag);
  } else {
    config.personen[idx].gesperrt = config.personen[idx].gesperrt.filter(t => t !== tag);
  }
  saveToStorage();
  renderWochenplan();
}

function removePerson(idx) {
  if (!confirm(`${config.personen[idx].name} wirklich entfernen?`)) return;
  config.personen.splice(idx, 1);
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
}

function addPersonDialog() {
  const name = prompt('Name der neuen Person:');
  if (!name || !name.trim()) return;
  const id = name.trim().toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
  config.personen.push({
    id, name: name.trim(),
    attribute: [], stammkraft_von: null,
    wunschFreierTag: null, gesperrt: [], azubi: false
  });
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
}

function renderPositionenListe() {
  const liste = document.getElementById('positionenListe');
  liste.innerHTML = (config.positionen || []).map((pos, idx) => {
    const gesperrtInfo = (pos.gesperrtAm || []).length > 0
      ? `Gesperrt: ${pos.gesperrtAm.join(', ')}`
      : 'Immer aktiv';
    const prioLabel = ['', 'Kritisch', 'Mittel', 'Joker-OK'][pos.prioritaet] || '—';
    return `<div class="list-item">
      <div class="list-item-info">
        <div class="list-item-name">${pos.label}</div>
        <div class="list-item-sub">Attribut: ${pos.attribut} · ${gesperrtInfo} · Priorität: ${prioLabel}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Alles rendern ───────────────────────────────────────
function renderAll() {
  renderWochenLabel();
  renderWochenplan();
  renderFehlzeiten();
  renderPersonSelect('fz-person');
  if (document.getElementById('tab-freieTage').classList.contains('active')) {
    renderFreieTage(); renderWocheStatus(); renderVorschlaege();
  }
  if (document.getElementById('tab-uebersicht').classList.contains('active')) renderUebersicht();
  if (document.getElementById('tab-archiv').classList.contains('active')) renderArchiv();
  if (document.getElementById('tab-konfiguration').classList.contains('active')) renderKonfiguration();
}

// ── Init ────────────────────────────────────────────────
loadConfig().then(() => renderAll());
</script>
</body>
</html>
