<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Der Fluss — BäckereiOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  <style>
    :root {
      --amber:    #d49a36;
      --amber-dim:#a5761f;
      --bg:       #161514;
      --bg2:      #1f1d1b;
      --bg3:      #2a2724;
      --border:   #3a3632;
      --text:     #e8e0d4;
      --text-dim: #8c8278;
      --green:    #4a7c59;
      --green-bright: #5a9c6e;
      --red:      #8c3a3a;
      --red-bright:#c04040;
      --blue:     #3a5e8c;
      --blue-bright:#4a7ab5;
      --radius:   8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-back {
      color: var(--amber);
      text-decoration: none;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .header h1 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      color: var(--amber);
      flex: 1;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { color: var(--amber); border-color: var(--amber); }

    /* ── Wochennavigation ───────────────────────── */
    .wochennav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .wochennavBtn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      transition: border-color 0.15s;
    }
    .wochennavBtn:hover { border-color: var(--amber); color: var(--amber); }
    .wochenLabel {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }
    .wochenLabel span { color: var(--amber); font-size: 20px; }

    /* ── Warnungen ──────────────────────────────── */
    .warnungen {
      padding: 0 16px;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .warnung-item {
      background: #3d1e1e;
      border: 1px solid var(--red-bright);
      color: #f08080;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Wochenplan Tabelle ─────────────────────── */
    .table-wrapper {
      overflow-x: auto;
      padding: 12px 16px 0;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }
    thead th {
      padding: 8px 10px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
    }
    thead th.today-col { color: var(--amber); border-bottom-color: var(--amber); }
    thead th:first-child { text-align: left; min-width: 100px; }

    tbody td {
      padding: 5px 6px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody td:first-child {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding-left: 0;
      white-space: nowrap;
    }
    .plan-cell {
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      min-width: 70px;
      line-height: 1.2;
      user-select: none;
    }
    .plan-cell:active { transform: scale(0.96); }
    .plan-cell.stammkraft { background: var(--green);   color: #d0f0d8; }
    .plan-cell.kaskade    { background: var(--amber-dim); color: #fff8e8; }
    .plan-cell.wolke      { background: #4a5e6e; color: #cce0f0; }
    .plan-cell.joker      { background: var(--red);     color: #ffd0d0; }
    .plan-cell.gesperrt   { background: var(--bg3);     color: var(--text-dim); font-style: italic; font-weight: 400; }
    .plan-cell .cell-name { display: block; }
    .plan-cell .cell-sub  { display: block; font-size: 11px; opacity: 0.7; font-weight: 400; }

    /* ── Legende ────────────────────────────────── */
    .legende {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .legende-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .legende-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    /* ── Tabs ───────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 16px;
      margin-top: 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      padding: 10px 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active, .tab-btn:hover {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    /* ── Tab-Inhalte ────────────────────────────── */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      color: var(--amber);
      margin-bottom: 14px;
    }

    /* ── Formulare ──────────────────────────────── */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
    }
    .form-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    select, input[type="text"], input[type="date"] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      width: 100%;
      -webkit-appearance: none;
    }
    select:focus, input:focus {
      outline: none;
      border-color: var(--amber);
    }
    .btn {
      background: var(--amber);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #e5ab47; }
    .btn-danger {
      background: none;
      border: 1px solid var(--red-bright);
      color: var(--red-bright);
    }
    .btn-danger:hover { background: var(--red); color: #ffd0d0; }
    .btn-secondary {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Listen ─────────────────────────────────── */
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      gap: 10px;
    }
    .list-item-info { flex: 1; }
    .list-item-name { font-weight: 700; font-size: 15px; }
    .list-item-sub  { font-size: 12px; color: var(--text-dim); }

    /* ── Freie Tage Grid ────────────────────────── */
    .freitag-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .freitag-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
    }
    .freitag-name {
      font-weight: 700;
      min-width: 90px;
      font-size: 15px;
    }
    .freitag-row select { flex: 1; }

    /* ── Konfiguration ──────────────────────────── */
    .person-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .person-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
    }
    .person-card-header:hover { background: var(--bg3); }
    .person-card-body {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .person-card-body.open { display: block; }
    .person-card-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .attr-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .attr-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .attr-tag button {
      background: none;
      border: none;
      color: var(--red-bright);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }

    /* ── Detail-Modal ───────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      color: var(--amber);
      margin-bottom: 12px;
    }
    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-label { color: var(--text-dim); }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      margin-top: -4px;
    }

    /* ── Export/Import ──────────────────────────── */
    .import-export {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    #importInput { display: none; }

    .azubi-badge {
      font-size: 10px;
      background: var(--blue);
      color: #c0d8ff;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 4px;
    }

    .heute-badge {
      font-size: 10px;
      background: var(--amber-dim);
      color: #fff8e0;
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="../index.html" class="header-back">
    <i class="ph ph-arrow-left"></i>
  </a>
  <h1>Der Fluss</h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="exportConfig()" title="Konfiguration exportieren">
      <i class="ph ph-download-simple"></i>
    </button>
    <label class="icon-btn" for="importInput" title="Konfiguration importieren" style="cursor:pointer">
      <i class="ph ph-upload-simple"></i>
    </label>
    <input type="file" id="importInput" accept=".json" onchange="importConfig(event)">
  </div>
</header>

<!-- ── Wochennavigation ────────────────────────────────── -->
<div class="wochennavigation wochennavigation-bar" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);">
  <button class="wochennavBtn" onclick="changeWeek(-1)">
    <i class="ph ph-caret-left"></i>
  </button>
  <div class="wochenLabel" id="wochenLabel"></div>
  <button class="wochennavBtn" onclick="changeWeek(+1)">
    <i class="ph ph-caret-right"></i>
  </button>
</div>

<!-- ── Warnungen ──────────────────────────────────────── -->
<div class="warnungen" id="warnungenBox"></div>

<!-- ── Wochenplan Tabelle ─────────────────────────────── -->
<div class="table-wrapper">
  <table id="wochenplanTable"></table>
</div>

<!-- ── Legende ───────────────────────────────────────── -->
<div class="legende">
  <div class="legende-item"><div class="legende-dot" style="background:var(--green)"></div>Stammkraft</div>
  <div class="legende-item"><div class="legende-dot" style="background:var(--amber-dim)"></div>Kaskade</div>
  <div class="legende-item"><div class="legende-dot" style="background:#4a5e6e"></div>Wolke</div>
  <div class="legende-item"><div class="legende-dot" style="background:var(--red)"></div>Joker</div>
  <div class="legende-item"><div class="legende-dot" style="background:var(--bg3);border:1px solid var(--border)"></div>Gesperrt</div>
</div>

<!-- ── Tabs ───────────────────────────────────────────── -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('fehlzeiten', this)">Fehlzeiten</button>
  <button class="tab-btn" onclick="switchTab('freieTage', this)">Freie Tage</button>
  <button class="tab-btn" onclick="switchTab('konfiguration', this)">Konfiguration</button>
</div>

<!-- ── Tab: Fehlzeiten ───────────────────────────────── -->
<div class="tab-content active" id="tab-fehlzeiten">
  <div class="section-title">Fehlzeit erfassen</div>
  <div class="form-row">
    <div class="form-group">
      <label>Person</label>
      <select id="fz-person"></select>
    </div>
    <div class="form-group">
      <label>Art</label>
      <select id="fz-typ">
        <option value="krank">Krank</option>
        <option value="urlaub">Urlaub</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Von</label>
      <input type="date" id="fz-von">
    </div>
    <div class="form-group">
      <label>Bis</label>
      <input type="date" id="fz-bis">
    </div>
    <button class="btn" onclick="addFehlzeit()">Eintragen</button>
  </div>

  <div class="section-title" style="margin-top:20px">Eingetragene Fehlzeiten</div>
  <div id="fehlzeitenListe"></div>
</div>

<!-- ── Tab: Freie Tage ───────────────────────────────── -->
<div class="tab-content" id="tab-freieTage">
  <div class="section-title">Freie Tage — <span id="freieTageWochLabel" style="color:var(--text)"></span></div>
  <p style="font-size:13px;color:var(--text-dim);margin-bottom:14px">
    Wunsch-Freitag pro Person. Kann nicht immer garantiert werden — zeigt nur den Wunsch.
    Gesetzt wird pro Woche.
  </p>
  <div class="freitag-grid" id="freitagGrid"></div>
  <div style="margin-top:14px">
    <button class="btn" onclick="saveFreieTage()">
      <i class="ph ph-floppy-disk"></i> Woche speichern
    </button>
  </div>
</div>

<!-- ── Tab: Konfiguration ────────────────────────────── -->
<div class="tab-content" id="tab-konfiguration">
  <div class="section-title">Personen</div>
  <div id="personenListe"></div>
  <button class="btn btn-secondary" style="margin-bottom:20px" onclick="addPersonDialog()">
    <i class="ph ph-plus"></i> Person hinzufügen
  </button>

  <div class="section-title">Joker</div>
  <div class="form-row" style="margin-bottom:20px">
    <div class="form-group">
      <label>Joker-Name (letzter Ausweg)</label>
      <input type="text" id="jokerName" placeholder="z.B. Heinrich" oninput="saveJoker()">
    </div>
  </div>

  <div class="section-title">Positionen</div>
  <div id="positionenListe"></div>
</div>

<!-- ── Detail-Modal ──────────────────────────────────── -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">
      <i class="ph ph-x"></i>
    </button>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script src="fluss_logik.js"></script>
<script>
// ── Config & State ──────────────────────────────────────
const STORAGE_KEY = 'fluss_config_v1';
const TAGE_NAMEN_LANG = ['montag','dienstag','mittwoch','donnerstag','freitag','samstag'];
const TAGE_NAMEN_KURZ = ['Mo','Di','Mi','Do','Fr','Sa'];

let config = null;
let currentMonday = FLUSS_LOGIK.getMondayOfWeek(new Date());

// ── Config laden / speichern ────────────────────────────
async function loadConfig() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { config = JSON.parse(stored); return; } catch(e) {}
  }
  // Fallback: fluss_config.json laden
  try {
    const res = await fetch('fluss_config.json', { cache: 'no-store' });
    config = await res.json();
  } catch(e) {
    config = { positionen: [], personen: [], joker: '', fehlzeiten: [], freieTage: {} };
  }
  saveToStorage();
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
}

function exportConfig() {
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fluss_config.json';
  a.click();
}

function importConfig(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      config = JSON.parse(e.target.result);
      saveToStorage();
      renderAll();
      alert('Konfiguration geladen.');
    } catch(err) {
      alert('Fehler beim Laden: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Woche navigieren ────────────────────────────────────
function changeWeek(delta) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + delta * 7);
  renderAll();
}

function renderWochenLabel() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const kw = weekKey.split('-W')[1];
  const jahr = weekKey.split('-W')[0];
  const today = FLUSS_LOGIK.dateToISO(new Date());
  const thisMonday = FLUSS_LOGIK.getMondayOfWeek(new Date());
  const isThisWeek = FLUSS_LOGIK.dateToISO(currentMonday) === FLUSS_LOGIK.dateToISO(thisMonday);
  document.getElementById('wochenLabel').innerHTML =
    `<span>KW ${kw}</span> / ${jahr}` + (isThisWeek ? ' <span class="heute-badge">Diese Woche</span>' : '');
  document.getElementById('freieTageWochLabel').textContent = `KW ${kw} / ${jahr}`;
}

// ── Wochenplan rendern ──────────────────────────────────
function renderWochenplan() {
  const wochenplan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const today = FLUSS_LOGIK.dateToISO(new Date());
  const table = document.getElementById('wochenplanTable');

  // Header
  let html = '<thead><tr><th></th>';
  wochenplan.forEach((tag, i) => {
    const isToday = tag.datum === today;
    html += `<th class="${isToday ? 'today-col' : ''}">
      ${TAGE_NAMEN_KURZ[i]}<br>
      <span style="font-size:11px;font-weight:400">${tag.datumFormatiert}</span>
    </th>`;
  });
  html += '</tr></thead><tbody>';

  // Zeilen pro Position
  const positionen = config.positionen || [];
  positionen.forEach(pos => {
    html += `<tr><td>${pos.label}</td>`;
    wochenplan.forEach(tag => {
      const z = tag.zuweisung[pos.id];
      if (!z) {
        html += '<td></td>';
        return;
      }
      const statusClass = z.status;
      const subText = z.status === 'gesperrt' ? '—' :
                      z.status === 'joker' ? 'Joker!' : '';
      html += `<td>
        <div class="plan-cell ${statusClass}"
             onclick="showDetail('${pos.id}', '${tag.datum}')"
             data-posid="${pos.id}" data-datum="${tag.datum}">
          <span class="cell-name">${z.person || '—'}</span>
          ${subText ? `<span class="cell-sub">${subText}</span>` : ''}
        </div>
      </td>`;
    });
    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;

  // Warnungen
  const alleWarnungen = wochenplan.flatMap(t => t.warnungen);
  const warnBox = document.getElementById('warnungenBox');
  if (alleWarnungen.length > 0) {
    warnBox.innerHTML = alleWarnungen.map(w =>
      `<div class="warnung-item"><i class="ph ph-warning"></i>${w}</div>`
    ).join('');
  } else {
    warnBox.innerHTML = '';
  }
}

// ── Detail-Modal ────────────────────────────────────────
function showDetail(posId, datum) {
  const wochenplan = FLUSS_LOGIK.berechneWochenplan(config, currentMonday);
  const tag = wochenplan.find(t => t.datum === datum);
  if (!tag) return;
  const z = tag.zuweisung[posId];
  const pos = (config.positionen || []).find(p => p.id === posId);

  document.getElementById('modalTitle').textContent =
    `${pos?.label || posId} — ${tag.tagKurz} ${tag.datumFormatiert}`;

  let content = '';
  const rows = [
    ['Besetzt durch', z.person || '—'],
    ['Status', statusLabel(z.status)],
  ];
  if (z.stammkraftName) {
    rows.push(['Stammkraft', z.stammkraftName]);
    rows.push(['Stammkraft-Status', z.stammkraftGrund || '?']);
  }
  if (z.grund) rows.push(['Grund', z.grund]);

  content = rows.map(([l, v]) =>
    `<div class="modal-row"><span class="modal-label">${l}</span><span>${v}</span></div>`
  ).join('');

  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('detailModal').classList.add('open');
}

function statusLabel(s) {
  return { stammkraft: 'Stammkraft', kaskade: 'Kaskade', wolke: 'Wolke', joker: 'Joker', gesperrt: 'Gesperrt', offen: 'Offen' }[s] || s;
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) {
    document.getElementById('detailModal').classList.remove('open');
  }
}

// ── Tab-Switching ───────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');

  if (id === 'freieTage') renderFreieTage();
  if (id === 'konfiguration') renderKonfiguration();
  if (id === 'fehlzeiten') renderFehlzeiten();
}

// ── Fehlzeiten ──────────────────────────────────────────
function renderPersonSelect(selectId) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  sel.innerHTML = (config.personen || [])
    .map(p => `<option value="${p.id}">${p.name}</option>`)
    .join('');
}

function addFehlzeit() {
  const personId = document.getElementById('fz-person').value;
  const typ = document.getElementById('fz-typ').value;
  const von = document.getElementById('fz-von').value;
  const bis = document.getElementById('fz-bis').value;
  if (!personId || !von || !bis) { alert('Bitte alle Felder ausfüllen.'); return; }
  if (von > bis) { alert('"Von" muss vor "Bis" liegen.'); return; }
  if (!config.fehlzeiten) config.fehlzeiten = [];
  config.fehlzeiten.push({ personId, typ, von, bis });
  saveToStorage();
  renderFehlzeiten();
  renderWochenplan();
}

function removeFehlzeit(idx) {
  config.fehlzeiten.splice(idx, 1);
  saveToStorage();
  renderFehlzeiten();
  renderWochenplan();
}

function renderFehlzeiten() {
  renderPersonSelect('fz-person');
  const liste = document.getElementById('fehlzeitenListe');
  if (!config.fehlzeiten || config.fehlzeiten.length === 0) {
    liste.innerHTML = '<p style="color:var(--text-dim);font-size:14px">Keine Fehlzeiten erfasst.</p>';
    return;
  }
  const sorted = [...config.fehlzeiten].map((f, i) => ({...f, _idx: i}))
    .sort((a, b) => b.von.localeCompare(a.von));
  liste.innerHTML = sorted.map(f => {
    const person = (config.personen || []).find(p => p.id === f.personId);
    const typBadge = f.typ === 'krank'
      ? `<span style="color:#f08080">${f.typ}</span>`
      : `<span style="color:#80c0f0">${f.typ}</span>`;
    return `<div class="list-item">
      <div class="list-item-info">
        <div class="list-item-name">${person?.name || f.personId}</div>
        <div class="list-item-sub">${typBadge} · ${f.von} bis ${f.bis}</div>
      </div>
      <button class="btn btn-danger" onclick="removeFehlzeit(${f._idx})">
        <i class="ph ph-trash"></i>
      </button>
    </div>`;
  }).join('');
}

// ── Freie Tage ──────────────────────────────────────────
function renderFreieTage() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  const freiMap = (config.freieTage || {})[weekKey] || {};
  const grid = document.getElementById('freitagGrid');

  grid.innerHTML = (config.personen || []).map(p => {
    const locked = p.gesperrt || [];
    const options = TAGE_NAMEN_LANG.map((t, i) => {
      const disabled = locked.includes(t) ? 'disabled' : '';
      return `<option value="${t}" ${freiMap[p.id] === t ? 'selected' : ''} ${disabled}>${TAGE_NAMEN_KURZ[i]}</option>`;
    }).join('');
    const azubiNote = p.azubi ? '<span class="azubi-badge">Azubi</span>' : '';
    return `<div class="freitag-row">
      <div class="freitag-name">${p.name}${azubiNote}</div>
      <select id="frei-${p.id}">
        <option value="">— kein Wunsch —</option>
        ${options}
      </select>
    </div>`;
  }).join('');
}

function saveFreieTage() {
  const weekKey = FLUSS_LOGIK.getWeekKey(currentMonday);
  if (!config.freieTage) config.freieTage = {};
  config.freieTage[weekKey] = {};
  (config.personen || []).forEach(p => {
    const val = document.getElementById(`frei-${p.id}`)?.value;
    if (val) config.freieTage[weekKey][p.id] = val;
  });
  saveToStorage();
  renderWochenplan();
  alert('Freie Tage gespeichert.');
}

// ── Konfiguration ───────────────────────────────────────
function saveJoker() {
  config.joker = document.getElementById('jokerName').value;
  saveToStorage();
  renderWochenplan();
}

function renderKonfiguration() {
  document.getElementById('jokerName').value = config.joker || '';
  renderPersonenListe();
  renderPositionenListe();
}

function renderPersonenListe() {
  const liste = document.getElementById('personenListe');
  const positionen = config.positionen || [];

  liste.innerHTML = (config.personen || []).map((p, idx) => {
    const stammkraftPos = positionen.find(pp => pp.id === p.stammkraft_von);
    const azuBadge = p.azubi ? '<span class="azubi-badge">Azubi</span>' : '';
    return `<div class="person-card">
      <div class="person-card-header" onclick="togglePersonCard(${idx})">
        <div>
          <strong>${p.name}</strong>${azuBadge}
          <div style="font-size:12px;color:var(--text-dim)">
            ${stammkraftPos ? `Stammkraft: ${stammkraftPos.label}` : 'Wolke'}
            · Attr: ${(p.attribute||[]).join(', ')}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-danger" onclick="event.stopPropagation();removePerson(${idx})">
            <i class="ph ph-trash"></i>
          </button>
        </div>
      </div>
      <div class="person-card-body" id="pcard-${idx}">
        <div class="person-card-fields">
          <div class="form-group">
            <label>Name</label>
            <input type="text" value="${p.name}" onchange="updatePerson(${idx},'name',this.value)">
          </div>
          <div class="form-group">
            <label>Stammkraft von</label>
            <select onchange="updatePerson(${idx},'stammkraft_von',this.value)">
              <option value="">— Wolke —</option>
              ${positionen.map(pp =>
                `<option value="${pp.id}" ${p.stammkraft_von === pp.id ? 'selected' : ''}>${pp.label}</option>`
              ).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Attribute (in Priorität)</label>
            <div class="attr-tags" id="attrTags-${idx}">
              ${(p.attribute||[]).map((a, ai) =>
                `<div class="attr-tag">${a}<button onclick="removeAttr(${idx},${ai})">×</button></div>`
              ).join('')}
            </div>
            <div style="display:flex;gap:6px;margin-top:6px">
              <input type="text" id="newAttr-${idx}" placeholder="Attribut hinzufügen" style="flex:1">
              <button class="btn btn-secondary" onclick="addAttr(${idx})">+</button>
            </div>
          </div>
          <div class="form-group">
            <label>Sperrtage</label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
              ${TAGE_NAMEN_LANG.map((t, ti) => `
                <label style="display:flex;align-items:center;gap:4px;font-size:14px;cursor:pointer">
                  <input type="checkbox" ${(p.gesperrt||[]).includes(t) ? 'checked' : ''}
                    onchange="toggleSperrtag(${idx},'${t}',this.checked)">
                  ${TAGE_NAMEN_KURZ[ti]}
                </label>
              `).join('')}
            </div>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
              <input type="checkbox" ${p.azubi ? 'checked' : ''}
                onchange="updatePerson(${idx},'azubi',this.checked)">
              Azubi (darf keine Versand-Positionen füllen)
            </label>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function togglePersonCard(idx) {
  const body = document.getElementById(`pcard-${idx}`);
  body.classList.toggle('open');
}

function updatePerson(idx, field, value) {
  config.personen[idx][field] = value;
  saveToStorage();
  renderWochenplan();
}

function addAttr(idx) {
  const input = document.getElementById(`newAttr-${idx}`);
  const val = input.value.trim().toLowerCase();
  if (!val) return;
  if (!config.personen[idx].attribute) config.personen[idx].attribute = [];
  config.personen[idx].attribute.push(val);
  input.value = '';
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
  document.getElementById(`pcard-${idx}`)?.classList.add('open');
}

function removeAttr(personIdx, attrIdx) {
  config.personen[personIdx].attribute.splice(attrIdx, 1);
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
  document.getElementById(`pcard-${personIdx}`)?.classList.add('open');
}

function toggleSperrtag(idx, tag, checked) {
  if (!config.personen[idx].gesperrt) config.personen[idx].gesperrt = [];
  if (checked) {
    if (!config.personen[idx].gesperrt.includes(tag)) config.personen[idx].gesperrt.push(tag);
  } else {
    config.personen[idx].gesperrt = config.personen[idx].gesperrt.filter(t => t !== tag);
  }
  saveToStorage();
  renderWochenplan();
}

function removePerson(idx) {
  if (!confirm(`${config.personen[idx].name} wirklich entfernen?`)) return;
  config.personen.splice(idx, 1);
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
}

function addPersonDialog() {
  const name = prompt('Name der neuen Person:');
  if (!name || !name.trim()) return;
  const id = name.trim().toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
  config.personen.push({
    id, name: name.trim(),
    attribute: [], stammkraft_von: null,
    wunschFreierTag: null, gesperrt: [], azubi: false
  });
  saveToStorage();
  renderPersonenListe();
  renderWochenplan();
}

function renderPositionenListe() {
  const liste = document.getElementById('positionenListe');
  liste.innerHTML = (config.positionen || []).map((pos, idx) => {
    const gesperrtInfo = (pos.gesperrtAm || []).length > 0
      ? `Gesperrt: ${pos.gesperrtAm.join(', ')}`
      : 'Immer aktiv';
    return `<div class="list-item">
      <div class="list-item-info">
        <div class="list-item-name">${pos.label}</div>
        <div class="list-item-sub">Attribut: ${pos.attribut} · ${gesperrtInfo}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Alles rendern ───────────────────────────────────────
function renderAll() {
  renderWochenLabel();
  renderWochenplan();
  renderFehlzeiten();
  renderPersonSelect('fz-person');
  if (document.getElementById('tab-freieTage').classList.contains('active')) renderFreieTage();
  if (document.getElementById('tab-konfiguration').classList.contains('active')) renderKonfiguration();
}

// ── Init ────────────────────────────────────────────────
loadConfig().then(() => renderAll());
</script>
</body>
</html>
