<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BäckereiOS — Inventur</title>
    <link rel="stylesheet" href="systemdesign.css">
    <script src="inventurdaten.js"></script>
    <script src="shell.js" defer></script>
    <style>
        body { background: var(--background, #f8f6f2); color: var(--text-primary, #1a1a1a); padding-bottom: 100px; }
        .container { max-width: 680px; margin: 0 auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }

        /* Froster */
        .froster-grid { display: flex; background: var(--border-color, #e5e0d8); border-radius: 10px; padding: 3px; gap: 3px; }
        .froster-btn { flex: 1; margin: 0; padding: 11px; border-radius: 8px; font-size: 0.85rem; border: none;
            background: transparent; color: var(--text-secondary, #6b7280); font-weight: 700; transition: all 0.2s; cursor: pointer; font-family: inherit; }
        .froster-btn.selected-yes { background: #10b981; color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
        .froster-btn.selected-no  { background: #ef4444; color: #fff; box-shadow: 0 2px 8px rgba(239,68,68,0.3); }

        /* Fortschritt */
        .fortschritt-wrap { background: var(--card-bg, #fff); border: 1px solid var(--border-color, #e5e0d8); border-radius: 12px; padding: 12px 14px; }
        .fortschritt-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: var(--text-secondary, #6b7280); }
        .fortschritt-label span:last-child { color: var(--text-primary, #1a1a1a); }
        .fortschritt-bar { height: 6px; background: var(--border-color, #e5e0d8); border-radius: 3px; overflow: hidden; }
        .fortschritt-fill { height: 100%; border-radius: 3px; background: #10b981; transition: width 0.3s ease; }

        /* Action Row */
        .action-row { display: flex; gap: 8px; }
        .btn-secondary { flex: 1; background: var(--card-bg, #fff); border: 1px solid var(--border-color, #e5e0d8);
            color: var(--text-primary, #1a1a1a); font-size: 0.82rem; padding: 11px 10px; border-radius: 10px;
            font-weight: 600; margin: 0; display: flex; justify-content: center; align-items: center; gap: 6px; cursor: pointer; font-family: inherit; }
        .btn-danger { background: #fef2f2; color: #ef4444; border: 1px solid #fecdd3;
            font-size: 0.82rem; padding: 11px 14px; border-radius: 10px; font-weight: 700; margin: 0; cursor: pointer; font-family: inherit; }

        /* Station Filter */
        .station-filter { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .station-filter::-webkit-scrollbar { display: none; }
        .sf-btn { flex-shrink: 0; padding: 7px 15px; border-radius: 20px; background: var(--card-bg, #fff);
            border: 1.5px solid var(--border-color, #e5e0d8); color: var(--text-secondary, #6b7280);
            font-size: 0.78rem; font-weight: 700; white-space: nowrap; margin: 0; cursor: pointer; font-family: inherit; }
        .sf-btn.active { background: #e67e22; color: #fff; border-color: #e67e22; }

        /* Produkt-Karte */
        .inv-card { background: var(--card-bg, #fff); border: 1px solid var(--border-color, #e5e0d8);
            border-radius: 14px; padding: 14px; transition: opacity 0.2s; }
        .inv-card.uncounted { opacity: 0.55; }
        .inv-card.from-file { border-color: #93c5fd; background: #f0f9ff; }
        .inv-card.counted { border-color: #6ee7b7; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-title { font-size: 0.95rem; font-weight: 800; margin: 0; line-height: 1.2; }
        .card-time { font-size: 0.68rem; color: var(--text-secondary, #6b7280); font-weight: 500; margin-top: 2px; }
        .card-time.stale { color: #ef4444; font-weight: 700; }

        .btn-zaehlen { background: #f8fafc; border: 1px dashed #cbd5e1; color: #64748b;
            padding: 6px 11px; font-size: 0.72rem; border-radius: 8px; font-weight: 700;
            width: auto; margin: 0; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .inv-card.counted  .btn-zaehlen { background: #d1fae5; border: 1px solid #10b981; color: #065f46; }
        .inv-card.from-file .btn-zaehlen { background: #dbeafe; border: 1px solid #3b82f6; color: #1e40af; }

        /* Eingabe Grid */
        .inv-inputs { display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 6px; align-items: center; }
        .loc-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .loc-label { font-size: 0.62rem; font-weight: 700; color: #94a3b8; }
        .loc-inp { text-align: center; padding: 10px 2px; border: 1.5px solid var(--border-color, #e5e0d8);
            font-weight: 700; font-size: 1.05rem; margin: 0; border-radius: 8px; width: 100%;
            background: var(--card-bg, #fff); color: var(--text-primary, #1a1a1a); font-family: inherit;
            transition: border-color 0.15s; cursor: pointer; }
        .loc-inp:not(:disabled):focus { border-color: #e67e22; outline: none; background: #fffbf5; }
        .loc-inp:disabled { background: var(--background, #f8f6f2); color: #cbd5e1; border-style: dashed; cursor: pointer; }

        .sum-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; margin-left: 4px; padding-left: 10px; border-left: 1px solid var(--border-color, #e5e0d8); }
        .sum-label { font-size: 0.62rem; font-weight: 800; color: var(--text-primary, #1a1a1a); text-transform: uppercase; }
        .inv-sum { min-width: 38px; text-align: center; padding: 8px 4px; background: var(--background, #f8f6f2);
            color: #e67e22; font-weight: 900; font-size: 1.05rem; border-radius: 8px;
            border: 1px solid var(--border-color, #e5e0d8); }

        /* Generieren Button */
        .btn-generate { width: 100%; background: #10b981; color: #fff; font-size: 1rem; padding: 16px;
            border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-family: inherit;
            box-shadow: 0 4px 12px rgba(16,185,129,0.25); transition: all 0.2s; margin-top: 4px; }
        .btn-generate:disabled { background: #cbd5e1; box-shadow: none; cursor: default; }
        .btn-generate.done { background: #059669; }

        /* base64 Akkordeon */
        .akk-wrap { background: var(--card-bg,#fff); border: 1px solid var(--border-color,#e5e0d8); border-radius: 12px; overflow: hidden; }
        .akk-header { display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px; cursor: pointer; user-select: none; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary,#6b7280); }
        .akk-header:hover { background: var(--background,#f8f6f2); }
        .akk-body { display: none; padding: 12px 14px; border-top: 1px solid var(--border-color,#e5e0d8); }
        .akk-body.open { display: block; }
        .akk-hinweis { font-size: 0.74rem; color: var(--text-secondary,#6b7280); margin-bottom: 10px; line-height: 1.5; }
        .b64-area { width: 100%; font-size: 0.72rem; font-family: monospace; border: 1px solid var(--border-color,#e5e0d8);
            border-radius: 8px; padding: 10px; resize: vertical; min-height: 80px; background: var(--background,#f8f6f2);
            color: var(--text-primary,#1a1a1a); box-sizing: border-box; }
        .akk-btns { display: flex; gap: 8px; margin-top: 8px; }
        .akk-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
            border: 1px solid var(--border-color,#e5e0d8); background: var(--card-bg,#fff);
            color: var(--text-primary,#1a1a1a); cursor: pointer; font-family: inherit; }
        .akk-btn.primary { background: #1e293b; color: #fff; border-color: #1e293b; }
    </style>
</head>
<body>
<div class="container">

    <h1 style="margin:0 0 4px; font-size:1.4rem; font-weight:900;">📦 Inventur</h1>

    <!-- Froster -->
    <div style="background:var(--card-bg,#fff);border:1px solid var(--border-color,#e5e0d8);border-radius:12px;padding:12px 14px;">
        <div style="font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary,#6b7280);margin-bottom:8px;">Froster-Status</div>
        <div class="froster-grid">
            <button id="btnFrosterYes" class="froster-btn" onclick="setFrosterStatus(true)">❄️ Fertig</button>
            <button id="btnFrosterNo"  class="froster-btn" onclick="setFrosterStatus(false)">❌ Noch nicht</button>
        </div>
    </div>

    <!-- Fortschritt -->
    <div class="fortschritt-wrap">
        <div class="fortschritt-label">
            <span>Gezählt</span>
            <span id="fortschritt-label">0 von 0</span>
        </div>
        <div class="fortschritt-bar"><div class="fortschritt-fill" id="fortschritt-fill" style="width:0%"></div></div>
    </div>

    <!-- Actions -->
    <div class="action-row">
        <label class="btn-secondary" style="cursor:pointer; flex-direction:column; gap:2px;">
            <span>📂 Vorherige Inventur laden</span>
            <span style="font-size:0.68rem;color:var(--text-secondary,#6b7280);font-weight:500;">Datei: inventurdaten.js</span>
            <input type="file" accept=".js" style="display:none;" onchange="importInventurJS(this)">
        </label>
        <button class="btn-danger" onclick="resetAll()">🔄</button>
    </div>

    <!-- Station Filter -->
    <div class="station-filter" id="station-filter"></div>

    <!-- Produktliste -->
    <div id="main-list" style="display:flex; flex-direction:column; gap:8px;"></div>

    <!-- Generieren -->
    <button id="btnGenerate" class="btn-generate" onclick="generateInventurJS()" disabled>⬇️ Inventurdaten speichern</button>

    <!-- base64 Akkordeon -->
    <div class="akk-wrap">
        <div class="akk-header" onclick="toggleAkk()">
            <span>📤 Daten per Text übertragen (für Urlaub)</span>
            <span id="akk-arrow">▼</span>
        </div>
        <div class="akk-body" id="akk-body">
            <div class="akk-hinweis">
                <strong>Für Kollegen ohne GitHub-Zugang:</strong> Inventur eingeben → "Als Text exportieren" → Text per WhatsApp schicken → Chef fügt Text hier ein → Download der fertigen Datei.
            </div>
            <textarea class="b64-area" id="b64-area" placeholder="Text hier einfügen um zu importieren..."></textarea>
            <div class="akk-btns">
                <button class="akk-btn" onclick="b64Export()">📋 Als Text exportieren</button>
                <button class="akk-btn primary" onclick="b64Import()">⬇️ Importieren</button>
            </div>
        </div>
    </div>

</div>
<script>
var workingData = {};
var activeStation = 'alle';
var isFrosterChecked = false;

function initApp() {
    if (!window.BOS_PRODUKT_CONFIG) {
        document.getElementById('main-list').innerHTML =
            '<div style="text-align:center;padding:30px;color:#ef4444;font-weight:700;">⚠️ produkt_config.json fehlt!</div>';
        return;
    }
    // Nur Produkte mit inventurRelevant:true
    window.BOS_INVENTUR_PRODUKTE = window.BOS_PRODUKT_CONFIG.filter(function(p){ return p.inventurRelevant && p.legacyKey; });
    if (!window.BOS_INVENTUR_PRODUKTE.length) {
        document.getElementById('main-list').innerHTML =
            '<div style="text-align:center;padding:30px;color:#6b7280;">ℹ Noch keine Produkte für die Frosterzählung markiert.<br><small>Im Config-Editor bei jedem Produkt unter ⚙ "Relevant für Frosterzählung" aktivieren.</small></div>';
        return;
    }
    prepareData();
    buildStationFilter();
    renderList();
    initFrosterState();
}

window.onload = async function() {
    try {
        const r = await fetch('produkt_config.json', { cache: 'no-store' });
        if (!r.ok) throw new Error('produkt_config.json nicht erreichbar');
        window.BOS_PRODUKT_CONFIG = await r.json();
    } catch(e) {
        document.getElementById('main-list').innerHTML =
            '<div style="text-align:center;padding:30px;color:#ef4444;font-weight:700;">⚠️ ' + e.message + '</div>';
        return;
    }
    // inventurdaten.js nachladen falls noch nicht da
    if (!window.BOS_INVENTUR) {
        var s = document.createElement('script');
        s.src = 'inventurdaten.js?t=' + Date.now();
        s.onload = function() { initApp(); };
        s.onerror = function() { initApp(); }; // auch ohne alte Inventur starten
        document.head.appendChild(s);
    } else { initApp(); }
};

function initFrosterState() {
    var val = localStorage.getItem('BOS_FROSTER_STATUS');
    if (val === 'true') setFrosterStatus(true);
    else if (val === 'false') setFrosterStatus(false);
}

function setFrosterStatus(isDone) {
    isFrosterChecked = true;
    localStorage.setItem('BOS_FROSTER_STATUS', isDone);
    document.getElementById('btnFrosterYes').classList.toggle('selected-yes', isDone);
    document.getElementById('btnFrosterNo').classList.toggle('selected-no', !isDone);
    document.getElementById('btnGenerate').disabled = false;
}

function prepareData() {
    var cur = window.BOS_INVENTUR || {};
    var curProducts = cur.products || {};
    var curStocks = cur.stocks || {};
    window.BOS_INVENTUR_PRODUKTE.forEach(function(p) {
        var k = p.legacyKey;
        var saved = curProducts[k] || null;
        workingData[k] = {
            name: p.name,
            station: p.station || '',
            locs: (saved && saved.locs) ? saved.locs : [0,0,0,0],
            stock: 0, ts: (saved && saved.ts) ? saved.ts : 0,
            counted: false, _fromFile: false
        };
        if (saved && saved.locs) workingData[k].stock = saved.locs.reduce(function(a,b){return a+b;},0);
        else if (saved && saved.stock) workingData[k].stock = saved.stock;
        else workingData[k].stock = curStocks[k] || 0;
    });
}

function buildStationFilter() {
    var stationSet = {};
    window.BOS_INVENTUR_PRODUKTE.forEach(function(p) {
        if (p.station) stationSet[p.station] = true;
    });
    var stations = ['alle'].concat(Object.keys(stationSet));
    var wrap = document.getElementById('station-filter');
    wrap.innerHTML = '';
    stations.forEach(function(s) {
        var btn = document.createElement('button');
        btn.className = 'sf-btn' + (s === activeStation ? ' active' : '');
        btn.textContent = s === 'alle' ? 'Alle' : s;
        btn.onclick = function() {
            activeStation = s;
            renderList();
            document.querySelectorAll('.sf-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
        };
        wrap.appendChild(btn);
    });
}

function updateFortschritt() {
    var keys = (window.BOS_INVENTUR_PRODUKTE||[]).map(function(p){ return p.legacyKey; });
    var gesamt = keys.length;
    var gezaehlt = keys.filter(function(k){ return workingData[k] && (workingData[k].counted || workingData[k]._fromFile); }).length;
    var pct = gesamt > 0 ? Math.round(gezaehlt / gesamt * 100) : 0;
    document.getElementById('fortschritt-label').textContent = gezaehlt + ' von ' + gesamt;
    document.getElementById('fortschritt-fill').style.width = pct + '%';
}

function renderList() {
    var container = document.getElementById('main-list');
    container.innerHTML = '';

    var keys = window.BOS_INVENTUR_PRODUKTE.map(function(p){ return p.legacyKey; });
    if (activeStation !== 'alle') {
        keys = keys.filter(function(k){ return workingData[k] && workingData[k].station === activeStation; });
    }
    keys.sort(function(a, b) {
        var da = workingData[a], db = workingData[b];
        return ((da.counted || da._fromFile) ? 0 : 1) - ((db.counted || db._fromFile) ? 0 : 1);
    });

    keys.forEach(function(k) {
        var d = workingData[k];
        if (!d) return;

        var tsStr, stale;
        if (d.ts === 0) { tsStr = 'Noch nicht gezählt'; stale = true; }
        else {
            var ageH = Math.round((Date.now() - d.ts) / 3600000);
            stale = ageH >= 24;
            tsStr = new Date(d.ts).toLocaleString('de-DE', {weekday:'short', hour:'2-digit', minute:'2-digit'});
            if (stale) tsStr += ' (' + ageH + 'h alt)';
        }

        // Card
        var card = document.createElement('div');
        card.className = 'inv-card' + (d._fromFile ? ' from-file' : d.counted ? ' counted' : ' uncounted');
        card.id = 'card_' + k;
        card.dataset.key = k;

        // Header
        var header = document.createElement('div');
        header.className = 'card-header';

        var info = document.createElement('div');
        var title = document.createElement('div');
        title.className = 'card-title';
        title.textContent = d.name;
        var time = document.createElement('div');
        time.className = 'card-time' + (stale ? ' stale' : '');
        time.textContent = tsStr;
        info.appendChild(title);
        info.appendChild(time);

        var btn = document.createElement('button');
        btn.className = 'btn-zaehlen';
        btn.textContent = d._fromFile ? 'Aus Datei' : d.counted ? '✓ Gezählt' : 'Nicht gezählt';
        btn.dataset.key = k;
        btn.addEventListener('click', function() { toggleCounted(this.dataset.key); });

        header.appendChild(info);
        header.appendChild(btn);
        card.appendChild(header);

        // Inputs
        var inputs = document.createElement('div');
        inputs.className = 'inv-inputs';

        for (var i = 0; i < 4; i++) {
            var wrap = document.createElement('div');
            wrap.className = 'loc-wrap';
            var label = document.createElement('div');
            label.className = 'loc-label';
            label.textContent = i + 1;
            var inp = document.createElement('input');
            inp.type = 'number';
            inp.inputMode = 'numeric';
            inp.className = 'loc-inp';
            inp.id = 'loc_' + k + '_' + i;
            inp.placeholder = '-';
            inp.value = d.locs[i] || '';
            inp.disabled = !(d.counted || d._fromFile);
            // data attributes statt inline strings
            inp.dataset.key = k;
            inp.dataset.idx = i;
            inp.addEventListener('focus', function() {
                entsperreKarte(this.dataset.key, parseInt(this.dataset.idx));
            });
            inp.addEventListener('input', function() {
                updateLoc(this.dataset.key, parseInt(this.dataset.idx), this.value);
            });
            wrap.appendChild(label);
            wrap.appendChild(inp);
            inputs.appendChild(wrap);
        }

        // Sum
        var sumWrap = document.createElement('div');
        sumWrap.className = 'sum-wrap';
        var sumLabel = document.createElement('div');
        sumLabel.className = 'sum-label';
        sumLabel.textContent = 'Ist';
        var sumVal = document.createElement('div');
        sumVal.className = 'inv-sum';
        sumVal.id = 'sum_' + k;
        sumVal.textContent = d.stock;
        sumWrap.appendChild(sumLabel);
        sumWrap.appendChild(sumVal);
        inputs.appendChild(sumWrap);

        card.appendChild(inputs);
        container.appendChild(card);
    });

    updateFortschritt();
}

function entsperreKarte(k, focusIdx) {
    var d = workingData[k];
    if (!d || d.counted || d._fromFile) return;
    d.counted = true;
    d.ts = Date.now();
    for (var i = 0; i < 4; i++) {
        var inp = document.getElementById('loc_' + k + '_' + i);
        if (inp) inp.disabled = false;
    }
    var card = document.getElementById('card_' + k);
    if (card) {
        card.className = 'inv-card counted';
        var btn = card.querySelector('.btn-zaehlen');
        if (btn) btn.textContent = '✓ Gezählt';
        var timeEl = card.querySelector('.card-time');
        if (timeEl) {
            timeEl.className = 'card-time';
            timeEl.textContent = new Date(d.ts).toLocaleString('de-DE', {weekday:'short', hour:'2-digit', minute:'2-digit'});
        }
    }
    setTimeout(function() {
        var target = document.getElementById('loc_' + k + '_' + focusIdx);
        if (target) { target.focus(); target.select(); }
    }, 30);
    updateFortschritt();
}

function toggleCounted(k) {
    var d = workingData[k];
    if (d._fromFile) { d._fromFile = false; d.counted = true; d.ts = d.ts || Date.now(); }
    else if (d.counted) { d.counted = false; d.locs = [0,0,0,0]; d.stock = 0; d.ts = 0; }
    else { d.counted = true; d.ts = Date.now(); }
    var scrollY = window.scrollY;
    renderList();
    window.scrollTo(0, scrollY);
}

function updateLoc(k, idx, val) {
    workingData[k].locs[idx] = parseInt(val) || 0;
    workingData[k].stock = workingData[k].locs.reduce(function(a,b){return a+b;},0);
    workingData[k].ts = Date.now();
    document.getElementById('sum_' + k).textContent = workingData[k].stock;
}

function resetAll() {
    if (!confirm('Alle Zählungen zurücksetzen?')) return;
    (window.BOS_INVENTUR_PRODUKTE||[]).forEach(function(p) {
        var k = p.legacyKey;
        workingData[k] = {name:p.name, station:p.station||'', locs:[0,0,0,0], stock:0, ts:0, counted:false, _fromFile:false};
    });
    renderList();
}

function importInventurJS(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var script = document.createElement('script');
            script.textContent = e.target.result;
            document.head.appendChild(script);
            document.head.removeChild(script);
            if (!window.BOS_INVENTUR) { alert('Ungültige Datei.'); return; }
            var loaded = window.BOS_INVENTUR.products || {};
            var count = 0;
            (window.BOS_INVENTUR_PRODUKTE||[]).forEach(function(prod) {
                var k = prod.legacyKey;
                var lp = loaded[k];
                if (!lp || workingData[k].counted) return;
                var locs = lp.locs || [0,0,0,0];
                if (locs.reduce(function(a,b){return a+b;},0) === 0 && lp.stock > 0) locs = [lp.stock,0,0,0];
                workingData[k] = {name:prod.name, station:prod.station||'', locs:locs, stock:locs.reduce(function(a,b){return a+b;},0), ts:lp.ts||0, counted:false, _fromFile:true};
                count++;
            });
            renderList();
            alert(count + ' Produkte geladen.');
        } catch(err) { alert('Fehler: ' + err.message); }
        input.value = '';
    };
    reader.readAsText(file);
}

function generateInventurJS() {
    if (!isFrosterChecked) { alert('Bitte zuerst den Froster-Status bestätigen.'); return; }
    var stocks = {}, cleanProducts = {};
    (window.BOS_INVENTUR_PRODUKTE||[]).forEach(function(p) {
        var k = p.legacyKey;
        var d = workingData[k];
        if (!d) return;
        stocks[k] = d.stock;
        cleanProducts[k] = {locs:d.locs, stock:d.stock, ts:d.ts};
    });
    var js = 'window.BOS_INVENTUR = ' + JSON.stringify({products:cleanProducts, stocks:stocks}, null, 2) + ';';
    var blob = new Blob([js], {type:'text/javascript'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inventurdaten.js';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    var btn = document.getElementById('btnGenerate');
    var now = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    btn.textContent = '✓ Gespeichert um ' + now + ' Uhr';
    btn.classList.add('done');
    setTimeout(function(){ btn.textContent = '⬇️ Inventurdaten speichern'; btn.classList.remove('done'); }, 4000);
}

// ── base64 Akkordeon ─────────────────────────────────────
function toggleAkk() {
    var body = document.getElementById('akk-body');
    var arrow = document.getElementById('akk-arrow');
    body.classList.toggle('open');
    arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function b64Export() {
    var stocks = {}, cleanProducts = {};
    (window.BOS_INVENTUR_PRODUKTE||[]).forEach(function(p) {
        var k = p.legacyKey;
        var d = workingData[k];
        if (!d) return;
        stocks[k] = d.stock;
        cleanProducts[k] = {locs:d.locs, stock:d.stock, ts:d.ts};
    });
    var js = 'window.BOS_INVENTUR = ' + JSON.stringify({products:cleanProducts, stocks:stocks}, null, 2) + ';';
    var b64 = btoa(unescape(encodeURIComponent(js)));
    var area = document.getElementById('b64-area');
    area.value = b64;
    area.select();
    try { document.execCommand('copy'); alert('Text kopiert — per WhatsApp senden.'); } catch(e) {}
}

function b64Import() {
    var b64 = document.getElementById('b64-area').value.trim();
    if (!b64) { alert('Bitte zuerst den Text einfügen.'); return; }
    try {
        var js = decodeURIComponent(escape(atob(b64)));
        var blob = new Blob([js], {type:'text/javascript'});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'inventurdaten.js';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        alert('inventurdaten.js heruntergeladen — auf GitHub hochladen.');
    } catch(e) { alert('Ungültiger Text: ' + e.message); }
}
