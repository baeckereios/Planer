<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BäckereiOS – Archiv</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <script src="../feiertage_nds.js"></script>
    <style>
        /* ── Layout ─────────────────────────────────────────── */
        body { background: #f5f0e8; }
        .container { max-width: 980px; margin: 20px auto; padding: 0 12px 80px; }

        .header-box { text-align: center; margin-bottom: 24px; }
        .header-box h1 { font-size: 1.5rem; font-weight: 900; color: #111827; margin: 0 0 4px; }
        .header-box p  { font-size: 0.85rem; color: #6b7280; margin: 0; }


        .ereignis-card {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
            padding: 11px 14px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            transition: border-color 0.15s, box-shadow 0.15s;
            user-select: none;
        }
        .ereignis-card:hover { border-color: #d49a36; }
        .ereignis-card.aktiv {
            border-color: #d49a36;
            background: #fdf6e3;
            box-shadow: 0 0 0 2px rgba(212,154,54,0.2);
        }
        .ereignis-card.keine-daten {
            opacity: 0.45; cursor: default;
        }
        .ereignis-card.keine-daten:hover { border-color: #e5e7eb; }

        .ereignis-icon { font-size: 1.1rem; flex-shrink: 0; }
        .ereignis-info { flex: 1; min-width: 0; }
        .ereignis-name {
            font-size: 0.9rem; font-weight: 700; color: #111827;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ereignis-datum { font-size: 0.72rem; color: #6b7280; margin-top: 1px; }
        .ereignis-badge {
            font-size: 0.65rem; font-weight: 800; padding: 2px 7px;
            border-radius: 20px; background: #f3f4f6; color: #9ca3af;
            flex-shrink: 0;
        }
        .ereignis-badge.hat-daten { background: #dcfce7; color: #16a34a; }

        /* ── Filter Panel ───────────────────────────────────── */
        .filter-panel {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 14px 16px; margin-bottom: 20px;
        }
        .filter-kopf {
            font-size: 0.72rem; font-weight: 800; letter-spacing: 1.5px;
            text-transform: uppercase; color: #6b7280;
            margin-bottom: 10px; padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
            display: flex; justify-content: space-between; align-items: center;
        }
        .filter-kopf-actions { display: flex; gap: 6px; }
        .filter-btn {
            font-size: 0.68rem; font-weight: 700; padding: 3px 9px;
            border-radius: 6px; border: 1px solid #e5e7eb;
            background: #f9fafb; color: #6b7280; cursor: pointer;
        }
        .filter-btn:hover { border-color: #d49a36; color: #d49a36; }

        .filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
        .filter-chip {
            font-size: 0.75rem; font-weight: 600; padding: 4px 10px;
            border-radius: 20px; border: 1px solid #e5e7eb;
            background: #f9fafb; color: #6b7280; cursor: pointer;
            transition: all 0.12s;
        }
        .filter-chip.aktiv { background: #d49a36; border-color: #d49a36; color: #fff; }
        .filter-chip:hover:not(.aktiv) { border-color: #d49a36; color: #d49a36; }

        /* ── Kein Ereignis gewählt ──────────────────────────── */
        .leer-hinweis {
            background: #fff; border: 1px dashed #d1d5db; border-radius: 12px;
            padding: 40px 20px; text-align: center; color: #9ca3af;
        }
        .leer-hinweis .leer-icon { font-size: 2rem; margin-bottom: 8px; }
        .leer-hinweis p { font-size: 0.85rem; margin: 0; }

        /* ── Archiv Tabellen-Bereich ─────────────────────────── */
        .archiv-bereich { }

        .archiv-kopf {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 14px 18px; margin-bottom: 14px;
            display: flex; align-items: center; gap: 12px;
        }
        .archiv-kopf-icon { font-size: 1.4rem; }
        .archiv-kopf-info { flex: 1; }
        .archiv-kopf-name { font-size: 1.05rem; font-weight: 900; color: #111827; }
        .archiv-kopf-datum { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }

        /* Ferien-Navigation */
        .ferien-nav {
            display: flex; align-items: center; gap: 8px;
            background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 10px 14px; margin-bottom: 14px;
        }
        .ferien-nav-btn {
            background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px;
            width: 34px; height: 34px; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.12s; flex-shrink: 0;
        }
        .ferien-nav-btn:hover:not(:disabled) { border-color: #d49a36; background: #fdf6e3; }
        .ferien-nav-btn:disabled { opacity: 0.3; cursor: default; }
        .ferien-nav-info { flex: 1; text-align: center; }
        .ferien-nav-woche { font-size: 0.85rem; font-weight: 700; color: #111827; }
        .ferien-nav-range { font-size: 0.72rem; color: #6b7280; margin-top: 1px; }

        /* ── Accordion Stationen ────────────────────────────── */
        .station-acc { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .station-acc-summary {
            padding: 13px 18px; font-weight: 800; cursor: pointer;
            list-style: none; display: flex; justify-content: space-between;
            align-items: center; background: #f8fafc;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #374151;
        }
        .station-acc-summary::after { content: '▼'; font-size: 0.75rem; color: #9ca3af; }
        details.station-acc[open] .station-acc-summary { border-bottom: 1px solid #e5e7eb; }
        details.station-acc[open] .station-acc-summary::after { transform: rotate(180deg); }

        .station-acc-body { padding: 0; overflow-x: auto; }

        /* ── Tabelle ────────────────────────────────────────── */
        .archiv-table {
            width: 100%; border-collapse: collapse; font-size: 0.82rem;
            min-width: 520px;
        }
        .archiv-table th {
            padding: 8px 10px; text-align: center;
            font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px;
            text-transform: uppercase; color: #6b7280;
            background: #f9fafb; border-bottom: 1px solid #e5e7eb;
            position: sticky; top: 0; z-index: 1;
            white-space: nowrap;
        }
        .archiv-table th.th-produkt {
            text-align: left; min-width: 130px; position: sticky;
            left: 0; z-index: 2; background: #f9fafb;
        }
        .archiv-table th.th-event {
            background: #fdf6e3; color: #b45309;
            border-bottom: 2px solid #d49a36;
        }
        .archiv-table td {
            padding: 7px 10px; text-align: center;
            border-bottom: 1px solid #f3f4f6; color: #374151;
            font-weight: 600; white-space: nowrap;
        }
        .archiv-table td.td-produkt {
            text-align: left; color: #111827; font-weight: 700;
            background: #fff; position: sticky; left: 0;
            border-right: 1px solid #e5e7eb;
        }
        .archiv-table td.td-event {
            background: #fdf6e3; color: #92400e; font-weight: 800;
            border-left: 2px solid #d49a36;
        }
        .archiv-table td.td-null { color: #d1d5db; font-weight: 400; }
        .archiv-table tr:last-child td { border-bottom: none; }
        .archiv-table tr:hover td { background: #fafafa; }
        .archiv-table tr:hover td.td-produkt { background: #fafafa; }
        .archiv-table tr:hover td.td-event { background: #fef3c7; }

        .keine-produkte {
            padding: 20px; text-align: center;
            font-size: 0.82rem; color: #9ca3af;
        }

        /* ── Jahr-Tabs ──────────────────────────────────────── */
        .jahr-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .jahr-tab {
            padding: 5px 14px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; border: 1px solid #e5e7eb;
            background: #f9fafb; color: #6b7280; transition: all 0.12s;
        }
        .jahr-tab.aktiv { background: #111827; color: #fff; border-color: #111827; }
        .jahr-tab:hover:not(.aktiv) { border-color: #d49a36; color: #d49a36; }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 600px) {
            .archiv-table { font-size: 0.75rem; }
            .archiv-table th, .archiv-table td { padding: 6px 7px; }
            .archiv-table td.td-produkt { min-width: 100px; font-size: 0.72rem; }
        }

        /* ── Collapsible Sektionen ──────────────────────────── */
        .filter-station-details { margin-bottom: 10px; }
        .filter-station-details:last-child { margin-bottom: 0; }
        .filter-station-summary {
            font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: #6b7280; margin-bottom: 0;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; list-style: none; padding: 6px 4px;
            border-radius: 6px; user-select: none;
        }
        .filter-station-summary:hover { color: #d49a36; }
        .filter-station-summary::after { content: '▸'; font-size: 0.75rem; color: #9ca3af; }
        .filter-station-details[open] .filter-station-summary::after { content: '▾'; }
        .filter-station-details[open] .filter-station-summary { margin-bottom: 6px; }
        .filter-station-count {
            font-size: 0.65rem; font-weight: 700; color: #9ca3af;
            background: #f3f4f6; padding: 2px 6px; border-radius: 10px; margin-right: 6px;
        }

        .ereignis-section { margin-bottom: 14px; }
        .ereignis-section-titel {
            font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px;
            text-transform: uppercase; color: #6b7280;
            padding: 8px 4px; cursor: pointer; list-style: none;
            display: flex; align-items: center; gap: 6px;
            border-bottom: 1px solid #e5e7eb; user-select: none;
        }
        .ereignis-section-titel:hover { color: #d49a36; }
        .ereignis-section-titel::after { content: '▸'; font-size: 0.75rem; color: #9ca3af; margin-left: auto; }
        .ereignis-section[open] .ereignis-section-titel::after { content: '▾'; }
        .ereignis-liste { display: flex; flex-direction: column; gap: 6px; padding-top: 8px; }

    </style>
</head>
<body>
<div id="shell-placeholder"></div>
<div class="container">

    <div class="header-box">
        <h1>Archiv</h1>
        <p>Backmengen zu Feiertagen &amp; Ferien</p>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel" id="filter-panel">
        <div class="filter-kopf">
            <span>Produkte filtern</span>
            <div class="filter-kopf-actions">
                <button class="filter-btn" onclick="alleAbwaehlen()">Keine</button>
                <button class="filter-btn" onclick="alleAnwaehlen()">Alle</button>
            </div>
        </div>
        <div id="filter-stationen"><!-- wird per JS befüllt --></div>
    </div>

    <!-- Ereignis-Auswahl -->
    <div id="ereignis-bereich"><!-- wird per JS befüllt --></div>

    <!-- Archiv-Inhalt -->
    <div id="archiv-inhalt">
        <div class="leer-hinweis">
            <div class="leer-icon">📅</div>
            <p>Feiertag oder Ferienzeitraum auswählen</p>
        </div>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// DATEN LADEN
// ═══════════════════════════════════════════════════════
let PRODUKT_CONFIG = [];
let BACKMENGEB_DB  = [];
let aktiveProdukte = new Set();
let gewaehlteEreignis = null;
let ferienWocheOffset = 0; // für Ferien-Navigation

const WT_KURZ = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const WT_LANG = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

function getLocalISO(d) {
    return d.getFullYear() + '-'
        + String(d.getMonth()+1).padStart(2,'0') + '-'
        + String(d.getDate()).padStart(2,'0');
}
function formatDatum(isoStr) {
    const d = new Date(isoStr + 'T12:00:00');
    return `${WT_KURZ[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function formatDatumKurz(isoStr) {
    const d = new Date(isoStr + 'T12:00:00');
    return `${WT_KURZ[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;
}

// ── Daten laden ──────────────────────────────────────────
Promise.all([
    fetch('../produkt_config.json').then(r => r.json()),
    fetch('../backmengen_db.json').then(r => r.json())
]).then(([config, db]) => {
    PRODUKT_CONFIG = config;
    BACKMENGEB_DB  = db;
    init();
}).catch(err => {
    console.error('Daten konnten nicht geladen werden:', err);
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init() {
    // Filter aus localStorage laden
    const gespeichert = localStorage.getItem('BOS_ARCHIV_FILTER');
    if (gespeichert) {
        try { aktiveProdukte = new Set(JSON.parse(gespeichert)); } catch(e) {}
    } else {
        // Default: alle
        PRODUKT_CONFIG.forEach(p => { if (p.legacyKey) aktiveProdukte.add(p.legacyKey); });
    }
    renderFilter();
    renderEreignisListe();
}

// ═══════════════════════════════════════════════════════
// HILFSFUNKTIONEN
// ═══════════════════════════════════════════════════════

// DB als Map datum→produkte
function buildDbMap() {
    const m = {};
    BACKMENGEB_DB.forEach(e => { m[e.datum] = e.produkte || {}; });
    return m;
}

// Alle DB-Daten in einem Zeitraum
function dbHatDatenImZeitraum(von, bis) {
    return BACKMENGEB_DB.some(e => e.datum >= von && e.datum <= bis);
}

// Stationen-Gruppierung
function getStationenMap() {
    const m = {};
    PRODUKT_CONFIG.forEach(p => {
        if (!p.legacyKey || !p.station) return;
        if (!m[p.station]) m[p.station] = [];
        m[p.station].push(p);
    });
    return m;
}

// ═══════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════
function renderFilter() {
    const stationenMap = getStationenMap();
    const container = document.getElementById('filter-stationen');
    let html = '';
    for (const [station, produkte] of Object.entries(stationenMap)) {
        const aktivAnzahl = produkte.filter(p => aktiveProdukte.has(p.legacyKey)).length;
        html += `<details class="filter-station-details">
            <summary class="filter-station-summary">
                <span>${station}</span>
                <span class="filter-station-count">${aktivAnzahl}/${produkte.length}</span>
            </summary>
            <div class="filter-chips">`;
        produkte.forEach(p => {
            const aktiv = aktiveProdukte.has(p.legacyKey) ? 'aktiv' : '';
            html += `<span class="filter-chip ${aktiv}" data-key="${p.legacyKey}"
                onclick="toggleChip(this,'${p.legacyKey}')">${p.name}</span>`;
        });
        html += `</div></details>`;
    }
    container.innerHTML = html;
}

function toggleChip(el, key) {
    if (aktiveProdukte.has(key)) {
        aktiveProdukte.delete(key);
        el.classList.remove('aktiv');
    } else {
        aktiveProdukte.add(key);
        el.classList.add('aktiv');
    }
    speichereFilter();
    if (gewaehlteEreignis) renderArchivTabelle();
}

function alleAbwaehlen() {
    aktiveProdukte.clear();
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('aktiv'));
    speichereFilter();
    if (gewaehlteEreignis) renderArchivTabelle();
}

function alleAnwaehlen() {
    document.querySelectorAll('.filter-chip').forEach(c => {
        c.classList.add('aktiv');
        aktiveProdukte.add(c.dataset.key);
    });
    speichereFilter();
    if (gewaehlteEreignis) renderArchivTabelle();
}

function speichereFilter() {
    localStorage.setItem('BOS_ARCHIV_FILTER', JSON.stringify([...aktiveProdukte]));
}

// ═══════════════════════════════════════════════════════
// EREIGNIS-LISTE
// ═══════════════════════════════════════════════════════
function renderEreignisListe() {
    const feiertage = BOS_FEIERTAGE.feiertage;
    const ferien    = BOS_FEIERTAGE.ferien;

    // Jahre ermitteln
    const alleJahre = [...new Set(feiertage.map(f => f.datum.slice(0,4)))].sort();

    let html = '';

    // ── Jahr-Tabs ──
    html += `<div class="jahr-tabs" id="jahr-tabs">`;
    alleJahre.forEach((j, i) => {
        html += `<span class="jahr-tab${i===0?' aktiv':''}" onclick="filterJahr('${j}',this)">${j}</span>`;
    });
    html += `</div>`;

    // ── Feiertage ──
    html += `<details class="ereignis-section" id="feiertage-section">
        <summary class="ereignis-section-titel">🗓 Gesetzliche Feiertage</summary>
        <div class="ereignis-liste" id="feiertage-liste">`;

    feiertage.forEach((f, i) => {
        // 7-Tage-Fenster: Feiertag -6 bis Feiertag selbst
        const endD = new Date(f.datum + 'T12:00:00');
        const startD = new Date(endD); startD.setDate(startD.getDate() - 6);
        const hatDaten = dbHatDatenImZeitraum(getLocalISO(startD), f.datum);
        const badge = hatDaten
            ? `<span class="ereignis-badge hat-daten">Daten</span>`
            : `<span class="ereignis-badge">Keine Daten</span>`;
        const klasse = hatDaten ? '' : ' keine-daten';
        const onclick = hatDaten ? `onclick="waehleFeiertag(${i})"` : '';
        html += `<div class="ereignis-card${klasse}" data-jahr="${f.datum.slice(0,4)}" id="feiertag-${i}" ${onclick}>
            <span class="ereignis-icon">🗓</span>
            <div class="ereignis-info">
                <div class="ereignis-name">${f.name}</div>
                <div class="ereignis-datum">${formatDatum(f.datum)}</div>
            </div>
            ${badge}
        </div>`;
    });

    html += `</div></details>`;

    // ── Ferien ──
    html += `<details class="ereignis-section">
        <summary class="ereignis-section-titel">🏖 Schulferien</summary>
        <div class="ereignis-liste">`;

    ferien.forEach((f, i) => {
        const hatDaten = dbHatDatenImZeitraum(f.von, f.bis);
        const badge = hatDaten
            ? `<span class="ereignis-badge hat-daten">Daten</span>`
            : `<span class="ereignis-badge">Keine Daten</span>`;
        const klasse = hatDaten ? '' : ' keine-daten';
        const onclick = hatDaten ? `onclick="waehleFerien(${i})"` : '';
        const tage = Math.round((new Date(f.bis) - new Date(f.von)) / 86400000) + 1;
        html += `<div class="ereignis-card${klasse}" id="ferien-${i}" ${onclick}>
            <span class="ereignis-icon">🏖</span>
            <div class="ereignis-info">
                <div class="ereignis-name">${f.name}</div>
                <div class="ereignis-datum">${formatDatumKurz(f.von)} – ${formatDatumKurz(f.bis)} (${tage} Tage)</div>
            </div>
            ${badge}
        </div>`;
    });

    html += `</div></details>`;

    document.getElementById('ereignis-bereich').innerHTML = html;

    // Initial erstes Jahr anzeigen
    filterJahr(alleJahre[0], document.querySelector('.jahr-tab'));
}

function filterJahr(jahr, el) {
    document.querySelectorAll('.jahr-tab').forEach(t => t.classList.remove('aktiv'));
    el.classList.add('aktiv');
    document.querySelectorAll('[data-jahr]').forEach(card => {
        card.style.display = card.dataset.jahr === jahr ? '' : 'none';
    });
}

// ═══════════════════════════════════════════════════════
// FEIERTAG WÄHLEN
// ═══════════════════════════════════════════════════════
function waehleFeiertag(index) {
    // Aktiv-State in Liste
    document.querySelectorAll('.ereignis-card').forEach(c => c.classList.remove('aktiv'));
    document.getElementById(`feiertag-${index}`)?.classList.add('aktiv');

    const f = BOS_FEIERTAGE.feiertage[index];
    gewaehlteEreignis = { typ: 'feiertag', ...f };
    ferienWocheOffset = 0;
    renderArchivTabelle();

    // Scroll zum Inhalt (mobile)
    setTimeout(() => {
        document.getElementById('archiv-inhalt').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
}

// ═══════════════════════════════════════════════════════
// FERIEN WÄHLEN
// ═══════════════════════════════════════════════════════
function waehleFerien(index) {
    document.querySelectorAll('.ereignis-card').forEach(c => c.classList.remove('aktiv'));
    document.getElementById(`ferien-${index}`)?.classList.add('aktiv');

    const f = BOS_FEIERTAGE.ferien[index];
    gewaehlteEreignis = { typ: 'ferien', ...f };
    ferienWocheOffset = 0;
    renderArchivTabelle();

    setTimeout(() => {
        document.getElementById('archiv-inhalt').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
}

function ferienwocheNavigieren(delta) {
    ferienWocheOffset += delta;
    renderArchivTabelle();
}

// ═══════════════════════════════════════════════════════
// ARCHIV TABELLE RENDERN
// ═══════════════════════════════════════════════════════
function renderArchivTabelle() {
    const e = gewaehlteEreignis;
    if (!e) return;

    const dbMap = buildDbMap();
    const container = document.getElementById('archiv-inhalt');

    if (e.typ === 'feiertag') {
        renderFeiertagTabelle(e, dbMap, container);
    } else {
        renderFerienTabelle(e, dbMap, container);
    }
}

// ── Feiertag: 7 Tage-Fenster ─────────────────────────
function renderFeiertagTabelle(e, dbMap, container) {
    // 7 Tage: Feiertag -6 bis Feiertag
    const endDatum = new Date(e.datum + 'T12:00:00');
    const tage = [];
    for (let i = -6; i <= 0; i++) {
        const d = new Date(endDatum);
        d.setDate(d.getDate() + i);
        tage.push(getLocalISO(d));
    }

    let html = buildArchivKopf('🗓', e.name, formatDatum(e.datum));
    html += buildTabelleHTML(tage, e.datum, dbMap, false);

    container.innerHTML = html;
}

// ── Ferien: wochenweise Navigation ───────────────────
function renderFerienTabelle(e, dbMap, container) {
    const vonDatum = new Date(e.von + 'T12:00:00');
    const bisDatum = new Date(e.bis + 'T12:00:00');

    // Wochenanzahl berechnen
    const totalTage = Math.round((bisDatum - vonDatum) / 86400000) + 1;
    const totalWochen = Math.ceil(totalTage / 7);

    // Aktuelle Woche: ferienWocheOffset clamp
    ferienWocheOffset = Math.max(0, Math.min(ferienWocheOffset, totalWochen - 1));

    // Woche berechnen
    const wochenStart = new Date(vonDatum);
    wochenStart.setDate(wochenStart.getDate() + ferienWocheOffset * 7);
    const wochenEnd = new Date(wochenStart);
    wochenEnd.setDate(wochenEnd.getDate() + 6);
    // Ende nicht über Ferienende hinaus
    const effEnde = wochenEnd > bisDatum ? bisDatum : wochenEnd;

    const tage = [];
    const cur = new Date(wochenStart);
    while (cur <= effEnde) {
        tage.push(getLocalISO(cur));
        cur.setDate(cur.getDate() + 1);
    }

    // Kopf
    let html = buildArchivKopf('🏖', e.name,
        `${formatDatumKurz(e.von)} – ${formatDatumKurz(e.bis)}`);

    // Navigationsleiste
    html += `<div class="ferien-nav">
        <button class="ferien-nav-btn" onclick="ferienwocheNavigieren(-1)"
            ${ferienWocheOffset === 0 ? 'disabled' : ''}>◀</button>
        <div class="ferien-nav-info">
            <div class="ferien-nav-woche">Woche ${ferienWocheOffset + 1} von ${totalWochen}</div>
            <div class="ferien-nav-range">${formatDatumKurz(getLocalISO(wochenStart))} – ${formatDatumKurz(getLocalISO(effEnde))}</div>
        </div>
        <button class="ferien-nav-btn" onclick="ferienwocheNavigieren(1)"
            ${ferienWocheOffset >= totalWochen - 1 ? 'disabled' : ''}>▶</button>
    </div>`;

    html += buildTabelleHTML(tage, null, dbMap, true);

    container.innerHTML = html;
}

// ── Kopf-Box ─────────────────────────────────────────
function buildArchivKopf(icon, name, datum) {
    return `<div class="archiv-kopf">
        <div class="archiv-kopf-icon">${icon}</div>
        <div class="archiv-kopf-info">
            <div class="archiv-kopf-name">${name}</div>
            <div class="archiv-kopf-datum">${datum}</div>
        </div>
    </div>`;
}

// ── Haupt-Tabelle ─────────────────────────────────────
function buildTabelleHTML(tage, highlightDatum, dbMap, istFerien) {
    const stationenMap = getStationenMap();
    let html = '';

    for (const [station, alleProdukte] of Object.entries(stationenMap)) {
        // Nur aktive Produkte
        const produkte = alleProdukte.filter(p => p.legacyKey && aktiveProdukte.has(p.legacyKey));
        if (produkte.length === 0) continue;

        html += `<details class="station-acc" open>
            <summary class="station-acc-summary">${station}
                <span style="font-size:0.72rem;font-weight:600;color:#9ca3af;text-transform:none;letter-spacing:0">
                    ${produkte.length} Produkte
                </span>
            </summary>
            <div class="station-acc-body">
            <table class="archiv-table">
            <thead><tr>
                <th class="th-produkt">Produkt</th>`;

        tage.forEach(d => {
            const istEvent = d === highlightDatum;
            const datum = new Date(d + 'T12:00:00');
            const label = `${WT_KURZ[datum.getDay()]}<br>${String(datum.getDate()).padStart(2,'0')}.${String(datum.getMonth()+1).padStart(2,'0')}.`;
            html += `<th class="${istEvent ? 'th-event' : ''}">${label}</th>`;
        });

        html += `</tr></thead><tbody>`;

        produkte.forEach(p => {
            html += `<tr><td class="td-produkt">${p.name}</td>`;
            tage.forEach(d => {
                const istEvent = d === highlightDatum;
                const val = dbMap[d] ? (dbMap[d][p.legacyKey] || 0) : null;
                const cssClass = istEvent ? 'td-event' : (val === 0 || val === null ? 'td-null' : '');
                let anzeige = '–';
                if (val !== null) {
                    if (val === 0) anzeige = '0';
                    else {
                        // Einheit
                        const einheit = p.einheit === 'bleche' ? ' Bl.' : ' Stk';
                        // Bei Bleche: _bleche Key nutzen wenn vorhanden
                        const blecheKey = p.legacyKey.replace('_stueck', '_bleche');
                        const blecheVal = dbMap[d] ? dbMap[d][blecheKey] : null;
                        if (p.einheit === 'bleche' && blecheVal != null && blecheVal > 0) {
                            const bl = parseFloat(blecheVal);
                            anzeige = (bl % 1 === 0 ? bl : bl.toFixed(1)) + ' Bl.';
                        } else {
                            anzeige = val + ' Stk';
                        }
                    }
                }
                html += `<td class="${cssClass}">${anzeige}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div></details>`;
    }

    if (html === '') {
        html = `<div class="leer-hinweis">
            <div class="leer-icon">🔍</div>
            <p>Keine Produkte ausgewählt</p>
        </div>`;
    }

    return html;
}
