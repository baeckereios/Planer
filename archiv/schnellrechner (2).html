<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOS - Schnellrechner</title>
    <link rel="stylesheet" href="systemdesign.css">
    <script src="stammdaten.js"></script>
    <script src="inventurdaten.js"></script>
    <script src="translations.js"></script>
    <style>
        body { margin: 0; padding-bottom: 50px; background: var(--bg); transition: 0.3s; }
        .brand-header { background: var(--surface); text-align: center; padding-top: 15px; box-shadow: 0 4px 10px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 5px; }
        .btn-back-nav { background: var(--surface2); border: 2px solid var(--border-s); color: var(--text); font-weight: 900; padding: 8px 15px; border-radius: 12px; text-decoration: none; font-size: 1rem; }
        .brand-logo { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; color: var(--text); line-height: 1; margin: 10px 0; }
        .brand-logo span { color: var(--amber); font-style: italic; }
        .slogan-bar { background: #111; color: var(--amber); padding: 12px; margin-top: 25px; font-family: 'Barlow Condensed'; font-weight: 800; font-size: 1rem; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }

        .container { max-width: 600px; margin: 0 auto; padding: 25px 20px; }
        .card { background: var(--surface); border: 2px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px var(--shadow); }
        .label { font-size: 0.75rem; font-weight: 900; color: var(--amber); letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; text-align: center; }

        .strip-today { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
        .strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px; flex-wrap: nowrap; }
        .pill { min-width: 48px; height: 48px; border-radius: 12px; border: 2px solid var(--border-s); background: var(--surface); font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; }
        .pill.active { border-color: var(--amber); background: var(--amber); color: white; }
        .pill.target { border-color: var(--green); background: var(--green); color: white; }
        .pill.in-range { border-color: var(--green); background: rgba(77,184,122,0.15); color: var(--green); }
        .pill.is-closed { border-color: var(--red); color: var(--red); background: rgba(201,74,74,0.1); text-decoration: line-through; cursor: not-allowed; opacity: 0.6; }

        .froster-group { display: flex; gap: 10px; margin: 15px 0; }
        .f-btn { flex: 1; padding: 20px 10px; border: 2px solid var(--border-s); background: var(--surface); border-radius: 16px; font-weight: 800; color: var(--dim); cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .f-btn.yes.active { border-color: var(--green); background: rgba(77,184,122,0.1); color: var(--green); }
        .f-btn.no.active { border-color: var(--red); background: rgba(224,92,92,0.1); color: var(--red); }

        .btn-toggle-extras { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border-s); background: var(--surface2); color: var(--dim); font-weight: 800; font-size: 0.8rem; margin: 15px 0; cursor: pointer; }
        .extras-area { background: var(--surface2); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); display: none; }
        .wg-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .wg-day { width: 80px; font-size: 0.85rem; font-weight: 900; color: var(--text); }
        .wg-ctrl { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border-s); background: var(--surface); font-size: 0.75rem; font-weight: 800; text-align: center; cursor: pointer; }
        .wg-ctrl.active { border-color: var(--amber); color: var(--amber); background: rgba(192,122,16,0.1); }
        .wg-ctrl.is-zu { border-color: var(--red); color: var(--red); background: rgba(224,92,92,0.1); }

        #result { margin-top: 30px; text-align: center; display: none; padding-top: 25px; border-top: 2px dashed var(--border); }
        .res-val { font-family: 'Fraunces'; font-size: 5.5rem; color: var(--amber); line-height: 0.9; font-weight: 900; }
        .calc-table { width: 100%; margin-top: 25px; border-collapse: collapse; text-align: left; font-weight: 700; color: var(--text); }
        .calc-table td { padding: 12px 5px; border-bottom: 1px solid var(--border-s); font-size: 0.95rem; }
        .calc-table .row-total { border-top: 2px solid var(--border); padding-top: 15px; }
        .calc-table .row-stock { color: var(--green); border-bottom: none; }
        .calc-table .row-missing { color: var(--red); font-weight: 800; }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="top-nav">
            <a href="index.html" class="btn-back-nav" id="lang-back">← BACK</a>
            <div style="font-family:'Barlow Condensed'; font-weight:900; color:var(--amber); letter-spacing:1px;" id="lang-calcTitle">Schnellrechner</div>
            <div style="width: 80px;"></div>
        </div>
        <div class="brand-logo">Bäckerei<span>OS</span></div>
        <div class="slogan-bar" id="lang-slogan">"WE MAKE BREAKFAST POSSIBLE IN THE FIRST PLACE."</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="label" id="lang-calcToday">Heute ist:</div>
            <div id="strip-today" class="strip-today"></div>

            <div style="display:grid; grid-template-columns: 1fr 90px; gap:10px; margin-bottom:20px;">
                <select id="prod-select" onchange="syncStock()" style="padding:15px; border-radius:12px; border:2px solid var(--border-s); font-weight:800; font-family:inherit; background:var(--surface); color:var(--text);">
                    <option value="" id="lang-calcSelect">-- Produkt --</option>
                </select>
                <input type="number" id="stock-input" placeholder="Ist" oninput="calculate()" style="padding:15px; border-radius:12px; border:2px solid var(--border-s); text-align:center; font-weight:800; background:var(--surface); color:var(--text);">
            </div>

            <div class="label" id="lang-calcStatus">Status für Morgen:</div>
            <div class="froster-group">
                <button class="f-btn yes" id="f-yes" onclick="setFroster(true)">❄️ <span id="lang-calcFrosterDone">FERTIG</span></button>
                <button class="f-btn no" id="f-no" onclick="setFroster(false)">❌ <span id="lang-calcFrosterNo">NOCH NICHT</span></button>
            </div>

            <div id="missing-tomorrow-area" style="display:none; margin-bottom:15px; border:2.5px solid rgba(224,92,92,0.3); padding:15px; border-radius:16px;">
                <div class="label" style="color:var(--red);" id="lang-calcMissing">Fehlmenge Morgen ⚠️</div>
                <input type="number" id="missing-input" placeholder="..." oninput="calculate()" style="width:100%; padding:12px; border-radius:10px; border:1.5px solid var(--border-s); text-align:center; font-weight:800;">
            </div>

            <div class="label" id="lang-calcReach">Reicht bis einschl.:</div>
            <div id="strip-target" class="strip"></div>

            <button class="btn-toggle-extras" onclick="toggleExtras()" id="lang-calcExtras">⚙️ Feiertage & Grillwetter (Aufklappen)</button>
            <div class="extras-area" id="extras-area">
                <div id="sandbox-grid"></div>
                <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-s);">
                    <div class="label" style="margin-bottom:8px;">KUNDENBESTELLUNG / FROSTERFEHLMENGEN (+ BLECHE):</div>
                    <input type="number" id="extra-order-input" placeholder="0" oninput="calculate()"
                        style="width:100%; padding:12px; border-radius:10px; border:1.5px solid var(--border-s); text-align:center; font-weight:800; font-size:1.1rem; background:var(--surface); color:var(--text);">
                </div>
            </div>

            <button class="btn-main" style="width:100%; padding:20px; border-radius:16px; background:var(--amber); color:white; border:none; font-weight:900; font-size:1.1rem; cursor:pointer;" id="btn-calc" onclick="calculate()" disabled>
                <span id="lang-calcProduce">BERECHNEN</span>
            </button>

            <div id="result">
                <div class="label" id="lang-calcResult">Produktion nötig:</div>
                <div class="res-val" id="res-val">0</div>
                <div style="font-weight:900; font-size:1.1rem; color:var(--dim); margin-bottom:20px;" id="res-unit">BLECHE</div>
                <table class="calc-table" id="calc-table"></table>
            </div>
        </div>
    </div>

    <script>
        let todayIdx = (new Date().getDay() === 0) ? 6 : new Date().getDay() - 1;
        let targetIdx = null;
        let targetOffset = null;
        let frosterDone = null;
        let simClosed = {}, simHamster = {}, simSun = {};
        const HAMSTER_ICON_SINGLE = '🐹';
        const HAMSTER_ICON_DOUBLE = '🐹<span style="font-size:1.25em; margin-left:-2px;">🐹</span>';

        // DIE VERMISSTE FUNKTION
        function applyLang() {
            const l = localStorage.getItem('BOS_LANG_CODE') || 'de';
            if (!window.BOS_LANG) return;
            const t = window.BOS_LANG[l];
            if(!t) return;
            document.querySelectorAll('[id^="lang-"]').forEach(el => {
                const k = el.id.replace('lang-', '');
                if(t[k]) el.innerText = t[k];
            });
        }

        function init() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('BOS_THEME') || 'light');
            applyLang();
            renderToday();
            buildSandbox();
            if (!window.BOS_STAMMDATEN) return;
            const sel = document.getElementById('prod-select');
            Object.keys(window.BOS_STAMMDATEN).forEach(id => {
                const opt = document.createElement('option'); opt.value = id; opt.innerText = window.BOS_STAMMDATEN[id].name;
                sel.appendChild(opt);
            });
        }

        function renderToday() {
            const c = document.getElementById('strip-today'); c.innerHTML = '';
            const days = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
            days.forEach((d, i) => {
                const p = document.createElement('div');
                p.className = `pill ${i === todayIdx ? 'active' : ''}`;
                p.style.cssText = 'min-width:unset; font-size:0.8rem;';
                p.innerText = d;
                p.onclick = () => { todayIdx = i; resetTarget(); renderToday(); renderTarget(); buildSandbox(); calculate(); };
                c.appendChild(p);
            });
        }

        function resetTarget() {
            if (frosterDone === null) return;
            const offset = frosterDone ? 2 : 1;
            targetOffset = offset;
            targetIdx = (todayIdx + offset) % 7;
        }

        function renderTarget() {
            const c = document.getElementById('strip-target'); c.innerHTML = '';
            if (frosterDone === null) return;
            const days = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
            const offset = frosterDone ? 2 : 1;
            if (targetOffset === null) resetTarget();

            const maxOffset = 8 - todayIdx; // immer Dienstag der Folgewoche
            for (let i = offset; i <= maxOffset; i++) {
                const dIdx = (todayIdx + i) % 7;
                const p = document.createElement('div');
                const isClosed = simClosed[i];
                const isTarget = i === targetOffset;
                const inRange = !isTarget && i < targetOffset;
                p.className = `pill ${isClosed ? 'is-closed' : ''} ${isTarget ? 'target' : (inRange ? 'in-range' : '')}`;
                p.innerText = days[dIdx];
                const capturedI = i;
                const capturedDIdx = dIdx;
                if (!isClosed) p.onclick = () => {
                    targetIdx = capturedDIdx;
                    targetOffset = capturedI;
                    renderTarget();
                    calculate();
                };
                c.appendChild(p);
            }
        }

        function isDayInRange(s, t, c) {
            let s1 = s, t1 = t, c1 = c;
            if (t1 < s1) t1 += 7; if (c1 < s1) c1 += 7;
            return c1 >= s1 && c1 <= t1;
        }

        function buildSandbox() {
            const grid = document.getElementById('sandbox-grid'); grid.innerHTML = '';
            const dayNames = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
            const sbMax = 8 - todayIdx;
            for(let i = 1; i <= sbMax; i++) {
                let dIdx = (todayIdx + i) % 7;
                const row = document.createElement('div'); row.className = 'wg-row';
                row.innerHTML = `<div class="wg-day">${dayNames[dIdx].substring(0,2)}</div>
                    <button class="wg-ctrl ${simClosed[i]?'is-zu':''}" onclick="simClosed[${i}]=!simClosed[${i}]; buildSandbox(); renderTarget(); calculate();">${simClosed[i]?'🔒 ZU':'AUF'}</button>
                    <button class="wg-ctrl ${(simHamster[i]||0)>0?'active':''}" onclick="simHamster[${i}]=((simHamster[${i}]||0)+1)%3; buildSandbox(); calculate();">${simHamster[i]===2?HAMSTER_ICON_DOUBLE:(simHamster[i]===1?HAMSTER_ICON_SINGLE:'· Kein')}</button>
                    <button class="wg-ctrl ${simSun[i]?'active':''}" onclick="simSun[${i}]=!simSun[${i}]; buildSandbox(); calculate();">☀️ ${simSun[i]?'An':'Aus'}</button>`;
                grid.appendChild(row);
            }
        }

        function setFroster(v) {
            frosterDone = v;
            document.getElementById('f-yes').classList.toggle('active', v);
            document.getElementById('f-no').classList.toggle('active', !v);
            document.getElementById('missing-tomorrow-area').style.display = v ? 'block' : 'none';
            document.getElementById('btn-calc').disabled = false;
            resetTarget(); renderTarget(); calculate();
        }

        function calculate() {
            const id = document.getElementById('prod-select').value; if(!id || frosterDone === null) return;
            const stock = parseInt(document.getElementById('stock-input').value) || 0;
            const missing = parseInt(document.getElementById('missing-input').value) || 0;
            const extraOrder = parseInt(document.getElementById('extra-order-input').value) || 0;
            const p = window.BOS_STAMMDATEN[id];
            const offset = frosterDone ? 2 : 1;
            if (targetOffset === null) resetTarget();
            const targetSteps = targetOffset;
            const dayNamesLong = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
            
            let totalNeed = 0, rowsHtml = '';
            
            if(frosterDone && missing > 0) {
                totalNeed += missing;
                const l = localStorage.getItem('BOS_LANG_CODE') || 'de';
                const missLabel = window.BOS_LANG?.[l]?.calcMissing || "Fehlmenge Morgen ⚠️";
                rowsHtml += `<tr class="row-missing"><td>${missLabel}</td><td style="text-align:right;">${missing}</td></tr>`;
            }

            for(let i = offset; i <= targetSteps; i++) {
                const dIdx = (todayIdx + i) % 7;
                let need = simClosed[i] ? 0 : p.needs[dIdx];
                let icon = simClosed[i] ? ' 🔒' : '';
                if(!simClosed[i]) {
                    const satNeed = p.needs[5];
                    if(simHamster[i] === 1) { need = Math.ceil((satNeed + need) / 2); icon = ' ' + HAMSTER_ICON_SINGLE; }
                    else if(simHamster[i] === 2) { need = satNeed; icon = ' ' + HAMSTER_ICON_DOUBLE; }
                    if(simSun[i] && p.sun > 0) { need += p.sun; icon += ' ☀️'; }
                }
                totalNeed += need;
                rowsHtml += `<tr style="${simClosed[i]?'opacity:0.4; text-decoration:line-through;':''}"><td>${dayNamesLong[dIdx]}${icon}</td><td style="text-align:right;">${need}</td></tr>`;
            }

            if (extraOrder > 0) {
                totalNeed += extraOrder;
                rowsHtml += `<tr style="color:var(--amber); font-weight:800;"><td>Sonderbestellung ★</td><td style="text-align:right;">+${extraOrder}</td></tr>`;
            }
            const rawNeeded = Math.max(0, totalNeed - stock);
            rowsHtml += `<tr class="row-total"><td>Gesamtbedarf</td><td style="text-align:right;">${totalNeed}</td></tr><tr class="row-stock"><td>- Bestand</td><td style="text-align:right;">-${stock}</td></tr>`;
            document.getElementById('calc-table').innerHTML = rowsHtml;

            let displayVal = rawNeeded, unit = "BLECHE";
            if(p.unit === 1) { displayVal = (rawNeeded * 25/30) * 1.06; unit = "PRESSEN"; }
            else if(p.unit === 2) { displayVal = rawNeeded * 20/30; unit = "PRESSEN"; }
            else if(p.unit === 3) { displayVal = rawNeeded / 9; unit = "BRÜHST."; }
            document.getElementById('res-val').innerText = displayVal % 1 !== 0 ? displayVal.toFixed(1).replace('.', ',') : displayVal;
            document.getElementById('res-unit').innerText = unit;
            document.getElementById('result').style.display = 'block';
        }

        function toggleExtras() { const a = document.getElementById('extras-area'); a.style.display = a.style.display==='none'?'block':'none'; }
        function syncStock() {
            const id = document.getElementById('prod-select').value;
            if (!id) return;
            const inp = document.getElementById('stock-input');
            // Inventur-Alter prüfen
            if (window.BOS_INVENTUR?.products) {
                let latestTs = 0;
                for (const key in window.BOS_INVENTUR.products) {
                    if (window.BOS_INVENTUR.products[key].ts > latestTs)
                        latestTs = window.BOS_INVENTUR.products[key].ts;
                }
                if (latestTs > 0 && (Date.now() - latestTs) / 3600000 > 24) {
                    inp.value = '';
                    inp.placeholder = '⚠️ Manuell eingeben';
                    inp.style.borderColor = 'var(--red)';
                    calculate();
                    return;
                }
            }
            inp.style.borderColor = '';
            inp.placeholder = 'Ist';
            if (window.BOS_INVENTUR?.stocks?.[id] !== undefined)
                inp.value = window.BOS_INVENTUR.stocks[id];
            calculate();
        }
        window.onload = init;
    </script>
  <script src="shell.js"></script>
</body>
</html>
