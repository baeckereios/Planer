<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markt & Strategie | BäckereiOS</title>
    <link rel="stylesheet" href="../systemdesign.css"> 

    <style>
        :root {
            --paper: #f4f4f0;
            --ink: #1a1a1a;
            --line: #ccc;
            --alert: #c0392b; 
            --safe: #27ae60;
            --neutral: #7f8c8d;
            --highlight: #d35400; 
        }

        body {
            background-color: white;
            color: var(--ink);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            padding-bottom: 60px;
        }

        /* ─── NAV ─── */
        .top-bar {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid var(--line);
            display: flex; align-items: center;
        }
        .back-nav {
            text-decoration: none; font-family: 'Barlow Condensed'; font-weight: 800;
            color: var(--ink); text-transform: uppercase; font-size: 0.9rem;
            display: flex; align-items: center; gap: 5px;
            padding: 8px 16px; background: var(--paper); border-radius: 8px;
            border: 1px solid var(--line); transition: 0.2s;
        }
        .back-nav:hover { background: var(--ink); color: white; }

        /* ─── HEADER ─── */
        .market-header {
            padding: 40px 20px 30px;
            text-align: center;
            background: white;
        }
        .market-brand {
            font-family: 'Fraunces', serif; font-weight: 900; font-size: 3rem;
            text-transform: uppercase; letter-spacing: -2px; line-height: 1; color: var(--ink);
        }
        .status-badge {
            display: inline-block; margin-top: 10px; padding: 6px 15px;
            border: 2px solid var(--highlight); color: var(--highlight);
            background: rgba(211, 84, 0, 0.05); font-family: 'Barlow Condensed';
            font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
        }

        /* ─── BEREICH 1: HARD FACTS (Grau) ─── */
        .hard-facts-zone {
            background-color: #f0f2f5; /* Technisches Grau */
            padding: 40px 15px 60px;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .zone-title {
            font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900;
            margin-bottom: 30px; text-align: center; color: #2c3e50;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .zone-title span { background: #2c3e50; color: white; padding: 5px 15px; font-size: 1rem; font-family: 'Barlow Condensed'; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; }

        .container { max-width: 900px; margin: 0 auto; }

        /* PREIS GRID */
        .commodities-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 40px;
        }
        .comm-card {
            background: white; border: 1px solid #d1d9e6; padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .comm-title { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: var(--neutral); height: 2.2em; }
        .comm-value { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; margin: 5px 0 8px; color: var(--ink); line-height: 1; }
        .comm-trend { font-size: 0.8rem; font-weight: bold; }
        .trend-up { color: var(--alert); } .trend-down { color: var(--safe); } .trend-flat { color: var(--neutral); }

        /* ANALYSE GRID (Hintergründe) */
        .analysis-grid {
            display: grid; grid-template-columns: 1fr; gap: 20px;
        }
        @media (min-width: 700px) { .analysis-grid { grid-template-columns: 1fr 1fr; } }

        .analysis-card {
            background: white; border-left: 5px solid #2c3e50; /* Seriöses Dunkelblau */
            padding: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .analysis-topic {
            font-family: 'Barlow Condensed'; font-weight: 800; font-size: 0.8rem;
            color: #2c3e50; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
        }
        .analysis-headline {
            font-family: 'Fraunces', serif; font-size: 1.3rem; line-height: 1.3;
            margin: 0 0 10px 0; color: var(--ink);
        }
        .analysis-text { font-size: 0.95rem; line-height: 1.6; color: #444; }

        /* ─── BEREICH 2: SOFT SKILLS (Weiß) ─── */
        .soft-news-zone {
            padding: 60px 15px 80px; background: white;
        }
        .trend-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }
        .trend-card {
            border: 1px solid var(--line); border-radius: 12px; padding: 20px;
            transition: 0.2s; position: relative; overflow: hidden;
        }
        .trend-card:hover { border-color: var(--highlight); transform: translateY(-3px); }
        .trend-tag {
            display: inline-block; padding: 3px 8px; background: var(--paper);
            font-family: 'Barlow Condensed'; font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; color: var(--neutral); border-radius: 4px; margin-bottom: 10px;
        }
        .trend-headline { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; line-height: 1.3; }
        .trend-text { font-size: 0.9rem; color: #666; line-height: 1.5; }

        #error-msg { color: var(--alert); text-align: center; display: none; margin-top: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="../index.html" class="back-nav">← Cockpit</a>
    </div>

    <header class="market-header">
        <div class="market-brand">Bäcker<span style="font-style:italic; color:var(--neutral);">Radar</span></div>
        <div id="status-badge" class="status-badge">Lade Daten...</div>
    </header>

    <div id="error-msg">⚠️ Datei 'markt_daten.js' fehlt!</div>

    <div class="hard-facts-zone">
        <div class="container">
            <div class="zone-title">
                <span>Hard Facts</span> Rohstoffe &amp; Ursachen
            </div>
            
            <div class="commodities-grid" id="comm-grid"></div>

            <div style="font-family:'Barlow Condensed'; font-weight:800; text-transform:uppercase; color:#2c3e50; margin-bottom:15px; letter-spacing:1px;">Markt-Analyse & Hintergründe</div>
            <div class="analysis-grid" id="analysis-grid"></div>
        </div>
    </div>

    <div class="soft-news-zone">
        <div class="container">
            <div class="zone-title">
                <span style="background:var(--highlight);">Magazin</span> Trends &amp; Inspiration
            </div>
            <div class="trend-grid" id="trend-grid"></div>
        </div>
    </div>

    <script src="markt_daten.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof marktDaten === 'undefined') {
                document.getElementById('error-msg').style.display = 'block'; return;
            }

            // Header
            document.getElementById('status-badge').innerText = `STAND: ${marktDaten.meta.ausgabe}`;

            // 1. Rohstoffe
            const commGrid = document.getElementById('comm-grid');
            marktDaten.rohstoffe.forEach(item => {
                let trendClass = 'trend-flat'; let arrow = '➖';
                if (item.trend === 'up') { trendClass = 'trend-up'; arrow = '▲'; }
                if (item.trend === 'down') { trendClass = 'trend-down'; arrow = '▼'; }

                commGrid.innerHTML += `
                <div class="comm-card">
                    <div class="comm-title">${item.name}</div>
                    <div class="comm-value">${item.preis}</div>
                    <div class="comm-trend ${trendClass}">
                        <span>${arrow} ${item.prozent}</span> <span style="font-weight:normal; color:#888;">${item.info}</span>
                    </div>
                </div>`;
            });

            // 2. Analysen (Die "Warum" Texte)
            const analysisGrid = document.getElementById('analysis-grid');
            marktDaten.analysen.forEach(item => {
                analysisGrid.innerHTML += `
                <div class="analysis-card">
                    <div class="analysis-topic">🧐 Hintergrund: ${item.thema}</div>
                    <h3 class="analysis-headline">${item.headline}</h3>
                    <div class="analysis-text">${item.text}</div>
                </div>`;
            });

            // 3. Trends (Das Magazin)
            const trendGrid = document.getElementById('trend-grid');
            marktDaten.trends.forEach(item => {
                trendGrid.innerHTML += `
                <div class="trend-card">
                    <div class="trend-tag">${item.kategorie}</div>
                    <div class="trend-headline">${item.headline}</div>
                    <div class="trend-text">${item.text}</div>
                </div>`;
            });
        });
    </script>
</body>
</html>
