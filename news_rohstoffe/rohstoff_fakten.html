<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RohstoffFakten | BäckereiOS</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <style>
        :root {
            --paper: #f4f4f0;
            --ink: #1a1a1a;
            --line: #ccc;
            --alert: #c0392b;
            --safe: #27ae60;
            --neutral: #7f8c8d;
            --highlight: #d35400;
        }
        body { background-color: white; color: var(--ink); font-family: 'Barlow', sans-serif; margin: 0; padding-bottom: 100px; }

        .market-header { padding: 30px 20px 20px; text-align: center; background: white; }
        .market-brand { font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.4rem; text-transform: uppercase; letter-spacing: -2px; line-height: 1; color: var(--ink); }
        .status-badge { display: inline-block; margin-top: 10px; padding: 6px 15px; border: 2px solid #2c3e50; color: #2c3e50; background: rgba(44,62,80,0.05); font-family: 'Barlow Condensed'; font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }

        .hard-facts-zone { background-color: #f0f2f5; padding: 30px 15px 50px; border-top: 1px solid var(--line); }
        .zone-title { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; text-align: center; color: #2c3e50; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .zone-title span { background: #2c3e50; color: white; padding: 4px 12px; font-size: 0.9rem; font-family: 'Barlow Condensed'; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; }
        .container { max-width: 900px; margin: 0 auto; }

        .commodities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .comm-card { background: white; border: 1px solid #d1d9e6; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .comm-title { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: var(--neutral); height: 2.2em; }
        .comm-value { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; margin: 5px 0 8px; color: var(--ink); line-height: 1; }
        .comm-trend { font-size: 0.8rem; font-weight: bold; }
        .trend-up { color: var(--alert); } .trend-down { color: var(--safe); } .trend-flat { color: var(--neutral); }

        .analysis-section-label { font-family: 'Barlow Condensed'; font-weight: 800; text-transform: uppercase; color: #2c3e50; margin-bottom: 15px; letter-spacing: 1px; }
        .analysis-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 700px) { .analysis-grid { grid-template-columns: 1fr 1fr; } }
        .analysis-card { background: white; border-left: 5px solid #2c3e50; padding: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .analysis-topic { font-family: 'Barlow Condensed'; font-weight: 800; font-size: 0.8rem; color: #2c3e50; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .analysis-headline { font-family: 'Fraunces', serif; font-size: 1.3rem; line-height: 1.3; margin: 0 0 10px 0; color: var(--ink); }
        .analysis-text { font-size: 0.95rem; line-height: 1.6; color: #444; }

        #error-msg { color: var(--alert); text-align: center; display: none; margin-top: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="market-header">
        <div class="market-brand">Rohstoff<span style="font-style:italic; color:var(--neutral);">Fakten</span></div>
        <div id="status-badge" class="status-badge">Lade Daten...</div>
    </header>

    <div id="error-msg">⚠️ Datei 'markt_daten.js' fehlt!</div>

    <div class="hard-facts-zone">
        <div class="container">
            <div class="zone-title">
                <span>Hard Facts</span> Rohstoffe &amp; Preise
            </div>
            <div class="commodities-grid" id="comm-grid"></div>
            <div class="analysis-section-label">Markt-Analyse &amp; Hintergründe</div>
            <div class="analysis-grid" id="analysis-grid"></div>
        </div>
    </div>

    <script src="../markt_daten.js"></script>
    <script>
        // 1. Daten direkt aufbauen (ohne Warteschleife)
        function initMarket() {
            if (typeof marktDaten === 'undefined') {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            document.getElementById('status-badge').innerText = `STAND: ${marktDaten.meta.ausgabe}`;

            const commGrid = document.getElementById('comm-grid');
            let commHtml = '';
            marktDaten.rohstoffe.forEach(item => {
                let trendClass = 'trend-flat'; let arrow = '➖';
                if (item.trend === 'up')   { trendClass = 'trend-up';   arrow = '▲'; }
                if (item.trend === 'down') { trendClass = 'trend-down'; arrow = '▼'; }
                commHtml += `
                <div class="comm-card">
                    <div class="comm-title">${item.name}</div>
                    <div class="comm-value">${item.preis}</div>
                    <div class="comm-trend ${trendClass}">
                        <span>${arrow} ${item.prozent}</span> <span style="font-weight:normal; color:#888;">${item.info}</span>
                    </div>
                </div>`;
            });
            commGrid.innerHTML = commHtml;

            const analysisGrid = document.getElementById('analysis-grid');
            let analysisHtml = '';
            marktDaten.analysen.forEach(item => {
                analysisHtml += `
                <div class="analysis-card">
                    <div class="analysis-topic">🧐 Hintergrund: ${item.thema}</div>
                    <h3 class="analysis-headline">${item.headline}</h3>
                    <div class="analysis-text">${item.text}</div>
                </div>`;
            });
            analysisGrid.innerHTML = analysisHtml;
        }

        // Führt den Aufbau sofort aus
        initMarket();

        // 2. Shell.js sicher und dynamisch nachladen
        // Prüft, ob wir NICHT im Assistenten sind
        if (window === window.parent && !window.location.search.includes('embedded=1')) {
            const shellScript = document.createElement('script');
            shellScript.src = '../shell.js';
            document.body.appendChild(shellScript);
        } else {
            // Falls wir im Assistenten sind: Padding unten entfernen und Header ausblenden
            document.body.style.paddingBottom = "0";
            document.querySelector('.market-header').style.display = "none";
            document.querySelector('.hard-facts-zone').style.paddingTop = "10px";
        }
    </script>
</body>
</html>
