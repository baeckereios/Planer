<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BäckerSpiele | BäckereiOS</title>
    <link rel="stylesheet" href="../systemdesign.css">
    <style>
        .games-intro {
            padding: 24px 16px 8px;
            text-align: center;
        }
        .games-intro h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0 0 6px;
            color: var(--text);
        }
        .games-intro p {
            font-size: 0.9rem;
            color: var(--dim);
            margin: 0;
        }

        .games-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 600px;
            margin: 0 auto;
        }

        .game-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 18px 16px;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.2s, transform 0.15s;
        }
        .game-card:hover, .game-card:active {
            border-color: var(--amber);
            transform: translateY(-2px);
        }

        .game-icon {
            font-size: 2.8rem;
            flex-shrink: 0;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border-radius: 12px;
        }

        .game-info { flex: 1; }
        .game-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: var(--text);
        }
        .game-desc {
            font-size: 0.88rem;
            color: var(--dim);
            line-height: 1.4;
        }
        .game-tag {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 8px;
            background: var(--amber);
            color: white;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }
        .game-arrow {
            color: var(--amber);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .games-footer {
            text-align: center;
            padding: 20px 16px 40px;
            font-size: 0.8rem;
            color: var(--dim);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="games-intro">
        <h2>🎮 BäckerSpiele</h2>
        <p>Pause mit Sinn — Spiele rund ums Handwerk</p>
    </div>

    <div class="games-list">

        <a href="../backspiel.html" class="game-card">
            <div class="game-icon">🏃</div>
            <div class="game-info">
                <div class="game-name">BäckerRun</div>
                <div class="game-desc">Side-Scroller durch die Backstube. Hindernisse ausweichen, Punkte sammeln, Highscore knacken.</div>
                <span class="game-tag">Runner</span>
            </div>
            <div class="game-arrow">▶</div>
        </a>

    </div>

    <div class="games-footer">Mehr Spiele kommen bald</div>

    <script src="../shell.js"></script>
</body>
</html>
